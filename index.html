// ─── TRUE / FALSE (IDs 301–325) ───────────────────────────────────────────
{id:301,type:'tf',topic:'Star Schema',difficulty:'easy',q:"In ShopFlow's star schema, FACT_ORDERS sits at the centre and dimension tables (DIM_CUSTOMERS, DIM_PRODUCTS, etc.) connect to it via foreign keys.",ans:true,exp:"TRUE. Star schema = one central fact table + surrounding dimension tables. FACT_ORDERS contains measures (price, freight, delay days) and foreign keys to each dimension. Analysts JOIN FACT_ORDERS to any dimension for context. The schema visually resembles a star — fact at centre, dims at the points."},
{id:302,type:'tf',topic:'FACT_ORDERS',difficulty:'easy',q:"In ShopFlow, FACT_ORDERS has one row per order (matching RAW_ORDERS 1-to-1).",ans:false,exp:"FALSE. FACT_ORDERS has one row per ORDER ITEM (matching RAW_ORDER_ITEMS grain). A single order with 3 items produces 3 rows in FACT_ORDERS. This is the order_items grain — more granular than order grain — because measures like price and freight_value exist at the item level, not the order level."},
{id:303,type:'tf',topic:'DIM_DATE',difficulty:'easy',q:"DIM_DATE is populated by joining existing order timestamps — one row is added per unique date found in STG_ORDERS.",ans:false,exp:"FALSE. DIM_DATE is generated using a row generator (e.g. TABLE(GENERATOR(ROWCOUNT => 3000))) to create a complete calendar — one row per calendar day covering the full date range, including days with no orders. Generating from order dates would leave gaps, breaking date-based analytics like 'orders per day' where zero-order days should still appear."},
{id:304,type:'tf',topic:'Clustering',difficulty:'easy',q:"Adding a clustering key to FACT_ORDERS reduces the amount of data scanned for queries that filter on the clustered columns.",ans:true,exp:"TRUE. Snowflake stores data in micro-partitions (16MB compressed). A clustering key reorganises micro-partitions so rows with similar values of the clustered column(s) land in the same micro-partition. A query WHERE order_purchase_ts BETWEEN '2018-01' AND '2018-06' can prune all micro-partitions outside that range — scanning a fraction of the data."},
{id:305,type:'tf',topic:'DIM_CUSTOMERS',difficulty:'easy',q:"DIM_CUSTOMERS uses customer_unique_id (not customer_id) as its primary key because customer_unique_id identifies the actual person.",ans:true,exp:"TRUE. customer_id is order-scoped — one person placing 5 orders generates 5 different customer_ids. customer_unique_id is the true person identifier. DIM_CUSTOMERS deduplicates to one row per person using customer_unique_id, then FACT_ORDERS joins via customer_unique_id for person-level analytics."},
{id:306,type:'tf',topic:'Star Schema',difficulty:'easy',q:"The grain of a fact table is defined as the most atomic level of detail each row represents.",ans:true,exp:"TRUE. Grain definition is the most important first step in star schema design. ShopFlow FACT_ORDERS grain = one row per order line item (order_id + order_item_id combination). Getting the grain wrong — e.g. one row per order — would require aggregating prices across items before loading, losing item-level detail forever."},
{id:307,type:'tf',topic:'DIM_DATE',difficulty:'easy',q:"DIM_DATE in ShopFlow includes attributes like year, month, quarter, and day_of_week to support GROUP BY in analytics without requiring date functions on FACT_ORDERS.",ans:true,exp:"TRUE. Without DIM_DATE, analysts write DATE_TRUNC('month', order_purchase_ts) in every query. With DIM_DATE, they JOIN on order_date_key and GROUP BY dim.year_month — simpler, faster (pre-computed), and consistent. Fiscal calendar overrides can also be stored in DIM_DATE."},
{id:308,type:'tf',topic:'Clustering',difficulty:'medium',q:"ALTER TABLE FACT_ORDERS CLUSTER BY (order_purchase_ts, seller_id) immediately reclusters all existing micro-partitions.",ans:false,exp:"FALSE. ALTER TABLE ... CLUSTER BY defines the clustering key but does not immediately recluster existing data. Snowflake reclusters incrementally in the background using the Automatic Clustering service (charged separately). For immediate reclustering on existing data, you would use ALTER TABLE FACT_ORDERS RECLUSTER."},
{id:309,type:'tf',topic:'DIM_SELLERS',difficulty:'medium',q:"DIM_SELLERS enriches seller data with latitude/longitude by joining STG_SELLERS to STG_GEOLOCATION on seller_zip_code_prefix.",ans:true,exp:"TRUE. STG_SELLERS has seller_zip_code_prefix. STG_GEOLOCATION has lat/lng per zip. LEFT JOIN on zip adds coordinates to each seller — enabling seller location analysis and distance calculations. Same pattern as DIM_CUSTOMERS enriching customer data with geolocation."},
{id:310,type:'tf',topic:'Star Schema',difficulty:'medium',q:"A snowflake schema differs from a star schema by normalising dimension tables — for example, having a separate STATE table that DIM_CUSTOMERS references.",ans:true,exp:"TRUE. Snowflake schema (the data modelling concept, not the Snowflake platform) normalises dimensions into sub-dimensions to reduce redundancy. Star schema keeps dimensions denormalised (state/city directly in DIM_CUSTOMERS). DWH best practice is usually star schema — simpler queries, better query performance, easier for analysts."},
{id:311,type:'tf',topic:'FACT_ORDERS',difficulty:'medium',q:"FACT_ORDERS should store both price and freight_value as separate columns rather than combining them into a single total_item_revenue column.",ans:true,exp:"TRUE. Keeping measures separate preserves analytical flexibility. Analysts can: sum only price (product revenue), sum only freight (logistics cost), or add both (total item value). Once combined, the components are lost. The analytics layer should expose atomic measures — aggregation is the analyst's job."},
{id:312,type:'tf',topic:'DIM_DATE',difficulty:'medium',q:"Using DATEADD('day', SEQ4(), '2016-01-01') in a GENERATOR query produces one row per day starting from Jan 1 2016.",ans:true,exp:"TRUE. TABLE(GENERATOR(ROWCOUNT => N)) generates N rows. SEQ4() produces sequential integers 0, 1, 2... DATEADD('day', SEQ4(), '2016-01-01') adds 0 days, 1 day, 2 days... to the start date — producing 2016-01-01, 2016-01-02, 2016-01-03, etc. This is the standard Snowflake pattern for DIM_DATE generation."},
{id:313,type:'tf',topic:'Clustering',difficulty:'medium',q:"Result cache and clustering keys are complementary — clustering speeds up first-run queries while result cache eliminates cost on repeated identical queries.",ans:true,exp:"TRUE. These are two separate optimizations. Clustering: reduces micro-partitions scanned per new query. Result cache: returns cached result instantly for exact query repeats (within 24 hours, no data changes). In Phase 03, you typically run the GMV query before and after clustering to prove partition pruning works — result cache is then tested with a second identical run."},
{id:314,type:'tf',topic:'DIM_PRODUCTS',difficulty:'medium',q:"DIM_PRODUCTS in ShopFlow reads directly from STG_PRODUCTS — no join to STG_GEOLOCATION is needed because products don't have locations.",ans:true,exp:"TRUE. Products have physical dimensions and categories but no geographic location. DIM_PRODUCTS is a simple projection of STG_PRODUCTS columns — no enrichment join needed. Compare to DIM_CUSTOMERS and DIM_SELLERS which both LEFT JOIN STG_GEOLOCATION to add lat/lng."},
{id:315,type:'tf',topic:'Star Schema',difficulty:'hard',q:"A slowly changing dimension (SCD Type 2) would add multiple rows per customer to DIM_CUSTOMERS — one per address change. ShopFlow implements SCD Type 2.",ans:false,exp:"FALSE. ShopFlow implements SCD Type 1 (overwrite) — one row per customer_unique_id, no historical tracking. SCD Type 2 adds an effective_from, effective_to, and is_current flag, creating multiple rows per entity. For SnowPro Core, understand SCD types conceptually but ShopFlow keeps it simple with Type 1."},
{id:316,type:'tf',topic:'FACT_ORDERS',difficulty:'hard',q:"Storing delivery_delay_days in FACT_ORDERS is an example of pre-aggregation — it violates the principle that fact tables should store only raw measures.",ans:false,exp:"FALSE. delivery_delay_days is a DERIVED measure (computed from two timestamps) but it is still row-level — one value per order item. Pre-aggregation would mean storing SUM(price) by month — a rolled-up value. Derived row-level measures are standard in fact tables. Computed once in STAGED, reused many times in analytics — correct design."},
{id:317,type:'tf',topic:'DIM_DATE',difficulty:'hard',q:"DIM_DATE rows for dates with no orders are still useful for analytics.",ans:true,exp:"TRUE. A BI chart of 'orders per day' needs ALL days on the X axis — even days with zero orders. Without a complete DIM_DATE, gaps appear. JOINing DIM_DATE to FACT_ORDERS LEFT JOIN ensures all days appear in results, with 0 orders on quiet days. This is impossible if DIM_DATE only contains dates with orders."},
{id:318,type:'tf',topic:'Clustering',difficulty:'hard',q:"A clustering key on (DATE_TRUNC('month', order_purchase_ts), seller_id) is more efficient for monthly-by-seller queries than a key on (order_purchase_ts, seller_id).",ans:true,exp:"TRUE. Truncating to month means rows from the same month group together in micro-partitions. A query filtering WHERE month = '2018-01' AND seller_id = 'abc' can prune to just those micro-partitions. With raw timestamp, monthly grouping is less tight — more micro-partitions span month boundaries — less effective pruning."},
{id:319,type:'tf',topic:'Star Schema',difficulty:'hard',q:"In FACT_ORDERS, storing seller_id as a foreign key to DIM_SELLERS is better than denormalizing seller_city directly into FACT_ORDERS.",ans:true,exp:"TRUE. Normalizing to a foreign key (seller_id → DIM_SELLERS) means seller attributes (city, state, lat/lng) are stored once. If seller city changes, only DIM_SELLERS is updated — FACT_ORDERS is untouched. Denormalizing city into every FACT_ORDERS row = data duplication and update anomalies. Star schema separates facts (measures) from dimensions (attributes)."},
{id:320,type:'tf',topic:'FACT_ORDERS',difficulty:'hard',q:"FACT_ORDERS is built using INNER JOIN between STG_ORDER_ITEMS and STG_ORDERS, which would drop order items for orders not in STG_ORDERS.",ans:true,exp:"TRUE. FACT_ORDERS: SELECT ... FROM STG_ORDER_ITEMS i JOIN STG_ORDERS o ON i.order_id = o.order_id. INNER JOIN requires both sides to match. The Phase 02 referential integrity check confirmed 0 orphan order items — so INNER JOIN is safe here. If orphans existed, LEFT JOIN would be needed to preserve all items."},
{id:321,type:'tf',topic:'DIM_DATE',difficulty:'easy',q:"GENERATOR in Snowflake is a special table function that produces rows without reading from any stored table.",ans:true,exp:"TRUE. TABLE(GENERATOR(ROWCOUNT => 3000)) produces exactly 3000 rows of synthetic data. Combined with SEQ4() and DATEADD, it generates a complete date sequence. No source table needed — pure computation. This is the standard pattern for building DIM_DATE in Snowflake."},
{id:322,type:'tf',topic:'Clustering',difficulty:'easy',q:"Snowflake charges extra for queries that benefit from clustering keys — similar to index maintenance costs in traditional databases.",ans:false,exp:"FALSE. Query pruning from clustering keys has no extra charge. You pay for: (1) warehouse compute while querying (same as without clustering), (2) Automatic Clustering service if enabled (charged in credits for background reclustering). Query execution itself doesn't have a 'clustering surcharge'."},
{id:323,type:'tf',topic:'Star Schema',difficulty:'medium',q:"In a star schema, dimension tables typically have more columns but fewer rows than the central fact table.",ans:true,exp:"TRUE. DIM_CUSTOMERS: ~96k rows, ~7 columns. FACT_ORDERS: ~112k rows, ~15 columns. Dimensions are wide (many attributes) but narrow in rows (one per entity). Facts are tall (many rows, one per event) with fewer columns (mostly foreign keys and measures). This ratio is typical for star schemas."},
{id:324,type:'tf',topic:'DIM_SELLERS',difficulty:'medium',q:"The LEFT JOIN between STG_SELLERS and STG_GEOLOCATION in DIM_SELLERS means sellers with no matching zip code in geolocation will still appear in DIM_SELLERS with NULL lat/lng.",ans:true,exp:"TRUE. LEFT JOIN preserves all STG_SELLERS rows. Sellers with a zip code not in STG_GEOLOCATION get NULL for lat/lng. They are still valid sellers who can appear in FACT_ORDERS — just without coordinate data. Excluding them with INNER JOIN would create orphan seller_id references in FACT_ORDERS."},
{id:325,type:'tf',topic:'FACT_ORDERS',difficulty:'hard',q:"FACT_ORDERS stores payment_value from STG_PAYMENTS joined to STG_ORDER_ITEMS — this is the recommended approach for including payment data.",ans:false,exp:"FALSE. STG_PAYMENTS is order-level (one payment row per order), not item-level. Joining payment to item-level FACT_ORDERS creates fan-out — a 3-item order with one $100 payment would produce 3 rows each with $100 = $300 total (wrong). Payment analysis is best done by joining FACT_ORDERS to a separate aggregated payment view, or in a separate FACT_PAYMENTS table."},

// ─── MCQ (IDs 326–360) ────────────────────────────────────────────────────
{id:326,type:'mcq',topic:'Star Schema',difficulty:'easy',q:"What is the grain of FACT_ORDERS in ShopFlow?",opts:["A) One row per order (order_id)","B) One row per order item (order_id + order_item_id)","C) One row per customer","D) One row per payment"],ans:'B',exp:"FACT_ORDERS grain = STG_ORDER_ITEMS grain = one row per line item within an order. This is the most granular transactional level — it captures individual product purchases. One order with 3 items = 3 FACT rows. This grain preserves price and freight at the item level."},
{id:327,type:'mcq',topic:'DIM_DATE',difficulty:'easy',q:"Why is DIM_DATE built with GENERATOR rather than derived from order timestamps?",opts:["A) GENERATOR is faster than timestamp extraction","B) GENERATOR creates a complete calendar — including days with zero orders — enabling correct time-series analytics","C) Order timestamps have timezone issues that GENERATOR avoids","D) DIM_DATE must include future dates — GENERATOR creates them"],ans:'B',exp:"A date dimension must be complete — every day in the analysis range, even quiet days. Deriving dates from orders would only include days with transactions — gaps would appear in time-series charts. GENERATOR ensures a continuous, gapless calendar."},
{id:328,type:'mcq',topic:'FACT_ORDERS',difficulty:'easy',q:"FACT_ORDERS has a column order_date_key (DATE). It is joined to DIM_DATE on: FACT.order_date_key = DIM_DATE.date_key. What type is this join typically called?",opts:["A) Fact-to-fact join","B) Conformed dimension join","C) Date spine join","D) Degenerate dimension join"],ans:'C',exp:"Joining a fact table to a date dimension via a date key is called a date spine join (or date dimension join). The date dimension acts as the 'spine' of time-series analysis. Conformed dimension applies to dimensions shared across multiple fact tables (which DIM_DATE often is). Degenerate dimension is a dimension key stored in the fact table without its own dimension table."},
{id:329,type:'mcq',topic:'Clustering',difficulty:'easy',q:"Before adding a clustering key, you run the GMV-by-seller query and note it scans 1.2TB. After clustering by (DATE_TRUNC('month', order_purchase_ts), seller_id) and querying Jan 2018 for seller X, what would you expect?",opts:["A) Same scan — clustering doesn't affect scan size","B) Smaller scan — micro-partitions pruned to only Jan 2018 rows for seller X","C) Larger scan — clustering reorganizes data, adding overhead","D) Zero scan — result cache returns the answer"],ans:'B',exp:"Clustering key on month + seller_id groups Jan 2018 + seller X rows into the same micro-partitions. The query's WHERE clause prunes all other micro-partitions — scanning only a fraction of 1.2TB. This is micro-partition pruning — the core benefit of clustering in Snowflake."},
{id:330,type:'mcq',topic:'DIM_CUSTOMERS',difficulty:'easy',q:"DIM_CUSTOMERS deduplicates to one row per customer_unique_id using QUALIFY. What is the ORDER BY in the ROW_NUMBER window function?",opts:["A) ORDER BY customer_id ASC — alphabetical","B) ORDER BY order_purchase_ts DESC — most recent order first","C) ORDER BY _loaded_at DESC — most recently loaded record","D) No ORDER BY needed — all records for the same unique ID are identical"],ans:'B',exp:"A customer who placed multiple orders appears multiple times in STG_CUSTOMERS (one per order/customer_id). To deduplicate to one person, ROW_NUMBER() PARTITION BY customer_unique_id ORDER BY order_purchase_ts DESC keeps the most recent order's record — the most up-to-date city/state information."},
{id:331,type:'mcq',topic:'Star Schema',difficulty:'easy',q:"Which fact table column is a DEGENERATE DIMENSION?",opts:["A) price — a numeric measure","B) seller_id — FK to DIM_SELLERS","C) order_id — an identifier stored in the fact table with no corresponding dimension table","D) order_date_key — FK to DIM_DATE"],ans:'C',exp:"Degenerate dimension: an identifier (like order_id) that is stored in the fact table for traceability but has no own dimension table. Order_id is the transaction key — useful for drilling back to the source order but not worth building a DIM_ORDERS table for. seller_id is a true FK to DIM_SELLERS, not degenerate."},
{id:332,type:'mcq',topic:'DIM_DATE',difficulty:'easy',q:"How many rows does DIM_DATE contain if ROWCOUNT = 3650?",opts:["A) 3,650 rows — approximately 10 years of daily records","B) 3,650 rows — approximately 1 year (365 * 10 decades)","C) Exactly 365 rows","D) Variable — depends on how many dates appear in FACT_ORDERS"],ans:'A',exp:"GENERATOR(ROWCOUNT => 3650) produces exactly 3650 rows. Each row represents one calendar day. 3650 / 365 ≈ 10 years of coverage. ShopFlow uses ~3000 rows (about 8 years) to cover the Olist dataset dates plus some future buffer. ROWCOUNT is the exact row count — no variability."},
{id:333,type:'mcq',topic:'FACT_ORDERS',difficulty:'medium',q:"FACT_ORDERS is built with: SELECT ... FROM STG_ORDER_ITEMS i JOIN STG_ORDERS o ON i.order_id = o.order_id. What type of join should be used between FACT_ORDERS and DIM_CUSTOMERS in analytics queries?",opts:["A) INNER JOIN — only customers with orders matter","B) LEFT JOIN — preserve all FACT rows even when customer dimension is NULL","C) RIGHT JOIN — preserve all customers even without orders","D) CROSS JOIN — match every order to every customer"],ans:'B',exp:"Phase 02 found 483 orders without a matching customer. INNER JOIN on DIM_CUSTOMERS would silently drop those 483 order rows. LEFT JOIN preserves all FACT rows — orders without customers get NULL for customer attributes. Revenue queries must not silently lose ~0.5% of orders."},
{id:334,type:'mcq',topic:'Clustering',difficulty:'medium',q:"You add a clustering key on order_purchase_ts (not DATE_TRUNC'd) to FACT_ORDERS. A query filters WHERE DATE_TRUNC('month', order_purchase_ts) = '2018-01-01'. Will clustering be effective?",opts:["A) Yes — Snowflake can derive the month range from the timestamp cluster","B) Partially — some pruning occurs since timestamps cluster together, but not as precisely as DATE_TRUNC on the key","C) No — the clustering key must exactly match the filter expression","D) Yes — all timestamp-based filters benefit equally from timestamp clustering"],ans:'B',exp:"Clustering on the raw timestamp groups rows chronologically — Jan 2018 timestamps do land near each other in micro-partitions. But within each micro-partition, rows from different months might co-exist (partition boundaries don't align exactly with month boundaries). DATE_TRUNC on the cluster key is more aligned with month-based queries."},
{id:335,type:'mcq',topic:'DIM_DATE',difficulty:'medium',q:"Which Snowflake function is used to calculate the quarter from a date in DIM_DATE?",opts:["A) QUARTER(date_key)","B) DATE_PART('quarter', date_key)","C) TO_CHAR(date_key, 'Q')","D) All of the above work correctly"],ans:'D',exp:"All three extract the quarter (1-4) from a date. QUARTER() is a Snowflake shorthand. DATE_PART('quarter', ...) is more verbose but ANSI-compatible. TO_CHAR(..., 'Q') returns it as a string character. DIM_DATE pre-computes these and stores them as columns — so the analyst never needs to call these functions; they just GROUP BY dim_date.quarter_of_year."},
{id:336,type:'mcq',topic:'Star Schema',difficulty:'medium',q:"Business query: 'Which product categories generate the most revenue?' — which tables are joined?",opts:["A) FACT_ORDERS JOIN DIM_PRODUCTS only","B) FACT_ORDERS JOIN DIM_PRODUCTS JOIN DIM_DATE","C) STG_ORDER_ITEMS JOIN STG_PRODUCTS","D) FACT_ORDERS JOIN DIM_PRODUCTS, grouping by product_category_english, summing price"],ans:'D',exp:"FACT_ORDERS has price and product_id (FK to DIM_PRODUCTS). DIM_PRODUCTS has product_category_english. Join on product_id, GROUP BY category, SUM(price). DIM_DATE is not needed unless you want revenue by category by time period. STG tables are used in Phase 02 verification but not in the analytics layer queries."},
{id:337,type:'mcq',topic:'DIM_SELLERS',difficulty:'medium',q:"A query: SELECT s.seller_state, COUNT(DISTINCT f.order_id), SUM(f.price) FROM FACT_ORDERS f JOIN DIM_SELLERS s ON f.seller_id = s.seller_id GROUP BY 1. What does this answer?",opts:["A) Revenue and order count by customer state","B) Revenue and order count by seller state","C) Number of unique sellers per state","D) Average price per seller"],ans:'B',exp:"JOIN to DIM_SELLERS on seller_id brings seller attributes. GROUP BY s.seller_state = group by the state where sellers are located. COUNT(DISTINCT f.order_id) = unique orders per seller state. SUM(f.price) = GMV per seller state. Useful for understanding which geographic areas of Brazil generate the most marketplace activity."},
{id:338,type:'mcq',topic:'FACT_ORDERS',difficulty:'medium',q:"The four core business queries ShopFlow was built for are: (1) revenue by category, (2) seller cancellation rates, (3) delivery delay vs review score, and (4) monthly GMV. Which tables does query (4) require?",opts:["A) FACT_ORDERS only — use DATE_TRUNC on order_purchase_ts","B) FACT_ORDERS + DIM_DATE — JOIN on date key, GROUP BY year_month","C) STG_ORDER_ITEMS + STG_ORDERS — Phase 03 not needed for this query","D) FACT_ORDERS + DIM_DATE + DIM_SELLERS — revenue needs seller context"],ans:'B',exp:"Monthly GMV: FACT_ORDERS has price + order_date_key. DIM_DATE has year_month (or year + month_of_year). JOIN on date_key, GROUP BY dim.year_month, SUM(price + freight_value). DIM_DATE is used to get clean month labels without calling DATE_TRUNC in every analytics query."},
{id:339,type:'mcq',topic:'Clustering',difficulty:'medium',q:"After adding a clustering key to FACT_ORDERS, you check SYSTEM$CLUSTERING_INFORMATION('FACT_ORDERS'). What information does this return?",opts:["A) The names of existing clustering keys on the table","B) Statistics about micro-partition overlap and average depth — measures clustering quality","C) The list of queries that benefited from clustering","D) Cost per month of the Automatic Clustering service"],ans:'B',exp:"SYSTEM$CLUSTERING_INFORMATION returns: average_overlap_depth (lower is better, 1.0 is perfect), average_depth, total_partition_count. These numbers show how well-clustered the data is. High overlap_depth = many micro-partitions contain the same key values = poor clustering = less effective pruning."},
{id:340,type:'mcq',topic:'DIM_DATE',difficulty:'hard',q:"DIM_DATE is built with GENERATOR(ROWCOUNT => 3000). The Olist dataset spans 2016 to 2018. A query filters WHERE dim_date.year = 2020. What happens?",opts:["A) Error — year 2020 doesn't exist in DIM_DATE","B) The query returns 0 rows — 2020 is outside the generated range","C) DIM_DATE auto-expands to cover 2020","D) The query falls back to scanning FACT_ORDERS directly"],ans:'B',exp:"DIM_DATE only contains the dates generated. If 3000 rows starting from 2016-01-01 only covers to ~2024, and the query is for 2020, it would return rows. But if ROWCOUNT is too small to reach 2020, the query returns 0 rows — no error, no fallback. Always generate DIM_DATE with enough rows plus a future buffer."},
{id:341,type:'mcq',topic:'Star Schema',difficulty:'hard',q:"Which of the four ShopFlow business queries is HARDEST to answer correctly with the star schema as built?",opts:["A) Revenue by product category — straightforward JOIN + GROUP BY","B) Seller cancellation rate — requires order_status from FACT_ORDERS and filtering/dividing","C) Delivery delay vs review score — requires 3-table join across FACT, DIM_DATE, and STG_REVIEWS","D) Monthly GMV — straightforward JOIN to DIM_DATE + SUM"],ans:'C',exp:"Delivery delay vs review score joins: FACT_ORDERS (delay), STG_REVIEWS (review score — via order_id). Review data lives in STG_REVIEWS, not a DIM table in Phase 03. The join is: FACT_ORDERS JOIN STG_REVIEWS ON order_id, then bucket delay days and average the score. Three logical tables, and STG_REVIEWS is not a dimension — it's a fact-level table accessed directly."},
{id:342,type:'mcq',topic:'FACT_ORDERS',difficulty:'hard',q:"You want seller cancellation rate = cancelled orders / total orders. FACT_ORDERS has one row per order ITEM. How do you get correct order-level counts?",opts:["A) COUNT(order_id) directly — each order appears once per item","B) COUNT(DISTINCT order_id) — deduplicates to unique orders","C) SUM(1) per row — item count equals order count in ShopFlow","D) JOIN to DIM_DATE first, then count"],ans:'B',exp:"FACT_ORDERS has multiple rows per order (one per item). COUNT(order_id) counts items, not orders — inflated. COUNT(DISTINCT order_id) deduplicates to unique orders. Seller cancellation rate: COUNT(DISTINCT CASE WHEN order_status='cancelled' THEN order_id END) / COUNT(DISTINCT order_id). Always use DISTINCT when counting order-level metrics from an item-level fact table."},
{id:343,type:'mcq',topic:'Clustering',difficulty:'hard',q:"FACT_ORDERS cluster key: (DATE_TRUNC('month', order_purchase_ts), seller_id). Query: WHERE seller_id = 'abc123'. Is this query fully optimized by the cluster key?",opts:["A) Yes — seller_id is in the cluster key","B) Partially — seller_id is the second column; pruning is more effective when the first column (month) is also filtered","C) No — single-column queries are never pruned by multi-column cluster keys","D) Yes — Snowflake evaluates all cluster key columns independently"],ans:'B',exp:"Multi-column cluster keys: leading columns provide the most pruning. CLUSTER BY (month, seller_id) primarily organizes by month first, then seller_id within each month. A query on seller_id alone still gets some benefit (rows for seller abc123 will be relatively grouped), but less effective than filtering on month + seller_id. The first column is always the primary partitioning dimension."},
{id:344,type:'mcq',topic:'DIM_DATE',difficulty:'hard',q:"You want is_weekend (TRUE/FALSE) and is_holiday_brazil (TRUE/FALSE) columns in DIM_DATE. Which approach is correct in Snowflake?",opts:["A) is_weekend: CASE WHEN DAYOFWEEK(date_key) IN (1,7) THEN TRUE ELSE FALSE END during CTAS generation","B) is_holiday_brazil requires a separate lookup table JOIN — cannot be computed from date alone","C) Both can be computed in the DIM_DATE CTAS using DAYOFWEEK and a CASE list of holiday dates","D) Both A and B — is_weekend via CASE, is_holiday via JOIN or CASE list of known dates"],ans:'D',exp:"A: DAYOFWEEK() returns 0 (Sun) or 1-6 (Mon-Sat) depending on first_day_of_week setting — check DAYOFWEEK documentation for Snowflake's specific return values. B and C: A Brazilian holiday list can be hardcoded as a CASE WHEN date_key IN ('2018-01-01', '2018-04-21', ...) THEN TRUE or stored in a lookup table and joined. Both approaches work."},
{id:345,type:'mcq',topic:'Star Schema',difficulty:'hard',q:"FACT_ORDERS references DIM_CUSTOMERS via customer_unique_id. But STG_ORDERS has customer_id (order-scoped), not customer_unique_id. How is this resolved?",opts:["A) FACT_ORDERS joins STG_ORDERS to STG_CUSTOMERS to get customer_unique_id","B) customer_id and customer_unique_id are the same in Snowflake","C) FACT_ORDERS uses customer_id — customer_unique_id is only in DIM_CUSTOMERS for reference","D) This join is impossible — FACT_ORDERS cannot reference DIM_CUSTOMERS"],ans:'A',exp:"FACT_ORDERS CTAS: SELECT ... o.customer_id ... FROM STG_ORDER_ITEMS i JOIN STG_ORDERS o ON i.order_id = o.order_id JOIN STG_CUSTOMERS c ON o.customer_id = c.customer_id to get c.customer_unique_id. This translates order-scoped customer_id to person-scoped customer_unique_id for the FK to DIM_CUSTOMERS."},
{id:346,type:'mcq',topic:'FACT_ORDERS',difficulty:'easy',q:"Which columns in FACT_ORDERS are MEASURES (numeric facts used in aggregations)?",opts:["A) order_id, seller_id, product_id","B) price, freight_value, delivery_delay_days","C) order_status, order_date_key","D) customer_unique_id, seller_id"],ans:'B',exp:"Measures are numeric values that can be aggregated: SUM(price), AVG(delivery_delay_days), etc. Dimension keys (order_id, seller_id) are foreign keys — they identify rows but you don't sum them. order_status is a descriptor. price, freight_value, and delivery_delay_days are the actual business metrics."},
{id:347,type:'mcq',topic:'DIM_SELLERS',difficulty:'easy',q:"DIM_SELLERS has a row for every seller that has ever registered on Olist — ~3,095 rows. FACT_ORDERS has ~112k rows. What is the expected output of: SELECT COUNT(*) FROM FACT_ORDERS f JOIN DIM_SELLERS s ON f.seller_id = s.seller_id?",opts:["A) 3,095 — limited by DIM_SELLERS","B) ~112,650 — all FACT rows that have a matching seller","C) ~112,650 × 3,095 — cross join","D) Depends on the distribution of seller_id values"],ans:'B',exp:"INNER JOIN preserves FACT rows that have a matching seller. Since every order item must have a seller (STG_ORDER_ITEMS.seller_id IS NOT NULL filter), all ~112k FACT rows should join. If any seller_id in FACT doesn't exist in DIM_SELLERS, those rows are dropped — but referential integrity checks in Phase 02 ensure 0 orphan sellers."},
{id:348,type:'mcq',topic:'DIM_DATE',difficulty:'medium',q:"DIM_DATE is queried by analysts. They want to filter to only 'weekday' orders. Which column makes this simplest?",opts:["A) date_key — WHERE DAYOFWEEK(date_key) NOT IN (0,6)","B) day_of_week_name — WHERE day_of_week_name NOT IN ('Saturday','Sunday')","C) is_weekday — WHERE is_weekday = TRUE","D) All three approaches are equivalent in complexity"],ans:'C',exp:"Pre-computed is_weekday = TRUE is the simplest — no function call, no string matching, just a boolean filter. This is the DIM_DATE design payoff: analysts write simple, readable predicates instead of DAYOFWEEK() logic. DIM_DATE's pre-computed attributes make queries simpler and more consistent across different analysts."},
{id:349,type:'mcq',topic:'Star Schema',difficulty:'medium',q:"Which ShopFlow SnowPro Core topic is demonstrated by building FACT_ORDERS from two source tables (STG_ORDER_ITEMS JOIN STG_ORDERS)?",opts:["A) COPY INTO idempotency","B) Dimensional modelling — combining fact-level and context-level data into one wide fact table","C) Time Travel recovery","D) External stage configuration"],ans:'B',exp:"Building FACT_ORDERS by joining item-level data (price, freight) with order-level data (status, timestamps, customer) into one flat table is dimensional modelling. The fact table is 'wide' — every row has all measures and dimension keys needed for analytics without requiring analysts to join source tables."},
{id:350,type:'mcq',topic:'Clustering',difficulty:'medium',q:"After adding a clustering key and waiting for reclustering, which INFORMATION_SCHEMA view shows whether queries are benefiting from partition pruning?",opts:["A) INFORMATION_SCHEMA.TABLE_STORAGE_METRICS","B) INFORMATION_SCHEMA.QUERY_HISTORY","C) SNOWFLAKE.ACCOUNT_USAGE.QUERY_HISTORY with partitions_scanned and partitions_total columns","D) SYSTEM$CLUSTERING_INFORMATION('FACT_ORDERS')"],ans:'C',exp:"SNOWFLAKE.ACCOUNT_USAGE.QUERY_HISTORY has partitions_scanned and partitions_total. Compare before/after clustering: if partitions_scanned / partitions_total drops from 0.9 to 0.1, clustering is working. SYSTEM$CLUSTERING_INFORMATION shows clustering quality (overlap depth), not query-level impact."},
{id:351,type:'mcq',topic:'Star Schema',difficulty:'hard',q:"Business query: 'Which sellers have the highest cancellation rates?' FACT_ORDERS has order_status. The query needs cancellation_rate = cancelled / total orders per seller. Correct SQL pattern?",opts:["A) SELECT seller_id, SUM(CASE WHEN order_status='cancelled' THEN 1 ELSE 0 END) / COUNT(*) FROM FACT_ORDERS GROUP BY seller_id","B) SELECT seller_id, COUNT(DISTINCT CASE WHEN order_status='cancelled' THEN order_id END) / COUNT(DISTINCT order_id) FROM FACT_ORDERS GROUP BY seller_id","C) SELECT seller_id, COUNT(CASE WHEN order_status='cancelled' THEN 1 END) / COUNT(*) FROM FACT_ORDERS JOIN DIM_SELLERS GROUP BY seller_id","D) Both B is correct — DISTINCT order_id needed because FACT is item-level"],ans:'B',exp:"FACT_ORDERS is item-level. One cancelled order with 3 items = 3 FACT rows. COUNT(*) counts 3. COUNT(DISTINCT order_id) counts 1. For cancellation RATE (orders cancelled / total orders), you must deduplicate with DISTINCT. CASE WHEN inside COUNT(DISTINCT ...) only counts distinct cancelled order IDs. D is correct (B is the answer) but A uses raw counts not DISTINCT — wrong."},
{id:352,type:'mcq',topic:'DIM_DATE',difficulty:'hard',q:"You want monthly GMV for a 'fiscal year' where the fiscal year starts in July (not January). What DIM_DATE attribute makes this easy?",opts:["A) month_of_year — filter WHERE month_of_year >= 7","B) fiscal_year and fiscal_month — pre-computed attributes in DIM_DATE based on July fiscal year start","C) year — WHERE year >= start_year","D) There is no way to handle fiscal years in DIM_DATE"],ans:'B',exp:"DIM_DATE can include pre-computed fiscal calendar attributes: fiscal_year = calendar_year + (1 if month >= 7 else 0), fiscal_month = (month - 6) mod 12. Storing these once in DIM_DATE means analysts GROUP BY fiscal_year — no ad-hoc date math in every query. This is the power of a rich DIM_DATE."},
{id:353,type:'mcq',topic:'FACT_ORDERS',difficulty:'hard',q:"FACT_ORDERS currently has no review data. The business wants avg_review_score as a FACT_ORDERS column. What are the implications?",opts:["A) Add avg_review_score to FACT_ORDERS CTAS by joining STG_REVIEWS ON order_id","B) This would be a pre-aggregated value — reviews are order-level, items are item-level, creating a partially denormalized fact","C) STG_REVIEWS has one row per order — joining to item-level FACT would duplicate the review score across all items of the same order","D) All of A, B, and C describe real implications"],ans:'D',exp:"D is correct. A: technically possible JOIN. B: review is order-level; fact is item-level — mixing grains. C: joining one review to three items duplicates the review score 3x in the result. Grain mixing in fact tables is a serious data modelling concern. Better approach: keep reviews in a separate FACT_REVIEWS table or join at query time."},
{id:354,type:'mcq',topic:'DIM_PRODUCTS',difficulty:'easy',q:"DIM_PRODUCTS in ShopFlow — which columns does it contain that were NOT in RAW_PRODUCTS?",opts:["A) product_name_length (fixed typo from product_name_lenght)","B) product_category_english (joined from translation table in STAGED)","C) product_id (added in STAGED)","D) Both A and B — both are transformations applied before ANALYTICS"],ans:'D',exp:"A: product_name_lenght (typo) → product_name_length (fixed in STAGED). B: product_category_english (joined from RAW_CATEGORY_TRANSLATION in STG_PRODUCTS CTAS). Both transformations happened in STAGED — DIM_PRODUCTS inherits them. DIM_PRODUCTS reads directly from STG_PRODUCTS which already has both clean columns."},
{id:355,type:'mcq',topic:'Star Schema',difficulty:'medium',q:"Why is it important to define FACT_ORDERS grain BEFORE building the table?",opts:["A) Snowflake requires grain specification in the CREATE TABLE statement","B) Grain determines which STG tables to join, what constitutes a unique row, and which measures belong in the fact table","C) Grain is needed to set up clustering keys correctly","D) Grain only matters for data modelling documentation, not implementation"],ans:'B',exp:"Grain is the foundation of fact table design. Wrong grain = wrong table. If grain = order (not item), you'd aggregate prices before loading — losing item-level detail forever. Grain determines: source table (STG_ORDER_ITEMS for item grain), unique key (order_id + order_item_id), measures that exist at that grain (price per item), and which dimension joins are valid."},
{id:356,type:'mcq',topic:'Clustering',difficulty:'easy',q:"On an X-Small warehouse, which query benefits MOST from a clustering key on order_purchase_ts?",opts:["A) SELECT COUNT(*) FROM FACT_ORDERS — counts all rows","B) SELECT * FROM FACT_ORDERS WHERE order_purchase_ts BETWEEN '2018-01-01' AND '2018-03-31'","C) SELECT seller_id, SUM(price) FROM FACT_ORDERS GROUP BY seller_id","D) SELECT * FROM FACT_ORDERS LIMIT 100"],ans:'B',exp:"Clustering key on order_purchase_ts allows micro-partition pruning for range queries on that column. A WHERE clause with a date range directly maps to the cluster key — Snowflake skips all micro-partitions outside that date range. A (full scan), C (full scan for all sellers), and D (LIMIT, stops early anyway) don't benefit from pruning the same way."},
{id:357,type:'mcq',topic:'DIM_DATE',difficulty:'medium',q:"DIM_DATE.day_of_week returns: 1=Monday, 2=Tuesday...7=Sunday. FACT_ORDERS joins to DIM_DATE. Query: orders placed on Sundays by category. How is this written?",opts:["A) WHERE DAYOFWEEK(order_purchase_ts) = 7 (directly on FACT)","B) JOIN DIM_DATE ON order_date_key = date_key WHERE dim_date.day_of_week = 7","C) WHERE order_purchase_ts LIKE '%-07'","D) Both A and B produce the same result"],ans:'D',exp:"Both produce the same result — but B is the DWH-preferred approach. Joining through DIM_DATE uses pre-computed day_of_week without calling DAYOFWEEK() in every query. Consistent definitions (everyone uses dim_date.day_of_week = 7 for Sunday) prevent different analysts defining 'Sunday' differently using DAYOFWEEK() variants with different first-day-of-week settings."},
{id:358,type:'mcq',topic:'Star Schema',difficulty:'hard',q:"FACT_ORDERS CTAS performs a 3-way JOIN: STG_ORDER_ITEMS + STG_ORDERS + STG_CUSTOMERS. The JOIN to STG_CUSTOMERS is to get customer_unique_id. What type of JOIN should be used?",opts:["A) INNER JOIN — only orders with valid customers should be in FACT_ORDERS","B) LEFT JOIN — preserve all order items even if customer_unique_id resolution fails","C) RIGHT JOIN — ensure all customers appear in FACT_ORDERS","D) CROSS JOIN — all combinations of orders and customers"],ans:'B',exp:"Phase 02 found 483 orders without customer records. These are valid order items with real revenue — they should appear in FACT_ORDERS. INNER JOIN would silently drop those 483 orders (and their items). LEFT JOIN preserves all order items — unknown customers get NULL customer_unique_id in FACT_ORDERS. Use LEFT JOIN when you cannot afford to lose fact rows."},
{id:359,type:'mcq',topic:'Clustering',difficulty:'hard',q:"FACT_ORDERS has 112,650 rows. You consider adding a clustering key. When does clustering provide the LEAST benefit?",opts:["A) When tables have very few micro-partitions (small tables like FACT_ORDERS may fit in 10-20 micro-partitions)","B) When queries always filter on the clustered column","C) When data is naturally ordered by the cluster key during INSERT","D) When Automatic Clustering is enabled"],ans:'A',exp:"Clustering benefits grow with table size. 112,650 rows in FACT_ORDERS compresses to maybe 10-15 micro-partitions — even a full scan is trivial. Clustering matters when tables have thousands of micro-partitions and queries can prune 90%+. ShopFlow Phase 03 demonstrates clustering conceptually — in production with 100M+ rows, the benefit is dramatic."},
{id:360,type:'mcq',topic:'DIM_DATE',difficulty:'hard',q:"FACT_ORDERS.order_date_key is DATE type. DIM_DATE.date_key is also DATE. The JOIN: f.order_date_key = d.date_key. order_date_key is derived from CAST(order_purchase_ts AS DATE). What timezone issue could corrupt this join?",opts:["A) No issue — DATE type has no timezone","B) order_purchase_ts is TIMESTAMP_NTZ — CAST to DATE uses the session timezone, which may shift the date for timestamps near midnight","C) DATE columns cannot be used in JOIN conditions","D) DIM_DATE uses TIMESTAMP_NTZ internally — the DATE comparison fails"],ans:'B',exp:"TIMESTAMP_NTZ stores as-is (UTC-equivalent). CAST(NTZ_timestamp AS DATE) extracts the date portion from the stored value — no conversion. BUT: if the original data was stored in a local timezone (which some connectors do), a 23:00 São Paulo time might be 02:00 UTC the next day — CAST to DATE gives a different date than intended. NTZ storage and careful timezone handling prevents this."},

// ─── MULTI-SELECT (IDs 361–400) ───────────────────────────────────────────
{id:361,type:'multi',topic:'Star Schema',difficulty:'easy',q:"Which tables make up the ShopFlow ANALYTICS star schema? (Select ALL)",opts:["A) FACT_ORDERS — central fact table, one row per order item","B) DIM_CUSTOMERS — one row per unique customer (customer_unique_id)","C) DIM_PRODUCTS — one row per product","D) DIM_SELLERS — one row per seller","E) DIM_DATE — one row per calendar day"],ans:['A','B','C','D','E'],exp:"ALL five. FACT_ORDERS is the fact. DIM_CUSTOMERS, DIM_PRODUCTS, DIM_SELLERS, and DIM_DATE are the four dimensions. This is a classic 5-table star schema — fact at centre, four dimension points."},
{id:362,type:'multi',topic:'FACT_ORDERS',difficulty:'easy',q:"Which columns from STG_ORDERS appear in FACT_ORDERS? (Select ALL)",opts:["A) order_status — order state (delivered, cancelled, etc.)","B) order_purchase_ts — becomes order_date_key (DATE) for DIM_DATE join","C) delivery_delay_days — pre-computed measure","D) order_approved_ts — approval timestamp","E) customer_id — raw order-scoped customer identifier"],ans:['A','B','C'],exp:"A: order_status is in FACT_ORDERS for cancellation rate queries. B: order_purchase_ts is DATE-truncated to order_date_key for DIM_DATE join. C: delivery_delay_days is a measure. D: order_approved_ts is not typically in FACT — too granular for analytics. E: customer_id (order-scoped) is replaced by customer_unique_id (person-scoped) from STG_CUSTOMERS join."},
{id:363,type:'multi',topic:'DIM_DATE',difficulty:'easy',q:"Which attributes should DIM_DATE contain? (Select ALL)",opts:["A) date_key — the DATE value (primary key)","B) year — e.g. 2018","C) month_of_year — 1 to 12","D) quarter_of_year — 1 to 4","E) day_of_week — 1 (Monday) to 7 (Sunday)"],ans:['A','B','C','D','E'],exp:"ALL are standard DIM_DATE attributes. date_key is the primary key. year, month, quarter, day_of_week are all pre-computed to enable simple GROUP BY in analytics. A well-built DIM_DATE also includes day_of_week_name, is_weekday, is_weekend, year_month (e.g. '2018-01'), year_quarter ('2018-Q1')."},
{id:364,type:'multi',topic:'Clustering',difficulty:'easy',q:"Which are benefits of adding a clustering key to FACT_ORDERS? (Select ALL)",opts:["A) Reduced micro-partitions scanned for date-range queries","B) Faster query performance for filters on the clustered column(s)","C) Reduced query cost — fewer micro-partitions = fewer credits consumed","D) Eliminates the need for a warehouse for queries on clustered tables","E) Demonstrates SnowPro Core exam topic: micro-partition pruning"],ans:['A','B','C','E'],exp:"A, B, C: Fewer partitions scanned = faster + cheaper. E: A key SnowPro Core topic. D is FALSE — clustering never eliminates the need for a warehouse. Queries always need compute — clustering just makes them use less of it."},
{id:365,type:'multi',topic:'DIM_CUSTOMERS',difficulty:'easy',q:"Which transformations are applied to build DIM_CUSTOMERS from STG_CUSTOMERS? (Select ALL)",opts:["A) Deduplicate to one row per customer_unique_id (QUALIFY ROW_NUMBER)","B) LEFT JOIN STG_GEOLOCATION to add lat/lng coordinates","C) Cast customer_zip_code_prefix to INTEGER","D) Keep only customers with at least one order (HAVING COUNT > 0)","E) ORDER BY most recent order — QUALIFY keeps the most recent address"],ans:['A','B','E'],exp:"A: QUALIFY deduplication keeps one row per customer_unique_id. B: LEFT JOIN adds lat/lng from geolocation. E: ORDER BY order_purchase_ts DESC = most recent record. C is wrong — zip stays VARCHAR (leading zeros). D is wrong — all customers in STG_CUSTOMERS have at least one order (that's how they got in the dataset)."},
{id:366,type:'multi',topic:'FACT_ORDERS',difficulty:'easy',q:"What are the dimension foreign keys stored in FACT_ORDERS? (Select ALL)",opts:["A) customer_unique_id — FK to DIM_CUSTOMERS","B) product_id — FK to DIM_PRODUCTS","C) seller_id — FK to DIM_SELLERS","D) order_date_key — FK to DIM_DATE","E) order_id — degenerate dimension (no separate DIM table)"],ans:['A','B','C','D','E'],exp:"ALL are correct. A-D: True foreign keys to dimension tables. E: order_id is a degenerate dimension — stored in FACT for traceability but has no DIM_ORDERS table. All five are in FACT_ORDERS enabling full star schema joins."},
{id:367,type:'multi',topic:'DIM_DATE',difficulty:'medium',q:"True statements about the GENERATOR function used for DIM_DATE? (Select ALL)",opts:["A) TABLE(GENERATOR(ROWCOUNT => 3000)) produces exactly 3000 rows","B) SEQ4() generates sequential integers 0, 1, 2, 3... for each row","C) DATEADD('day', SEQ4(), '2016-01-01') produces dates starting Jan 1 2016","D) GENERATOR requires a source table to iterate over","E) GENERATOR is used because DIM_DATE needs dates that may not exist in order data"],ans:['A','B','C','E'],exp:"A: Exact row count. B: SEQ4() = 0, 1, 2... (4-byte integer sequence). C: Produces 2016-01-01, 2016-01-02, etc. E: Complete calendar, not just dates-with-orders. D is FALSE — GENERATOR is a pure function that produces rows without a source table."},
{id:368,type:'multi',topic:'Star Schema',difficulty:'medium',q:"Which of the four ShopFlow business queries require joining FACT_ORDERS to more than one dimension? (Select ALL)",opts:["A) Revenue by category — FACT + DIM_PRODUCTS","B) Seller cancellation rates — FACT + DIM_SELLERS","C) Delivery delay vs review score — FACT + STG_REVIEWS (not a DIM, accessed directly)","D) Monthly GMV trend — FACT + DIM_DATE","E) Revenue by category over time — FACT + DIM_PRODUCTS + DIM_DATE (two dimensions)"],ans:['E'],exp:"A-D each join FACT to exactly ONE dimension or one STG table. E joins two dimensions (DIM_PRODUCTS for category + DIM_DATE for month) — that's the multi-dimension query. 'Monthly GMV by category' is the natural extension of the four queries and requires two dimension joins."},
{id:369,type:'multi',topic:'Clustering',difficulty:'medium',q:"When ShopFlow Phase 03 demonstrates clustering, which steps are taken? (Select ALL)",opts:["A) Run GMV by seller query BEFORE adding clustering key — note partitions scanned","B) ALTER TABLE FACT_ORDERS CLUSTER BY (DATE_TRUNC('month', order_purchase_ts), seller_id)","C) Wait for or trigger reclustering","D) Run the same query AFTER — compare partitions_scanned in QUERY_HISTORY","E) Drop all existing micro-partitions and rebuild from scratch"],ans:['A','B','C','D'],exp:"A: Baseline measurement before clustering. B: Define the clustering key. C: Reclustering is needed (background or manual). D: Compare before/after in QUERY_HISTORY (partitions_scanned, partitions_total). E is FALSE — clustering doesn't drop micro-partitions; it reorganizes them incrementally."},
{id:370,type:'multi',topic:'DIM_SELLERS',difficulty:'medium',q:"DIM_SELLERS is built with LEFT JOIN STG_GEOLOCATION. Which are true about this join? (Select ALL)",opts:["A) Join key: STG_SELLERS.seller_zip_code_prefix = STG_GEOLOCATION.zip_code_prefix","B) STG_GEOLOCATION has one row per zip after Phase 02 deduplication — no fan-out risk","C) Sellers with no matching zip get NULL lat/lng in DIM_SELLERS","D) This join produces more rows than STG_SELLERS has","E) The result is ~3,095 rows — same as STG_SELLERS"],ans:['A','B','C','E'],exp:"A: Correct join key. B: Phase 02 QUALIFY ensured one zip per row — safe to join. C: LEFT JOIN preserves sellers with no match. E: LEFT JOIN from 3,095 sellers to a deduplicated geolocation table = 3,095 rows max. D is FALSE — deduplicated geolocation (one row per zip) + LEFT JOIN cannot produce more rows than the left table."},
{id:371,type:'multi',topic:'FACT_ORDERS',difficulty:'medium',q:"Which measures (numeric columns for aggregation) should be in FACT_ORDERS? (Select ALL)",opts:["A) price — item price in BRL","B) freight_value — shipping cost in BRL","C) delivery_delay_days — days late or early","D) seller_id — foreign key to DIM_SELLERS","E) review_score — customer satisfaction (1-5)"],ans:['A','B','C'],exp:"Measures: price, freight_value, delivery_delay_days — all numeric and aggregatable. D (seller_id) is a dimension foreign key — you group BY it, don't SUM it. E (review_score) is from STG_REVIEWS — a separate dataset not in FACT_ORDERS grain. Adding review_score to FACT would mix order-item grain with order-level review grain."},
{id:372,type:'multi',topic:'DIM_DATE',difficulty:'medium',q:"Year-month grouped GMV query: SELECT d.year_month, SUM(f.price) FROM FACT_ORDERS f JOIN DIM_DATE d ON f.order_date_key = d.date_key GROUP BY d.year_month ORDER BY 1. What could go wrong? (Select ALL)",opts:["A) order_date_key is DATE, date_key is DATE — join types match, no issue","B) year_month might be stored as VARCHAR '2018-01' — ORDER BY sorts lexicographically, which is correct for YYYY-MM format","C) Some FACT rows have NULL order_date_key — those rows are dropped by INNER JOIN to DIM_DATE","D) SUM(price) includes NULL prices — these add 0 to the sum","E) The GROUP BY year_month produces one row per month — correct for trend analysis"],ans:['C','E'],exp:"C: If any order_purchase_ts was NULL, CAST to DATE = NULL, JOIN to DIM_DATE drops it. These rows' revenue is silently excluded. E: GROUP BY year_month = one row per month — correct. A: DATE = DATE join is fine. B: YYYY-MM lexicographic order = chronological order — correct. D: SUM ignores NULLs (doesn't add 0) — so NULL prices are excluded from the sum, not added as 0."},
{id:373,type:'multi',topic:'Star Schema',difficulty:'medium',q:"Why is DIM_DATE a 'conformed dimension' in ShopFlow? (Select ALL)",opts:["A) Multiple fact tables (if built) could share the same DIM_DATE by date key","B) Conformed means it is physically small — DIM_DATE has few rows","C) All date-based analytics use the same definition of year, month, quarter","D) 'Conformed' means consistent definitions across the enterprise — day 7 is always Sunday, Q1 is always Jan-Mar","E) DIM_DATE is built once and reused — no per-fact-table date dimension needed"],ans:['A','C','D','E'],exp:"A: If we add FACT_REVIEWS later, it joins the same DIM_DATE by review_created_ts. C and D: Conformed = consistent, shared definitions. E: One DIM_DATE serves all fact tables. B is false — 'conformed' refers to shared definitions, not table size."},
{id:374,type:'multi',topic:'Clustering',difficulty:'medium',q:"FACT_ORDERS cluster key: (DATE_TRUNC('month', order_purchase_ts), seller_id). Which queries benefit from pruning? (Select ALL)",opts:["A) WHERE DATE_TRUNC('month', order_purchase_ts) = '2018-01-01' AND seller_id = 'abc'","B) WHERE order_purchase_ts BETWEEN '2018-01-01' AND '2018-01-31'","C) WHERE seller_id = 'abc' (no date filter)","D) WHERE product_id = 'xyz' (product not in cluster key)","E) WHERE DATE_TRUNC('month', order_purchase_ts) IN ('2018-01-01', '2018-02-01')"],ans:['A','B','C','E'],exp:"A: Both cluster columns — maximum pruning. B: Date range maps to month boundary — micro-partitions for Jan 2018 are pruned. C: seller_id alone still gets partial pruning (seller rows grouped within months). E: Two specific months — prunes to those two month partitions. D: product_id not in cluster key — full scan."},
{id:375,type:'multi',topic:'DIM_CUSTOMERS',difficulty:'hard',q:"True statements about handling the customer_id vs customer_unique_id distinction in FACT_ORDERS? (Select ALL)",opts:["A) FACT_ORDERS stores customer_unique_id (person-scoped) as the FK to DIM_CUSTOMERS","B) The mapping from customer_id to customer_unique_id is done during the FACT_ORDERS CTAS via JOIN to STG_CUSTOMERS","C) customer_id (order-scoped) should also be stored in FACT_ORDERS as a degenerate dimension for traceability","D) Without this distinction, COUNT(DISTINCT customer_id) would overcount unique buyers","E) DIM_CUSTOMERS has one row per customer_unique_id — FACT_ORDERS joins to it on customer_unique_id"],ans:['A','B','D','E'],exp:"A: FACT stores the person-scoped key. B: FACT CTAS joins STG_ORDERS → STG_CUSTOMERS to translate. D: COUNT(DISTINCT customer_id) counts order-slots not people — overstated. E: DIM_CUSTOMERS is deduplicated by customer_unique_id. C is technically possible but not standard — FACT already has order_id as degenerate dimension."},
{id:376,type:'multi',topic:'FACT_ORDERS',difficulty:'hard',q:"FACT_ORDERS CTAS joins three STAGED tables. Which joins should be INNER and which should be LEFT? (Select ALL)",opts:["A) STG_ORDER_ITEMS JOIN STG_ORDERS: INNER JOIN — items without orders are invalid (referential integrity confirmed 0 orphans)","B) STG_ORDER_ITEMS JOIN STG_ORDERS: LEFT JOIN — items must be preserved even if order record missing","C) FACT_ORDERS JOIN STG_CUSTOMERS: LEFT JOIN — 483 orders have no customer record, must be preserved","D) FACT_ORDERS JOIN DIM_SELLERS: INNER JOIN — every item has a valid seller (confirmed in STG)","E) All joins in FACT_ORDERS CTAS should be LEFT JOIN for safety"],ans:['A','C'],exp:"A: INNER JOIN on order is safe — 0 orphan items confirmed. C: LEFT JOIN for customers — 483 orders have no customer, would be lost with INNER. D is debatable — seller orphans were also checked as 0 in Phase 02. E is overly conservative — INNER JOIN where integrity is confirmed is fine and can be faster."},
{id:377,type:'multi',topic:'DIM_DATE',difficulty:'hard',q:"You want to track 'Black Friday Brazil' (Novembro Negro — last Friday of November) in DIM_DATE.is_special_promotion. What approaches work? (Select ALL)",opts:["A) Compute dynamically: CASE WHEN MONTH(date_key)=11 AND DAYOFWEEK(date_key)=5 AND DAYOFYEAR(date_key) > 324 THEN TRUE ELSE FALSE END (approximate last-Friday logic)","B) Maintain a separate PROMOTIONS table with date ranges and join DIM_DATE to it","C) Pre-compute dates list: CASE WHEN date_key IN ('2016-11-25','2017-11-24','2018-11-23',...) THEN TRUE","D) Add a DIM_DATE column promotion_name VARCHAR and manually populate for special days","E) Use GENERATOR to produce Black Friday dates mathematically"],ans:['A','B','C','D'],exp:"All four are valid approaches. A: Approximate dynamic calculation (may have edge cases). B: Separate PROMOTIONS lookup table joined to DIM_DATE. C: Hardcoded known dates — precise but needs maintenance. D: Manually populated VARCHAR promotion labels — flexible. E is wrong — GENERATOR produces sequential rows, not special-day calculations. A, B, C, D are all real-world patterns."},
{id:378,type:'multi',topic:'Star Schema',difficulty:'hard',q:"An analyst wants to answer: 'Which sellers in SP state have avg review score < 3 AND more than 50 orders?' Which tables are needed? (Select ALL)",opts:["A) FACT_ORDERS — for order counts and order_id","B) DIM_SELLERS — for seller_state filter","C) STG_REVIEWS — for review scores (not yet a DIM table in Phase 03)","D) DIM_CUSTOMERS — not needed for this query","E) DIM_DATE — not needed unless filtering by time period"],ans:['A','B','C'],exp:"A: FACT_ORDERS COUNT(DISTINCT order_id) per seller. B: DIM_SELLERS for seller_state = 'SP'. C: STG_REVIEWS joined ON order_id for AVG(review_score). D: Customer info not needed. E: Time filter not requested. Three tables: FACT → DIM_SELLERS for state, FACT → STG_REVIEWS for scores."},
{id:379,type:'multi',topic:'Clustering',difficulty:'hard',q:"True statements about Automatic Clustering in Snowflake? (Select ALL)",opts:["A) Automatic Clustering continuously maintains the cluster key as new data is inserted","B) Automatic Clustering is charged separately from warehouse compute credits","C) Without Automatic Clustering, clustering degrades over time as new data is inserted in non-clustered order","D) Automatic Clustering requires Enterprise edition or higher","E) FACT_ORDERS in ShopFlow (112k rows) would greatly benefit from Automatic Clustering"],ans:['A','B','C','D'],exp:"A: Automatic Clustering is a background service that reclusters as data changes. B: Charged in compute credits separately from queries. C: Without it, new INSERTs add rows in unordered micro-partitions — degrading clustering. D: Available from Enterprise edition. E is FALSE — 112k rows in ShopFlow is tiny. Automatic Clustering is designed for large tables (billions of rows) with continuous inserts."},
{id:380,type:'multi',topic:'DIM_DATE',difficulty:'hard',q:"ShopFlow DIM_DATE covers 2016-2024. A query joins FACT_ORDERS (2016-2018 data) to DIM_DATE with INNER JOIN on order_date_key. Which statements are true? (Select ALL)",opts:["A) The INNER JOIN produces the same result as LEFT JOIN — all FACT rows have matching dates in DIM_DATE","B) 2019-2024 rows in DIM_DATE are unused but cause no errors","C) Using INNER JOIN means any FACT row with a NULL order_date_key is dropped","D) If DIM_DATE didn't cover 2018, INNER JOIN would silently drop all 2018 FACT orders","E) LEFT JOIN from FACT to DIM_DATE is safer — preserves FACT rows even if date not in DIM_DATE"],ans:['A','B','C','D','E'],exp:"ALL are true. A: Since 2016-2018 dates exist in DIM_DATE, INNER = LEFT for non-NULL dates. B: Unused DIM rows don't error. C: NULL order_date_key drops from INNER JOIN. D: Critical point — if DIM_DATE is too short, you silently lose data. E: LEFT JOIN is defensive programming — keeps FACT rows even if DIM_DATE has a gap."},
{id:381,type:'multi',topic:'FACT_ORDERS',difficulty:'easy',q:"Business query: Monthly GMV. SELECT d.year_month, SUM(f.price + f.freight_value) FROM FACT_ORDERS f JOIN DIM_DATE d ON f.order_date_key = d.date_key GROUP BY 1 ORDER BY 1. Which columns must exist in FACT_ORDERS? (Select ALL)",opts:["A) order_date_key (DATE) — FK to DIM_DATE","B) price (FLOAT)","C) freight_value (FLOAT)","D) seller_id — needed for monthly GMV","E) product_category_english — needed for monthly GMV"],ans:['A','B','C'],exp:"A: JOIN key to DIM_DATE for month grouping. B: price in the SUM. C: freight_value in the SUM. D: seller_id is NOT needed for this query (no seller filter or group). E: category not needed for overall monthly GMV. The query only needs date + two financial measures."},
{id:382,type:'multi',topic:'DIM_SELLERS',difficulty:'medium',q:"Analyst query: top 10 sellers by GMV with their state. Tables needed and join pattern? (Select ALL)",opts:["A) FACT_ORDERS — for price (measure) and seller_id (FK)","B) DIM_SELLERS — for seller_state","C) JOIN: FACT_ORDERS JOIN DIM_SELLERS ON seller_id","D) GROUP BY seller_id, seller_state, ORDER BY SUM(price) DESC, LIMIT 10","E) DIM_DATE needed to compute annual GMV"],ans:['A','B','C','D'],exp:"A: FACT has price and seller_id. B: DIM_SELLERS has seller_state. C: JOIN on seller_id. D: GROUP BY both seller and state, ORDER BY revenue, LIMIT 10. E: DIM_DATE not needed unless you want GMV for a specific time period — the query as stated is all-time GMV."},
{id:383,type:'multi',topic:'Star Schema',difficulty:'medium',q:"Which of the following are DIMENSION attributes (not measures) that belong in dimension tables, not FACT_ORDERS? (Select ALL)",opts:["A) product_category_english — belongs in DIM_PRODUCTS","B) seller_city — belongs in DIM_SELLERS","C) price — measure, belongs in FACT_ORDERS","D) customer_state — belongs in DIM_CUSTOMERS","E) delivery_delay_days — measure, belongs in FACT_ORDERS"],ans:['A','B','D'],exp:"A: Category is a product attribute → DIM_PRODUCTS. B: City is a seller attribute → DIM_SELLERS. D: State is a customer attribute → DIM_CUSTOMERS. C: price is a numeric measure → FACT_ORDERS. E: delivery_delay_days is a computed measure → FACT_ORDERS. Separating attributes from measures is the core star schema principle."},
{id:384,type:'multi',topic:'FACT_ORDERS',difficulty:'hard',q:"FACT_ORDERS is rebuilt with CTAS. At T=0 a BI tool is running a dashboard query. At T=1 the CTAS starts. At T=2 the CTAS completes. What does the BI dashboard see? (Select ALL)",opts:["A) At T=0 to T=2: dashboard sees the old FACT_ORDERS data — MVCC isolation","B) At T=2+: new dashboard queries see the new FACT_ORDERS — atomic swap","C) Between T=1 and T=2: the dashboard sees a mix of old and new rows — partially built FACT","D) The CTAS blocks until the dashboard query finishes","E) The dashboard query gets an error when the CTAS completes and swaps the table"],ans:['A','B'],exp:"A: Snowflake MVCC — ongoing queries see the table snapshot from when they started. B: After CTAS commits, new queries see the new table. C is FALSE — no partial reads. D is FALSE — no blocking. E is FALSE — in-flight query finishes against old data cleanly. This MVCC behaviour is a key Snowflake advantage for zero-downtime rebuilds."},
{id:385,type:'multi',topic:'DIM_DATE',difficulty:'easy',q:"Which are valid uses of DIM_DATE in ShopFlow analytics? (Select ALL)",opts:["A) GROUP BY d.year_month for monthly GMV trend","B) GROUP BY d.quarter_of_year for quarterly revenue","C) WHERE d.is_weekday = TRUE to filter to weekday orders only","D) JOIN DIM_DATE to filter orders by product category","E) WHERE d.year = 2018 to filter to 2018 orders only"],ans:['A','B','C','E'],exp:"A, B, C, E: All valid date-dimension use cases — time-series grouping, quarterly rollup, weekday filter, year filter. D is WRONG — product category comes from DIM_PRODUCTS, not DIM_DATE. DIM_DATE only contains date attributes, not product attributes."},
{id:386,type:'multi',topic:'Clustering',difficulty:'medium',q:"You want to understand if clustering is working on FACT_ORDERS after ALTER TABLE. Which queries/commands help? (Select ALL)",opts:["A) SYSTEM$CLUSTERING_INFORMATION('SHOPFLOW_DB.SHOPFLOW_ANALYTICS.FACT_ORDERS') — shows overlap depth","B) SELECT partitions_scanned, partitions_total FROM SNOWFLAKE.ACCOUNT_USAGE.QUERY_HISTORY WHERE query_id = '...' — shows query-level pruning","C) SELECT COUNT(*) FROM FACT_ORDERS — counts rows, nothing to do with clustering","D) SHOW TABLES LIKE 'FACT_ORDERS' — clustering_key column shows defined keys","E) ALTER TABLE FACT_ORDERS RECLUSTER — triggers immediate reclustering and reports results"],ans:['A','B','D'],exp:"A: SYSTEM$CLUSTERING_INFORMATION gives micro-partition quality stats. B: QUERY_HISTORY shows actual partition pruning per query. D: SHOW TABLES shows the clustering_key column. C: COUNT(*) tells you row count, nothing about clustering. E: RECLUSTER triggers reclustering but doesn't 'report results' — you'd check CLUSTERING_INFORMATION before/after."},
{id:387,type:'multi',topic:'Star Schema',difficulty:'hard',q:"FACT_ORDERS is built once. New orders arrive daily. Which options correctly handle incremental loading into FACT_ORDERS? (Select ALL)",opts:["A) Full CTAS rebuild daily — simple but re-processes all historical data","B) MERGE INTO FACT_ORDERS USING new_orders_stage ON order_item_key — upsert new and updated rows","C) INSERT INTO FACT_ORDERS SELECT ... WHERE order_purchase_ts > last_loaded_ts — append new rows only","D) Snowflake STREAM on STG_ORDER_ITEMS captures changes; TASK runs nightly INSERT — Phase 05 pattern","E) TRUNCATE FACT_ORDERS then reload from RAW — equivalent to full CTAS"],ans:['A','B','C','D','E'],exp:"ALL are valid approaches with different tradeoffs. A: Simple, reliable, expensive at scale. B: MERGE handles updates (rare for orders). C: Append-only if orders never change. D: Phase 05 stream+task pattern — the proper incremental automation. E: Same as A but separate TRUNCATE step. Real production systems use B, C, or D depending on change frequency."},
{id:388,type:'multi',topic:'DIM_CUSTOMERS',difficulty:'medium',q:"DIM_CUSTOMERS CTAS uses QUALIFY ROW_NUMBER() OVER (PARTITION BY customer_unique_id ORDER BY order_purchase_ts DESC) = 1. What does this ensure? (Select ALL)",opts:["A) Exactly one row per customer_unique_id","B) The customer's most recent city and state are kept","C) Customers with the same customer_unique_id but different cities are all preserved","D) The row with the latest order purchase timestamp is kept for each person","E) Customers who never placed an order are excluded"],ans:['A','B','D','E'],exp:"A: QUALIFY = 1 guarantees exactly one row per partition (customer_unique_id). B: Most recent record reflects latest known location. D: ORDER BY purchase_ts DESC = newest first, rank 1 = most recent. E: Customers come from STG_CUSTOMERS which is derived from orders — all customers have placed at least one order. C is FALSE — only one row per unique_id is kept."},
{id:389,type:'multi',topic:'FACT_ORDERS',difficulty:'medium',q:"Which STAGED tables contribute columns to FACT_ORDERS? (Select ALL)",opts:["A) STG_ORDER_ITEMS — price, freight_value, product_id, seller_id","B) STG_ORDERS — order_status, order_purchase_ts, delivery_delay_days","C) STG_CUSTOMERS — customer_unique_id (for FK to DIM_CUSTOMERS)","D) STG_REVIEWS — review_score","E) STG_GEOLOCATION — seller lat/lng"],ans:['A','B','C'],exp:"A: item-level measures and FKs. B: order-level attributes and measures. C: person-level customer ID via join. D: STG_REVIEWS is not joined in FACT_ORDERS CTAS — review data is accessed separately in analytics. E: Geolocation enriches DIM tables (customers, sellers), not FACT_ORDERS directly."},
{id:390,type:'multi',topic:'DIM_DATE',difficulty:'hard',q:"DIM_DATE has columns: date_key, year, month_of_year, quarter_of_year, day_of_week, is_weekday. A query groups FACT_ORDERS by both quarter AND weekday status. Which is correct? (Select ALL)",opts:["A) SELECT d.quarter_of_year, d.is_weekday, COUNT(DISTINCT f.order_id), SUM(f.price) FROM FACT_ORDERS f JOIN DIM_DATE d ON f.order_date_key = d.date_key GROUP BY 1,2","B) The result has up to 4 quarters × 2 weekday values = 8 rows","C) This query requires a separate DIM_DATE lookup for both groupings","D) GROUP BY d.quarter_of_year, d.is_weekday uses pre-computed columns — no date functions needed","E) ORDER BY quarter_of_year, is_weekday produces meaningful ordering"],ans:['A','B','D','E'],exp:"A: Correct SQL — JOIN DIM_DATE once, GROUP BY two pre-computed columns. B: 4 quarters × 2 is_weekday values = max 8 result rows (some combinations may have 0 orders). D: No DAYOFWEEK() or QUARTER() functions needed — pre-computed. E: ORDER BY 1,2 produces Q1 weekday/weekend, Q2 weekday/weekend, etc. C is FALSE — one DIM_DATE JOIN covers both groupings."},
{id:391,type:'multi',topic:'Star Schema',difficulty:'easy',q:"Which correctly describe the difference between fact tables and dimension tables? (Select ALL)",opts:["A) Fact tables have many rows (one per event), dimension tables have fewer rows (one per entity)","B) Fact tables store measures (price, quantity), dimension tables store attributes (name, category, state)","C) Fact tables are narrow (few columns), dimension tables are wide (many columns)","D) Fact tables are joined to dimension tables using foreign keys","E) Dimension tables typically have a primary key that the fact table references"],ans:['A','B','C','D','E'],exp:"ALL are correct descriptions of the fact/dimension split. A: Many events vs few entities. B: Measures in facts, attributes in dims. C: Fact = wide in rows, narrow in columns; Dim = few rows, many columns. D: Foreign key JOIN pattern. E: DIM primary key (product_id, seller_id) = FACT foreign key."},
{id:392,type:'multi',topic:'FACT_ORDERS',difficulty:'hard',q:"You add a review_score column to FACT_ORDERS by joining STG_REVIEWS ON order_id. FACT grain = order item. What problems arise? (Select ALL)",opts:["A) An order with 3 items and one review gets review_score duplicated across all 3 item rows","B) AVG(review_score) in FACT_ORDERS would be inflated — 3-item orders contribute 3× to the average","C) COUNT(DISTINCT CASE WHEN review_score IS NOT NULL THEN order_id END) still correctly counts reviewed orders","D) SUM(review_score) has no analytical meaning but is now possible — dangerous","E) Review data is order-level, not item-level — mixing grains in FACT_ORDERS"],ans:['A','B','D','E'],exp:"A: Three FACT rows for one reviewed order = review score repeated 3×. B: AVG denominator inflated by item count. D: SUM(review_score) is meaningless but becomes possible — analysts might misuse it. E: Grain mixing — the core problem. C is actually correct — DISTINCT order_id deduplicates correctly — but it's a workaround for the grain problem."},
{id:393,type:'multi',topic:'Clustering',difficulty:'hard',q:"FACT_ORDERS is originally loaded in chronological order of order_purchase_ts. How does this affect clustering? (Select ALL)",opts:["A) Data loaded chronologically is naturally clustered by timestamp — clustering quality starts high","B) As new orders are inserted (new months), clustering quality remains good — new months are appended in order","C) As historical backfills (old dates) are inserted, clustering quality degrades — old dates mixed with new micro-partitions","D) Automatic Clustering would be triggered more by historical backfills than by chronological appends","E) For ShopFlow (static dataset), natural chronological clustering eliminates the need for a clustering key"],ans:['A','B','C','D','E'],exp:"ALL are true. A: Chronological load = natural time clustering. B: Appending newer months maintains order. C: Backfilling old data inserts old timestamps into new micro-partitions — degradation. D: Backfills cause more disorder — more reclustering needed. E: For ShopFlow's static ~112k rows, the dataset fits in few micro-partitions — clustering provides minimal benefit."},
{id:394,type:'multi',topic:'DIM_SELLERS',difficulty:'hard',q:"For Phase 03 seller query: top 5 sellers with most cancellations. Which are needed? (Select ALL)",opts:["A) FACT_ORDERS — order_status, seller_id, order_id","B) DIM_SELLERS — seller_id (for JOIN), seller_city, seller_state","C) COUNT(DISTINCT CASE WHEN order_status = 'canceled' THEN order_id END) for cancelled orders","D) COUNT(DISTINCT order_id) for total orders per seller","E) DIM_DATE — needed to filter to recent orders"],ans:['A','B','C','D'],exp:"A: FACT has order_status and seller_id. B: DIM_SELLERS for seller context. C: Cancelled order count using DISTINCT (item-level fact). D: Total orders per seller. E: DIM_DATE not required unless time filter specified. Result: JOIN FACT to DIM_SELLERS, GROUP BY seller, compute cancellation_count / total_count, ORDER BY DESC, LIMIT 5."},
{id:395,type:'multi',topic:'Star Schema',difficulty:'medium',q:"Phase 03 builds the star schema on top of Phase 02 STAGED tables. Which are true about this separation? (Select ALL)",opts:["A) ANALYTICS reads from STAGED — never directly from RAW","B) If STAGED is rebuilt, ANALYTICS can be rebuilt from STAGED without touching RAW","C) ANALYTICS = star schema = optimized for analytics; STAGED = cleaned types = optimized for transform","D) Analysts should query ANALYTICS, not STAGED","E) The three-layer architecture (RAW→STAGED→ANALYTICS) maps to the Medallion Architecture (Bronze→Silver→Gold)"],ans:['A','B','C','D','E'],exp:"ALL are correct. A and B: Layer isolation — ANALYTICS depends on STAGED, STAGED depends on RAW. C: Each layer has a clear contract. D: Analysts query the star schema — dimension joins are pre-built. E: Bronze=RAW, Silver=STAGED, Gold=ANALYTICS — exact Medallion mapping."},
{id:396,type:'multi',topic:'FACT_ORDERS',difficulty:'medium',q:"FACT_ORDERS CTAS completes. You verify with SELECT COUNT(*). Expected: ~112,650. You get 112,233. What are valid explanations? (Select ALL)",opts:["A) Some STG_ORDER_ITEMS rows had NULL order_id, filtered by the JOIN to STG_ORDERS","B) Some orders in STG_ORDERS had NULL customer_id, causing LEFT JOIN to DIM_CUSTOMERS to fail","C) INNER JOIN to STG_ORDERS dropped a few order items whose order_id was not in STG_ORDERS (orphans that slipped through)","D) CREATE OR REPLACE truncated 417 rows randomly","E) STG_ORDER_ITEMS itself has fewer than 112,650 rows after Phase 02 NULL filtering"],ans:['A','C','E'],exp:"A: If any STG_ORDER_ITEMS rows have NULL order_id and INNER JOIN to STG_ORDERS is used, those would be dropped. C: If Phase 02 integrity check left some orphan items (unlikely but possible). E: Phase 02 WHERE clause on STG_ORDER_ITEMS may have already removed some rows. B is wrong — LEFT JOIN to customers doesn't drop rows. D is wrong — CREATE OR REPLACE recreates, doesn't randomly drop."},
{id:397,type:'multi',topic:'DIM_DATE',difficulty:'medium',q:"DIM_DATE is a dimension. Which are characteristics that make it a 'large' dimension vs 'small' dimension? (Select ALL)",opts:["A) DIM_DATE has ~3,000 rows — small compared to FACT_ORDERS ~112k rows","B) DIM_DATE grows by exactly 365 or 366 rows per year — predictable","C) DIM_DATE is never updated — dates don't change attributes once created","D) DIM_DATE would be classified as a 'slowly changing dimension type 0' — no changes ever","E) DIM_DATE is often the smallest dimension in a star schema"],ans:['A','B','C','D','E'],exp:"ALL are true. A: 3000 rows vs 112k FACT rows — very small. B: Predictable linear growth. C: 2018-01-08 attributes (year=2018, quarter=1) never change. D: SCD Type 0 = fixed, no changes. E: Date dimension is typically the smallest dimension (few rows, pre-determined)."},
{id:398,type:'multi',topic:'Star Schema',difficulty:'hard',q:"Which Phase 03 SnowPro Core exam topics are covered by the ANALYTICS layer? (Select ALL)",opts:["A) Star schema modelling — fact and dimension tables","B) DIM_DATE generation using GENERATOR function","C) Clustering keys and micro-partition pruning","D) Result cache — 24-hour TTL, three cache types","E) RBAC — role-based access control"],ans:['A','B','C','D'],exp:"A: Star schema is a core exam topic. B: GENERATOR is a Snowflake-specific function (exam topic). C: Clustering and pruning (exam topic). D: Result cache demonstrated by running the same query twice (exam topic). E: RBAC is Phase 04 — not Phase 03. The exam topic table in ShopFlow context shows all four A-D as Phase 03 topics."},
{id:399,type:'multi',topic:'FACT_ORDERS',difficulty:'hard',q:"FACT_ORDERS final column list. Which are CORRECTLY described? (Select ALL)",opts:["A) order_id — degenerate dimension (transaction key, no DIM table)","B) order_item_id — degenerate dimension (item sequence, no DIM table)","C) customer_unique_id — FK to DIM_CUSTOMERS (person-level)","D) product_id — FK to DIM_PRODUCTS","E) order_date_key — DATE, FK to DIM_DATE"],ans:['A','B','C','D','E'],exp:"ALL correct. A and B: order_id and order_item_id are degenerate dimensions — stored in FACT for traceability but have no own DIM table. C: FK to DIM_CUSTOMERS on customer_unique_id (not order-scoped customer_id). D: FK to DIM_PRODUCTS on product_id. E: DATE-typed key for DIM_DATE join."},
{id:400,type:'multi',topic:'Clustering',difficulty:'hard',q:"TRUE statements about micro-partitions and clustering in Snowflake? (Select ALL)",opts:["A) Snowflake automatically stores data in 16MB (compressed) micro-partitions","B) Every table has micro-partitions — clustering defines HOW rows are distributed across them","C) Without clustering, micro-partitions are organized in insertion order","D) Clustering key values are stored in micro-partition metadata — enabling MIN/MAX pruning","E) A query can only prune micro-partitions if it uses = or BETWEEN filters — not > or <"],ans:['A','B','C','D'],exp:"A: 16MB compressed micro-partitions are the storage unit. B: All tables have micro-partitions; clustering = deliberate organization. C: Default insertion order = chronological for append workloads. D: MIN/MAX ranges in metadata enable pruning for range queries. E is FALSE — >, <, >=, <=, BETWEEN, =, IN all trigger pruning when they align with the clustering key range."},
];

// ─── TRUE / FALSE (IDs 401–412) ───────────────────────────────────────────
{id:401,type:'tf',topic:'RBAC',difficulty:'easy',q:"In Snowflake, privileges are granted to roles, and roles are granted to users — not privileges directly to users.",ans:true,exp:"TRUE. This is the fundamental RBAC pattern. Privilege → Role → User. Never grant privileges directly to a user. This matches AWS IAM: Policy → Role → User/Service. In ShopFlow, SHOPFLOW_ENGINEER role has warehouse USAGE, then the role is granted to specific users."},
{id:402,type:'tf',topic:'RBAC',difficulty:'easy',q:"GRANT USAGE ON WAREHOUSE SHOPFLOW_WH TO ROLE SHOPFLOW_ANALYST gives the analyst role the ability to run queries using that warehouse.",ans:true,exp:"TRUE. USAGE on a warehouse = ability to start and run queries using it. Without USAGE, a role cannot execute any SQL — even if they have table SELECT privileges. Both USAGE (warehouse) and SELECT (table) are needed to query data."},
{id:403,type:'tf',topic:'Masking',difficulty:'easy',q:"A dynamic data masking policy in Snowflake can show the real value to some roles and a masked value to others — decided at query time.",ans:true,exp:"TRUE. Dynamic data masking evaluates the calling role at query time. CASE WHEN CURRENT_ROLE() IN ('SHOPFLOW_ENGINEER') THEN email ELSE '***MASKED***' END. Engineers see real emails; analysts see masked. The policy is attached to the column — one definition, applies to all queries."},
{id:404,type:'tf',topic:'Row Access',difficulty:'easy',q:"A row access policy set on FACT_ORDERS can allow SHOPFLOW_SELLER role to see only rows where seller_id matches their own seller ID.",ans:true,exp:"TRUE. Row access policies filter rows at the storage layer — not enforced by application logic. The policy function maps the current user/role to allowed seller_ids. SHOPFLOW_SELLER querying FACT_ORDERS sees only their own rows — Snowflake enforces this transparently."},
{id:405,type:'tf',topic:'RBAC',difficulty:'easy',q:"SECURITYADMIN is the correct role for creating custom roles and granting privileges in Snowflake.",ans:true,exp:"TRUE. Snowflake's system role hierarchy: SECURITYADMIN manages users, roles, and grants. SYSADMIN creates warehouses and databases. ACCOUNTADMIN = full control. For RBAC setup, USE ROLE SECURITYADMIN before creating SHOPFLOW_ENGINEER, SHOPFLOW_ANALYST, SHOPFLOW_SELLER roles."},
{id:406,type:'tf',topic:'Result Cache',difficulty:'medium',q:"Snowflake result cache stores query results for 24 hours — the same exact query within 24 hours returns instantly with zero warehouse credits.",ans:true,exp:"TRUE. Result cache: same query text + same underlying data + within 24 hours = instant result from cache. No warehouse needed — zero credits. The cache is invalidated if the underlying table data changes (DML) or the 24-hour TTL expires. This is one of three Snowflake cache types: result cache, metadata cache, warehouse local cache."},
{id:407,type:'tf',topic:'Masking',difficulty:'medium',q:"Once a masking policy is attached to a column, the column definition changes — future SELECT * queries show the masked value only.",ans:true,exp:"TRUE. The masking policy is attached to the column — SELECT email FROM STG_CUSTOMERS returns masked values for roles without UNMASK privilege. SELECT * includes the masked column. The physical data is unchanged; the mask is applied at query execution time."},
