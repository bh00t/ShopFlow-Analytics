{id:212,type:'tf',topic:'NULL Handling',difficulty:'medium',q:"In STG_REVIEWS, replacing NULL comment fields with empty strings ('') would be a better practice than leaving them as NULL.",ans:false,exp:"FALSE. NULL and '' mean different things. NULL = the customer did not leave a comment. '' = the customer submitted an empty comment. Replacing NULL with '' loses this distinction and causes IS NULL filters to miss those rows. ShopFlow explicitly leaves comment NULLs as-is — a deliberate design decision."},
{id:213,type:'tf',topic:'INFORMATION_SCHEMA',difficulty:'medium',q:"INFORMATION_SCHEMA.COLUMNS can confirm whether a CTAS correctly produced a FLOAT column from TRY_CAST.",ans:true,exp:"TRUE. After CTAS, INFORMATION_SCHEMA.COLUMNS shows the data_type of every column. You can verify price is FLOAT (not TEXT), order_purchase_ts is TIMESTAMP_NTZ (not TEXT), etc. This is more reliable than looking at sample data — a column might look numeric but still be stored as VARCHAR."},
{id:214,type:'tf',topic:'Foreign Keys',difficulty:'medium',q:"Snowflake enforces FOREIGN KEY constraints at write time — INSERT will fail if a referencing value does not exist in the parent table.",ans:false,exp:"FALSE. Snowflake defines foreign keys as NOVALIDATE and RELY by default — they are informational metadata used by the query optimizer, not enforced at write time. You must validate referential integrity yourself with LEFT JOIN checks, as done in ShopFlow Phase 02 Cell 14."},
{id:215,type:'tf',topic:'TRY_CAST',difficulty:'medium',q:"TRY_CAST(product_weight_g AS FLOAT) on a value of 'N/A' returns 0.0.",ans:false,exp:"FALSE. TRY_CAST on an unconvertible value returns NULL, not zero. Returning 0.0 would be silently wrong — a product with no weight is different from a product with zero weight. NULL correctly represents 'value unknown' and will be excluded from AVG(), SUM() etc. automatically."},
{id:216,type:'tf',topic:'QUALIFY',difficulty:'medium',q:"Without QUALIFY, achieving the same deduplication result requires either a CTE or a subquery.",ans:true,exp:"TRUE. Standard SQL equivalent: WITH ranked AS (SELECT *, ROW_NUMBER() OVER (...) AS rn FROM ...) SELECT * FROM ranked WHERE rn = 1. QUALIFY collapses this into a single SELECT without a subquery. More readable and efficient — Snowflake optimizes QUALIFY internally."},
{id:217,type:'tf',topic:'TIMESTAMP_NTZ',difficulty:'medium',q:"Storing timestamps as TIMESTAMP_NTZ means two sessions in different timezones will see the same raw value when querying the table.",ans:true,exp:"TRUE. NTZ = no timezone stored or applied. Both a user in São Paulo and one in Tokyo see '2018-01-08 21:28:27' — the exact stored value. TIMESTAMP_LTZ would convert to each session's local timezone, potentially causing confusion when comparing timestamps across sessions."},
{id:218,type:'tf',topic:'CTAS',difficulty:'medium',q:"In ShopFlow Phase 02, the _loaded_at and _source_file metadata columns are carried forward from RAW into STAGED tables.",ans:true,exp:"TRUE. Each STAGED CTAS includes _loaded_at and _source_file in its SELECT list (e.g. p._loaded_at, p._source_file). This preserves data lineage — you can always trace a STAGED row back to when it was originally loaded into RAW and from which file."},
{id:219,type:'tf',topic:'TRY_TO_TIMESTAMP',difficulty:'hard',q:"TRY_TO_TIMESTAMP('2023-99-99') returns NULL in Snowflake.",ans:true,exp:"TRUE. '2023-99-99' is not a valid date (month 99, day 99). TRY_TO_TIMESTAMP returns NULL for invalid dates instead of throwing an error. This is exactly why ShopFlow uses TRY_ variants — the Olist dataset occasionally contains malformed date strings, and VARCHAR in RAW accepts them all, then TRY_ handles them gracefully in STAGED."},
{id:220,type:'tf',topic:'NULL Handling',difficulty:'hard',q:"In STG_ORDERS, the delivery_delay_days column will always be NULL for orders with order_status = 'delivered'.",ans:false,exp:"FALSE. delivery_delay_days is NULL when delivered_ts is NULL — i.e. when the order has not been delivered. Delivered orders have a non-NULL delivered_ts, so DATEDIFF produces a real number (could be positive, negative, or zero). The NULL case applies to orders still in transit, cancelled, etc."},
{id:221,type:'tf',topic:'COALESCE',difficulty:'hard',q:"COALESCE is equivalent to NVL in Oracle and ISNULL in SQL Server — all three return the first non-NULL value from a list.",ans:false,exp:"PARTIALLY TRUE but NVL and ISNULL only accept exactly two arguments. COALESCE is ANSI SQL and accepts any number of arguments: COALESCE(a, b, c, d). NVL(a, b) and ISNULL(a, b) are two-argument equivalents. COALESCE is the standard Snowflake recommendation."},
{id:222,type:'tf',topic:'QUALIFY',difficulty:'hard',q:"QUALIFY can reference window functions that are not in the SELECT clause.",ans:true,exp:"TRUE. QUALIFY works like HAVING (for GROUP BY) — it filters on the window function result even if that function is not in the SELECT list. Example: SELECT zip, lat, lng FROM ... QUALIFY ROW_NUMBER() OVER (...) = 1. ROW_NUMBER() doesn't appear in SELECT but QUALIFY can still reference it."},
{id:223,type:'tf',topic:'LEFT JOIN',difficulty:'hard',q:"In STG_PRODUCTS CTAS, specifying p.* instead of listing each column explicitly would correctly include all RAW_PRODUCTS columns plus the translation join column.",ans:false,exp:"FALSE. p.* expands to all columns from RAW_PRODUCTS but would NOT include the translation column (t.product_category_name_english). You must explicitly select t.product_category_name_english (or the COALESCE expression) alongside p.*. Also, p.* would include the typo column names (product_name_lenght) — you'd lose the rename opportunity."},
{id:224,type:'tf',topic:'CTAS',difficulty:'hard',q:"Running STG_GEOLOCATION CTAS while another session is querying STG_GEOLOCATION will cause an error or lock conflict.",ans:false,exp:"FALSE. Snowflake uses multi-version concurrency control (MVCC). CREATE OR REPLACE creates a new version of the table atomically — readers see the old version until the swap completes, then see the new version. No lock conflict, no error. This is a major advantage of Snowflake over traditional databases."},
{id:225,type:'tf',topic:'NULL Handling',difficulty:'hard',q:"After WHERE order_id IS NOT NULL in STG_ORDERS, it is still possible to have rows where customer_id IS NULL.",ans:true,exp:"TRUE. ShopFlow only filters WHERE order_id IS NOT NULL — it does not filter on customer_id. Some Olist orders legitimately have no customer record. The referential integrity check in Cell 14 (orders without a customer LEFT JOIN) quantifies this. NULL customer_id flows into STG_ORDERS and must be handled in Phase 3 joins."},

// ─── MCQ (IDs 226–260) ────────────────────────────────────────────────────
{id:226,type:'mcq',topic:'TRY_CAST',difficulty:'easy',q:"Why does ShopFlow use TRY_CAST instead of CAST for all type conversions in STAGED tables?",opts:["A) TRY_CAST is faster than CAST","B) TRY_CAST returns NULL for bad values instead of failing — prevents entire CTAS from crashing on one dirty value","C) CAST is deprecated in Snowflake","D) TRY_CAST preserves the original VARCHAR value alongside the cast"],ans:'B',exp:"CAST fails the whole query on the first unconvertible value. One row with 'N/A' in price would abort the entire STG_ORDER_ITEMS rebuild. TRY_CAST converts cleanly and returns NULL for bad values — you know exactly which rows need investigation."},
{id:227,type:'mcq',topic:'CTAS',difficulty:'easy',q:"Which SQL pattern does ShopFlow use to build every STAGED table?",opts:["A) INSERT INTO ... SELECT FROM","B) CREATE OR REPLACE TABLE ... AS SELECT (CTAS)","C) MERGE INTO ... USING","D) ALTER TABLE ... ADD COLUMN then UPDATE"],ans:'B',exp:"CTAS is ideal for STAGED: schema is inferred from SELECT, the table is rebuilt cleanly every time, it's a single atomic operation. INSERT INTO SELECT requires the table to exist first and appends to existing data. MERGE handles upserts — overkill for a full rebuild."},
{id:228,type:'mcq',topic:'QUALIFY',difficulty:'easy',q:"In STG_GEOLOCATION, what does PARTITION BY geolocation_zip_code_prefix do inside the ROW_NUMBER window function?",opts:["A) Groups all rows across the entire table into one partition","B) Creates a separate ranking sequence for each unique zip code prefix — ranking restarts at 1 for each zip","C) Filters out rows where zip is NULL","D) Sorts all rows by zip before applying ROW_NUMBER"],ans:'B',exp:"PARTITION BY groups rows — ROW_NUMBER() restarts from 1 for each zip. Without PARTITION BY, ROW_NUMBER would rank all 1M rows globally (1 to 1M) — QUALIFY = 1 would only keep one row total, not one per zip."},
{id:229,type:'mcq',topic:'NULL Handling',difficulty:'easy',q:"Why does ShopFlow leave NULL values in review_comment_message rather than replacing with an empty string?",opts:["A) Empty strings cause errors in Snowflake aggregation functions","B) NULL means 'no comment was left' — semantically different from '' which means 'an empty comment was submitted'","C) Snowflake cannot store empty strings in VARCHAR columns","D) NULL values take up less storage than empty strings"],ans:'B',exp:"Data semantics matter. NULL = customer did not submit a comment. '' = customer submitted but typed nothing. These are different states. IS NULL filters and COUNT(review_comment_message) work correctly when NULLs are properly preserved."},
{id:230,type:'mcq',topic:'TIMESTAMP_NTZ',difficulty:'easy',q:"An analyst runs the same query from São Paulo (UTC-3) and Tokyo (UTC+9). The query selects order_purchase_ts from STG_ORDERS. What do both see?",opts:["A) São Paulo sees UTC-3 adjusted time, Tokyo sees UTC+9 adjusted time","B) Both see exactly the same stored value — no timezone conversion with TIMESTAMP_NTZ","C) Both see UTC time","D) Snowflake asks for session timezone preference before returning results"],ans:'B',exp:"TIMESTAMP_NTZ stores and returns the value exactly as stored — no conversion. '2018-01-08 21:28:27' is returned to both users identically. This is why NTZ is the standard for DWH: consistent, unambiguous, timezone-agnostic."},
{id:231,type:'mcq',topic:'COALESCE',difficulty:'easy',q:"In STG_PRODUCTS, what value is stored in product_category_english for a product whose Portuguese category name has no translation?",opts:["A) NULL","B) The Portuguese category name","C) 'uncategorised'","D) An empty string"],ans:'C',exp:"COALESCE(t.product_category_name_english, 'uncategorised') — when the LEFT JOIN finds no match, t.product_category_name_english is NULL, so COALESCE returns 'uncategorised'. No NULLs flow into ANALYTICS for this column."},
{id:232,type:'mcq',topic:'DATEDIFF',difficulty:'easy',q:"An order has order_estimated_delivery_date = '2018-02-10' and order_delivered_customer_date = '2018-02-07'. What is delivery_delay_days?",opts:["A) 3","B) -3","C) NULL","D) 0"],ans:'B',exp:"DATEDIFF('day', estimated, delivered) = delivered - estimated = Feb 7 - Feb 10 = -3 days. Negative = early delivery. ShopFlow's analytics use this: negative is good (early), positive is bad (late), zero is exact."},
{id:233,type:'mcq',topic:'TRY_TO_TIMESTAMP',difficulty:'easy',q:"What is the difference between TRY_TO_TIMESTAMP and TRY_TO_TIMESTAMP_NTZ in Snowflake?",opts:["A) No difference — they are aliases","B) TRY_TO_TIMESTAMP_NTZ always returns TIMESTAMP_NTZ; TRY_TO_TIMESTAMP returns the session's default timestamp type","C) TRY_TO_TIMESTAMP_NTZ is faster","D) TRY_TO_TIMESTAMP_NTZ cannot parse strings with spaces"],ans:'B',exp:"TRY_TO_TIMESTAMP returns the session's TIMESTAMP_TYPE_MAPPING parameter (default NTZ). TRY_TO_TIMESTAMP_NTZ always returns TIMESTAMP_NTZ regardless of session settings. For predictability in a DWH, using TRY_TO_TIMESTAMP_NTZ is more explicit."},
{id:234,type:'mcq',topic:'CTAS',difficulty:'medium',q:"After CREATE OR REPLACE TABLE STG_GEOLOCATION AS SELECT ..., what is the table owner?",opts:["A) The role that owns RAW_GEOLOCATION","B) The role that executed the CREATE OR REPLACE statement","C) SYSADMIN always owns CTAS tables","D) SHOPFLOW_ROLE regardless of who runs the statement"],ans:'B',exp:"In Snowflake, whoever creates an object owns it — the role executing the statement. If you run the CTAS as SYSADMIN, SYSADMIN owns STG_GEOLOCATION. If you run as SHOPFLOW_ROLE, that role owns it. Ownership determines who can grant access to others."},
{id:235,type:'mcq',topic:'QUALIFY',difficulty:'medium',q:"STG_GEOLOCATION starts with ~1,000,163 rows in RAW. After QUALIFY ROW_NUMBER() OVER (PARTITION BY zip ORDER BY _loaded_at DESC) = 1, approximately how many rows remain?",opts:["A) ~1,000,163 — QUALIFY doesn't remove rows, just ranks them","B) ~19,000 — one row per unique zip code prefix","C) ~99,441 — one per order","D) ~50,000 — half the rows"],ans:'B',exp:"~19,000 unique zip code prefixes exist in the dataset. QUALIFY keeps exactly one row per unique zip, collapsing ~1M rows into ~19k. This makes geolocation joins safe — a customer zip joins to exactly one coordinate row, no fan-out."},
{id:236,type:'mcq',topic:'TRY_CAST',difficulty:'medium',q:"TRY_CAST(order_item_id AS INTEGER) for a value of '2.0' returns what?",opts:["A) NULL — '2.0' cannot be cast to INTEGER","B) 2 — Snowflake truncates the decimal during cast","C) Error — TRY_CAST doesn't handle decimal strings","D) '2.0' — the original VARCHAR value is preserved"],ans:'B',exp:"Snowflake coerces '2.0' to INTEGER as 2 (truncating the decimal). TRY_CAST to INTEGER from a numeric string like '2.0' succeeds. Only non-numeric strings like 'two' or 'N/A' would produce NULL. This is worth testing on your actual data before assuming."},
{id:237,type:'mcq',topic:'NULL Handling',difficulty:'medium',q:"In STG_CUSTOMERS, why is customer_zip_code_prefix kept as VARCHAR rather than cast to INTEGER?",opts:["A) INTEGER columns cannot be used as join keys","B) Zip codes can have leading zeros (e.g. '01310') — casting to INTEGER drops the leading zero","C) TRY_CAST on zip codes would always return NULL","D) VARCHAR is faster for JOIN operations"],ans:'B',exp:"Brazilian zip codes start with digits 0-9. '01310' as INTEGER becomes 1310 — the join to STG_GEOLOCATION on zip_code_prefix would fail. Zip codes are identifiers, not numbers — arithmetic on them is meaningless. Always store identifiers as VARCHAR or CHAR."},
{id:238,type:'mcq',topic:'LEFT JOIN',difficulty:'medium',q:"In STG_PRODUCTS, the LEFT JOIN is ON p.product_category_name = t.product_category_name. What happens when p.product_category_name IS NULL?",opts:["A) The row is dropped — NULL does not join","B) The row is kept, and t.product_category_name_english is NULL — COALESCE then returns 'uncategorised'","C) Snowflake raises a NULL join key warning","D) The row is matched to the first row in the translation table"],ans:'B',exp:"NULL = NULL is FALSE in SQL — a NULL join key never matches. The LEFT JOIN keeps the product row but produces NULL for all translation columns. COALESCE then converts the NULL English name to 'uncategorised'. Net result: products with NULL category get 'uncategorised' — correct behaviour."},
{id:239,type:'mcq',topic:'INFORMATION_SCHEMA',difficulty:'medium',q:"You want to confirm STG_ORDERS.order_purchase_ts is TIMESTAMP_NTZ, not TEXT. Which query gives a definitive answer?",opts:["A) SELECT order_purchase_ts FROM STG_ORDERS LIMIT 5 — visually inspect the format","B) SELECT data_type FROM INFORMATION_SCHEMA.COLUMNS WHERE table_name='STG_ORDERS' AND column_name='ORDER_PURCHASE_TS'","C) DESCRIBE TABLE STG_ORDERS","D) Both B and C are definitive"],ans:'D',exp:"Both INFORMATION_SCHEMA.COLUMNS and DESCRIBE TABLE show the official stored data type. Visual inspection (A) is unreliable — a TIMESTAMP_NTZ and a VARCHAR can look identical in output. Always verify data types through metadata, not eye-test."},
{id:240,type:'mcq',topic:'CTAS',difficulty:'medium',q:"Which statement about CTAS and clustering keys is true?",opts:["A) CTAS automatically inherits clustering keys from the source table","B) Clustering keys must be defined separately after CTAS using ALTER TABLE ... CLUSTER BY","C) CTAS cannot be used on tables that will have clustering keys","D) CTAS with clustering requires Enterprise edition"],ans:'B',exp:"CTAS creates a table from SELECT — it does not inherit clustering keys from the source (RAW tables have none anyway). Clustering is added with ALTER TABLE FACT_ORDERS CLUSTER BY (...) in Phase 03/04. CTAS and clustering keys are independent operations."},
{id:241,type:'mcq',topic:'ROW_NUMBER',difficulty:'medium',q:"What would happen if you used RANK() instead of ROW_NUMBER() for STG_GEOLOCATION deduplication when two rows have the exact same _loaded_at?",opts:["A) No difference — both produce identical results","B) Both rows would get RANK = 1, and QUALIFY = 1 would keep BOTH rows — deduplication fails","C) RANK() would throw an error on tied values","D) RANK() would arbitrarily pick one of the tied rows"],ans:'B',exp:"RANK() assigns the same rank to tied rows. Two rows with identical _loaded_at in the same zip partition both get RANK = 1. QUALIFY = 1 keeps both — you still have a duplicate. ROW_NUMBER() always assigns unique ranks even for ties, guaranteeing exactly one row per partition gets rank 1."},
{id:242,type:'mcq',topic:'TRY_CAST',difficulty:'medium',q:"In STG_PAYMENTS, payment_value TRY_CAST to FLOAT returns NULL for 3 rows. What is the impact on SUM(payment_value)?",opts:["A) SUM returns NULL — any NULL in the column makes the aggregate NULL","B) SUM ignores NULL values and returns the sum of all non-NULL rows","C) SUM returns 0 for NULL rows","D) SUM raises a warning but returns the correct total"],ans:'B',exp:"SQL aggregate functions (SUM, AVG, COUNT, MIN, MAX) ignore NULL values by default. SUM(payment_value) correctly adds all non-NULL values and skips the 3 NULLs. This is standard SQL behaviour — but COUNT(*) vs COUNT(payment_value) would differ (COUNT(*) includes NULLs, COUNT(col) doesn't)."},
{id:243,type:'mcq',topic:'DATEDIFF',difficulty:'medium',q:"delivery_delay_days = DATEDIFF('day', estimated_delivery_ts, delivered_ts). For an undelivered order, delivered_ts is NULL. What is delivery_delay_days?",opts:["A) 0","B) A very large positive number","C) NULL","D) DATEDIFF raises an error when one argument is NULL"],ans:'C',exp:"Any arithmetic involving NULL returns NULL. DATEDIFF(unit, NULL, X) = NULL. DATEDIFF(unit, X, NULL) = NULL. This is correct — an undelivered order has no delay value. In Phase 03 analytics, WHERE delivery_delay_days IS NOT NULL filters to delivered orders only."},
{id:244,type:'mcq',topic:'CTAS',difficulty:'hard',q:"You rebuild STG_ORDER_ITEMS while a BI tool is running a long query against it. What happens?",opts:["A) The CTAS blocks until the BI query completes","B) The BI query sees the old table version throughout; CTAS completes atomically; subsequent BI queries see the new table","C) Both operations fail with a lock conflict","D) The BI query sees partially rebuilt data — a mix of old and new rows"],ans:'B',exp:"Snowflake MVCC: CREATE OR REPLACE is atomic. The BI query runs against the old micro-partitions until it finishes. Once CTAS commits, new queries see the new table. No partial reads, no lock conflicts. This is a fundamental advantage over traditional databases."},
{id:245,type:'mcq',topic:'NULL Handling',difficulty:'hard',q:"STG_CUSTOMERS WHERE customer_id IS NOT NULL AND customer_unique_id IS NOT NULL. A row has customer_id='abc' and customer_unique_id=NULL. What happens to it?",opts:["A) It passes the filter — customer_id IS NOT NULL is TRUE","B) It is excluded — customer_unique_id IS NOT NULL is FALSE","C) Both conditions are evaluated and the row is kept if either is TRUE","D) WHERE clause cannot evaluate multiple IS NOT NULL conditions simultaneously"],ans:'B',exp:"AND requires BOTH conditions to be TRUE. customer_id IS NOT NULL = TRUE, customer_unique_id IS NOT NULL = FALSE. TRUE AND FALSE = FALSE — the row is excluded. This is intentional: a customer without a unique ID cannot be used for person-level analytics in Phase 03."},
{id:246,type:'mcq',topic:'QUALIFY',difficulty:'hard',q:"Can QUALIFY be used with RANK() to keep all tied-for-first rows in a partition?",opts:["A) No — QUALIFY only works with ROW_NUMBER()","B) Yes — QUALIFY RANK() OVER (...) = 1 keeps all rows tied for first place","C) Yes — but only in subqueries, not in main CTAS statements","D) No — QUALIFY requires a unique ranking function"],ans:'B',exp:"QUALIFY works with any window function. QUALIFY RANK() OVER (PARTITION BY zip ORDER BY _loaded_at DESC) = 1 keeps ALL rows tied for first place — multiple rows if timestamps match. For deduplication this is wrong (you want exactly one). But for 'keep all top-scoring items' queries, this is the correct pattern."},
{id:247,type:'mcq',topic:'TRY_CAST',difficulty:'hard',q:"TRY_CAST('99999999999999999999' AS INTEGER) — value exceeds INTEGER max. What does Snowflake return?",opts:["A) NULL — overflow treated as unconvertible","B) The maximum INTEGER value (2,147,483,647)","C) An error — TRY_CAST doesn't protect against overflow","D) The value truncated to INTEGER range"],ans:'A',exp:"Snowflake's TRY_CAST returns NULL for any value that cannot be safely represented in the target type — including overflow. This is the 'safe' behaviour. Note: Snowflake INTEGER is actually 38-digit precision (equivalent to NUMBER(38,0)), so true overflow only happens with extremely large values."},
{id:248,type:'mcq',topic:'CTAS',difficulty:'hard',q:"STG_ORDERS CTAS selects _loaded_at from RAW_ORDERS (a TIMESTAMP_NTZ column). What type does _loaded_at have in STG_ORDERS?",opts:["A) VARCHAR — CTAS always defaults to VARCHAR","B) TIMESTAMP_NTZ — CTAS inherits the type from the source column","C) TIMESTAMP_LTZ — CTAS converts to session timezone type","D) The type depends on the active TIMESTAMP_TYPE_MAPPING session parameter"],ans:'B',exp:"CTAS inherits the exact data type from the source expression. Since RAW_ORDERS._loaded_at is TIMESTAMP_NTZ, the _loaded_at column in STG_ORDERS is also TIMESTAMP_NTZ. No conversion, no surprise — type flows through transparently."},
{id:249,type:'mcq',topic:'LEFT JOIN',difficulty:'hard',q:"STG_PRODUCTS uses LEFT JOIN. After the CTAS, COUNT(*) = 32,928 vs RAW_PRODUCTS COUNT(*) = 32,951. What explains the difference?",opts:["A) The LEFT JOIN dropped some rows — impossible with LEFT JOIN","B) The WHERE p.product_id IS NOT NULL filter removed 23 rows with NULL product IDs","C) Duplicate products were automatically deduplicated","D) COALESCE removed 23 rows where both category columns were NULL"],ans:'B',exp:"LEFT JOIN cannot reduce row count — it keeps all rows from the left table. The only filter in the CTAS is WHERE p.product_id IS NOT NULL. 32,951 - 23 = 32,928 means 23 rows in RAW_PRODUCTS had NULL product_id. Those rows are correctly excluded — a product without an ID cannot be referenced."},
{id:250,type:'mcq',topic:'TRY_TO_TIMESTAMP',difficulty:'hard',q:"TRY_TO_TIMESTAMP('2018-01-08T21:28:27') vs TRY_TO_TIMESTAMP('2018-01-08 21:28:27') — which parses correctly in Snowflake?",opts:["A) Only the space-separated version — Snowflake does not support ISO 8601 T separator","B) Both — Snowflake's auto-detect handles common date formats including T separator","C) Only the T-separator ISO 8601 version","D) Neither — Snowflake requires explicit FORMAT string for both"],ans:'B',exp:"Snowflake's TRY_TO_TIMESTAMP auto-detects common formats including ISO 8601 (T separator) and the space-separated variant. The Olist dataset uses space-separated format — but if the source changes to ISO format, TRY_TO_TIMESTAMP would still parse correctly."},
{id:251,type:'mcq',topic:'NULL Handling',difficulty:'easy',q:"Which column in STG_ORDERS will have the most NULL values, and why?",opts:["A) order_purchase_ts — many orders never start","B) delivered_ts — many orders are not yet delivered or were cancelled","C) order_status — many orders have unknown status","D) order_id — many orders have no primary key"],ans:'B',exp:"order_delivered_customer_date (→ delivered_ts) is NULL for every undelivered order: cancelled, processing, in-transit, unavailable. The Phase 02 verification query shows: COUNT(*) - COUNT(delivered_ts) = not_yet_delivered. This NULLs flow into delivery_delay_days correctly."},
{id:252,type:'mcq',topic:'CTAS',difficulty:'easy',q:"What is the purpose of UPPER(customer_state) AS customer_state in STG_CUSTOMERS?",opts:["A) Converts city names to uppercase","B) Normalises 2-letter state codes to uppercase — prevents 'sp' and 'SP' from being treated as different states in GROUP BY","C) Required by Snowflake for VARCHAR columns","D) Improves JOIN performance on state columns"],ans:'B',exp:"Source data may have state codes in mixed case ('sp', 'Sp', 'SP'). Without normalisation, GROUP BY state would produce separate buckets for each variant — wrong analytics. UPPER() ensures all states are consistently uppercase regardless of source variation."},
{id:253,type:'mcq',topic:'INFORMATION_SCHEMA',difficulty:'easy',q:"After Phase 02, you check INFORMATION_SCHEMA.TABLES for SHOPFLOW_STAGED. STG_GEOLOCATION shows row_count ≈ 19,000 while RAW_GEOLOCATION shows ≈ 1,000,163. This confirms what?",opts:["A) The STAGED load failed — expected count is ~1M","B) Deduplication worked — QUALIFY collapsed ~1M raw rows to ~19k unique zip codes","C) A bug — STAGED should always match RAW row counts","D) STG_GEOLOCATION only loaded the first 19,000 rows from RAW"],ans:'B',exp:"This dramatic reduction is expected and correct. ~1M rows / ~19k unique zips = ~52 duplicate coordinate entries per zip on average. QUALIFY ROW_NUMBER() = 1 correctly reduces to one row per zip. The delta between RAW and STAGED row counts proves deduplication worked."},
{id:254,type:'mcq',topic:'DATEDIFF',difficulty:'medium',q:"What does review_response_days = DATEDIFF('day', review_created_ts, review_answered_ts) represent?",opts:["A) How long the review sat unmoderated","B) How many days the customer took to submit their review after being asked","C) The age of the review in days from today","D) How long the seller took to respond to the review"],ans:'B',exp:"review_creation_date = when Olist sent the review request. review_answer_timestamp = when the customer submitted. DATEDIFF between them = customer response time. Useful for understanding review recency — did customers respond immediately or days later?"},
{id:255,type:'mcq',topic:'TRY_CAST',difficulty:'medium',q:"STG_PAYMENTS has TRY_CAST(payment_installments AS INTEGER). A payment with installments = '1.5' (from a data error). What is stored?",opts:["A) 1 — truncated","B) 2 — rounded","C) NULL — '1.5' is not a valid INTEGER","D) Error — TRY_CAST on '1.5' to INTEGER throws"],ans:'A',exp:"Snowflake TRY_CAST('1.5' AS INTEGER) truncates the decimal — stores 1. This mirrors the CAST behaviour for numeric strings. '1.5' is a valid numeric string, just not a whole number — truncation occurs silently. This is worth knowing: NULL only happens for non-numeric strings."},
{id:256,type:'mcq',topic:'CTAS',difficulty:'medium',q:"After STG_PRODUCTS CTAS, you discover product_category_name_english has a typo. How do you fix it?",opts:["A) UPDATE STG_PRODUCTS SET product_category_name_english = ... — update the translation","B) Fix the typo in RAW_CATEGORY_TRANSLATION and re-run the STG_PRODUCTS CTAS — it rebuilds from RAW","C) ALTER TABLE STG_PRODUCTS RENAME COLUMN — rename the column","D) Drop and recreate STG_PRODUCTS manually"],ans:'B',exp:"The CTAS pattern: fix the source (RAW), re-run the CTAS. STG_PRODUCTS is rebuilt from RAW every time the CTAS runs. No patching of STAGED directly — that violates the principle that STAGED is derived from RAW, never edited directly. This is the power of CTAS over INSERT-based pipelines."},
{id:257,type:'mcq',topic:'LEFT JOIN',difficulty:'hard',q:"STG_PRODUCTS LEFT JOIN translation table. After CTAS, you find 500 rows where product_category_english = 'uncategorised'. You check RAW_CATEGORY_TRANSLATION and find the category exists there. What is the most likely cause?",opts:["A) COALESCE is broken","B) Case mismatch — product_category_name in RAW_PRODUCTS uses different capitalisation than in RAW_CATEGORY_TRANSLATION","C) The LEFT JOIN was silently converted to INNER JOIN","D) NULL_IF during COPY INTO converted the category name to NULL"],ans:'B',exp:"The JOIN is ON p.product_category_name = t.product_category_name — case-sensitive string comparison. If products have 'CAMA_MESA_BANHO' and translation has 'cama_mesa_banho', they don't match. Solution: UPPER(p.product_category_name) = UPPER(t.product_category_name) or LOWER on both sides."},
{id:258,type:'mcq',topic:'QUALIFY',difficulty:'hard',q:"You add a second window function to the STG_GEOLOCATION CTAS: ROW_NUMBER() OVER (PARTITION BY city ORDER BY _loaded_at DESC) AS city_rn. You want one row per zip AND one row per city. Can a single QUALIFY handle both?",opts:["A) Yes — QUALIFY zip_rn = 1 AND city_rn = 1","B) No — you'd get one row per zip that is also the only representative of its city — impossible since multiple zips share a city","C) Yes — QUALIFY SUM(zip_rn + city_rn) = 2","D) No — QUALIFY only accepts one window function"],ans:'B',exp:"Logically impossible as one QUALIFY. A zip that is first in its zip-partition may not be first in its city-partition. Requiring both = 1 would produce 0 or very few rows. You'd need two separate steps or a more complex approach. QUALIFY can reference multiple window functions but the logic must be achievable in a single pass."},
{id:259,type:'mcq',topic:'TRY_CAST',difficulty:'hard',q:"After STG_ORDER_ITEMS CTAS, COUNT(price) = 112,647 but COUNT(*) = 112,650. What does this tell you?",opts:["A) Three rows were dropped by the WHERE clause","B) Three rows had price values that TRY_CAST(price AS FLOAT) could not convert — those cells are NULL","C) Three rows have duplicate order_id + order_item_id combinations","D) Snowflake skipped three rows during CTAS execution"],ans:'B',exp:"COUNT(col) counts non-NULL values. COUNT(*) counts all rows. The difference (3) = rows where price IS NULL. Since price in RAW is VARCHAR, TRY_CAST failed on 3 values — probably malformed strings. Those rows are still present in STG_ORDER_ITEMS but with NULL price. Important for revenue calculations."},
{id:260,type:'mcq',topic:'CTAS',difficulty:'hard',q:"STG_GEOLOCATION CTAS takes 45 seconds on X-Small. What is the MOST effective way to speed it up given 1M RAW rows?",opts:["A) Increase warehouse to Small (2x compute)","B) Add LIMIT 1000000 to the SELECT — full table is redundant","C) Use COPY INTO instead of CTAS for STAGED tables","D) Partition the CTAS into 10 smaller INSERT statements"],ans:'A',exp:"Doubling warehouse size doubles compute threads, halving query time. CTAS processes all rows in parallel — more threads = faster. LIMIT would truncate data (wrong). COPY INTO is for staged files, not SQL transforms. Splitting into INSERTs doesn't help — each part still needs compute. Warehouse scaling is the Snowflake way."},

// ─── MULTI-SELECT (IDs 261–300) ───────────────────────────────────────────
{id:261,type:'multi',topic:'TRY_CAST',difficulty:'easy',q:"Which are correct about TRY_CAST vs CAST in ShopFlow? (Select ALL)",opts:["A) TRY_CAST(price AS FLOAT) on 'N/A' returns NULL, not an error","B) CAST(price AS FLOAT) on 'N/A' raises an error and aborts the query","C) TRY_CAST is slower than CAST in all scenarios","D) TRY_CAST is available in Snowflake but not in standard SQL","E) Both TRY_CAST and CAST produce the same result when the value is a valid number"],ans:['A','B','D','E'],exp:"A: TRY_CAST safely returns NULL for bad values. B: CAST aborts on first error. D: TRY_CAST is Snowflake-specific (standard SQL uses TRY_CONVERT in SQL Server, no equivalent in ANSI). E: For valid values like '29.90', both return 29.90. C is false — TRY_CAST has negligible overhead."},
{id:262,type:'multi',topic:'CTAS',difficulty:'easy',q:"Which are true about the CTAS pattern used in ShopFlow STAGED tables? (Select ALL)",opts:["A) Schema is derived from the SELECT statement — no explicit column definitions needed","B) CREATE OR REPLACE makes the operation idempotent — safe to re-run","C) CTAS with CREATE OR REPLACE deletes existing data before rebuilding","D) CTAS creates both the table structure and loads the data in one statement","E) CTAS requires a running warehouse to execute"],ans:['A','B','C','D','E'],exp:"ALL are true. A: Schema inferred from SELECT. B: OR REPLACE = safe re-run (rebuilds from scratch). C: Replace drops old data. D: Single atomic DDL + DML operation. E: CTAS executes a SELECT which needs compute. All five are core CTAS properties."},
{id:263,type:'multi',topic:'QUALIFY',difficulty:'easy',q:"What makes QUALIFY preferable to a CTE for deduplication in Snowflake? (Select ALL)",opts:["A) QUALIFY is more concise — no wrapper query needed","B) QUALIFY is Snowflake-specific and signals to reviewers this is intentional Snowflake-idiomatic code","C) QUALIFY is universally supported across all SQL databases","D) QUALIFY can reference window functions not in the SELECT list","E) QUALIFY is optimized by Snowflake's query planner"],ans:['A','B','D','E'],exp:"A: One SELECT vs CTE + outer SELECT. B: Snowflake idiom, signals expertise. D: Window function doesn't need to be in SELECT. E: Snowflake optimizes QUALIFY internally. C is FALSE — QUALIFY is Snowflake-specific, not standard SQL."},
{id:264,type:'multi',topic:'NULL Handling',difficulty:'easy',q:"Which columns in STG_ORDERS are expected to have NULL values for some rows? (Select ALL)",opts:["A) order_id — never NULL (filtered by WHERE)","B) order_approved_ts — payment not always approved immediately","C) carrier_pickup_ts — seller may not have shipped yet","D) delivered_ts — order may not be delivered yet","E) delivery_delay_days — NULL when delivered_ts is NULL"],ans:['B','C','D','E'],exp:"A: WHERE order_id IS NOT NULL removes NULL order_ids. B: Not all orders are approved (cancelled before approval). C: Not all are shipped. D: Not all are delivered. E: DATEDIFF returns NULL when delivered_ts is NULL — computed from a NULL input. B, C, D, E are all expected NULLs."},
{id:265,type:'multi',topic:'TIMESTAMP_NTZ',difficulty:'easy',q:"Reasons ShopFlow uses TIMESTAMP_NTZ for all warehouse timestamps? (Select ALL)",opts:["A) Consistent — same value returned regardless of session timezone","B) Storage efficient — NTZ uses fewer bytes than LTZ","C) Industry standard for DWH — store UTC, convert at the reporting layer","D) Required by Snowflake for CTAS operations","E) Avoids bugs where UTC and local time differ causing incorrect date comparisons"],ans:['A','C','E'],exp:"A: NTZ is unambiguous — same value everywhere. C: DWH best practice — store in NTZ, let BI tools handle timezone display. E: TIMESTAMP_LTZ comparisons can produce wrong results when session timezones differ. B is false — storage size is similar. D is false — CTAS works with any timestamp type."},
{id:266,type:'multi',topic:'LEFT JOIN',difficulty:'easy',q:"Why is LEFT JOIN used instead of INNER JOIN in STG_PRODUCTS? (Select ALL)",opts:["A) INNER JOIN would silently drop products with no translation — data loss","B) LEFT JOIN preserves all products — unmatched rows get NULL for English name","C) COALESCE then converts the NULL to 'uncategorised' — no NULLs in output","D) LEFT JOIN is faster than INNER JOIN on large tables","E) The Olist dataset has products with no Portuguese category — those need to be kept"],ans:['A','B','C','E'],exp:"A: INNER JOIN drops non-matching rows — data loss. B: ALL left-table rows are preserved. C: COALESCE handles the NULL. E: Some products genuinely have no category. D is false — INNER JOIN is often faster since it processes fewer rows."},
{id:267,type:'multi',topic:'DATEDIFF',difficulty:'easy',q:"What can delivery_delay_days reveal in analytics? (Select ALL)",opts:["A) Whether orders were delivered before or after the estimated date","B) Whether delivery delay correlates with lower review scores","C) Which sellers consistently deliver late","D) The absolute distance between seller and customer","E) Which product categories have worst delivery performance"],ans:['A','B','C','E'],exp:"A: Positive = late, negative = early. B: Phase 02 business check confirms late orders get lower scores. C: Aggregate by seller_id. E: Join to STG_PRODUCTS via STG_ORDER_ITEMS. D is false — delay in days doesn't give geographic distance (though it might correlate)."},
{id:268,type:'multi',topic:'TRY_TO_TIMESTAMP',difficulty:'medium',q:"TRY_TO_TIMESTAMP is used for which columns in STG_ORDERS? (Select ALL)",opts:["A) order_purchase_timestamp → order_purchase_ts","B) order_approved_at → order_approved_ts","C) order_delivered_carrier_date → carrier_pickup_ts","D) order_delivered_customer_date → delivered_ts","E) order_estimated_delivery_date → estimated_delivery_ts"],ans:['A','B','C','D','E'],exp:"ALL FIVE timestamps in RAW_ORDERS are VARCHAR and all five are cast with TRY_TO_TIMESTAMP in STG_ORDERS. This is the biggest single transformation in Phase 02 — converting the raw date strings to proper TIMESTAMP_NTZ values for time-based analytics."},
{id:269,type:'multi',topic:'CTAS',difficulty:'medium',q:"Which STAGED tables apply a WHERE IS NOT NULL filter on their primary key column? (Select ALL)",opts:["A) STG_ORDERS — WHERE order_id IS NOT NULL","B) STG_ORDER_ITEMS — WHERE order_id IS NOT NULL AND product_id IS NOT NULL AND seller_id IS NOT NULL","C) STG_CUSTOMERS — WHERE customer_id IS NOT NULL AND customer_unique_id IS NOT NULL","D) STG_GEOLOCATION — WHERE geolocation_zip_code_prefix IS NOT NULL","E) STG_CATEGORY_TRANSLATION — WHERE both name columns IS NOT NULL"],ans:['A','B','C','D','E'],exp:"ALL FIVE. Every STAGED CTAS filters out rows where key join/identifier columns are NULL. This is a systematic data quality pattern: STAGED guarantees no orphaned rows, no keyless records. The result is clean referential integrity going into Phase 03."},
{id:270,type:'multi',topic:'ROW_NUMBER',difficulty:'medium',q:"True statements about ROW_NUMBER() vs RANK() vs DENSE_RANK()? (Select ALL)",opts:["A) ROW_NUMBER(): 1,2,3,4,5 — always unique, no ties","B) RANK(): 1,2,2,4,5 — tied rows share rank, next rank skips","C) DENSE_RANK(): 1,2,2,3,4 — tied rows share rank, next rank does not skip","D) For deduplication (keep one row per group), ROW_NUMBER() is the correct choice","E) QUALIFY works with all three"],ans:['A','B','C','D','E'],exp:"ALL correct. The three window ranking functions behave exactly as described. ROW_NUMBER is the right choice for deduplication because it guarantees exactly one row gets rank 1. QUALIFY works with any window function."},
{id:271,type:'multi',topic:'NULL Handling',difficulty:'medium',q:"Which Phase 02 business sense checks directly use delivery_delay_days? (Select ALL)",opts:["A) Business check 3: delivery delay vs review score","B) Business check 1: GMV by order status","C) Challenge 4 (SLA investigator): top sellers by avg delivery delay","D) The referential integrity check on order_items","E) STG_ORDERS verification query: avg_delay_days"],ans:['A','C','E'],exp:"A: Business check 3 buckets delay into Early/On time/Late and shows avg review score. C: Challenge 4 asks for top 5 sellers by avg delivery_delay_days. E: STG_ORDERS verification calculates ROUND(AVG(delivery_delay_days), 1). B and D don't use delivery_delay_days."},
{id:272,type:'multi',topic:'INFORMATION_SCHEMA',difficulty:'medium',q:"Which metadata queries are used in Phase 02 to verify STAGED tables? (Select ALL)",opts:["A) INFORMATION_SCHEMA.TABLES — row counts for all 9 STG tables","B) INFORMATION_SCHEMA.COLUMNS — data type verification for STG_ORDERS and STG_GEOLOCATION","C) INFORMATION_SCHEMA.LOAD_HISTORY — CTAS load history","D) INFORMATION_SCHEMA.STAGES — verify OLIST_STAGE is still intact","E) INFORMATION_SCHEMA.TABLES — created_at timestamp for each STG table"],ans:['A','B','E'],exp:"A: Cell 12 queries TABLES for row counts of all 9 STG tables. B: Cell 13 queries COLUMNS to verify data types. E: TABLES includes created_at which Cell 12 also selects. C is wrong — LOAD_HISTORY tracks COPY INTO operations, not CTAS (which is DDL+DML not a load). D isn't used in Phase 02."},
{id:273,type:'multi',topic:'CTAS',difficulty:'medium',q:"Which STAGED tables perform data type casting (beyond just passing through VARCHAR)? (Select ALL)",opts:["A) STG_ORDERS — 5 timestamps to TIMESTAMP_NTZ","B) STG_ORDER_ITEMS — price, freight_value to FLOAT; order_item_id to INTEGER","C) STG_CUSTOMERS — no casting, all pass-through","D) STG_PAYMENTS — payment_value to FLOAT; installments, sequential to INTEGER","E) STG_GEOLOCATION — lat, lng to FLOAT"],ans:['A','B','D','E'],exp:"A: 5x TRY_TO_TIMESTAMP. B: 2x FLOAT, 1x INTEGER, 1x timestamp. D: 1x FLOAT, 2x INTEGER. E: 2x FLOAT. C is correct — STG_CUSTOMERS only applies UPPER(state), no numeric/timestamp casting. STG_SELLERS is similar to customers."},
{id:274,type:'multi',topic:'LEFT JOIN',difficulty:'medium',q:"Which statements about the referential integrity checks in Phase 02 Cell 14 are true? (Select ALL)",opts:["A) They use LEFT JOIN + WHERE right_key IS NULL to find orphan records","B) They check order_items with no matching order","C) They check order_items with no matching product","D) They check that every geolocation zip matches a customer zip","E) Snowflake foreign keys would enforce these constraints automatically if defined"],ans:['A','B','C'],exp:"A: LEFT JOIN + WHERE right IS NULL is the standard orphan-detection pattern. B: Items without orders checked. C: Items without products checked. D is not performed in Phase 02 (though it could be). E is FALSE — Snowflake foreign keys are NOVALIDATE by default, not enforced at write time."},
{id:275,type:'multi',topic:'QUALIFY',difficulty:'medium',q:"The QUALIFY clause in STG_GEOLOCATION CTAS — which of these alternative approaches would produce the same result? (Select ALL that are EQUIVALENT)",opts:["A) WITH ranked AS (SELECT *, ROW_NUMBER() OVER (PARTITION BY zip ORDER BY _loaded_at DESC) rn FROM RAW_GEOLOCATION WHERE zip IS NOT NULL) SELECT zip, TRY_CAST(lat AS FLOAT), ... FROM ranked WHERE rn = 1","B) SELECT DISTINCT geolocation_zip_code_prefix, geolocation_lat, geolocation_lng FROM RAW_GEOLOCATION","C) SELECT * FROM RAW_GEOLOCATION GROUP BY geolocation_zip_code_prefix","D) Using a subquery: SELECT ... FROM (SELECT *, ROW_NUMBER() ... AS rn FROM ...) t WHERE t.rn = 1","E) CREATE TABLE ... AS SELECT ... FROM RAW_GEOLOCATION SAMPLE (1 ROWS)"],ans:['A','D'],exp:"A and D are both logically equivalent to QUALIFY — CTE and subquery approaches produce the same deduplication. B uses DISTINCT but on all columns — doesn't deduplicate per zip (returns all unique row combinations). C is invalid SQL — GROUP BY without aggregation. E randomly samples rows, not deduplication."},
{id:276,type:'multi',topic:'TRY_CAST',difficulty:'medium',q:"Which columns in STG_PRODUCTS use TRY_CAST? (Select ALL)",opts:["A) product_name_lenght → product_name_length (TRY_CAST AS INTEGER)","B) product_description_lenght → product_description_length (TRY_CAST AS INTEGER)","C) product_photos_qty (TRY_CAST AS INTEGER)","D) product_weight_g (TRY_CAST AS FLOAT)","E) product_category_name (no cast — remains VARCHAR)"],ans:['A','B','C','D','E'],exp:"ALL are correct. A and B: integer casts with typo fix. C: integer cast. D: float cast for weight. E: category name stays VARCHAR — it's a text identifier. All four numeric columns are cast; the category column is text and stays text."},
{id:277,type:'multi',topic:'NULL Handling',difficulty:'hard',q:"Which Phase 02 decisions explicitly choose to leave NULLs rather than replacing them? (Select ALL)",opts:["A) Review comments left NULL when no comment was submitted","B) delivered_ts left NULL for undelivered orders","C) delivery_delay_days left NULL when delivered_ts is NULL","D) product_category_name replaced with 'uncategorised' instead of NULL","E) geolocation lat/lng left NULL when TRY_CAST fails"],ans:['A','B','C','E'],exp:"A: Intentional NULL preservation — NULL ≠ empty string. B: Undelivered orders have no delivery timestamp — NULL is correct. C: DATEDIFF on NULL input returns NULL — propagation is intentional. E: Bad coordinates become NULL (better than wrong numbers). D is WRONG — COALESCE actively replaces NULL with 'uncategorised'."},
{id:278,type:'multi',topic:'CTAS',difficulty:'hard',q:"What can go wrong if STAGED CTAS tables are run out of order (e.g. STG_PRODUCTS before STG_CATEGORY_TRANSLATION)? (Select ALL)",opts:["A) STG_PRODUCTS CTAS reads from RAW_CATEGORY_TRANSLATION directly — order of STG tables doesn't matter","B) If STG_PRODUCTS read from STG_CATEGORY_TRANSLATION (it doesn't), running it first would fail","C) No issue — Phase 02 CTAS reads from RAW tables, not other STAGED tables","D) The referential integrity checks in Cell 14 would fail if run before STG_ORDER_ITEMS exists","E) STG_ORDERS must be created before STG_ORDER_ITEMS for the referential integrity check to work"],ans:['A','C','D','E'],exp:"A and C are the same truth: Phase 02 CTAS reads from RAW — STG creation order doesn't affect other STG builds. D: Cell 14 queries STG tables — if they don't exist, queries fail. E: Cell 14 LEFT JOINs STG_ORDERS and STG_ORDER_ITEMS — both must exist first. B is a hypothetical that doesn't apply (STG_PRODUCTS reads RAW)."},
{id:279,type:'multi',topic:'QUALIFY',difficulty:'hard',q:"You want to keep the two most recent rows per zip in STG_GEOLOCATION for redundancy. Which changes are needed? (Select ALL)",opts:["A) Change QUALIFY ROW_NUMBER() ... = 1 to QUALIFY ROW_NUMBER() ... <= 2","B) Change PARTITION BY geolocation_zip_code_prefix to PARTITION BY geolocation_city","C) Add TOP 2 to the SELECT","D) No other changes needed beyond the QUALIFY condition","E) The downstream joins would need to handle multiple coordinate rows per zip"],ans:['A','D','E'],exp:"A: <= 2 keeps up to two rows per partition. D: That's the only change to the QUALIFY. E: Downstream joins (customers to geolocation) would now produce fan-out — one customer joins to two geo rows, doubling counts. This is why we keep exactly one per zip. B changes the partition (wrong logic). C TOP 2 would apply to the whole query globally."},
{id:280,type:'multi',topic:'TRY_CAST',difficulty:'hard',q:"STG_ORDER_ITEMS has 3 rows where TRY_CAST(price AS FLOAT) = NULL. What impact does this have downstream? (Select ALL)",opts:["A) Those 3 rows still exist in STG_ORDER_ITEMS — they are not filtered out","B) SUM(price) in analytics queries ignores those 3 rows automatically","C) AVG(price) is calculated excluding those 3 NULL rows — may be slightly inflated/deflated","D) FACT_ORDERS in Phase 03 inherits these NULL prices","E) WHERE price IS NOT NULL in Phase 03 FACT_ORDERS would exclude those 3 rows"],ans:['A','B','C','D','E'],exp:"A: WHERE clause only filters on order_id/product_id/seller_id — not price. B: SQL aggregates ignore NULL. C: AVG denominates on non-NULL count — 3 missing values change the mean. D: Phase 03 reads from STAGED — inherits NULLs. E: Phase 03 could filter NULL prices but ShopFlow doesn't — analyst must be aware."},
{id:281,type:'multi',topic:'NULL Handling',difficulty:'hard',q:"Phase 02 referential integrity check finds 0 orphan order_items and 0 orphan product references but 483 orders without a customer. Which are valid explanations? (Select ALL)",opts:["A) 483 orders have customer_id values that don't exist in STG_CUSTOMERS","B) This is expected — the Olist dataset has known referential gaps","C) The WHERE clause in STG_CUSTOMERS filtered out those 483 customer records","D) Those 483 orders must be deleted from STG_ORDERS","E) Phase 03 DIM_CUSTOMERS join should use LEFT JOIN to preserve those 483 orders in FACT_ORDERS"],ans:['A','B','C','E'],exp:"A: The customer_id in those orders doesn't match any customer record. B: Known data quality issue in Olist. C: If customers had NULL customer_id or unique_id, they were filtered. E: FACT_ORDERS LEFT JOIN DIM_CUSTOMERS preserves orders without customers (null customer dimension). D is wrong — don't delete valid orders just because the customer record is missing."},
{id:282,type:'multi',topic:'INFORMATION_SCHEMA',difficulty:'hard',q:"Which are true about INFORMATION_SCHEMA.COLUMNS usage in Phase 02? (Select ALL)",opts:["A) It is used to verify STG_ORDERS timestamps are TIMESTAMP_NTZ not TEXT","B) It is used to verify STG_GEOLOCATION lat/lng are FLOAT not TEXT","C) It queries column names, data types, and nullable status","D) It can identify whether COALESCE successfully prevented NULLs","E) Column names in INFORMATION_SCHEMA.COLUMNS are stored in UPPERCASE in Snowflake"],ans:['A','B','C','E'],exp:"A and B: Phase 02 Cell 13 runs these exact checks. C: COLUMNS view returns column_name, data_type, is_nullable. E: Snowflake stores identifiers in uppercase — column_name = 'ORDER_PURCHASE_TS', not 'order_purchase_ts'. D is false — COLUMNS shows schema, not data values; COALESCE result must be verified with a SELECT query."},
{id:283,type:'multi',topic:'CTAS',difficulty:'easy',q:"Which correctly describe why Phase 02 reads from RAW tables rather than re-reading CSVs from the stage? (Select ALL)",opts:["A) RAW is the permanent audit trail — no need to go back to Kaggle or the stage","B) STAGED is always rebuilt from RAW — if RAW is correct, STAGED can always be recreated","C) Reading from stage would require re-running COPY INTO","D) Stage files may have been purged after Phase 01","E) RAW to STAGED is a SQL transform — COPY INTO is for files, not table-to-table"],ans:['A','B','C','D','E'],exp:"ALL are correct. A: RAW = source of truth. B: Full rebuild from RAW is the recovery strategy. C: You'd need COPY INTO which reloads from file. D: If PURGE=TRUE was used, files are gone. E: CTAS reads from tables, not staged files."},
{id:284,type:'multi',topic:'TRY_TO_TIMESTAMP',difficulty:'medium',q:"Which format strings would TRY_TO_TIMESTAMP handle automatically without specifying a FORMAT parameter? (Select ALL)",opts:["A) '2018-01-08 21:28:27'","B) '2018-01-08T21:28:27'","C) '08/01/2018 21:28:27'","D) '2018-01-08'","E) 'January 8, 2018'"],ans:['A','B','D'],exp:"A: Space-separated ISO-8601-like — auto-detected. B: T-separator ISO-8601 — auto-detected. D: Date-only ISO format — auto-detected, time defaults to midnight. C: MM/DD/YYYY with time — ambiguous, needs explicit FORMAT. E: Month name format — needs explicit FORMAT string."},
{id:285,type:'multi',topic:'DATEDIFF',difficulty:'medium',q:"Business check 3 in Phase 02 shows avg_review_score by delivery bucket. Which buckets are defined? (Select ALL)",opts:["A) 'Early' — delivery_delay_days < 0","B) 'On time' — delivery_delay_days = 0","C) 'Up to 1 week late' — delivery_delay_days BETWEEN 1 AND 7","D) 'More than 1 week late' — delivery_delay_days > 7","E) 'Unknown' — delivery_delay_days IS NULL"],ans:['A','B','C','D'],exp:"The CASE statement in business check 3 defines four buckets: Early (< 0), On time (= 0), Up to 1 week late (1-7), More than 1 week late (> 7). The WHERE clause filters WHERE delivery_delay_days IS NOT NULL — so NULL rows are excluded, not put in an 'Unknown' bucket. E is not present."},
{id:286,type:'multi',topic:'NULL Handling',difficulty:'medium',q:"Which columns in STG_REVIEWS are intentionally left with possible NULL values? (Select ALL)",opts:["A) review_id — never NULL (filtered)","B) order_id — never NULL (filtered)","C) review_score — never NULL (filtered)","D) review_comment_title — often NULL, intentionally preserved","E) review_comment_message — often NULL, intentionally preserved"],ans:['D','E'],exp:"WHERE review_id IS NOT NULL AND order_id IS NOT NULL AND review_score IS NOT NULL ensures A, B, C are never NULL. D and E (comment title and message) are intentionally left as NULL — most customers only leave a star rating without text. Replacing with '' would misrepresent the data."},
{id:287,type:'multi',topic:'CTAS',difficulty:'hard',q:"What additional computed column is created in STG_REVIEWS alongside the timestamp casts? (Select ALL)",opts:["A) review_response_days — days between review request sent and customer response","B) review_age_days — days since the review was created to today","C) has_comment — boolean flag whether review_comment_message IS NOT NULL","D) review_created_ts — TRY_TO_TIMESTAMP of review_creation_date","E) review_answered_ts — TRY_TO_TIMESTAMP of review_answer_timestamp"],ans:['A','D','E'],exp:"A: review_response_days = DATEDIFF('day', review_created_ts, review_answered_ts) — computed column. D and E: The two timestamp casts that also appear as columns. B and C are not in the Phase 02 CTAS — reasonable additions but not built yet."},
{id:288,type:'multi',topic:'LEFT JOIN',difficulty:'hard',q:"In business check 2 (avg review score by product category), three tables are joined. Which joins are used and why? (Select ALL)",opts:["A) STG_REVIEWS JOIN STG_ORDER_ITEMS ON order_id — reviews link to items via order","B) STG_ORDER_ITEMS JOIN STG_PRODUCTS ON product_id — items link to product details","C) STG_REVIEWS LEFT JOIN STG_ORDERS ON order_id — to get delivery delay","D) HAVING COUNT(DISTINCT review_id) >= 100 — filters to categories with enough reviews for statistical relevance","E) The join chain: review → order_item → product — allows category-level review analysis"],ans:['A','B','D','E'],exp:"A: review.order_id = order_item.order_id links review to product purchase. B: order_item.product_id = product.product_id links to category. D: HAVING 100+ reviews for statistical significance. E: That three-table chain is the core analytical join. C is not in business check 2 — STG_ORDERS is not needed for this query."},
{id:289,type:'multi',topic:'TRY_CAST',difficulty:'easy',q:"Which ShopFlow STAGED tables cast numeric columns to FLOAT (not INTEGER)? (Select ALL)",opts:["A) STG_ORDER_ITEMS — price, freight_value","B) STG_PAYMENTS — payment_value","C) STG_PRODUCTS — weight, length, height, width","D) STG_REVIEWS — review_score","E) STG_GEOLOCATION — lat, lng"],ans:['A','B','C','E'],exp:"A: price and freight are financial values — FLOAT. B: payment_value — FLOAT. C: Physical dimensions — FLOAT (fractions of cm/g are valid). E: Coordinates — FLOAT (precision matters for mapping). D is wrong — review_score is INTEGER (1-5 whole numbers, never fractional)."},
{id:290,type:'multi',topic:'QUALIFY',difficulty:'easy',q:"Correct descriptions of what happens to RAW_GEOLOCATION during Phase 02? (Select ALL)",opts:["A) ~1,000,163 raw rows reduced to ~19,000 unique zip codes","B) lat and lng cast from VARCHAR to FLOAT","C) state normalized to UPPERCASE","D) QUALIFY ROW_NUMBER() = 1 keeps the most recently loaded row per zip","E) Duplicate rows are identified by HAVING COUNT(*) > 1 before deletion"],ans:['A','B','C','D'],exp:"A: ~1M → ~19k. B: TRY_CAST lat/lng AS FLOAT. C: UPPER(geolocation_state). D: ROW_NUMBER ORDER BY _loaded_at DESC — newest first. E is the wrong approach — Phase 02 uses QUALIFY directly in CTAS, not a separate HAVING + DELETE step."},
{id:291,type:'multi',topic:'CTAS',difficulty:'medium',q:"After Phase 02 is complete, which STAGED tables feed directly into Phase 03 ANALYTICS star schema? (Select ALL)",opts:["A) STG_ORDERS — base for FACT_ORDERS","B) STG_ORDER_ITEMS — line items for FACT_ORDERS","C) STG_CUSTOMERS — source for DIM_CUSTOMERS","D) STG_SELLERS — source for DIM_SELLERS","E) STG_PRODUCTS — source for DIM_PRODUCTS"],ans:['A','B','C','D','E'],exp:"ALL five are direct Phase 03 sources. STG_ORDERS + STG_ORDER_ITEMS join to build FACT_ORDERS. STG_CUSTOMERS + STG_GEOLOCATION → DIM_CUSTOMERS. STG_SELLERS + STG_GEOLOCATION → DIM_SELLERS. STG_PRODUCTS → DIM_PRODUCTS. STG_GEOLOCATION is also used but only as a join source."},
{id:292,type:'multi',topic:'NULL Handling',difficulty:'medium',q:"Business check 3 (delivery delay vs review score) requires WHERE delivery_delay_days IS NOT NULL. What does this filter remove? (Select ALL)",opts:["A) Orders that were never delivered (delivered_ts IS NULL)","B) Cancelled orders with no delivery","C) Orders still in transit","D) Orders where both estimated and delivered timestamps are NULL","E) Orders with review_score IS NULL"],ans:['A','B','C','D'],exp:"delivery_delay_days IS NULL whenever delivered_ts is NULL (DATEDIFF of NULL = NULL). So this filter removes all orders without a delivery timestamp: A (never delivered), B (cancelled), C (in transit), D (both timestamps NULL). E is wrong — review_score NULLs are handled by the JOIN to STG_REVIEWS (only orders with reviews appear)."},
{id:293,type:'multi',topic:'INFORMATION_SCHEMA',difficulty:'medium',q:"After Phase 02, INFORMATION_SCHEMA.TABLES shows STG_GEOLOCATION row_count = 19,327 while STG_ORDERS = 99,441. What can be inferred? (Select ALL)",opts:["A) QUALIFY deduplication was successful in STG_GEOLOCATION","B) STG_ORDERS loaded all orders from RAW_ORDERS (none dropped by NULL filter)","C) The WHERE order_id IS NOT NULL filter removed exactly 0 rows from RAW_ORDERS","D) STG_GEOLOCATION has fewer rows than STG_ORDERS — no analytical significance","E) 19,327 is the count of unique Brazilian zip code prefixes in the dataset"],ans:['A','B','C','E'],exp:"A: 19k << 1M proves dedup worked. B: 99,441 STAGED = 99,441 RAW = all rows passed. C: Same count means 0 rows had NULL order_id. E: 19,327 unique zips is the correct interpretation. D is wrong — the difference has huge significance: it proves deduplication worked as designed."},
{id:294,type:'multi',topic:'CTAS',difficulty:'hard',q:"You need to add a new column revenue_brl = price + freight_value to STG_ORDER_ITEMS. What must you do? (Select ALL)",opts:["A) Modify the CTAS SELECT statement to include price + freight_value AS revenue_brl","B) Re-run the STG_ORDER_ITEMS CTAS — CREATE OR REPLACE rebuilds with the new column","C) ALTER TABLE STG_ORDER_ITEMS ADD COLUMN revenue_brl FLOAT","D) UPDATE STG_ORDER_ITEMS SET revenue_brl = price + freight_value after adding the column","E) No downstream changes needed if Phase 03 explicitly selects revenue_brl"],ans:['A','B'],exp:"CTAS pattern: modify the SELECT (A), re-run to rebuild (B). ALTER + UPDATE (C+D) technically works but violates the CTAS philosophy — STAGED is rebuilt from RAW, not patched. E: if Phase 03 selects revenue_brl it will work after CTAS rebuild. A and B are the correct CTAS-idiomatic approach."},
{id:295,type:'multi',topic:'LEFT JOIN',difficulty:'hard',q:"Phase 02 STG_PRODUCTS CTAS: which are true about the join execution order? (Select ALL)",opts:["A) Snowflake reads all of RAW_PRODUCTS first, then joins to RAW_CATEGORY_TRANSLATION","B) Snowflake's optimizer may reorder the join for efficiency — the logical order and physical order may differ","C) RAW_CATEGORY_TRANSLATION (71 rows) is likely broadcast to all compute nodes as a hash join","D) The join produces at most one translation row per product — LEFT JOIN with a unique key on the right side","E) Adding a WHERE t.product_category_name IS NOT NULL would convert the LEFT JOIN to an effective INNER JOIN"],ans:['B','C','D','E'],exp:"B: Snowflake's optimizer determines physical execution order. C: Small tables (71 rows) are broadcast hash joined — very efficient. D: Translation table has one row per category — LEFT JOIN produces max one match. E: Filtering on a column from the right table of a LEFT JOIN with IS NOT NULL effectively converts it to INNER JOIN behaviour."},
{id:296,type:'multi',topic:'TRY_CAST',difficulty:'hard',q:"A new column payment_fee FLOAT is needed in STG_PAYMENTS but it doesn't exist in RAW_PAYMENTS. What are the options? (Select ALL)",opts:["A) Add payment_fee to RAW_PAYMENTS with ALTER TABLE and back-populate","B) Add payment_fee as a computed column in STG_PAYMENTS CTAS: e.g. payment_value * 0.02 AS payment_fee","C) Leave STG_PAYMENTS unchanged — add payment_fee in FACT_ORDERS CTAS instead","D) Add payment_fee to RAW_PAYMENTS after re-loading from a new Kaggle CSV that has the column","E) Create a separate lookup table mapping order_id to fee and join in STAGED"],ans:['B','C','D','E'],exp:"B: Derived columns can be computed in STAGED from existing columns. C: Valid — derived columns can be pushed to ANALYTICS layer. D: If source data now has fees, reload RAW, add column, re-run STAGED. E: External data enrichment via join is a valid pattern. A is wrong — modifying RAW breaks the immutable RAW contract."},
{id:297,type:'multi',topic:'QUALIFY',difficulty:'hard',q:"You run the STG_GEOLOCATION CTAS and dedup_check returns 'FAIL — duplicates remain'. What are likely causes? (Select ALL)",opts:["A) PARTITION BY was accidentally omitted — ROW_NUMBER ranked globally, only one row total got rank 1","B) ORDER BY _loaded_at DESC was changed to ASC — still dedups correctly, just picks oldest row","C) The QUALIFY condition was changed from = 1 to <= 2 — keeps up to two rows per zip","D) geolocation_zip_code_prefix has leading/trailing spaces causing the same zip to appear as different values","E) TRY_CAST(geolocation_lat AS FLOAT) returned NULL for some rows, causing those rows to be skipped"],ans:['A','C','D'],exp:"A: Without PARTITION BY, ROW_NUMBER ranks all 1M rows globally — QUALIFY = 1 keeps ONE row total, not one per zip. But dedup_check would show 1 row (extreme fail). C: <= 2 allows two rows per zip — duplicates remain. D: '01310' ≠ '01310 ' — space causes false mismatches. B is fine — ASC picks oldest row, but still deduplicates. E: NULL lat rows are still included (WHERE only filters NULL zip)."},
{id:298,type:'multi',topic:'CTAS',difficulty:'hard',q:"True statements about the order in which Phase 02 STAGED tables should be created? (Select ALL)",opts:["A) STG_GEOLOCATION must exist before STG_CUSTOMERS (STG_CUSTOMERS reads from STG_GEOLOCATION)","B) STG_CATEGORY_TRANSLATION must exist before STG_PRODUCTS (STG_PRODUCTS reads from RAW_CATEGORY_TRANSLATION, not STG_CATEGORY_TRANSLATION)","C) STG_ORDERS must exist before STG_ORDER_ITEMS (for the referential integrity check, not for the CTAS)","D) All 9 CTAS statements can be run in any order — they all read from RAW tables","E) STG_ORDERS and STG_ORDER_ITEMS must both exist before running the business sense checks"],ans:['C','D','E'],exp:"D is the key truth: all STAGED CTAS read from RAW — no dependencies on other STAGED tables for the CTAS themselves. C: STG_ORDERS must exist for the referential integrity LEFT JOIN in Cell 14. E: Business sense checks join multiple STG tables — all referenced tables must exist. A is false — STG_CUSTOMERS reads from RAW_CUSTOMERS + RAW_GEOLOCATION (via Phase 03, not Phase 02). B is false — STG_PRODUCTS reads RAW_CATEGORY_TRANSLATION directly."},
{id:299,type:'multi',topic:'NULL Handling',difficulty:'hard',q:"Which SQL aggregate functions naturally handle NULL values without extra IS NOT NULL filtering? (Select ALL)",opts:["A) SUM — ignores NULL, sums non-NULL values","B) AVG — ignores NULL in both numerator and denominator","C) COUNT(col) — counts only non-NULL values","D) COUNT(*) — counts all rows including those where col is NULL","E) MIN/MAX — ignore NULL, return min/max of non-NULL values"],ans:['A','B','C','D','E'],exp:"ALL are correct descriptions of NULL handling in SQL aggregates. SUM, AVG, MIN, MAX ignore NULLs automatically. COUNT(col) counts non-NULLs; COUNT(*) counts all rows. Understanding this prevents incorrect queries — AVG(price) when 3 prices are NULL gives average of non-NULL prices, which may differ from what you intend."},
{id:300,type:'multi',topic:'CTAS',difficulty:'hard',q:"A colleague proposes replacing all Phase 02 CTAS statements with views (CREATE VIEW STG_ORDERS AS SELECT ...). What are the tradeoffs? (Select ALL)",opts:["A) Views don't store data — every query against a view re-runs the full transform against RAW","B) Views would make INFORMATION_SCHEMA.TABLES row counts unavailable for STG tables","C) Views enable always-fresh STAGED data — no need to re-run CTASs when RAW changes","D) View-based STAGED would be slower for heavy analytical joins in Phase 03","E) Time Travel would not be available on views (no physical storage)"],ans:['A','B','C','D','E'],exp:"ALL are true tradeoffs. A: Views compute on read — expensive if STG is queried frequently. B: Views have no row_count in INFORMATION_SCHEMA. C: Views always reflect current RAW state — automatic freshness. D: Phase 03 star schema queries joining STG views would re-run all STAGED transforms. E: No physical micro-partitions means no Time Travel. CTAS (materialized) vs views is a genuine architecture decision with real tradeoffs."},
];
