  .wiggle:hover { transform: rotate(-1.5deg) scale(1.02) translateY(-2px); box-shadow: 6px 6px 0 rgba(41,181,232,0.4); }
  .wiggle:active { transform: rotate(0) scale(.98) translateY(0); box-shadow: 2px 2px 0 rgba(41,181,232,0.3); }
  .hover-row:hover { background-color: #f0f0f0 !important; transition: background-color 0.2s ease; }
  @keyframes spring-in {

  @keyframes pulse-dot {

  .status-locked { background: #f3f4f6; color: #6b7280; border: 2px solid #d1d5db; border-radius: 20px; padding: 2px 12px; font-size: 12px; font-weight: 700; font-family: 'Fira Code', monospace; }

<script>

const P={slate:{bg:"#eaf3f9",ink:"#0d2a3d",light:"#f4f9fd",accent:"#3a7fa0",dot:"#2d6a8a",tag:"#cce3f0"},teal:{bg:"#e0f5f2",ink:"#0a3530",light:"#f0faf9",accent:"#0d9e8a",dot:"#0bbfa8",tag:"#b3e8e2"},purple:{bg:"#ede9fb",ink:"#2a1f5e",light:"#f7f5fd",accent:"#6550cc",dot:"#7b68d8",tag:"#cfc8f5"},coral:{bg:"#fde9e5",ink:"#5c1e14",light:"#fef5f3",accent:"#d94830",dot:"#e8685a",tag:"#f5c5be"},amber:{bg:"#fef3dc",ink:"#5c3600",light:"#fffaf0",accent:"#c87800",dot:"#e89a10",tag:"#fcdfa0"},blue:{bg:"#ddeefa",ink:"#0a2545",light:"#eef6fd",accent:"#1a6db8",dot:"#29B5E8",tag:"#b0d8f5"},green:{bg:"#dff5e6",ink:"#0d3a1c",light:"#f0faf3",accent:"#1a8c45",dot:"#28b85a",tag:"#b0e8c5"}},PHASES=[{id:"p0",pal:"slate",num:"00",title:"Snowflake setup",status:"done",week:"One-time · Snowsight UI",desc:"Warehouse · database · 3 schemas · file format · internal stage",domain:"Setup",steps:[{id:"account",icon:"🔍",title:"Explore your account",sub:"SHOW WAREHOUSES · SHOW DATABASES · SHOW ROLES",tabs:{What:"When you first create a Snowflake account, Snowflake provisions a few default objects automatically.\n\nRun these to see what exists:\n• SHOW WAREHOUSES — default COMPUTE_WH is usually pre-created\n• SHOW DATABASES — you'll see SNOWFLAKE and SNOWFLAKE_SAMPLE_DATA\n• SHOW ROLES — 5 built-in roles: ACCOUNTADMIN, SYSADMIN, SECURITYADMIN, USERADMIN, PUBLIC\n\n📌 Note: In Snowflake Notebooks, only the last query in a cell displays its output grid. That's why each query is split into its own cell — so you can see every result.","Object hierarchy":"Account → Warehouses / Databases (siblings)\n  Database → Schemas\n    Schema → Tables / Stages / File Formats\n\nKey insight: warehouses and databases are siblings — both directly under the account. A warehouse is compute. A database is storage. They are completely independent.","SnowPro tip":"💡 Pro Tip — The Snowflake Object Hierarchy\n\nSnowflake organises everything in a strict hierarchy — nothing can exist outside its parent:\n\nOrganisation → Account → Database → Schema → Table\n\nThis is the most tested architecture concept: compute ≠ storage. A suspended warehouse does NOT affect your data.\n\nINFORMATION_SCHEMA lives inside every database — a read-only system catalogue of all objects in that database.",SQL:"-- Who am I?\nSELECT CURRENT_USER(), CURRENT_ROLE(),\n       CURRENT_ACCOUNT(), CURRENT_REGION();\n\n-- What exists already?\nSHOW WAREHOUSES;\nSHOW DATABASES;\nSHOW ROLES;"}},{id:"wh",icon:"⚡",title:"Create SHOPFLOW_WH",sub:"X-Small · AUTO_SUSPEND=60 · AUTO_RESUME=TRUE",tabs:{What:"A virtual warehouse is compute — the cluster of CPU and memory that runs your queries. Without a running warehouse no query executes, not even DDL like CREATE SCHEMA.\n\nSHOPFLOW_WH settings:\n• X-Small = 1 credit/hour (cheapest — sufficient for this project)\n• AUTO_SUSPEND = 60 seconds idle → suspends automatically\n• AUTO_RESUME = TRUE → starts the moment you run a query",Why:"X-Small is more than enough for loading ~1.6M rows and running analytical queries. Larger sizes only matter for very complex queries on very large tables.\n\nAUTO_SUSPEND=60 means you never waste credits on idle time. Always suspend manually at the end of a session for extra savings.","AWS analogy":"Like an EC2 instance that starts when you SSH in and stops 60 seconds after you log off. You pay only for the seconds it is actually running.\n\nCredits are billed in 60-second minimum increments — a 5-second query still costs 60 seconds.","SnowPro tip":"💡 Pro Tip — Warehouse Sizes\n\nSizes double in credits:\nXS=1 · S=2 · M=4 · L=8 · XL=16\n\nScale UP = bigger size (complex single queries)\nScale OUT = multi-cluster warehouse (many concurrent users)\n\nSuspending a warehouse = 0 credits. Data is not affected.\n\n💸 Cost Tip: Always run ALTER WAREHOUSE SHOPFLOW_WH SUSPEND at session end. AUTO_SUSPEND=60 is a safety net, not a substitute for good habits.",SQL:"USE ROLE SYSADMIN;\n\nCREATE WAREHOUSE IF NOT EXISTS SHOPFLOW_WH\n  WAREHOUSE_SIZE = 'X-SMALL'\n  AUTO_SUSPEND   = 60\n  AUTO_RESUME    = TRUE\n  COMMENT        = 'ShopFlow project warehouse';\n\nUSE WAREHOUSE SHOPFLOW_WH;\nSHOW WAREHOUSES LIKE 'SHOPFLOW%';"}},{id:"db",icon:"🗄",title:"Create SHOPFLOW_DB",sub:"Database · DATA_RETENTION = 1 day (Time Travel)",tabs:{What:"A database is a storage container — holds schemas which hold tables, stages, file formats. All project objects live inside SHOPFLOW_DB.\n\nDATA_RETENTION_TIME_IN_DAYS = 1 enables Time Travel for 1 day — you can query data as it existed at any past point and recover accidentally dropped tables with UNDROP TABLE.","SnowPro tip":"🔍 Concept Note — Time Travel & Fail-safe\n\nTime Travel retention:\n• Standard edition: up to 1 day\n• Enterprise edition: up to 90 days\n\nAfter Time Travel expires → Fail-safe: a 7-day emergency recovery window managed by Snowflake Support. You cannot query Fail-safe data directly — it is a last-resort backup only.\n\nThis distinction is heavily tested on the SnowPro exam.",SQL:"CREATE DATABASE IF NOT EXISTS SHOPFLOW_DB\n  DATA_RETENTION_TIME_IN_DAYS = 1\n  COMMENT = 'ShopFlow Analytics — Olist dataset';\n\nUSE DATABASE SHOPFLOW_DB;\n\n-- Verify\nSHOW DATABASES LIKE 'SHOPFLOW%';\n\nSELECT CURRENT_WAREHOUSE() AS wh,\n       CURRENT_DATABASE()  AS db,\n       CURRENT_ROLE()      AS role;"}},{id:"role",icon:"🔒",title:"Create SHOPFLOW_ROLE",sub:"RBAC — never work as ACCOUNTADMIN",tabs:{What:"Best practice: never do day-to-day work as ACCOUNTADMIN or SYSADMIN. Create a project-specific role with only the privileges needed.\n\nSHOPFLOW_ROLE gets:\n• USAGE on SHOPFLOW_WH (can run queries)\n• ALL PRIVILEGES on SHOPFLOW_DB (can create objects)","AWS analogy":"AWS IAM: Policy → IAM Role → User\nSnowflake RBAC: Privileges → Role → User\n\nSame concept — attach a scoped role to the user rather than giving root/admin access directly.","SnowPro tip":"💡 Pro Tip — Role Hierarchy\n\nACCOUNTADMIN > SYSADMIN > SECURITYADMIN > USERADMIN > PUBLIC\n\nHigher roles inherit all privileges of lower ones.\n\nGRANT PRIVILEGE ON OBJECT TO ROLE = gives a role permission on an object\nGRANT ROLE TO USER = assigns a role to a user\n\nThese are two separate operations — both are needed. Never do day-to-day work as ACCOUNTADMIN, just like you never log into AWS as root.",SQL:"USE ROLE SECURITYADMIN;\n\nCREATE ROLE IF NOT EXISTS SHOPFLOW_ROLE\n  COMMENT = 'Role for ShopFlow project';\n\n-- Grant role to your user\nGRANT ROLE SHOPFLOW_ROLE TO USER YOUR_USERNAME;\n\n-- Grant warehouse usage\nGRANT USAGE ON WAREHOUSE SHOPFLOW_WH\n  TO ROLE SHOPFLOW_ROLE;\n\n-- Grant database access\nGRANT ALL PRIVILEGES ON DATABASE SHOPFLOW_DB\n  TO ROLE SHOPFLOW_ROLE;\n\nSHOW GRANTS ON WAREHOUSE SHOPFLOW_WH;"}},{id:"schemas",icon:"📁",title:"Create 3 schemas",sub:"RAW · STAGED · ANALYTICS — one per layer",tabs:{What:"Three schemas inside SHOPFLOW_DB — one per layer of the warehouse architecture:\n\n🗂 SHOPFLOW_RAW\nLanding zone. Data arrives exactly as received. All columns VARCHAR. Never modify rows here.\n\n🔧 SHOPFLOW_STAGED\nCleaning room. Type cast, deduplicated, NULLs handled, typos fixed.\n\n📊 SHOPFLOW_ANALYTICS\nStar schema. Optimised for reads. What analysts and dashboards query.","Why 3 schemas?":"Access control: grant analysts SELECT on SHOPFLOW_ANALYTICS only — no exposure to raw data.\n\nBlast radius: drop and recreate SHOPFLOW_STAGED without touching RAW or ANALYTICS.\n\nClarity: any engineer opening Snowsight immediately knows which layer they are in.\n\nSame pattern at Airbnb (Bronze/Silver/Gold), Databricks (Medallion), and every serious data team.","SnowPro tip":"🔍 Concept Note — Auto-created Schemas\n\nWhen a database is created, Snowflake auto-creates two schemas:\n• PUBLIC — default schema for new objects\n• INFORMATION_SCHEMA — read-only system catalogue of everything in that database\n\nYou will see both in SHOW SCHEMAS output. Do not store your project objects in PUBLIC — use the dedicated SHOPFLOW_RAW / STAGED / ANALYTICS schemas instead.",SQL:"USE ROLE SYSADMIN;\nUSE DATABASE SHOPFLOW_DB;\n\nCREATE SCHEMA IF NOT EXISTS SHOPFLOW_RAW\n  DATA_RETENTION_TIME_IN_DAYS = 1\n  COMMENT = 'Landing zone — raw data, never modified';\n\nCREATE SCHEMA IF NOT EXISTS SHOPFLOW_STAGED\n  DATA_RETENTION_TIME_IN_DAYS = 1\n  COMMENT = 'Cleaned and typed data';\n\nCREATE SCHEMA IF NOT EXISTS SHOPFLOW_ANALYTICS\n  DATA_RETENTION_TIME_IN_DAYS = 1\n  COMMENT = 'Star schema for analysts';\n\nSHOW SCHEMAS IN DATABASE SHOPFLOW_DB;"}},{id:"stage",icon:"📦",title:"Stage + file format",sub:"OLIST_STAGE · OLIST_CSV_FORMAT",tabs:{What:"Internal stage = loading dock. Files uploaded here via Snowsight UI. COPY INTO reads from here into RAW tables.\n\nOLIST_CSV_FORMAT = named reusable parser config:\n• SKIP_HEADER=1 — skip the column header row\n• FIELD_OPTIONALLY_ENCLOSED_BY='\"' — handles commas inside quoted fields\n• NULL_IF — treat empty strings and \"NA\" as SQL NULL\n• ENCODING=UTF8 — handles Portuguese characters (ã, ç, é)\n• ERROR_ON_COLUMN_COUNT_MISMATCH=FALSE — RAW tables have 2 extra metadata columns not in the CSV — load what's there, use DEFAULT for the rest","Why internal stage?":"Internal = Snowflake manages the storage. No S3 bucket, no IAM roles, no external cloud setup needed.\n\nExternal stage = points to your own S3/GCS/Azure bucket. Used in production with Snowpipe. Same COPY INTO syntax — just a different FROM path.","SnowPro tip":"💡 Pro Tip — Stage Types\n\nStage types to know for the exam:\n@~            → user stage (one per user, always exists)\n@%tablename   → table stage (one per table, always exists)\n@stagename    → named internal stage ← we use this\nexternal stage → points to S3/GCS/Azure (needs storage integration)\n\nLIST @stagename → shows files inside (like aws s3 ls)\nREMOVE @stagename/file → deletes a staged file\n\nPUT is NOT available in Snowsight UI — only via SnowSQL CLI or Python/Java connectors.",SQL:"USE SCHEMA SHOPFLOW_RAW;\n\nCREATE OR REPLACE FILE FORMAT OLIST_CSV_FORMAT\n  TYPE                           = CSV\n  FIELD_OPTIONALLY_ENCLOSED_BY   = '\"'\n  SKIP_HEADER                    = 1\n  NULL_IF   = ('NULL','null','','NA','N/A')\n  EMPTY_FIELD_AS_NULL            = TRUE\n  ENCODING                       = UTF8\n  ERROR_ON_COLUMN_COUNT_MISMATCH = FALSE;\n\nCREATE STAGE IF NOT EXISTS OLIST_STAGE\n  FILE_FORMAT = OLIST_CSV_FORMAT\n  COMMENT = 'Internal stage for Olist CSV files';\n\nSHOW FILE FORMATS IN SCHEMA SHOPFLOW_RAW;\nSHOW STAGES IN SCHEMA SHOPFLOW_RAW;\nLIST @OLIST_STAGE;"}},{id:"rawtables",icon:"🗃",title:"Create 9 RAW tables",sub:"All VARCHAR · _loaded_at · _source_file",tabs:{What:"9 tables in SHOPFLOW_RAW — one per Olist CSV file. Every column is VARCHAR.\n\nTwo metadata columns on every table:\n• _loaded_at — TIMESTAMP_NTZ auto-filled on load via DEFAULT CURRENT_TIMESTAMP()\n• _source_file — which CSV file this row came from\n\nThese are prefixed with _ to signal: system metadata, not business data.","Why all VARCHAR?":'RAW contract: accept everything, reject nothing. Real data is messy.\n\nA date column that occasionally contains "N/A" or "2023-99-99" would crash a TIMESTAMP column. VARCHAR accepts everything. You handle bad values in STAGED with TRY_CAST().\n\nIf you used CAST() and one value fails → entire load fails. TRY_CAST() returns NULL for bad values → load succeeds.',"Column count fix":'⚠️ Important: Each RAW table has 2 extra metadata columns (_loaded_at, _source_file) that are not present in the CSV files.\n\nWithout ERROR_ON_COLUMN_COUNT_MISMATCH=FALSE:\nCOPY INTO fails with: "Number of columns in file (8) does not match table (10)"\n\nWith ERROR_ON_COLUMN_COUNT_MISMATCH=FALSE:\nSnowflake loads the CSV columns positionally and applies DEFAULT values to the metadata columns. _loaded_at auto-fills with CURRENT_TIMESTAMP().',"Tables created":"RAW_ORDERS          — ~99,441 rows\nRAW_ORDER_ITEMS     — ~112,650 rows\nRAW_CUSTOMERS       — ~99,441 rows\nRAW_SELLERS         — ~3,095 rows\nRAW_PRODUCTS        — ~32,951 rows\nRAW_PAYMENTS        — ~103,886 rows\nRAW_REVIEWS         — ~99,224 rows\nRAW_GEOLOCATION     — ~1,000,163 rows\nRAW_CATEGORY_TRANSLATION — ~71 rows",SQL:"CREATE OR REPLACE TABLE SHOPFLOW_RAW.RAW_ORDERS (\n  order_id                          VARCHAR,\n  customer_id                       VARCHAR,\n  order_status                      VARCHAR,\n  order_purchase_timestamp          VARCHAR,\n  order_approved_at                 VARCHAR,\n  order_delivered_carrier_date      VARCHAR,\n  order_delivered_customer_date     VARCHAR,\n  order_estimated_delivery_date     VARCHAR,\n  _loaded_at   TIMESTAMP_NTZ DEFAULT CURRENT_TIMESTAMP(),\n  _source_file VARCHAR\n);\n-- (all 9 tables follow same pattern)"}}]},{id:"p1",pal:"teal",num:"01",title:"Load RAW data",status:"done",week:"~1 hour · Snowsight UI + SQL notebook",desc:"Upload CSVs via Snowsight UI → COPY INTO 9 RAW tables → verify row counts",domain:"Data Loading",steps:[{id:"upload",icon:"⬆",title:"Upload CSVs via Snowsight UI",sub:"9 files → @OLIST_STAGE",tabs:{What:"Download the 9 Olist CSV files from kaggle.com/datasets/olistbr/brazilian-ecommerce on your laptop, then upload them directly via the Snowsight UI.\n\nSnowsight → Data → Databases → SHOPFLOW_DB → SHOPFLOW_RAW → Stages → OLIST_STAGE → + Files\n\nSnowflake stores uploaded files as .csv (no auto-compression from UI upload).","Why not Python download?":"Snowflake Notebooks run on Snowflake-managed compute. That runtime cannot make outbound internet connections to external sites like kaggle.com — the firewall blocks it.\n\nSo the work is split:\n• Your laptop → downloads CSVs from Kaggle\n• Snowsight UI → uploads to OLIST_STAGE\n• SQL notebook → COPY INTO RAW tables","Verify upload":"After uploading, run:\nLIST @SHOPFLOW_DB.SHOPFLOW_RAW.OLIST_STAGE;\n\nYou should see 9 files. If fewer appear, upload the missing ones before running COPY INTO.","SnowPro tip":"💡 Pro Tip — PUT vs Snowsight UI Upload\n\nPUT command (SnowSQL CLI / Python connector):\n• Compresses files to .gz automatically before uploading\n• References in COPY INTO: filename.csv.gz\n\nSnowsight UI upload:\n• Stores files as-is — no compression\n• References in COPY INTO: filename.csv\n\nThis is why our COPY INTO statements use .csv (not .csv.gz) — files were uploaded via the UI."}},{id:"copyinto",icon:"📥",title:"COPY INTO all 9 tables",sub:"One statement per table · verify each result",tabs:{What:"COPY INTO reads files from the stage and loads them into RAW tables. Snowflake's bulk loader — the equivalent of Redshift's COPY command.\n\nKey options used:\n• FORMAT_NAME = 'OLIST_CSV_FORMAT' — uses the named file format from setup\n• ERROR_ON_COLUMN_COUNT_MISMATCH = FALSE — handles extra metadata columns\n• ON_ERROR = 'SKIP_FILE' — skip bad files, load the rest\n• PURGE = FALSE — keep files in stage after loading","ON_ERROR options":"ABORT_STATEMENT (default)\n  Any error stops everything immediately\n\nCONTINUE\n  Skip bad rows, load good rows from same file\n\nSKIP_FILE ← we use this\n  Skip entire file if any error found\n\nSKIP_FILE_n\n  Skip file only if errors exceed n rows",Idempotency:"🛡️ Reliability Tip — COPY INTO Idempotency\n\nCOPY INTO is idempotent by default. Running it twice on the same file returns status SKIPPED — it will NOT duplicate rows. Snowflake tracks loaded files in its internal metadata.\n\nTo force a reload: add FORCE = TRUE to the statement.\n\nThis makes COPY INTO safe to re-run after failures — only unloaded files will be processed.","Result columns":"Each COPY INTO returns one row:\n• file — which file was processed\n• status — LOADED or SKIPPED\n• rows_parsed — rows read from file\n• rows_loaded — rows inserted into table\n• errors_seen — rows that failed to parse",SQL:"COPY INTO SHOPFLOW_RAW.RAW_ORDERS\nFROM @OLIST_STAGE/olist_orders_dataset.csv\nFILE_FORMAT = (\n  FORMAT_NAME = 'OLIST_CSV_FORMAT',\n  ERROR_ON_COLUMN_COUNT_MISMATCH = FALSE\n)\nON_ERROR = 'SKIP_FILE'\nPURGE    = FALSE;\n\n-- (run for all 9 tables)"}},{id:"verify",icon:"✅",title:"Verify row counts + LOAD_HISTORY",sub:"INFORMATION_SCHEMA · 9 tables confirmed",tabs:{What:"After loading, verify two things:\n1. Row counts match expected values\n2. LOAD_HISTORY shows no errors\n\nExpected counts:\nRAW_ORDERS: ~99,441\nRAW_ORDER_ITEMS: ~112,650\nRAW_CUSTOMERS: ~99,441\nRAW_SELLERS: ~3,095\nRAW_PRODUCTS: ~32,951\nRAW_PAYMENTS: ~103,886\nRAW_REVIEWS: ~99,224\nRAW_GEOLOCATION: ~1,000,163\nRAW_CATEGORY_TRANSLATION: ~71",LOAD_HISTORY:"INFORMATION_SCHEMA.LOAD_HISTORY shows every COPY INTO ever run on this database:\n• Which file was loaded\n• How many rows were parsed and loaded\n• How many errors occurred\n• Exact timestamp\n• Final status","SnowPro tip":"🔍 Concept Note — LOAD_HISTORY vs COPY_HISTORY\n\nINFORMATION_SCHEMA.LOAD_HISTORY\n  Scope    : current database only\n  Latency  : real-time\n  Retention: 14 days\n  Best for : immediate post-load checks\n\nSNOWFLAKE.ACCOUNT_USAGE.COPY_HISTORY\n  Scope    : entire account\n  Latency  : up to 45 minutes\n  Retention: 365 days\n  Best for : long-term audits, compliance\n\nWhen tracking data loads: use LOAD_HISTORY right after loading, COPY_HISTORY for historical investigation.",SQL:"-- Row count verification\nSELECT table_name, row_count\nFROM SHOPFLOW_DB.INFORMATION_SCHEMA.TABLES\nWHERE table_schema = 'SHOPFLOW_RAW'\n  AND table_name LIKE 'RAW_%'\nORDER BY table_name;\n\n-- Load audit\nSELECT\n  TO_CHAR(LAST_LOAD_TIME,'YYYY-MM-DD HH24:MI') AS load_time,\n  TABLE_NAME,\n  ROW_COUNT,\n  ERROR_COUNT,\n  STATUS\nFROM SHOPFLOW_DB.INFORMATION_SCHEMA.LOAD_HISTORY\nWHERE SCHEMA_NAME = 'SHOPFLOW_RAW'\nORDER BY LAST_LOAD_TIME DESC;"}}]},{id:"p2",pal:"purple",num:"02",title:"Build STAGED layer",status:"next",week:"~2 hours",desc:"Type cast · NULL handling · deduplication — RAW → STAGED via CTAS + TRY_CAST",domain:"Transformation",steps:[{id:"typecast",icon:"🔄",title:"Type casting",sub:"TRY_CAST · TRY_TO_TIMESTAMP · VARCHAR → proper types",tabs:{What:"Transform RAW VARCHAR columns into properly typed STAGED columns. Every date becomes TIMESTAMP_NTZ. Every price becomes FLOAT. Every score becomes INTEGER.\n\nKey function: TRY_CAST() — returns NULL for bad values instead of throwing an error. This is what makes the STAGED layer safe to build on.","TRY_CAST vs CAST":"CAST('29.90' AS FLOAT)    → 29.9   ✓\nCAST('R$29,90' AS FLOAT)  → ERROR  ✗\n\nTRY_CAST('29.90' AS FLOAT)    → 29.9  ✓\nTRY_CAST('R$29,90' AS FLOAT)  → NULL  ✓\n\nTRY_CAST never fails. Bad values become NULL so you can identify and fix them later. Always use TRY_CAST when moving from RAW → STAGED.","NULL delivery dates":"💡 Expected NULLs vs Unexpected NULLs\n\nNot all NULLs are problems. In this dataset:\n\n✅ Expected NULL: order_delivered_customer_date is NULL for orders not yet delivered (status = processing, shipped). This is correct — the order hasn't arrived yet.\n\n❌ Unexpected NULL: order_id being NULL would be a real problem — nothing can join to a row with no primary key.\n\nThe STAGED layer handles both: filter WHERE order_id IS NOT NULL, leave delivery date NULLs as-is.",SQL:"CREATE OR REPLACE TABLE SHOPFLOW_STAGED.STG_ORDERS AS\nSELECT\n  order_id,\n  customer_id,\n  order_status,\n  TRY_TO_TIMESTAMP(order_purchase_timestamp)\n    AS order_purchase_ts,\n  TRY_TO_TIMESTAMP(order_approved_at)\n    AS order_approved_ts,\n  TRY_TO_TIMESTAMP(order_delivered_carrier_date)\n    AS carrier_pickup_ts,\n  TRY_TO_TIMESTAMP(order_delivered_customer_date)\n    AS delivered_ts,\n  TRY_TO_TIMESTAMP(order_estimated_delivery_date)\n    AS estimated_delivery_ts,\n  _loaded_at,\n  _source_file\nFROM SHOPFLOW_RAW.RAW_ORDERS\nWHERE order_id IS NOT NULL;"}},{id:"dedup",icon:"🧹",title:"Deduplication",sub:"ROW_NUMBER + QUALIFY — keep latest row per key",tabs:{What:"Some RAW tables have duplicate rows from source system retries. RAW_GEOLOCATION has multiple lat/lng entries per zip code.\n\nFix: ROW_NUMBER() OVER (PARTITION BY key ORDER BY _loaded_at DESC) ranks duplicates. QUALIFY rn = 1 keeps only the most recent version per key.","Why not dedup in RAW?":"RAW is append-only — never modify it. If your dedup logic has a bug, fix it and regenerate STAGED from RAW. You never lose the original data.\n\nIf you deduplicated in RAW you'd have no audit trail of what was originally received.",QUALIFY:"💡 Concept Note — QUALIFY (Snowflake-specific)\n\nQUALIFY filters rows based on window function results — without needing a CTE or subquery wrapper.\n\nWithout QUALIFY (standard SQL — verbose):\nWITH ranked AS (\n  SELECT *, ROW_NUMBER() OVER (...) AS rn\n  FROM ...\n)\nSELECT * FROM ranked WHERE rn = 1;\n\nWith QUALIFY (Snowflake — clean):\nSELECT *\nFROM ...\nQUALIFY ROW_NUMBER() OVER (...) = 1;\n\nROW_NUMBER vs RANK vs DENSE_RANK:\n• ROW_NUMBER — always unique: 1,2,3,4,5\n• RANK — ties share rank, skips next: 1,2,2,4,5\n• DENSE_RANK — ties share rank, no skip: 1,2,2,3,4\nFor deduplication always use ROW_NUMBER.",SQL:"-- Deduplicate geolocation (keep 1 per zip)\nCREATE OR REPLACE TABLE SHOPFLOW_STAGED.STG_GEOLOCATION AS\nSELECT\n  geolocation_zip_code_prefix AS zip_prefix,\n  TRY_CAST(geolocation_lat AS FLOAT) AS lat,\n  TRY_CAST(geolocation_lng AS FLOAT) AS lng,\n  geolocation_city AS city,\n  geolocation_state AS state\nFROM SHOPFLOW_RAW.RAW_GEOLOCATION\nQUALIFY ROW_NUMBER() OVER (\n  PARTITION BY geolocation_zip_code_prefix\n  ORDER BY _loaded_at DESC\n) = 1;"}},{id:"fixtypes",icon:"🔧",title:"Fix column name typos",sub:"product_name_lenght → product_name_length",tabs:{What:"RAW_PRODUCTS has two typos from the original Olist dataset:\n• product_name_lenght (should be product_name_length)\n• product_description_lenght (should be product_description_length)\n\nWe preserved these in RAW — exact copy of source. In STAGED, we rename them to correct names.","Why fix in STAGED not RAW?":"RAW is an exact replica of the source. If you rename columns in RAW, you break the contract — it's no longer exactly what was received.\n\nSTAGED is where you clean, fix, and standardise. All downstream code (ANALYTICS, reports) should reference STAGED, not RAW.\n\n💡 Concept Note — Foreign Keys in Snowflake:\nSnowflake supports FOREIGN KEY constraints in DDL but marks them as NOVALIDATE and RELY by default — they are informational only, not enforced at write time. The optimizer may use them for query planning. You must check referential integrity yourself.",SQL:"CREATE OR REPLACE TABLE SHOPFLOW_STAGED.STG_PRODUCTS AS\nSELECT\n  product_id,\n  product_category_name,\n  -- fix typos from original dataset\n  TRY_CAST(product_name_lenght AS INTEGER)\n    AS product_name_length,\n  TRY_CAST(product_description_lenght AS INTEGER)\n    AS product_description_length,\n  TRY_CAST(product_photos_qty AS INTEGER)\n    AS product_photos_qty,\n  TRY_CAST(product_weight_g AS FLOAT)\n    AS product_weight_g,\n  TRY_CAST(product_length_cm AS FLOAT)\n    AS product_length_cm,\n  TRY_CAST(product_height_cm AS FLOAT)\n    AS product_height_cm,\n  TRY_CAST(product_width_cm AS FLOAT)\n    AS product_width_cm\nFROM SHOPFLOW_RAW.RAW_PRODUCTS\nWHERE product_id IS NOT NULL;"}}]},{id:"p3",pal:"coral",num:"03",title:"ANALYTICS star schema",status:"locked",week:"~3 hours",desc:"FACT_ORDERS at centre · DIM_CUSTOMERS · DIM_PRODUCTS · DIM_SELLERS · DIM_DATE",domain:"Data Modelling",steps:[{id:"fact",icon:"⭐",title:"FACT_ORDERS",sub:"One row per order item — all measures here",tabs:{What:"Centre of the star schema. Each row = one order item (one order can have multiple items from different sellers).\n\nAll numeric measures:\n• price — item price in BRL\n• freight_value — shipping cost in BRL\n• delivery_days — actual vs estimated delivery gap\n• payment_value — what was actually paid\n\nAll foreign keys to dimension tables.","Why item grain?":"Order grain (one row per order) loses product detail. An order with 3 products at 3 different prices — order grain aggregates them. Item grain lets analysts GROUP BY product, seller, or category without complex joins.\n\nSELECT seller_id, SUM(price) AS gmv\nFROM FACT_ORDERS\nGROUP BY seller_id — clean and fast.",SQL:"CREATE OR REPLACE TABLE\n  SHOPFLOW_ANALYTICS.FACT_ORDERS AS\nSELECT\n  i.order_id,\n  i.order_item_id,\n  i.product_id,\n  i.seller_id,\n  o.customer_id,\n  o.order_status,\n  o.order_purchase_ts,\n  TRY_CAST(i.price AS FLOAT)         AS price,\n  TRY_CAST(i.freight_value AS FLOAT) AS freight_value,\n  DATEDIFF('day',\n    o.order_purchase_ts,\n    o.delivered_ts)                  AS delivery_days,\n  o.delivered_ts,\n  o.estimated_delivery_ts\nFROM SHOPFLOW_STAGED.STG_ORDER_ITEMS i\nJOIN SHOPFLOW_STAGED.STG_ORDERS o\n  ON i.order_id = o.order_id;"}},{id:"dims",icon:"📐",title:"Dimension tables",sub:"DIM_CUSTOMERS · DIM_PRODUCTS · DIM_SELLERS · DIM_DATE",tabs:{What:"Four dimension tables surround FACT_ORDERS:\n\nDIM_CUSTOMERS — customer_id, city, state, coordinates\nDIM_PRODUCTS — product_id, category_english, weight, dimensions\nDIM_SELLERS — seller_id, city, state, coordinates\nDIM_DATE — date_key, year, month, quarter, day_of_week — one row per calendar day","Why DIM_DATE?":"DIM_DATE lets analysts filter and GROUP BY time periods without calling date functions on every query:\n\nSELECT d.month_name, SUM(f.price)\nFROM FACT_ORDERS f\nJOIN DIM_DATE d ON f.order_purchase_ts::DATE = d.date_key\nGROUP BY d.month_name\n\nFaster than DATE_TRUNC() on every row. Also enables fiscal year, week number, holiday flags.",SQL:"CREATE OR REPLACE TABLE\n  SHOPFLOW_ANALYTICS.DIM_CUSTOMERS AS\nSELECT DISTINCT\n  c.customer_unique_id AS customer_id,\n  c.customer_city      AS city,\n  c.customer_state     AS state,\n  g.lat,\n  g.lng\nFROM SHOPFLOW_STAGED.STG_CUSTOMERS c\nLEFT JOIN SHOPFLOW_STAGED.STG_GEOLOCATION g\n  ON c.customer_zip_code_prefix = g.zip_prefix;"}}]},{id:"p4",pal:"amber",num:"04",title:"Performance + Security",status:"locked",week:"~2 hours",desc:"Clustering keys · result cache · RBAC · row access policies · dynamic masking",domain:"Performance + Security",steps:[{id:"cluster",icon:"⚡",title:"Clustering keys",sub:"Tune queries — before vs after partition scan",tabs:{What:"Add CLUSTER KEY on FACT_ORDERS(order_purchase_ts, seller_id). Run a slow date-filtered aggregation before and after — compare partition scans in QUERY_HISTORY.\n\nSnowflake co-locates rows with similar values in the same micro-partitions. Queries that filter on the cluster key scan far fewer partitions.","SnowPro tip":"Micro-partitions: ~16MB compressed each.\nClustering = queries skip more partitions.\n\nCluster on columns most common in WHERE and JOIN.\n\nSYSTEM$CLUSTERING_INFORMATION('table') → shows cluster depth and health.\n\nAutomatic clustering = Snowflake maintains it for you (costs credits but hands-free).",SQL:"-- Check before\nSELECT seller_id, SUM(price) AS gmv\nFROM SHOPFLOW_ANALYTICS.FACT_ORDERS\nWHERE order_purchase_ts >=\n  DATEADD('day',-30,CURRENT_DATE())\nGROUP BY seller_id;\n\n-- Add clustering key\nALTER TABLE SHOPFLOW_ANALYTICS.FACT_ORDERS\n  CLUSTER BY (\n    DATE_TRUNC('month', order_purchase_ts),\n    seller_id\n  );\n\n-- Check health\nSELECT SYSTEM$CLUSTERING_INFORMATION(\n  'SHOPFLOW_ANALYTICS.FACT_ORDERS');"}},{id:"roles",icon:"🔒",title:"Role hierarchy + masking",sub:"3 roles · row access policy · dynamic masking",tabs:{What:"Three project roles:\n\n👷 SHOPFLOW_ENGINEER — full access all schemas\n👀 SHOPFLOW_ANALYST — read-only ANALYTICS schema\n🏪 SHOPFLOW_SELLER — ANALYTICS read-only, only their own orders\n\nPlus:\n• Dynamic data masking on customer email (ENGINEER sees real, ANALYST sees XXX@XXX.com)\n• Row access policy on FACT_ORDERS (SELLER sees only their own rows)","Why DB-level not app-level?":"Application-level security can be bypassed — a developer removes a line of code, or a user queries via Python directly.\n\nDB-level policies are enforced by Snowflake below the application — SELECT * returns masked/filtered data regardless of tool or language used.",SQL:"-- Dynamic masking\nCREATE OR REPLACE MASKING POLICY email_mask\n  AS (val VARCHAR) RETURNS VARCHAR ->\n  CASE\n    WHEN CURRENT_ROLE() = 'SHOPFLOW_ENGINEER'\n      THEN val\n    ELSE 'XXX@XXX.com'\n  END;\n\n-- Row access policy\nCREATE OR REPLACE ROW ACCESS POLICY\n  seller_filter\n  AS (seller_id VARCHAR) RETURNS BOOLEAN ->\n  CASE\n    WHEN CURRENT_ROLE() IN\n      ('SHOPFLOW_ENGINEER','SHOPFLOW_ANALYST')\n      THEN TRUE\n    WHEN CURRENT_ROLE() = 'SHOPFLOW_SELLER'\n      THEN seller_id = CURRENT_USER()\n    ELSE FALSE\n  END;"}}]},{id:"p5",pal:"blue",num:"05",title:"Streams, Tasks & Sharing",status:"locked",week:"~2 hours",desc:"Automate nightly refresh · CDC with streams · share live data with a partner",domain:"Automation + Sharing",steps:[{id:"stream",icon:"🌊",title:"Stream on FACT_ORDERS",sub:"CDC — capture every change automatically",tabs:{What:"A STREAM tracks every INSERT, UPDATE, DELETE on FACT_ORDERS since you last consumed it. Querying the stream shows only changed rows plus metadata columns:\n• METADATA$ACTION (INSERT or DELETE)\n• METADATA$ISUPDATE (boolean)","AWS analogy":"Snowflake STREAM ≈ DynamoDB Streams + Kinesis\n\nIn AWS: capturing table changes requires DynamoDB Streams or Debezium on RDS — extra infrastructure, extra cost.\n\nIn Snowflake: CREATE STREAM is one SQL statement. Zero extra infrastructure.","SnowPro tip":"Stream offset advances ONLY when a DML statement reads from it. Reading a stream without DML does not advance it.\n\nAppend-only streams → track inserts only (more efficient for insert-heavy tables)\n\nSYSTEM$STREAM_HAS_DATA() → check if stream has unprocessed records",SQL:"CREATE OR REPLACE STREAM\n  SHOPFLOW_ANALYTICS.ORDERS_STREAM\n  ON TABLE SHOPFLOW_ANALYTICS.FACT_ORDERS\n  APPEND_ONLY = TRUE;\n\n-- Check stream has data\nSELECT SYSTEM$STREAM_HAS_DATA(\n  'SHOPFLOW_ANALYTICS.ORDERS_STREAM');\n\n-- Preview new records\nSELECT\n  METADATA$ACTION,\n  order_id, seller_id, price\nFROM SHOPFLOW_ANALYTICS.ORDERS_STREAM\nLIMIT 10;"}},{id:"task",icon:"⏰",title:"Nightly task",sub:"CRON schedule · replaces EventBridge + Lambda",tabs:{What:"A TASK runs SQL on a CRON schedule. Nightly task reads new orders from the stream and aggregates into DAILY_SELLER_SUMMARY. Tasks can chain into DAGs — each triggered by another task completing.","AWS analogy":'Snowflake TASK ≈ EventBridge rule + Lambda\n\nBut the "Lambda function" is just SQL — no deployment, no runtime, no packaging.\n\nIn AWS: Lambda queries Redshift, writes back results.\nIn Snowflake: 10-line CREATE TASK statement.',"SnowPro tip":"Tasks start SUSPENDED after creation:\nALTER TASK taskname RESUME;\n\nServerless tasks → Snowflake manages compute\nWarehouse tasks → you specify warehouse\n\nTASK_HISTORY in INFORMATION_SCHEMA shows run history, errors, and duration.",SQL:"CREATE OR REPLACE TASK NIGHTLY_SELLER_SUMMARY\n  WAREHOUSE = SHOPFLOW_WH\n  SCHEDULE  = 'USING CRON 0 1 * * * Asia/Kolkata'\n  WHEN SYSTEM$STREAM_HAS_DATA(\n    'SHOPFLOW_ANALYTICS.ORDERS_STREAM')\nAS\n  INSERT INTO\n    SHOPFLOW_ANALYTICS.DAILY_SELLER_SUMMARY\n  SELECT\n    seller_id,\n    DATE_TRUNC('day', order_purchase_ts) AS summary_date,\n    COUNT(*) AS orders_count,\n    SUM(price + freight_value) AS gmv\n  FROM SHOPFLOW_ANALYTICS.ORDERS_STREAM\n  GROUP BY 1, 2;\n\nALTER TASK NIGHTLY_SELLER_SUMMARY RESUME;"}},{id:"share",icon:"🤝",title:"Secure data share",sub:"No data copy — partner queries live",tabs:{What:"A SECURE SHARE exposes selected tables to another Snowflake account. The consumer queries your data live — their queries run against your storage. No data copied, no pipeline, no S3, no file exports.","Real world":"A brand partner like a seller on the platform logs into a reader account and queries their own product sales in real time — no SFTP, no email attachments, no daily CSV exports.\n\nSnowflake Marketplace is the public version — companies publish live datasets anyone can subscribe to.",SQL:"CREATE SHARE BRAND_PARTNER_SHARE;\n\nGRANT USAGE ON DATABASE SHOPFLOW_DB\n  TO SHARE BRAND_PARTNER_SHARE;\nGRANT USAGE ON SCHEMA SHOPFLOW_ANALYTICS\n  TO SHARE BRAND_PARTNER_SHARE;\nGRANT SELECT ON TABLE\n  SHOPFLOW_ANALYTICS.DAILY_SELLER_SUMMARY\n  TO SHARE BRAND_PARTNER_SHARE;\n\n-- Verify\nSHOW GRANTS TO SHARE BRAND_PARTNER_SHARE;"}}]},{id:"p6",pal:"green",num:"06",title:"Visual Analytics",status:"locked",week:"~2 hours \u00b7 Python notebook",desc:"Plotly charts on the star schema \u00b7 session.sql() \u00b7 st.plotly_chart \u00b7 Streamlit in Notebooks",domain:"Visualisation",steps:[{id:"p6_setup",icon:"\ud83d\udc0d",title:"Session + libraries",sub:"get_active_session \u00b7 pandas \u00b7 plotly \u00b7 streamlit",tabs:{What:"Python cells in Snowflake Notebooks share a live Snowpark session with the SQL cells.\n\nGet the session with:\n  from snowflake.snowpark.context import get_active_session\n  session = get_active_session()\n\nAll core libraries are pre-installed: pandas, plotly, streamlit. No pip install needed.","AWS analogy":"Like a SageMaker notebook with a pre-authenticated Redshift connection \u2014 except the session is always live and auto-injected by the platform.","SnowPro tip":"Pro Tip \u2014 get_active_session()\n\nDo NOT rely on session being auto-injected. Always call get_active_session() explicitly in your first Python cell.\n\nSnowflake Notebooks use an SQL kernel with per-cell language overrides. Set language=python on any cell to run Python alongside SQL.",SQL:"from snowflake.snowpark.context import get_active_session\nsession = get_active_session()\n\nimport pandas as pd\nimport plotly.express as px\nimport plotly.graph_objects as go\nimport streamlit as st\n\nprint(session.get_current_database())"}},{id:"p6_gmv",icon:"\ud83d\udcc8",title:"Monthly GMV trend",sub:"session.sql().to_pandas() \u00b7 Plotly bar chart",tabs:{What:"Pull monthly GMV from FACT_ORDERS into Pandas, then chart with Plotly.\n\nPattern for every chart:\n  df = session.sql('SELECT ...').to_pandas()\n  fig = px.bar(df, ...)\n  st.plotly_chart(fig, use_container_width=True)","SnowPro tip":"Pro Tip \u2014 Rendering Plotly in Notebooks\n\nfig.show() fails because nbformat is not installed in the Snowflake Notebook runtime.\n\nAlways use st.plotly_chart(fig, use_container_width=True) instead. Streamlit is built into every Snowflake Notebook and renders inline.",SQL:"df_gmv = session.sql(\n  'SELECT DATE_TRUNC(\\'month\\', order_purchase_ts) AS order_month,'\n  ' COUNT(DISTINCT order_id) AS orders,'\n  ' ROUND(SUM(price + freight_value), 2) AS gmv_brl'\n  ' FROM SHOPFLOW_ANALYTICS.FACT_ORDERS'\n  ' WHERE order_status = \\'delivered\\' GROUP BY 1 ORDER BY 1'\n).to_pandas()\nst.plotly_chart(fig, use_container_width=True)"}},{id:"p6_reviews",icon:"\u2b50",title:"Review score vs delay",sub:"numpy polyfit trendline \u00b7 scatter chart",tabs:{What:"Scatter: x = delivery delay day buckets, y = avg review score.\n\nUse numpy.polyfit() for the trendline. statsmodels (needed for plotly trendline='lowess') is NOT installed in Snowflake Notebooks.","SnowPro tip":"Warning \u2014 statsmodels is not installed in Snowflake Notebooks.\n\npx.scatter(trendline='lowess') will throw ImportError.\n\nFix: use numpy instead:\n  z = np.polyfit(x, y, 2)\n  p_fn = np.poly1d(z)\n  y_line = p_fn(x_line)\nThen add as a go.Scatter trace.",SQL:"import numpy as np\nz = np.polyfit(delay_buckets, avg_scores, 2)\np_fn = np.poly1d(z)\nx_line = range(int(min(delay_buckets)), int(max(delay_buckets)))\nfig.add_trace(go.Scatter(x=list(x_line), y=[p_fn(v) for v in x_line], mode='lines', name='Trend'))\nst.plotly_chart(fig, use_container_width=True)"}},{id:"p6_states",icon:"\ud83d\uddfa",title:"Orders by Brazilian state",sub:"Bar chart \u00b7 no outbound internet needed",tabs:{What:"Bar chart of order volume and GMV by Brazilian state, joining FACT_ORDERS to DIM_CUSTOMERS.\n\nNote: Choropleth maps need a GeoJSON file fetched from the internet. Snowflake Notebooks block all outbound connections. Use a bar chart instead \u2014 same insight, zero network calls.","SnowPro tip":"Snowflake Notebooks have no outbound internet access.\n\nThis means:\n- No Kaggle API calls\n- No urllib or requests to external URLs\n- No pip install from PyPI\n\nAll data must be pre-loaded into Snowflake via COPY INTO.\nFor choropleth maps, run the same code locally in Jupyter.",SQL:"df_st = session.sql(\n  'SELECT c.state, COUNT(*) AS orders,'\n  ' ROUND(SUM(f.price+f.freight_value),0) AS gmv_brl'\n  ' FROM SHOPFLOW_ANALYTICS.FACT_ORDERS f'\n  ' JOIN SHOPFLOW_ANALYTICS.DIM_CUSTOMERS c'\n  '   ON f.customer_id=c.customer_id'\n  ' GROUP BY 1 ORDER BY 2 DESC'\n).to_pandas()\nfig = px.bar(df_st, x='STATE', y='ORDERS', title='Orders by State')\nst.plotly_chart(fig, use_container_width=True)"}}]}],DATASETS=[{file:"olist_orders_dataset.csv",table:"RAW_ORDERS",rows:"~99,441",desc:"Core fact — one row per order"},{file:"olist_order_items_dataset.csv",table:"RAW_ORDER_ITEMS",rows:"~112,650",desc:"Products within each order"},{file:"olist_customers_dataset.csv",table:"RAW_CUSTOMERS",rows:"~99,441",desc:"Customer master data"},{file:"olist_sellers_dataset.csv",table:"RAW_SELLERS",rows:"~3,095",desc:"Seller profiles"},{file:"olist_products_dataset.csv",table:"RAW_PRODUCTS",rows:"~32,951",desc:"Product catalogue"},{file:"olist_order_payments_dataset.csv",table:"RAW_PAYMENTS",rows:"~103,886",desc:"Payment transactions"},{file:"olist_order_reviews_dataset.csv",table:"RAW_REVIEWS",rows:"~99,224",desc:"Customer review scores"},{file:"olist_geolocation_dataset.csv",table:"RAW_GEOLOCATION",rows:"~1,000,163",desc:"Zip → lat/lng mapping"},{file:"product_category_name_translation.csv",table:"RAW_CATEGORY_TRANSLATION",rows:"~71",desc:"Category names in English"}];function StatusBadge({status:e}){return null}const LS_KEY="shopflow_progress_v1";function loadProgress(){try{return JSON.parse(localStorage.getItem(LS_KEY)||"{}")}catch{return{}}}function saveProgress(e){try{localStorage.setItem(LS_KEY,JSON.stringify(e))}catch{}}function useProgress(){const[e,t]=React.useState(loadProgress);return{done:e,toggleStep:function(e){t(t=>{const a={...t,[e]:!t[e]};return saveProgress(a),a})},clearAll:fun {id:1,type:"tf",topic:"Architecture",difficulty:"easy",q:"In Snowflake, suspending a virtual warehouse also makes the data in its associated database temporarily unavailable.",ans:false,exp:"FALSE. Compute (warehouse) and storage (database) are completely independent. Suspending a warehouse has zero effect on data availability. This separation is Snowflake's core architectural advantage."},
{id:2,type:"tf",topic:"Time Travel",difficulty:"easy",q:"Snowflake's Fail-safe feature can be directly queried by users using AT or BEFORE syntax.",ans:false,exp:"FALSE. Fail-safe is managed exclusively by Snowflake Support. Only Time Travel supports AT/BEFORE syntax. Fail-safe starts after Time Travel expires."},
{id:3,type:"tf",topic:"Architecture",difficulty:"easy",q:"PUBLIC and INFORMATION_SCHEMA are automatically created inside every new Snowflake database.",ans:true,exp:"TRUE. Every new database auto-gets PUBLIC (default schema) and INFORMATION_SCHEMA (read-only system catalogue). You will always see them in SHOW SCHEMAS output."},
{id:4,type:"tf",topic:"Warehouse",difficulty:"easy",q:"A Medium warehouse in Snowflake consumes exactly 3 credits per hour.",ans:false,exp:"FALSE. Warehouse credits double each size: XS=1, S=2, M=4, L=8, XL=16. Medium = 4 credits/hour, not 3."},
{id:5,type:"tf",topic:"Stages",difficulty:"easy",q:"The PUT command for uploading files to a stage is available directly in the Snowsight UI.",ans:false,exp:"FALSE. PUT is only available via SnowSQL CLI or language connectors. Snowsight UI has a file upload button instead. Files uploaded via UI stay as .csv — no auto-compression."},
{id:6,type:"tf",topic:"Architecture",difficulty:"easy",q:"In the Medallion Architecture, SHOPFLOW_STAGED corresponds to the Silver layer.",ans:true,exp:"TRUE. RAW=Bronze (landing), STAGED=Silver (cleaned/typed), ANALYTICS=Gold (star schema). Used at Airbnb, Databricks, and every serious data team."},
{id:7,type:"tf",topic:"Roles",difficulty:"easy",q:"GRANT ROLE SHOPFLOW_ROLE TO USER my_user automatically also grants the role all necessary object privileges.",ans:false,exp:"FALSE. Granting a role to a user and granting privileges to that role are completely separate operations. A new role has zero privileges until explicitly granted."},
{id:8,type:"tf",topic:"File Format",difficulty:"easy",q:"ERROR_ON_COLUMN_COUNT_MISMATCH=FALSE allows COPY INTO to succeed when RAW tables have 2 more columns than the CSV files.",ans:true,exp:"TRUE. RAW tables have _loaded_at and _source_file audit columns not in the CSV. Without this setting COPY INTO fails. The extra columns use DEFAULT values."},
{id:9,type:"tf",topic:"Architecture",difficulty:"easy",q:"Schema-level DATA_RETENTION_TIME_IN_DAYS overrides database-level retention for objects in that schema.",ans:true,exp:"TRUE. Snowflake applies the most specific retention setting. A schema with retention=0 has no Time Travel even if the parent database has retention=1."},
{id:10,type:"tf",topic:"Roles",difficulty:"easy",q:"ACCOUNTADMIN inherits all privileges of SYSADMIN, SECURITYADMIN, USERADMIN, and PUBLIC.",ans:true,exp:"TRUE. Higher roles inherit all privileges of lower roles. ACCOUNTADMIN is at the top — includes everything. This is exactly why you should NOT use it for day-to-day work."},
{id:11,type:"tf",topic:"Time Travel",difficulty:"medium",q:"On Snowflake Standard Edition, the maximum Time Travel retention period is 90 days.",ans:false,exp:"FALSE. Standard Edition supports up to 1 day. Enterprise Edition supports up to 90 days. A very common exam trap."},
{id:12,type:"tf",topic:"Architecture",difficulty:"medium",q:"UNDROP TABLE works for tables but NOT for schemas or databases in Snowflake.",ans:false,exp:"FALSE. UNDROP works for all three: UNDROP TABLE, UNDROP SCHEMA, UNDROP DATABASE — within the Time Travel retention window."},
{id:13,type:"tf",topic:"Warehouse",difficulty:"medium",q:"A SUSPENDED Snowflake warehouse still consumes credits for its compute nodes.",ans:false,exp:"FALSE. Suspended warehouse = zero credits. Compute nodes are completely deallocated. Only running warehouses consume credits. Data is unaffected."},
{id:14,type:"tf",topic:"Architecture",difficulty:"medium",q:"DROP DATABASE SHOPFLOW_DB CASCADE removes all schemas, tables, stages, and file formats in one command.",ans:true,exp:"TRUE. CASCADE recursively removes ALL child objects. The cleanest way to fully tear down a project without errors about existing child objects."},
{id:15,type:"tf",topic:"Architecture",difficulty:"medium",q:"INFORMATION_SCHEMA inside a database can be written to using INSERT or UPDATE statements.",ans:false,exp:"FALSE. INFORMATION_SCHEMA is a read-only system catalogue. You cannot INSERT, UPDATE, or DELETE from it — only SELECT."},
{id:16,type:"tf",topic:"Stages",difficulty:"medium",q:"A named internal stage like @OLIST_STAGE can load files into multiple different tables.",ans:true,exp:"TRUE. A named stage is not tied to any table. ShopFlow uses one @OLIST_STAGE for all 9 CSV files loading into 9 different RAW tables."},
{id:17,type:"tf",topic:"Warehouse",difficulty:"medium",q:"AUTO_RESUME=TRUE means the warehouse starts automatically when a query is submitted, even if suspended.",ans:true,exp:"TRUE. AUTO_RESUME=TRUE makes the warehouse wake on-demand. Combined with AUTO_SUSPEND you only pay for actual query time — the most cost-efficient setup."},
{id:18,type:"tf",topic:"Architecture",difficulty:"medium",q:"USE ROLE, USE WAREHOUSE, and USE DATABASE must be run in the order: ROLE then WAREHOUSE then DATABASE.",ans:false,exp:"FALSE. All three set independent session context variables and can be run in any order. Best practice is to set all three at the top of every script."},
{id:19,type:"tf",topic:"File Format",difficulty:"hard",q:"SKIP_HEADER=0 in a CSV file format would cause the column header row to be loaded as a data row in VARCHAR RAW tables.",ans:true,exp:"TRUE. Without SKIP_HEADER=1, the header line ('order_id,customer_id,...') inserts as a data row. All RAW columns are VARCHAR so it won't type-error — but it pollutes data with a header row."},
{id:20,type:"tf",topic:"Architecture",difficulty:"hard",q:"Warehouses and databases are in a parent-child relationship — a database belongs to a warehouse.",ans:false,exp:"FALSE. Warehouses and databases are SIBLINGS — both direct children of the account. A warehouse provides compute. A database stores data. Completely independent."},
{id:21,type:"tf",topic:"Roles",difficulty:"hard",q:"A role with OWNERSHIP on SHOPFLOW_DB can grant that database's privileges to other roles without needing SECURITYADMIN.",ans:true,exp:"TRUE. Object owners can grant privileges on their objects to other roles. SECURITYADMIN is for role management, but object owners manage their own object's grants."},
{id:22,type:"tf",topic:"Time Travel",difficulty:"hard",q:"Time Travel storage is free — Snowflake does not charge extra for retaining historical versions of data.",ans:false,exp:"FALSE. Time Travel storage is an ADDITIONAL cost. You pay for historical micro-partition versions beyond current data. Longer retention + more changes = higher cost."},
{id:23,type:"tf",topic:"Architecture",difficulty:"hard",q:"INFORMATION_SCHEMA.TABLES.row_count always provides the exact row count without scanning any data.",ans:false,exp:"FALSE. row_count is approximate metadata — no credits consumed. For exact count you must run SELECT COUNT(*) which scans the table and uses warehouse compute."},
{id:24,type:"tf",topic:"Warehouse",difficulty:"hard",q:"Snowflake bills warehouse usage in 60-second minimum increments per resume, not per query.",ans:true,exp:"TRUE. Each time a warehouse resumes, you're billed at least 60 seconds. A 3-second query costs the same as a 59-second query. Minimise resumes to minimise cost."},
{id:25,type:"tf",topic:"Stages",difficulty:"hard",q:"Files uploaded to @OLIST_STAGE via Snowsight UI are automatically compressed to .gz format.",ans:false,exp:"FALSE. Only PUT (SnowSQL/connector) auto-compresses to .gz. Snowsight UI stores files as uploaded — .csv stays .csv. Your COPY INTO path must match exactly what LIST shows."},
{id:26,type:"mcq",topic:"Architecture",difficulty:"easy",q:"What is the correct Snowflake object hierarchy from account level down to data?",opts:["A) Account → Warehouse → Database → Schema → Table","B) Account → Database → Schema → Table (warehouses are siblings of databases)","C) Organisation → Warehouse → Schema → Table","D) Account → Schema → Database → Table"],ans:"B",exp:"Warehouses and databases are siblings — both direct children of the account. Storage hierarchy: Account → Database → Schema → Table/Stage/FileFormat. Warehouses provide compute independently."},
{id:27,type:"mcq",topic:"Warehouse",difficulty:"easy",q:"You run a 5-second query on an X-Small warehouse. How many seconds are you billed?",opts:["A) 5 seconds","B) 30 seconds","C) 60 seconds","D) 0 — under 10 seconds is free"],ans:"C",exp:"60-second minimum per warehouse resume regardless of execution time. A 5-second query and a 59-second query cost the same."},
{id:28,type:"mcq",topic:"Roles",difficulty:"easy",q:"Which Snowflake role is designed for creating roles and managing privilege grants?",opts:["A) SYSADMIN","B) USERADMIN","C) SECURITYADMIN","D) ACCOUNTADMIN"],ans:"C",exp:"SECURITYADMIN owns role lifecycle and grants. SYSADMIN owns infrastructure. USERADMIN manages users. Using the correct role for each task follows least-privilege best practice."},
{id:29,type:"mcq",topic:"Time Travel",difficulty:"easy",q:"RAW_ORDERS is accidentally dropped at 9am. DATA_RETENTION=1 day. It is now 6pm. Recovery command?",opts:["A) RESTORE TABLE SHOPFLOW_RAW.RAW_ORDERS","B) UNDROP TABLE SHOPFLOW_RAW.RAW_ORDERS","C) ROLLBACK TABLE SHOPFLOW_RAW.RAW_ORDERS","D) Cannot recover — permanently lost"],ans:"B",exp:"UNDROP TABLE recovers dropped tables within the Time Travel window. Only 9 hours passed within the 24-hour window — UNDROP restores it completely."},
{id:30,type:"mcq",topic:"Stages",difficulty:"easy",q:"Key functional difference between @~ and @OLIST_STAGE?",opts:["A) @~ is faster; @OLIST_STAGE is more secure","B) @~ is a user stage that exists automatically per user; @OLIST_STAGE is a named internal stage you explicitly created","C) @~ is for CSV files; @OLIST_STAGE for JSON","D) @~ requires S3; @OLIST_STAGE uses Snowflake storage"],ans:"B",exp:"@~ (user stage) exists automatically for every user. @OLIST_STAGE is named — shared across sessions, holds files for multiple tables. Named stages are the production standard."},
{id:31,type:"mcq",topic:"Architecture",difficulty:"easy",q:"Why are all RAW table columns defined as VARCHAR?",opts:["A) VARCHAR queries run faster in Snowflake","B) RAW contract: accept everything, reject nothing. Dirty data loads fine as VARCHAR but would crash typed columns","C) Snowflake requires VARCHAR for staging tables","D) VARCHAR uses less storage than FLOAT or TIMESTAMP"],ans:"B",exp:"RAW layer = zero data loss at ingestion. Dates with 'N/A', prices with 'R$29,90' — all load as VARCHAR. TRY_CAST in STAGED handles conversion. Real-world data engineering best practice."},
{id:32,type:"mcq",topic:"File Format",difficulty:"easy",q:"What does FIELD_OPTIONALLY_ENCLOSED_BY='\"' handle in the Olist CSVs?",opts:["A) Encrypts sensitive fields during loading","B) Fields containing commas wrapped in double-quotes treated as a single field","C) Converts all text fields to uppercase","D) Skips fields enclosed in quotes"],ans:"B",exp:"A city like 'São Paulo, SP' contains a comma. Without this setting, the parser splits it into two columns. The setting tells the parser: content inside double-quotes is one field, regardless of internal commas."},
{id:33,type:"mcq",topic:"Architecture",difficulty:"easy",q:"DROP SCHEMA SHOPFLOW_STAGED CASCADE. What does CASCADE do?",opts:["A) Drops only empty tables","B) Asks confirmation before each child","C) Recursively drops all objects inside the schema","D) Creates a backup before dropping"],ans:"C",exp:"CASCADE recursively removes ALL child objects atomically. Without CASCADE, DROP fails if the schema has objects. With CASCADE, everything inside is gone in one command."},
{id:34,type:"mcq",topic:"Warehouse",difficulty:"easy",q:"SHOPFLOW_WH has AUTO_SUSPEND=60. What does this mean?",opts:["A) Suspends after 60 queries","B) Suspends after 60 seconds of inactivity — zero credits charged while suspended","C) Suspends after 60 minutes","D) Auto-resumes after 60 seconds"],ans:"B",exp:"AUTO_SUSPEND=60 means 60 seconds of idle time triggers suspension. Combined with AUTO_RESUME=TRUE, you only pay for actual query time — ideal for a learning project on a limited budget."},
{id:35,type:"mcq",topic:"Roles",difficulty:"medium",q:"SHOPFLOW_ROLE is missing GRANT USAGE ON WAREHOUSE. What happens when it runs a query?",opts:["A) Runs slowly on shared compute","B) Error: insufficient privileges to operate on warehouse","C) Automatically uses the smallest available warehouse","D) Uses SYSADMIN warehouse instead"],ans:"B",exp:"USAGE on warehouse is mandatory for any role to execute queries. Without it, every query fails. Most common Phase 00 setup mistake."},
{id:36,type:"mcq",topic:"Architecture",difficulty:"medium",q:"Precise purpose of the _source_file column on every RAW table?",opts:["A) Stores the original Kaggle download URL","B) Records which CSV file each row came from — enables targeted DELETE and reload per file","C) Acts as primary key to prevent duplicates","D) Compresses file metadata"],ans:"B",exp:"_source_file enables surgical reloads: DELETE WHERE _source_file='olist_products.csv', fix the file, COPY INTO. Zero impact on other tables. Production data lineage pattern."},
{id:37,type:"mcq",topic:"Time Travel",difficulty:"medium",q:"Difference between Time Travel and Fail-safe?",opts:["A) Time Travel for tables; Fail-safe for databases","B) Time Travel: user-accessible AT/BEFORE, configurable 0-90 days; Fail-safe: Snowflake Support only, always 7 days after TT expires","C) They are the same feature with different names","D) Fail-safe on Standard Edition; Time Travel requires Enterprise"],ans:"B",exp:"Time Travel: you query it directly, configurable retention. Fail-safe: 7-day emergency recovery managed by Snowflake Support only — no direct user access, last resort."},
{id:38,type:"mcq",topic:"Stages",difficulty:"medium",q:"Three types of internal stages in Snowflake?",opts:["A) Raw, staged, analytics","B) Named stage (@stagename), user stage (@~), table stage (@%tablename)","C) CSV, JSON, Parquet stages","D) Internal, external, hybrid"],ans:"B",exp:"Named stages (@name) — created explicitly, shared across sessions. User stages (@~) — one per user, automatic. Table stages (@%table) — one per table, automatic. Named stages are the production standard."},
{id:39,type:"mcq",topic:"File Format",difficulty:"medium",q:"Why does OLIST_CSV_FORMAT set ENCODING=UTF8?",opts:["A) UTF8 compresses data for faster load","B) Olist data is Brazilian — Portuguese characters (ã,ç,é,õ) require UTF-8 or they corrupt","C) Snowflake defaults to ASCII which can't store numbers","D) UTF8 required for CSV files over 100MB"],ans:"B",exp:"Portuguese city names and product descriptions have special characters. Without ENCODING=UTF8 they load as garbled symbols. UTF-8 is the international standard for multi-language text."},
{id:40,type:"mcq",topic:"Architecture",difficulty:"medium",q:"What does DATA_RETENTION_TIME_IN_DAYS=1 on SHOPFLOW_DB enable?",opts:["A) Automatic daily S3 backups","B) Time Travel — query data as it existed in the past 24 hours and recover accidentally dropped objects","C) Daily archive jobs","D) Compresses data older than 1 day"],ans:"B",exp:"DATA_RETENTION=1 enables 24-hour Time Travel. Query historical data with AT(TIMESTAMP=>) and recover dropped tables with UNDROP TABLE."},
{id:41,type:"mcq",topic:"Architecture",difficulty:"medium",q:"Why does SHOPFLOW_RAW have the rule: rows are never updated or deleted?",opts:["A) Snowflake doesn't support UPDATE on VARCHAR","B) RAW is the permanent audit trail — if STAGED or ANALYTICS breaks, rebuild from RAW without going back to Kaggle","C) Updating RAW consumes extra credits","D) RAW schema is read-only — Snowflake enforces this"],ans:"B",exp:"RAW is your source of truth. STAGED and ANALYTICS are derived and can be rebuilt anytime. If a transformation bug is discovered months later, RAW still has the original data. Core medallion architecture principle."},
{id:42,type:"mcq",topic:"Warehouse",difficulty:"medium",q:"You need to run a large one-time migration quickly then won't need extra compute. Best approach?",opts:["A) Create a new X-Large warehouse permanently","B) Resize SHOPFLOW_WH to X-Large for migration, then back to X-Small after","C) Run multiple X-Small warehouses simultaneously","D) Increase AUTO_SUSPEND to 3600 seconds"],ans:"B",exp:"ALTER WAREHOUSE lets you resize in place. Resize up, run the job, resize down. Only pay for larger size during the job. No new warehouse needed."},
{id:43,type:"mcq",topic:"Roles",difficulty:"medium",q:"GRANT OWNERSHIP ON DATABASE SHOPFLOW_DB TO ROLE SHOPFLOW_ROLE is run. What changes?",opts:["A) SHOPFLOW_ROLE can create objects inside SHOPFLOW_DB without SYSADMIN","B) SYSADMIN loses all access to SHOPFLOW_DB","C) All other roles lose access automatically","D) Database locked — only SHOPFLOW_ROLE can read it"],ans:"A",exp:"OWNERSHIP = full control: create child objects, grant privileges, drop the object. SYSADMIN still has access via role hierarchy. Other roles unaffected unless explicitly revoked."},
{id:44,type:"mcq",topic:"File Format",difficulty:"medium",q:"NULL_IF=('NULL','null','','NA','N/A') in OLIST_CSV_FORMAT does what?",opts:["A) Rejects rows containing these strings","B) Converts these strings to SQL NULL when loading","C) Removes these strings from text fields","D) Only affects INTEGER and FLOAT columns"],ans:"B",exp:"NULL_IF tells the parser: when you encounter these exact strings, store as SQL NULL instead of the literal text. 'N/A' in an order date field becomes NULL in the table — clean and queryable."},
{id:45,type:"mcq",topic:"Architecture",difficulty:"hard",q:"A new account has SNOWFLAKE and SNOWFLAKE_SAMPLE_DATA databases. What should you know?",opts:["A) They're empty — use them as your project database","B) SNOWFLAKE is a system database for account metadata; SNOWFLAKE_SAMPLE_DATA has training datasets — never modify either","C) They can be safely dropped to free storage","D) Must be replicated to your region before use"],ans:"B",exp:"SNOWFLAKE contains ACCOUNT_USAGE views and system metadata. SNOWFLAKE_SAMPLE_DATA has TPC-DS training data. Both are system-managed. Always create your own project database and leave these alone."},
{id:46,type:"mcq",topic:"Warehouse",difficulty:"hard",q:"SHOPFLOW_WH is X-Small (1 credit/hr). A query takes 90 seconds. How many credits consumed?",opts:["A) 0.025 credits (90/3600)","B) 0.0167 credits (60/3600)","C) 1 credit (minimum 1 hour)","D) 0.033 credits (120/3600 — rounds up to next 60s)"],ans:"D",exp:"90 seconds exceeds the first 60s increment, so rounds up to 120 seconds: 120/3600 × 1 = 0.0333 credits. Billing is in 60-second increments after the first — every started increment is billed fully."},
{id:47,type:"mcq",topic:"Roles",difficulty:"hard",q:"SHOW GRANTS TO ROLE SHOPFLOW_ROLE shows no privilege on SHOPFLOW_DB. But the role owns it. Why?",opts:["A) A bug — SHOW GRANTS always appears empty for owned objects","B) OWNERSHIP appears in SHOW GRANTS ON DATABASE SHOPFLOW_DB not in SHOW GRANTS TO ROLE","C) The ownership was revoked automatically","D) SHOW GRANTS requires ACCOUNTADMIN for ownership"],ans:"B",exp:"SHOW GRANTS TO ROLE shows received privilege grants. OWNERSHIP appears in SHOW GRANTS ON <object>. Two different views: grants given TO a role vs grants ON an object. Common exam trap."},
{id:48,type:"mcq",topic:"Architecture",difficulty:"hard",q:"COPY CURRENT GRANTS in GRANT OWNERSHIP ... COPY CURRENT GRANTS — what does it preserve?",opts:["A) Copies database contents to a new location","B) Preserves existing grants on the object when ownership transfers — without it, all grants are revoked","C) Creates a backup before ownership transfer","D) Copies ownership to multiple roles simultaneously"],ans:"B",exp:"When ownership transfers, Snowflake by default revokes all grants made by the old owner. COPY CURRENT GRANTS preserves them. Without it, any roles granted SELECT on SHOPFLOW_DB lose access when ownership moves."},
{id:49,type:"mcq",topic:"Time Travel",difficulty:"hard",q:"You query RAW_ORDERS AT(OFFSET => -3600). What does this return?",opts:["A) Rows inserted more than 3600 seconds ago","B) The state of RAW_ORDERS as it existed 3600 seconds (1 hour) ago","C) The last 3600 rows in the table","D) Rows where _loaded_at > 3600 seconds in the past"],ans:"B",exp:"AT(OFFSET => -3600) = negative seconds relative to now = the table state 1 hour ago. Also valid: AT(TIMESTAMP => '...') for absolute point, or AT(STATEMENT => 'query_id') for before a specific DML."},
{id:50,type:"mcq",topic:"Stages",difficulty:"hard",q:"LIST @OLIST_STAGE shows files as .csv.gz. But you uploaded .csv via Snowsight UI. What happened?",opts:["A) Snowflake corrupted the files","B) Trick question — Snowsight UI does NOT compress files. They stay as .csv","C) FILE_FORMAT setting compressed them","D) Snowflake auto-compresses all internal stage files"],ans:"B",exp:"Common misconception. Snowsight UI does NOT auto-compress. Files stay exactly as uploaded. Only PUT (SnowSQL/connector) produces .gz. If LIST shows .csv.gz, files were uploaded via PUT."},
{id:51,type:"mcq",topic:"Architecture",difficulty:"hard",q:"Why set DATA_RETENTION=1 at both database level AND each schema level?",opts:["A) Database + schema settings are additive — 1+1=2 days","B) Schema-level overrides database-level. Setting both ensures consistent retention if someone changes the database setting","C) Snowflake requires both for Time Travel to work","D) Database controls stages; schema controls tables"],ans:"B",exp:"Schema-level DATA_RETENTION overrides database-level. Setting both: even if someone runs ALTER DATABASE SET DATA_RETENTION=0, schemas maintain their own retention independently. Defence in depth."},
{id:52,type:"mcq",topic:"File Format",difficulty:"hard",q:"EMPTY_FIELD_AS_NULL=TRUE with two consecutive commas ('abc,,def'). What does it produce?",opts:["A) Empty string ''","B) SQL NULL","C) Row is rejected as malformed","D) Previous field's value is repeated"],ans:"B",exp:"EMPTY_FIELD_AS_NULL=TRUE converts empty fields to SQL NULL. Without it, empty fields become empty strings ''. NULL means 'unknown/missing'; '' means 'present but empty'. For analytics, NULL is almost always correct."},
{id:53,type:"mcq",topic:"Roles",difficulty:"hard",q:"Minimum set of roles needed for the entire ShopFlow Phase 00 setup?",opts:["A) Only ACCOUNTADMIN","B) SYSADMIN (warehouse+database+schemas) and SECURITYADMIN (role creation+grants)","C) Only SYSADMIN","D) USERADMIN and SYSADMIN only"],ans:"B",exp:"SYSADMIN creates SHOPFLOW_WH, SHOPFLOW_DB, schemas, file format, stage, and RAW tables. SECURITYADMIN creates SHOPFLOW_ROLE and runs GRANT ROLE TO USER. Two roles, each for their designated purpose."},
{id:54,type:"mcq",topic:"Architecture",difficulty:"hard",q:"When should you use ACCOUNT_USAGE instead of INFORMATION_SCHEMA?",opts:["A) Never — INFORMATION_SCHEMA is always better","B) When you need history beyond 14 days, cross-database reporting, or account-level aggregates","C) ACCOUNT_USAGE is faster for large tables","D) ACCOUNT_USAGE is required for Time Travel queries"],ans:"B",exp:"INFORMATION_SCHEMA: real-time, current database only, 14-day max. ACCOUNT_USAGE: 45-min latency but 365-day history, full account coverage, includes QUERY_HISTORY and COPY_HISTORY."},
{id:55,type:"mcq",topic:"Warehouse",difficulty:"hard",q:"SHOPFLOW_WH running 3 hours with no queries. AUTO_SUSPEND=60 should have stopped it. Most likely cause?",opts:["A) AUTO_SUSPEND only works on Enterprise edition","B) A long-running query or open transaction keeps the warehouse active — AUTO_SUSPEND doesn't fire during active work","C) Warehouse is in ECONOMY mode which disables AUTO_SUSPEND","D) AUTO_SUSPEND requires SYSADMIN to enable after creation"],ans:"B",exp:"AUTO_SUSPEND fires only when truly idle — no running queries, no open transactions. An open transaction (even inside an uncommitted BEGIN block) keeps the warehouse active indefinitely. Always COMMIT or ROLLBACK before ending a session."},
{id:56,type:"mcq",topic:"Architecture",difficulty:"hard",q:"CREATE DATABASE SHOPFLOW_DB: SHOW SCHEMAS shows PUBLIC and INFORMATION_SCHEMA. Expected?",opts:["A) No — Snowflake shouldn't create auto-schemas","B) Yes — Snowflake automatically creates PUBLIC and INFORMATION_SCHEMA in every new database","C) No — PUBLIC was from a previous database","D) Yes — only if running as ACCOUNTADMIN"],ans:"B",exp:"Every new database gets PUBLIC (default schema) and INFORMATION_SCHEMA (system catalogue). Always present, cannot be dropped. Your 3 project schemas appear alongside them."},
{id:57,type:"mcq",topic:"Stages",difficulty:"hard",q:"Delete a specific incorrectly uploaded file from @OLIST_STAGE. What command?",opts:["A) DELETE FROM @OLIST_STAGE WHERE name='file.csv'","B) DROP FILE @OLIST_STAGE/file.csv","C) REMOVE @OLIST_STAGE/olist_orders_dataset.csv","D) TRUNCATE STAGE OLIST_STAGE"],ans:"C",exp:"REMOVE @stage/filename removes a specific file. TRUNCATE STAGE removes all files. LIST shows files. PUT uploads. REMOVE is the standard command for individual file deletion."},
{id:58,type:"mcq",topic:"Architecture",difficulty:"hard",q:"Fully qualified name for RAW_ORDERS and when must you use it?",opts:["A) SHOPFLOW_WH.SHOPFLOW_RAW.RAW_ORDERS — always include warehouse","B) SHOPFLOW_DB.SHOPFLOW_RAW.RAW_ORDERS — when the active schema is not SHOPFLOW_RAW","C) SHOPFLOW_ROLE.SHOPFLOW_DB.RAW_ORDERS — include role in path","D) Snowflake doesn't support fully qualified names"],ans:"B",exp:"Fully qualified: database.schema.object. Use when active schema differs from object's schema. Warehouses and roles are NOT part of the object path."},
{id:59,type:"mcq",topic:"Roles",difficulty:"hard",q:"CURRENT_ROLE() = 'SYSADMIN'. You run GRANT OWNERSHIP ON DATABASE SHOPFLOW_DB TO ROLE SHOPFLOW_ROLE. Valid?",opts:["A) No — must switch to SECURITYADMIN for all GRANTs","B) No — must use ACCOUNTADMIN for ownership transfer","C) No — SYSADMIN cannot grant ownership","D) Yes — SYSADMIN created and owns SHOPFLOW_DB, so it can transfer ownership"],ans:"D",exp:"The current owner of an object can transfer ownership to another role. SYSADMIN created SHOPFLOW_DB and owns it — so SYSADMIN can run this GRANT OWNERSHIP. No need to switch to SECURITYADMIN for this specific transfer."},
{id:60,type:"mcq",topic:"Architecture",difficulty:"hard",q:"A team member says: 'Skip SHOPFLOW_STAGED — just cast in SELECT queries against RAW.' Strongest counter-argument?",opts:["A) CAST doesn't work on VARCHAR in Snowflake","B) Every query repeats the same casting logic — one bug means fixing every query. STAGED centralises: fix once, all queries get it","C) RAW tables are locked after COPY INTO","D) Casting in SELECT uses more credits than CTAS"],ans:"B",exp:"DRY principle: if every query casts timestamps and handles NULLs, you have duplicated logic everywhere. STAGED centralises this — TRY_TO_TIMESTAMP lives in one place, all downstream work uses the already-cast column."},
{id:61,type:"multi",topic:"Architecture",difficulty:"easy",q:"Which correctly describe ShopFlow's Medallion Architecture layers? (Select ALL)",opts:["A) SHOPFLOW_RAW — exact copy of source data, all VARCHAR, never modified","B) SHOPFLOW_STAGED — type cast, deduplicated, NULL-handled, cleaned data","C) SHOPFLOW_ANALYTICS — star schema with FACT and DIM tables for BI queries","D) SHOPFLOW_STAGED is queried directly by analysts and dashboards","E) SHOPFLOW_RAW is rebuilt from Kaggle every time STAGED changes"],ans:["A","B","C"],exp:"A, B, C describe the three layers correctly. D is false: analysts query ANALYTICS. E is false: RAW is permanent — STAGED rebuilds from RAW, not vice versa."},
{id:62,type:"multi",topic:"Warehouse",difficulty:"easy",q:"Which SHOPFLOW_WH configuration settings minimise credit consumption? (Select ALL)",opts:["A) WAREHOUSE_SIZE = 'X-SMALL'","B) AUTO_SUSPEND = 60","C) AUTO_RESUME = TRUE","D) WAREHOUSE_SIZE = 'X-LARGE'","E) Manually suspending after work completes"],ans:["A","B","C","E"],exp:"A: X-Small sufficient for 100k rows. B: 60s auto-suspend stops idle billing. C: Auto-resume = no manual startup overhead. E: Manual suspend stops billing immediately without waiting 60s. D is wrong — larger = more expensive."},
{id:63,type:"multi",topic:"Roles",difficulty:"easy",q:"Which are Snowflake's five built-in system roles? (Select ALL)",opts:["A) ACCOUNTADMIN","B) SYSADMIN","C) SECURITYADMIN","D) USERADMIN","E) PUBLIC"],ans:["A","B","C","D","E"],exp:"All five: ACCOUNTADMIN (full control), SYSADMIN (infrastructure), SECURITYADMIN (roles+grants), USERADMIN (users+roles), PUBLIC (baseline for all users). Present in every Snowflake account from day one."},
{id:64,type:"multi",topic:"Stages",difficulty:"easy",q:"Which commands interact with Snowflake stages? (Select ALL)",opts:["A) LIST @stage_name — show files in stage","B) PUT file://path @stage — upload a file","C) REMOVE @stage/file.csv — delete a file","D) COPY INTO table FROM @stage — load into table","E) SELECT * FROM @stage — query file contents directly"],ans:["A","B","C","D"],exp:"A: LIST shows contents. B: PUT uploads (SnowSQL/connector only). C: REMOVE deletes. D: COPY INTO loads. E is false: you cannot SELECT from a stage — files must be loaded into a table first via COPY INTO."},
{id:65,type:"multi",topic:"Architecture",difficulty:"easy",q:"Which Snowflake objects were created in ShopFlow Phase 00? (Select ALL)",opts:["A) SHOPFLOW_WH","B) SHOPFLOW_DB","C) SHOPFLOW_ROLE","D) OLIST_STAGE","E) STG_ORDERS"],ans:["A","B","C","D"],exp:"A, B, C, D are Phase 00 setup objects. E (STG_ORDERS) is Phase 02 — it doesn't exist until Phase 02. Phase 00 creates infrastructure; data objects come later."},
{id:66,type:"multi",topic:"Time Travel",difficulty:"easy",q:"Which Time Travel AT syntax options are valid in Snowflake? (Select ALL)",opts:["A) AT(TIMESTAMP => '2024-01-15 09:00:00'::TIMESTAMP_NTZ)","B) AT(OFFSET => -3600) — 1 hour ago","C) AT(STATEMENT => 'query_id') — just before that query ran","D) AT(YESTERDAY) — shorthand for yesterday midnight","E) BEFORE(STATEMENT => 'query_id') — immediately before that statement"],ans:["A","B","C","E"],exp:"A: Absolute timestamp. B: Relative offset in seconds. C: Before a specific query. E: BEFORE syntax is valid. D is false: AT(YESTERDAY) is not valid Snowflake syntax."},
{id:67,type:"multi",topic:"File Format",difficulty:"medium",q:"Which file format settings in OLIST_CSV_FORMAT handle NULL values? (Select ALL)",opts:["A) NULL_IF = ('NULL','null','','NA','N/A')","B) EMPTY_FIELD_AS_NULL = TRUE","C) SKIP_HEADER = 1","D) FIELD_OPTIONALLY_ENCLOSED_BY = '\"'","E) ENCODING = UTF8"],ans:["A","B"],exp:"A: NULL_IF converts specific strings to SQL NULL. B: EMPTY_FIELD_AS_NULL converts empty fields to NULL. C handles headers, D handles quoted fields, E handles encoding — none are NULL-specific."},
{id:68,type:"multi",topic:"Architecture",difficulty:"medium",q:"Which metadata columns are added to every RAW table and what populates them? (Select ALL)",opts:["A) _loaded_at TIMESTAMP_NTZ DEFAULT CURRENT_TIMESTAMP() — auto-populated at COPY INTO time","B) _source_file VARCHAR — populated manually in each COPY INTO statement","C) _row_hash VARCHAR — Snowflake auto-generates for deduplication","D) _loaded_at is set to the file's last-modified timestamp","E) The _ prefix signals system metadata not business data"],ans:["A","B","E"],exp:"A: DEFAULT CURRENT_TIMESTAMP() fires at INSERT time. B: _source_file set explicitly in COPY INTO. E: Underscore prefix convention distinguishes audit from business columns. C and D are both false."},
{id:69,type:"multi",topic:"Roles",difficulty:"medium",q:"Which statements about Snowflake RBAC are correct? (Select ALL)",opts:["A) Privileges are granted to roles, not directly to users","B) A user can be assigned multiple roles but only one is active at a time","C) USE ROLE switches the active role for the current session","D) GRANT PRIVILEGE ON OBJECT TO USER is valid Snowflake syntax","E) Object ownership: the role that creates an object owns it by default"],ans:["A","B","C","E"],exp:"A: Always Privilege → Role → User. B: Many roles possible; one active at a time. C: USE ROLE changes session active role. E: Creator owns. D is false: you cannot grant privileges directly to users in Snowflake."},
{id:70,type:"multi",topic:"Architecture",difficulty:"medium",q:"Which objects live inside the SHOPFLOW_RAW schema? (Select ALL)",opts:["A) OLIST_CSV_FORMAT — named file format","B) OLIST_STAGE — internal stage","C) RAW_ORDERS and the other 8 RAW tables","D) SHOPFLOW_WH — virtual warehouse","E) STG_ORDERS and other STG tables"],ans:["A","B","C"],exp:"File formats and stages live inside schemas. OLIST_CSV_FORMAT, OLIST_STAGE, and all 9 RAW tables are in SHOPFLOW_RAW. D is false: warehouses are account-level. E is false: STG tables are in SHOPFLOW_STAGED."},
{id:71,type:"multi",topic:"Warehouse",difficulty:"medium",q:"Which are true about Snowflake warehouse sizing? (Select ALL)",opts:["A) Each size up doubles compute power and cost","B) X-Small=1, Small=2, Medium=4, Large=8, X-Large=16 credits/hr","C) Resizing requires dropping and recreating the warehouse","D) Larger warehouse runs queries faster but costs proportionally more","E) Multi-cluster warehouses scale out horizontally for concurrency"],ans:["A","B","D","E"],exp:"A: Doubling is exact. B: Credit rates are exactly these. D: Faster AND more expensive. E: Multi-cluster adds instances for concurrent workloads. C is false: ALTER WAREHOUSE resizes in place."},
{id:72,type:"multi",topic:"Time Travel",difficulty:"medium",q:"Which objects support Time Travel in Snowflake? (Select ALL)",opts:["A) Tables","B) Schemas","C) Databases","D) Stages","E) Virtual warehouses"],ans:["A","B","C"],exp:"Time Travel covers data storage objects: tables, schemas, databases. Stages (file storage) and warehouses (compute) have no row-level history to travel."},
{id:73,type:"multi",topic:"Stages",difficulty:"medium",q:"Which are correct about @OLIST_STAGE in ShopFlow? (Select ALL)",opts:["A) Named internal stage — Snowflake manages the file storage","B) FILE_FORMAT = OLIST_CSV_FORMAT attached — COPY INTO inherits it automatically","C) Files uploaded via Snowsight UI are stored as .csv.gz","D) LIST @OLIST_STAGE shows filename, size, and last-modified timestamp","E) The stage can only hold one file at a time"],ans:["A","B","D"],exp:"A: Named internal stage. B: Attached format = inherited by COPY INTO. D: LIST output includes name, size, md5, last_modified. C is false: UI stores .csv not .gz. E is false: a stage can hold many files."},
{id:74,type:"multi",topic:"Architecture",difficulty:"medium",q:"Which INFORMATION_SCHEMA views are used in ShopFlow Phase 00 verification? (Select ALL)",opts:["A) INFORMATION_SCHEMA.TABLES — table metadata including row_count","B) INFORMATION_SCHEMA.COLUMNS — column names and data types","C) INFORMATION_SCHEMA.LOAD_HISTORY — COPY INTO operation history","D) INFORMATION_SCHEMA.QUERY_HISTORY — all queries in the account","E) INFORMATION_SCHEMA is real-time with no latency"],ans:["A","B","E"],exp:"A: TABLES for row counts. B: COLUMNS for data type verification. E: Real-time, no latency. C is for Phase 01. D is false: QUERY_HISTORY is in ACCOUNT_USAGE (with latency), not INFORMATION_SCHEMA."},
{id:75,type:"multi",topic:"Roles",difficulty:"medium",q:"Which are correct about SHOPFLOW_ROLE created in Phase 00? (Select ALL)",opts:["A) Created with SECURITYADMIN role active","B) Needs USAGE on SHOPFLOW_WH to run any queries","C) Owns SHOPFLOW_DB after GRANT OWNERSHIP is run","D) Automatically gets ACCOUNTADMIN privileges as a new role","E) GRANT ROLE SHOPFLOW_ROLE TO USER assigns it to a specific user"],ans:["A","B","C","E"],exp:"A: SECURITYADMIN for CREATE ROLE. B: USAGE on warehouse mandatory. C: GRANT OWNERSHIP transfers control. E: Assigning role to user = GRANT ROLE TO USER. D is false: new roles have zero privileges."},
{id:76,type:"multi",topic:"Architecture",difficulty:"medium",q:"Which Snowflake concepts map to AWS equivalents in ShopFlow? (Select ALL)",opts:["A) Snowflake warehouse ≈ AWS EC2/RDS compute","B) Internal stage ≈ S3 bucket (raw landing zone)","C) SHOPFLOW_RAW schema ≈ S3 raw landing bucket","D) SHOPFLOW_ANALYTICS ≈ Redshift schema optimised for BI","E) Snowflake RBAC ≈ AWS IAM roles and policies"],ans:["A","B","C","D","E"],exp:"All five mappings are valid: compute, intermediate storage, raw landing, BI schema, and access control all have direct AWS parallels. These help AWS engineers map existing knowledge to Snowflake."},
{id:77,type:"multi",topic:"File Format",difficulty:"medium",q:"Which best practices does OLIST_CSV_FORMAT follow? (Select ALL)",opts:["A) Named reusable object — used across all 9 COPY INTO statements","B) Created inside SHOPFLOW_RAW schema","C) SKIP_HEADER=1 — avoids loading column headers as data","D) ERROR_ON_COLUMN_COUNT_MISMATCH=FALSE — handles 2 extra audit columns","E) Created fresh for each COPY INTO statement inline"],ans:["A","B","C","D"],exp:"A: Define once, reference by name. B: Schema-level scope. C: Headers skipped. D: Essential for audit-column mismatch. E is the anti-pattern — duplicated settings hard to maintain."},
{id:78,type:"multi",topic:"Warehouse",difficulty:"hard",q:"Which scenarios justify a LARGER warehouse for ShopFlow, even on a trial account? (Select ALL)",opts:["A) Loading all 9 CSV files via COPY INTO — one-time bulk ingestion","B) Running SELECT COUNT(*) on INFORMATION_SCHEMA.TABLES","C) Running a complex star schema JOIN across FACT_ORDERS and all 4 DIM tables","D) Running SHOW WAREHOUSES","E) Full rebuild of all STAGED tables from RAW in one session"],ans:["A","C","E"],exp:"Worth paying more for: A (bulk load finishes faster), C (heavy multi-table JOINs), E (full STAGED rebuild). B and D are metadata operations — use minimal or no warehouse compute."},
{id:79,type:"multi",topic:"Architecture",difficulty:"hard",q:"Valid reasons ShopFlow uses three schemas instead of one? (Select ALL)",opts:["A) Access control — grant ANALYTICS SELECT to analysts without exposing RAW","B) Blast radius control — drop and rebuild STAGED without touching RAW or ANALYTICS","C) Clarity — anyone opening Snowsight immediately knows which layer they're in","D) Performance — queries run faster with data spread across schemas","E) Snowflake requires separate schemas for VARCHAR and typed tables"],ans:["A","B","C"],exp:"A: Schema-level RBAC is cleaner than table-level grants. B: Medallion isolation — STAGED can be rebuilt while RAW and ANALYTICS stay intact. C: Naming clarity is real engineering value. D and E are both false."},
{id:80,type:"multi",topic:"Time Travel",difficulty:"hard",q:"Which correctly describe the relationship between Time Travel and Fail-safe? (Select ALL)",opts:["A) Fail-safe begins the moment Time Travel retention expires","B) Fail-safe is always exactly 7 days regardless of edition","C) Data in Fail-safe can be recovered via UNDROP commands","D) TT + Fail-safe gives maximum 97-day recovery window (90+7) on Enterprise","E) Both Time Travel and Fail-safe incur storage costs"],ans:["A","B","D","E"],exp:"A: Fail-safe starts after TT expires. B: 7 days, always, non-configurable. D: Enterprise 90-day TT + 7-day Fail-safe = 97 days theoretical max. E: Both cost extra storage. C is false: Fail-safe is Snowflake Support only — UNDROP only works within TT window."},
{id:81,type:"multi",topic:"Stages",difficulty:"hard",q:"True about the relationship between OLIST_STAGE and OLIST_CSV_FORMAT? (Select ALL)",opts:["A) File format is attached to stage at creation: FILE_FORMAT = OLIST_CSV_FORMAT","B) COPY INTO automatically inherits the format from the stage","C) ShopFlow still specifies FORMAT_NAME in COPY INTO explicitly as best practice","D) Attaching a file format to a stage is mandatory","E) The file format controls how files are parsed at PUT time"],ans:["A","B","C"],exp:"A: Stage created with FILE_FORMAT. B: Inheritance works automatically. C: ShopFlow specifies FORMAT_NAME anyway for clarity — explicit > implicit. D is false: format is optional on stage. E is false: format applies at COPY INTO time, not PUT time."},
