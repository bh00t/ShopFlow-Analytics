{id:82,type:"multi",topic:"Architecture",difficulty:"hard",q:"Which statements about Snowflake micro-partitions are correct? (Select ALL)",opts:["A) Snowflake divides all table data into micro-partitions of ~16MB compressed","B) Micro-partitions are immutable — new data creates new partitions","C) Column metadata (min, max, count) tracked per micro-partition for pruning","D) Users specify which micro-partition to INSERT into","E) Micro-partitions replace the need for manual indexing"],ans:["A","B","C","E"],exp:"A: ~16MB compressed target. B: Immutable by design. C: Column-level metadata enables pruning. E: Replaces traditional indexes. D is false: Snowflake manages partition layout entirely."},
{id:83,type:"multi",topic:"Roles",difficulty:"hard",q:"New engineer joins and needs to load data and run queries. Minimum required grants? (Select ALL)",opts:["A) GRANT ROLE SHOPFLOW_ROLE TO USER new_engineer","B) GRANT USAGE ON WAREHOUSE SHOPFLOW_WH TO ROLE SHOPFLOW_ROLE (if not already done)","C) GRANT ALL PRIVILEGES ON DATABASE SHOPFLOW_DB TO USER new_engineer","D) GRANT SELECT, INSERT ON ALL TABLES IN SCHEMA SHOPFLOW_RAW TO ROLE SHOPFLOW_ROLE","E) GRANT OWNERSHIP ON ACCOUNT TO ROLE SHOPFLOW_ROLE"],ans:["A","B"],exp:"SHOPFLOW_ROLE already owns SHOPFLOW_DB — granting the role to the user (A) gives full access. Warehouse USAGE (B) ensures query execution. C is wrong — grants go to roles not users. D is redundant if role owns the database. E is dangerous — never grant account ownership."},
{id:84,type:"multi",topic:"File Format",difficulty:"hard",q:"Which CSV parsing challenges does OLIST_CSV_FORMAT specifically address? (Select ALL)",opts:["A) Product descriptions containing commas — FIELD_OPTIONALLY_ENCLOSED_BY","B) Portuguese characters — ENCODING=UTF8","C) Missing delivery dates — NULL_IF and EMPTY_FIELD_AS_NULL","D) Extra audit columns in RAW tables — ERROR_ON_COLUMN_COUNT_MISMATCH=FALSE","E) Duplicate zip codes — SKIP_HEADER=0"],ans:["A","B","C","D"],exp:"A: Quoted commas. B: UTF-8 for Portuguese. C: Missing dates become NULL. D: 2 extra audit columns handled. E is false: duplicate zips are handled in Phase 02 with ROW_NUMBER+QUALIFY, not the file format."},
{id:85,type:"multi",topic:"Architecture",difficulty:"hard",q:"How does ShopFlow's RAW layer differ from traditional staging tables? (Select ALL)",opts:["A) All columns are VARCHAR — accepts any value without type validation","B) Two audit columns (_loaded_at, _source_file) added to every table","C) RAW is never truncated or modified — append-only by convention","D) RAW tables are auto-partitioned by _loaded_at for Time Travel","E) RAW serves as permanent source of truth — STAGED and ANALYTICS rebuild from it"],ans:["A","B","C","E"],exp:"A: All-VARCHAR RAW is the key design decision. B: Audit columns for lineage. C: Immutability by convention — golden rule of RAW. E: RAW is the origin of the entire pipeline. D is false: no _loaded_at clustering key unless explicitly set."},
{id:86,type:"multi",topic:"Warehouse",difficulty:"hard",q:"Which cost optimisation techniques apply to SHOPFLOW_WH on a $400 free trial? (Select ALL)",opts:["A) X-Small size — cheapest compute sufficient for the workload","B) AUTO_SUSPEND=60 — minimal idle time","C) Manually suspend at end of every notebook session","D) Use INFORMATION_SCHEMA for row counts instead of SELECT COUNT(*)","E) Run all 9 COPY INTO statements in one transaction to save credits"],ans:["A","B","C","D"],exp:"A: Right-sized warehouse. B: 60s auto-suspend. C: Manual suspend stops billing clock immediately. D: Metadata queries use no warehouse compute. E is false: transactions don't reduce warehouse credit consumption."},
{id:87,type:"multi",topic:"Architecture",difficulty:"hard",q:"Which AWS → Snowflake mappings are explicitly in the ShopFlow project context? (Select ALL)",opts:["A) SHOPFLOW_RAW ≈ S3 raw landing bucket","B) SHOPFLOW_STAGED ≈ Glue curated/cleaned S3 bucket","C) SHOPFLOW_ANALYTICS ≈ Redshift schema optimised for BI queries","D) SHOPFLOW_WH ≈ AWS Lambda function","E) OLIST_STAGE ≈ S3 staging prefix"],ans:["A","B","C"],exp:"The project context explicitly maps RAW ≈ S3 raw landing, STAGED ≈ Glue curated bucket, ANALYTICS ≈ Redshift BI schema. D is false: warehouse ≈ EC2/RDS compute, not Lambda. E is a reasonable analogy but not explicitly stated."},
{id:88,type:"multi",topic:"Stages",difficulty:"hard",q:"Operational differences between PUT (SnowSQL) and Snowsight UI for file upload? (Select ALL)",opts:["A) PUT auto-compresses to .gz; Snowsight UI stores as uploaded (.csv stays .csv)","B) PUT is available in Snowflake Notebooks","C) Snowsight UI works from any browser — zero tool setup","D) PUT requires SnowSQL CLI or a language connector","E) Files via PUT appear as .csv.gz in LIST; UI-uploaded appear as .csv"],ans:["A","C","D","E"],exp:"A and E: compression difference is the key operational distinction. C: Browser-based, no tools. D: PUT requires external tools. B is false: Snowflake Notebooks block outbound internet — PUT not available in Notebooks."},
{id:89,type:"multi",topic:"Roles",difficulty:"hard",q:"Which follow best practices for role usage demonstrated in ShopFlow Phase 00? (Select ALL)",opts:["A) Using SYSADMIN to create warehouses and databases — not ACCOUNTADMIN","B) Using SECURITYADMIN to create roles and run GRANT TO USER","C) Creating SHOPFLOW_ROLE as a project-specific role — not doing all work as SYSADMIN","D) Granting ACCOUNTADMIN to SHOPFLOW_ROLE for maximum flexibility","E) Never working as PUBLIC for database operations"],ans:["A","B","C","E"],exp:"A: SYSADMIN for infrastructure. B: SECURITYADMIN for access management. C: Project-specific roles limit blast radius. E: PUBLIC has near-zero privileges. D is the anti-pattern — giving project roles ACCOUNTADMIN breaks least-privilege."},
{id:90,type:"multi",topic:"Architecture",difficulty:"hard",q:"Which correctly describe SHOPFLOW_DB created in Phase 00? (Select ALL)",opts:["A) DATA_RETENTION=1 enables 24-hour Time Travel","B) Contains three project schemas: RAW, STAGED, ANALYTICS","C) Also auto-contains PUBLIC and INFORMATION_SCHEMA","D) The database stores compute resources alongside data","E) SHOPFLOW_ROLE owns it after GRANT OWNERSHIP is run"],ans:["A","B","C","E"],exp:"A: 1 day = 24-hour TT. B: Three project schemas. C: PUBLIC and INFORMATION_SCHEMA always exist. E: GRANT OWNERSHIP transfers control. D is false: databases store data only — compute is in the warehouse."},
{id:91,type:"multi",topic:"File Format",difficulty:"hard",q:"Implications of file format created at SHOPFLOW_RAW schema level? (Select ALL)",opts:["A) Format referenced by short name within SHOPFLOW_RAW","B) Cross-schema reference needs SHOPFLOW_DB.SHOPFLOW_RAW.OLIST_CSV_FORMAT","C) The format is invisible to SHOPFLOW_STAGED without fully qualified reference","D) DROP SCHEMA SHOPFLOW_RAW CASCADE would also drop OLIST_CSV_FORMAT","E) Schema-level formats are more performant than account-level formats"],ans:["A","B","C","D"],exp:"A: Short name within schema. B: Cross-schema needs full qualification. C: Other schemas don't see it by short name. D: CASCADE drops all child objects including file formats. E is false: scope affects visibility not performance."},
{id:92,type:"multi",topic:"Architecture",difficulty:"hard",q:"Which Phase 00 verification checks confirm readiness for Phase 01? (Select ALL)",opts:["A) SHOW WAREHOUSES LIKE 'SHOPFLOW%'","B) SHOW SCHEMAS IN DATABASE SHOPFLOW_DB — confirms 5 schemas","C) SHOW FILE FORMATS IN SCHEMA SHOPFLOW_RAW — confirms OLIST_CSV_FORMAT","D) SHOW STAGES IN SCHEMA SHOPFLOW_RAW — confirms OLIST_STAGE","E) SELECT COUNT(*) FROM RAW_ORDERS — confirms tables have data"],ans:["A","B","C","D"],exp:"A, B, C, D verify Phase 00 objects exist and are configured. E is wrong — RAW_ORDERS should be EMPTY before Phase 01 runs. row_count = 0 at this point is correct and expected."},
{id:93,type:"multi",topic:"Roles",difficulty:"hard",q:"How does Snowflake RBAC differ from traditional database permission systems? (Select ALL)",opts:["A) Privileges always granted to roles, never directly to users","B) Role inheritance: GRANT ROLE B TO ROLE A means A inherits B's privileges","C) Object ownership: the creating role owns the object and can grant access to others","D) ACCOUNTADMIN can bypass all access controls and see all data","E) Snowflake role privileges apply across all sessions using that role"],ans:["A","B","C","E"],exp:"A: Privilege → Role → User always. B: Role hierarchy with inheritance. C: Owner = full control + can grant to others. E: Roles are session-level — USE ROLE activates different privilege set. D is false: ACCOUNTADMIN is subject to masking policies and row access policies."},
{id:94,type:"multi",topic:"Architecture",difficulty:"hard",q:"DATA_RETENTION=1 set on SHOPFLOW_DB and all 3 schemas. Which objects have Time Travel? (Select ALL)",opts:["A) SHOPFLOW_DB database level","B) SHOPFLOW_RAW schema","C) SHOPFLOW_STAGED schema","D) SHOPFLOW_ANALYTICS schema","E) Individual RAW tables inherit schema-level retention unless overridden"],ans:["A","B","C","D","E"],exp:"All five correct: database (A), each schema (B, C, D) explicitly set retention=1. Tables (E) inherit from schema unless they have their own setting. Belt-and-suspenders ensures Time Travel works at every level."},
{id:95,type:"multi",topic:"Warehouse",difficulty:"hard",q:"How do Snowflake virtual warehouses differ from traditional database servers? (Select ALL)",opts:["A) Warehouses suspend and resume in seconds — no data loss","B) Multiple warehouses query the same database simultaneously without contention","C) Warehouse size changed without dropping and recreating","D) Warehouse must be in same region as database","E) Suspending has zero impact on data availability"],ans:["A","B","C","E"],exp:"A: Near-instant suspend/resume. B: Multiple warehouses = no storage contention. C: ALTER WAREHOUSE resize in place. E: Compute and storage are independent. D is false — not a constraint that exists as framed."},
{id:96,type:"multi",topic:"Time Travel",difficulty:"hard",q:"Developer accidentally DELETEs all delivered orders at 2pm. DATA_RETENTION=1. It's 3pm. Valid recovery options? (Select ALL)",opts:["A) UNDROP TABLE RAW_ORDERS — recovers before the delete","B) INSERT INTO RAW_ORDERS SELECT * FROM RAW_ORDERS AT(OFFSET => -3600) WHERE order_status='delivered'","C) CREATE TABLE RAW_ORDERS_BACKUP AS SELECT * FROM RAW_ORDERS BEFORE(STATEMENT => 'delete_query_id')","D) SELECT * FROM RAW_ORDERS AT(TIMESTAMP => '14:00:00'::TIMESTAMP_NTZ) to query the historical state","E) TRUNCATE TABLE RAW_ORDERS — then reload from stage"],ans:["B","C","D"],exp:"B: Re-insert deleted rows using AT(OFFSET). C: Create backup table using BEFORE(STATEMENT). D: Query historical state (but doesn't restore). A is wrong: UNDROP is for dropped tables, not DELETE operations. E makes things worse — removes all remaining rows."},
{id:97,type:"multi",topic:"Architecture",difficulty:"hard",q:"Why use OLIST_CSV_FORMAT as a named object rather than inline FILE_FORMAT options? (Select ALL)",opts:["A) DRY principle — define once, reference across all 9 COPY INTO statements","B) If encoding changes UTF8→UTF16, update one object instead of 9 statements","C) Named formats mandatory for internal stages — inline not supported","D) Named formats can be shared across schemas and databases","E) Easier to audit — SHOW FILE FORMATS and DESCRIBE FILE FORMAT show all settings"],ans:["A","B","D","E"],exp:"A: One definition, many uses. B: Change once, affects all. D: Cross-schema use with fully qualified name. E: Operational visibility. C is false: inline FILE_FORMAT options are fully supported."},
{id:98,type:"multi",topic:"Roles",difficulty:"hard",q:"Which correctly describe the five system roles and their primary responsibilities? (Select ALL)",opts:["A) ACCOUNTADMIN — full account control including billing, replication, organisation","B) SYSADMIN — creates and manages warehouses, databases, schemas, tables","C) SECURITYADMIN — manages users, roles, and all privilege grants","D) USERADMIN — creates users and manages roles they own","E) PUBLIC — has SELECT on all tables by default"],ans:["A","B","C","D"],exp:"A, B, C, D are all correct. E is false: PUBLIC has essentially no data access by default. Any data access must be explicitly granted even to PUBLIC."},
{id:99,type:"multi",topic:"Architecture",difficulty:"hard",q:"What happens when CREATE OR REPLACE TABLE RAW_ORDERS is run on a table with 99,441 rows? (Select ALL that are true)",opts:["A) The existing table is dropped and a new empty table is created","B) All 99,441 rows are permanently deleted from the live table","C) The old table version is available via Time Travel if DATA_RETENTION > 0","D) Downstream views or tasks referencing RAW_ORDERS continue working","E) The operation is atomic — RAW_ORDERS always exists"],ans:["A","B","C","E"],exp:"A: DROP+CREATE is what CREATE OR REPLACE does. B: Data gone from live table. C: Time Travel retains the dropped version. E: Atomic operation. D is false: views and tasks may break if the schema changes."},
{id:100,type:"multi",topic:"Stages",difficulty:"hard",q:"All valid ways to reference @OLIST_STAGE in Snowflake SQL? (Select ALL)",opts:["A) @OLIST_STAGE — when SHOPFLOW_RAW is the active schema","B) @SHOPFLOW_RAW.OLIST_STAGE — schema-qualified","C) @SHOPFLOW_DB.SHOPFLOW_RAW.OLIST_STAGE — fully qualified","D) @SHOPFLOW_WH.SHOPFLOW_RAW.OLIST_STAGE — warehouse-qualified","E) @~OLIST_STAGE — user stage shorthand with name appended"],ans:["A","B","C"],exp:"A: Short name when schema is active. B: Schema-qualified from any schema in same DB. C: Fully qualified from any session. D is false: warehouses are not part of the object path. E is false: @~ is the user stage, not a prefix for named stages."},
];
const QUIZ_POOL_P1=[
{id:101,type:"tf",topic:"COPY INTO",difficulty:"easy",q:"COPY INTO is idempotent by default — running it twice on the same staged file will NOT create duplicate rows.",ans:true,exp:"TRUE. Snowflake tracks loaded file metadata (filename, size, last-modified). Re-running COPY INTO returns SKIPPED for already-loaded files. Use FORCE=TRUE to override — but that may create duplicates."},
{id:102,type:"tf",topic:"COPY INTO",difficulty:"easy",q:"PURGE=FALSE in COPY INTO means staged files are deleted immediately after a successful load.",ans:false,exp:"FALSE. PURGE=FALSE means files are KEPT in the stage. PURGE=TRUE deletes them post-load. ShopFlow uses PURGE=FALSE — files retained for potential reloads."},
{id:103,type:"tf",topic:"Data Loading",difficulty:"easy",q:"Files uploaded to an internal stage via Snowsight UI are automatically compressed to .gz format.",ans:false,exp:"FALSE. Only PUT (via SnowSQL or Python connector) auto-compresses to .gz. Snowsight UI stores files exactly as uploaded. Your COPY INTO FROM path must match what LIST shows."},
{id:104,type:"tf",topic:"COPY INTO",difficulty:"easy",q:"COPY INTO with ON_ERROR='CONTINUE' skips bad individual rows but continues loading remaining valid rows from the same file.",ans:true,exp:"TRUE. CONTINUE skips rows that fail to parse and loads the rest. SKIP_FILE skips the entire file on any error. ABORT_STATEMENT (default) stops everything on first error."},
{id:105,type:"tf",topic:"Data Loading",difficulty:"easy",q:"_loaded_at column is populated when COPY INTO executes, not when the stage file was originally uploaded.",ans:true,exp:"TRUE. DEFAULT CURRENT_TIMESTAMP() fires at INSERT time — when COPY INTO writes the row. All rows in one batch share the same _loaded_at, making it easy to identify when a specific load ran."},
{id:106,type:"tf",topic:"COPY INTO",difficulty:"easy",q:"FORCE=TRUE guarantees no duplicate rows because Snowflake deduplicates automatically during the forced reload.",ans:false,exp:"FALSE. FORCE=TRUE bypasses the idempotency check and loads the file regardless. It does NOT deduplicate — you get duplicate rows. Always TRUNCATE or DELETE before forced reloads."},
{id:107,type:"tf",topic:"Verification",difficulty:"easy",q:"INFORMATION_SCHEMA.TABLES.row_count provides the exact live row count and is always 100% accurate.",ans:false,exp:"FALSE. row_count is approximate metadata — no warehouse credits consumed. For guaranteed exact count, run SELECT COUNT(*) which scans the full table."},
{id:108,type:"tf",topic:"COPY INTO",difficulty:"easy",q:"ON_ERROR='SKIP_FILE' skips individual bad rows within a file while loading good rows from the same file.",ans:false,exp:"FALSE. SKIP_FILE abandons the ENTIRE file the moment any error is found. CONTINUE is the option that skips individual bad rows. SKIP_FILE prioritises file integrity over partial loads."},
{id:109,type:"tf",topic:"Data Loading",difficulty:"medium",q:"Snowflake Notebooks can use the Kaggle API to download CSV files directly into the notebook runtime.",ans:false,exp:"FALSE. Snowflake Notebook compute has no outbound internet access. Files must be downloaded to your local machine then uploaded to @OLIST_STAGE via Snowsight UI."},
{id:110,type:"tf",topic:"COPY INTO",difficulty:"medium",q:"STATUS='SKIPPED' in COPY INTO output always means the file had errors and was skipped due to ON_ERROR='SKIP_FILE'.",ans:false,exp:"FALSE. SKIPPED has two meanings: (1) file already loaded — idempotency, or (2) errors triggered SKIP_FILE. Check ERROR_COUNT — if 0, the skip was idempotency, not errors."},
{id:111,type:"tf",topic:"Verification",difficulty:"medium",q:"INFORMATION_SCHEMA.LOAD_HISTORY has up to 45-minute latency — you may need to wait after COPY INTO.",ans:false,exp:"FALSE. INFORMATION_SCHEMA.LOAD_HISTORY is real-time. The 45-minute latency applies to SNOWFLAKE.ACCOUNT_USAGE.COPY_HISTORY, not INFORMATION_SCHEMA."},
{id:112,type:"tf",topic:"Data Loading",difficulty:"medium",q:"RAW_GEOLOCATION has ~1,000,163 rows — the largest of the 9 RAW tables by row count.",ans:true,exp:"TRUE. RAW_GEOLOCATION maps every Brazilian zip code prefix to lat/lng with multiple entries per zip. The largest table by far — next largest is RAW_PAYMENTS at ~103,886."},
{id:113,type:"tf",topic:"COPY INTO",difficulty:"medium",q:"The _source_file column in RAW tables is automatically populated by Snowflake during COPY INTO.",ans:false,exp:"FALSE. _source_file must be explicitly set in the COPY INTO statement using METADATA$FILENAME or a hardcoded string. _loaded_at auto-populates via DEFAULT, but _source_file requires manual specification."},
{id:114,type:"tf",topic:"Verification",difficulty:"medium",q:"After a successful COPY INTO, running it again on the same file without FORCE=TRUE returns rows_loaded=0.",ans:true,exp:"TRUE. The second run returns STATUS='SKIPPED' and rows_loaded=0 — idempotency detected the file was already loaded. This is by design — safe re-runs are a key operational property."},
{id:115,type:"tf",topic:"Data Loading",difficulty:"medium",q:"RAW_ORDERS and RAW_CUSTOMERS have the same row count (~99,441) because every order has exactly one customer record.",ans:true,exp:"TRUE. Each order has one customer record (with customer_id being per-order). This 1:1 relationship between orders and customer records produces equal row counts."},
{id:116,type:"tf",topic:"COPY INTO",difficulty:"hard",q:"COPY INTO tracks loaded files by a combination of filename, file size, and last-modified timestamp.",ans:true,exp:"TRUE. All three together form the file identity for idempotency tracking. Re-upload the same file with a new modification timestamp and Snowflake sees it as a 'new' file."},
{id:117,type:"tf",topic:"Data Loading",difficulty:"hard",q:"The Olist dataset uses customer_id as a true unique person identifier — each person has exactly one customer_id.",ans:false,exp:"FALSE. customer_id is per-order, not per-person. One person placing 5 orders has 5 different customer_ids. customer_unique_id is the true unique person identifier."},
{id:118,type:"tf",topic:"COPY INTO",difficulty:"hard",q:"ON_ERROR='ABORT_STATEMENT' is the safest choice for all production data pipelines.",ans:false,exp:"FALSE. 'Safest' depends on context. ABORT ensures no partial loads but one bad file blocks all others. SKIP_FILE often preferred: bad files skipped, good files load. The right choice depends on your data contracts."},
{id:119,type:"tf",topic:"Verification",difficulty:"hard",q:"INFORMATION_SCHEMA.LOAD_HISTORY retains records for 365 days.",ans:false,exp:"FALSE. INFORMATION_SCHEMA.LOAD_HISTORY retains 14 days. For 365-day retention, use SNOWFLAKE.ACCOUNT_USAGE.COPY_HISTORY — which has ~45-minute latency but covers the full account."},
{id:120,type:"tf",topic:"Data Loading",difficulty:"hard",q:"All rows from all 9 CSV files share the same _loaded_at timestamp if all COPY INTO statements run in the same session.",ans:false,exp:"FALSE. Each COPY INTO runs at a different moment. _loaded_at = CURRENT_TIMESTAMP() fires when each row is inserted — RAW_ORDERS rows get the timestamp of when that specific COPY INTO ran."},
{id:121,type:"tf",topic:"COPY INTO",difficulty:"hard",q:"COPY INTO PURGE=TRUE permanently deletes the stage file — it cannot be recovered even with Time Travel.",ans:true,exp:"TRUE. PURGE=TRUE removes the file from the internal stage. Time Travel covers table data history, not stage file history. Once purged, the stage file is gone permanently."},
{id:122,type:"tf",topic:"Verification",difficulty:"hard",q:"LOAD_HISTORY shows one row per COPY INTO execution per table, regardless of how many files were loaded.",ans:false,exp:"FALSE. LOAD_HISTORY shows one row per FILE per COPY INTO execution. If one COPY INTO loads 5 files via pattern match, LOAD_HISTORY shows 5 rows — one per file."},
{id:123,type:"tf",topic:"Data Loading",difficulty:"hard",q:"The 5 Phase 01 data quality checks all run against RAW tables before any STAGED transformation.",ans:true,exp:"TRUE. Phase 01 quality checks run directly against RAW to understand data before transforming. Correct approach — verify what you loaded in RAW, then design STAGED transformations based on findings."},
{id:124,type:"tf",topic:"COPY INTO",difficulty:"hard",q:"FORMAT_NAME must always be specified in the COPY INTO statement — it cannot be inherited from the stage.",ans:false,exp:"FALSE. If a stage has FILE_FORMAT attached at creation, COPY INTO inherits it automatically. ShopFlow specifies it explicitly for clarity, but it's not strictly required when the stage has the format attached."},
{id:125,type:"tf",topic:"Data Loading",difficulty:"hard",q:"RAW_CATEGORY_TRANSLATION has only ~71 rows but is critical because it enables English category analysis across STAGED and ANALYTICS.",ans:true,exp:"TRUE. The tiny translation table maps Portuguese to English. Without it, all product categories would be in Portuguese. STG_PRODUCTS LEFT JOINs to it to add product_category_name_english."},
{id:126,type:"mcq",topic:"COPY INTO",difficulty:"easy",q:"COPY INTO for RAW_ORDERS returns status='SKIPPED'. The file has not changed. Most likely cause?",opts:["A) Warehouse was suspended during the load","B) File was already successfully loaded in a previous run — idempotency skipped it","C) Table schema does not match the file","D) Stage file has been corrupted"],ans:"B",exp:"A SKIPPED result with ERROR_COUNT=0 means this exact file was already successfully loaded. Idempotency is working correctly. Use FORCE=TRUE to reload — but expect duplicate rows."},
{id:127,type:"mcq",topic:"COPY INTO",difficulty:"easy",q:"ON_ERROR='SKIP_FILE' — a CSV file has one parsing error. What happens?",opts:["A) Bad row is logged and skipped; all other rows load","B) Entire file is skipped — no rows from that file are loaded","C) Load pauses and waits for user input","D) Snowflake auto-corrects the bad value"],ans:"B",exp:"SKIP_FILE abandons the entire file on the first error. Different from CONTINUE (which skips individual bad rows). If a file is bad, skip it and load the other 8 successfully."},
{id:128,type:"mcq",topic:"Verification",difficulty:"easy",q:"Confirm RAW_ORDERS loaded 99,441 rows without SELECT COUNT(*). Which query gives row count metadata instantly?",opts:["A) SELECT COUNT(*) FROM SHOPFLOW_RAW.RAW_ORDERS","B) SELECT row_count FROM SHOPFLOW_DB.INFORMATION_SCHEMA.TABLES WHERE table_name='RAW_ORDERS'","C) SHOW TABLES LIKE 'RAW_ORDERS'","D) DESCRIBE TABLE RAW_ORDERS"],ans:"B",exp:"INFORMATION_SCHEMA.TABLES.row_count is metadata — no warehouse compute, instant. SELECT COUNT(*) scans the full table and costs credits. SHOW TABLES also shows row count but INFORMATION_SCHEMA is more query-friendly."},
{id:129,type:"mcq",topic:"Data Loading",difficulty:"easy",q:"Why does COPY INTO reference 'olist_orders_dataset.csv' (not .csv.gz) in ShopFlow?",opts:["A) Snowflake only supports .csv extension","B) Files uploaded via Snowsight UI do NOT auto-compress — they stay as .csv","C) FILE_FORMAT setting COMPRESSION=NONE forces no compression","D) .gz files can't load into VARCHAR columns"],ans:"B",exp:"Snowsight UI uploads as-is — no compression. So olist_orders_dataset.csv in the stage IS named .csv. If uploaded via PUT, they would be .csv.gz. The COPY INTO path must match exactly what LIST @OLIST_STAGE shows."},
{id:130,type:"mcq",topic:"COPY INTO",difficulty:"easy",q:"PURGE=FALSE in COPY INTO — what happens to staged files?",opts:["A) Files deleted from stage after successful load","B) Files kept in stage after loading — available for reload or audit","C) Files moved to backup stage","D) Files compressed to save space"],ans:"B",exp:"PURGE=FALSE keeps files in the stage. ShopFlow default — files stay for re-examination, reload with FORCE=TRUE, or audit. PURGE=TRUE would delete post-load."},
{id:131,type:"mcq",topic:"Verification",difficulty:"easy",q:"Key difference between INFORMATION_SCHEMA.LOAD_HISTORY and SNOWFLAKE.ACCOUNT_USAGE.COPY_HISTORY?",opts:["A) LOAD_HISTORY for CSV only; COPY_HISTORY covers all file types","B) LOAD_HISTORY: real-time, 14-day retention, current database; COPY_HISTORY: ~45min latency, 365-day retention, entire account","C) They are identical with different names","D) COPY_HISTORY only shows failed loads"],ans:"B",exp:"Use LOAD_HISTORY immediately after loading (no latency, 14 days). Use COPY_HISTORY for audits older than 14 days or cross-database investigation (45-min latency, 365 days, full account)."},
{id:132,type:"mcq",topic:"Data Loading",difficulty:"easy",q:"Which check confirms order dates have a meaningful range and aren't all identical?",opts:["A) SELECT COUNT(*) FROM RAW_ORDERS","B) SELECT MIN(order_purchase_timestamp), MAX(order_purchase_timestamp) FROM RAW_ORDERS","C) SHOW TABLES LIKE 'RAW_ORDERS'","D) SELECT DISTINCT order_status FROM RAW_ORDERS"],ans:"B",exp:"MIN and MAX of the timestamp column shows the date range. The Olist dataset spans 2016-2018, so you expect MIN around 2016 and MAX around 2018. Identical MIN/MAX would suggest a loading error."},
{id:133,type:"mcq",topic:"COPY INTO",difficulty:"easy",q:"Which COPY INTO option makes it safe to run the same statement multiple times without creating duplicates?",opts:["A) PURGE=TRUE","B) ON_ERROR='CONTINUE'","C) The default behaviour — idempotency tracks loaded files automatically","D) DEDUPLICATE=TRUE"],ans:"C",exp:"No special option needed — COPY INTO is idempotent by default. Snowflake tracks every loaded file's metadata. Subsequent runs return SKIPPED automatically. FORCE=TRUE is what DISABLES this protection."},
{id:134,type:"mcq",topic:"Data Loading",difficulty:"medium",q:"COPY INTO returns rows_parsed=99441 but rows_loaded=0 with status='SKIPPED'. What happened?",opts:["A) All rows had parsing errors","B) File was already loaded in a previous session — idempotency protection skipped it","C) Warehouse ran out of credits mid-load","D) Table was full — no more rows could be inserted"],ans:"B",exp:"rows_parsed shows the file was read (99,441 rows). rows_loaded=0 with SKIPPED = idempotency prevented duplicate load. Check LOAD_HISTORY to see when the original load ran."},
{id:135,type:"mcq",topic:"COPY INTO",difficulty:"medium",q:"COPY INTO RAW_GEOLOCATION returns ERROR_COUNT=47 with ON_ERROR='CONTINUE'. What happened?",opts:["A) Entire file skipped due to 47 errors","B) 47 rows failed to parse and were skipped; remaining ~999,116 rows loaded successfully","C) Load failed completely — CONTINUE only applies if ERROR_COUNT < 10","D) 47 error rows inserted with all-NULL values"],ans:"B",exp:"ON_ERROR='CONTINUE' skips individual bad rows and loads everything else. 47 rows couldn't be parsed, but ~999,116 rows loaded. Error details are in LOAD_HISTORY's first_error and error_count fields."},
{id:136,type:"mcq",topic:"Verification",difficulty:"medium",q:"Which check confirms no orders are referencing non-existent customers?",opts:["A) SELECT COUNT(*) FROM RAW_ORDERS","B) SELECT COUNT(*) FROM RAW_ORDERS o LEFT JOIN RAW_CUSTOMERS c ON o.customer_id=c.customer_id WHERE c.customer_id IS NULL","C) SELECT DISTINCT customer_id FROM RAW_ORDERS","D) SHOW TABLES IN SCHEMA SHOPFLOW_RAW"],ans:"B",exp:"A LEFT JOIN with WHERE c.customer_id IS NULL finds orphan order records. 0 rows = all orders have valid customer references. Basic referential integrity check before building STAGED layer."},
{id:137,type:"mcq",topic:"Data Loading",difficulty:"medium",q:"Phase 01 review score check shows ~57% are 5-star. Is this a data loading error?",opts:["A) Yes — scores shouldn't be so skewed","B) No — high 5-star concentration is typical in e-commerce datasets","C) Yes — some 1-star reviews converted to 5-stars during loading","D) No — the dataset is from a test environment"],ans:"B",exp:"High 5-star concentration is typical in e-commerce. Satisfied customers who don't review + unhappy or very happy customers who do. The 57% figure is real production data donated by Olist — not a loading error."},
{id:138,type:"mcq",topic:"COPY INTO",difficulty:"medium",q:"COPY INTO RAW_PRODUCTS returns status='LOAD_FAILED'. First place to look for details?",opts:["A) SHOW WAREHOUSES — check if warehouse suspended","B) SELECT first_error FROM INFORMATION_SCHEMA.LOAD_HISTORY WHERE table_name='RAW_PRODUCTS'","C) SELECT * FROM RAW_PRODUCTS LIMIT 1","D) SHOW FILE FORMATS — check if OLIST_CSV_FORMAT deleted"],ans:"B",exp:"INFORMATION_SCHEMA.LOAD_HISTORY has first_error (exact error message), first_error_line, and first_error_column — exactly what you need to diagnose a parsing failure. Always first diagnostic step for LOAD_FAILED."},
{id:139,type:"mcq",topic:"Data Loading",difficulty:"medium",q:"Phase 01 Check 5 joins RAW_PRODUCTS to RAW_CATEGORY_TRANSLATION with LEFT JOIN. Why not INNER JOIN?",opts:["A) LEFT JOIN is faster for large tables","B) Some products have NULL or unrecognised category — LEFT JOIN keeps them with 'uncategorised'; INNER JOIN excludes them","C) INNER JOIN not supported in Snowflake","D) Translation table too small for INNER JOIN"],ans:"B",exp:"Products with no matching translation would be silently dropped by INNER JOIN. LEFT JOIN keeps all products and shows 'uncategorised' via COALESCE. Complete picture of the product catalogue."},
{id:140,type:"mcq",topic:"COPY INTO",difficulty:"medium",q:"RAW_ORDERS needs to be reloaded from scratch due to a parsing issue. Correct sequence?",opts:["A) Run COPY INTO again — Snowflake overwrites old rows","B) TRUNCATE TABLE RAW_ORDERS, fix the staged file, then COPY INTO with FORCE=TRUE","C) DROP TABLE RAW_ORDERS, recreate it, then COPY INTO","D) DELETE FROM RAW_ORDERS, then COPY INTO without FORCE=TRUE"],ans:"B",exp:"TRUNCATE removes all rows. Fix source file (re-upload corrected version). FORCE=TRUE bypasses idempotency since file metadata may not have changed. TRUNCATE is faster than DELETE for full table clears."},
{id:141,type:"mcq",topic:"Verification",difficulty:"medium",q:"NULL check on RAW_ORDERS shows null_delivery_date = 17,000. Is this a data quality problem?",opts:["A) Yes — every order must have a delivery date","B) No — orders with status 'processing', 'shipped', or 'cancelled' have not been delivered and legitimately have NULL delivery dates","C) Yes — NULL in VARCHAR means encoding errors","D) No — NULLs in RAW are always correct because NULL_IF filters bad values"],ans:"B",exp:"NULL delivery dates are EXPECTED for undelivered orders. Only 'delivered' orders have an actual delivery date. This is a meaningful NULL — not a data quality error. Phase 02 keeps delivery_delay_days as NULL for undelivered orders."},
{id:142,type:"mcq",topic:"COPY INTO",difficulty:"medium",q:"Why does each COPY INTO specify a single filename rather than a pattern match?",opts:["A) Pattern matching not supported for internal stages","B) Single filename ensures exactly the right file loads into the right table — no accidental cross-loading","C) Pattern matching would load all 9 files into every table","D) Single filename required when ERROR_ON_COLUMN_COUNT_MISMATCH=FALSE is set"],ans:"B",exp:"Each RAW table has a different schema. Loading the wrong file into the wrong table silently inserts bad data (all VARCHAR). Explicit filename: orders CSV → RAW_ORDERS, products CSV → RAW_PRODUCTS. Precision over convenience."},
{id:143,type:"mcq",topic:"Data Loading",difficulty:"medium",q:"Phase 01 confirms RAW_PAYMENTS has ~103,886 rows but RAW_ORDERS only ~99,441. Why more payment rows?",opts:["A) Some payments failed and retried — duplicate rows","B) An order can have multiple payment rows — one per payment method used","C) RAW_PAYMENTS includes cancelled orders while RAW_ORDERS excludes them","D) COPY INTO for payments loaded the file twice accidentally"],ans:"B",exp:"RAW_PAYMENTS has one row per payment method per order. Order paid with two methods (voucher + credit card) = 2 payment rows. SUM(payment_value) GROUP BY order_id gives total order value."},
{id:144,type:"mcq",topic:"COPY INTO",difficulty:"hard",q:"Developer sets FORCE=TRUE on every COPY INTO in their daily pipeline. What risk does this create?",opts:["A) FORCE=TRUE makes queries slower","B) Each run loads the file again — rows accumulate as duplicates over time","C) FORCE=TRUE causes COPY INTO to fail if the file hasn't changed","D) FORCE=TRUE only works on the first 10 runs"],ans:"B",exp:"FORCE=TRUE disables idempotency. Every pipeline run reloads — RAW_ORDERS would have 99k rows day 1, 198k day 2, etc. All downstream tables would double-count. FORCE=TRUE only for specific deliberate reload scenarios."},
{id:145,type:"mcq",topic:"Verification",difficulty:"hard",q:"INFORMATION_SCHEMA.LOAD_HISTORY is filtered WHERE SCHEMA_NAME='SHOPFLOW_RAW'. Why this filter?",opts:["A) Without it the query fails — SCHEMA_NAME is required","B) LOAD_HISTORY covers the entire database — filtering by schema shows only RAW layer loads, not future STAGED loads","C) SCHEMA_NAME filter improves performance by 10x","D) Without filter, LOAD_HISTORY shows only the most recent load"],ans:"B",exp:"INFORMATION_SCHEMA.LOAD_HISTORY covers all tables in the database. Filtering WHERE SCHEMA_NAME='SHOPFLOW_RAW' isolates Phase 01 RAW loads from other COPY INTO operations. Precise filtering gives precise results."},
{id:146,type:"mcq",topic:"Data Loading",difficulty:"hard",q:"_source_file='olist_orders_dataset.csv' in RAW_ORDERS rows. 6 months later you need to reload orders data. Exact command enabling surgical reload?",opts:["A) TRUNCATE TABLE RAW_ORDERS","B) DELETE FROM RAW_ORDERS WHERE _source_file='olist_orders_dataset.csv', then COPY INTO FORCE=TRUE","C) DROP TABLE RAW_ORDERS CASCADE","D) CREATE OR REPLACE TABLE RAW_ORDERS AS SELECT * FROM RAW_ORDERS WHERE _source_file != 'olist_orders_dataset.csv'"],ans:"B",exp:"DELETE WHERE _source_file removes exactly those rows while leaving any other loaded data intact. Then COPY INTO FORCE=TRUE reloads. This is the exact pattern _source_file was designed for."},
{id:147,type:"mcq",topic:"COPY INTO",difficulty:"hard",q:"COPY INTO references '@OLIST_STAGE/olist_orders_dataset.csv' but LIST shows 'olist_orders_dataset.csv.gz'. What happens?",opts:["A) COPY INTO auto-detects .gz and loads anyway","B) COPY INTO fails with 'File not found' — path must exactly match LIST output","C) Snowflake automatically tries both .csv and .csv.gz","D) Load succeeds but only half the rows load"],ans:"B",exp:"COPY INTO uses the exact path specified. If LIST shows .csv.gz but COPY INTO references .csv — file not found, 0 rows loaded. Why ShopFlow uses .csv — files were uploaded via Snowsight UI, so LIST shows them as .csv."},
{id:148,type:"mcq",topic:"Data Loading",difficulty:"hard",q:"Phase 01 Check 2 casts payment_value::FLOAT inline in the RAW query. Why cast here if RAW is all-VARCHAR?",opts:["A) VARCHAR values cannot appear in AVG() calls","B) AVG() on VARCHAR could sort alphabetically — explicit FLOAT cast ensures correct numeric average","C) FLOAT required for GROUP BY operations","D) Casting is needed before any window function"],ans:"B",exp:"Snowflake can implicitly cast VARCHAR to FLOAT for aggregations, but explicit cast makes intent clear and surfaces any non-castable values as NULL rather than corrupting the average. Explicit over implicit is best practice."},
{id:149,type:"mcq",topic:"COPY INTO",difficulty:"hard",q:"Team member runs COPY INTO RAW_ORDERS FORCE=TRUE after Phase 01. Safest way to fix resulting duplicates?",opts:["A) TRUNCATE TABLE RAW_ORDERS then reload from stage","B) DELETE FROM RAW_ORDERS WHERE _loaded_at > (original load timestamp)","C) CREATE OR REPLACE TABLE RAW_ORDERS AS SELECT DISTINCT * FROM RAW_ORDERS","D) Use Time Travel to restore pre-duplicate state"],ans:"B",exp:"FORCE=TRUE creates a second batch with a new _loaded_at. DELETE WHERE _loaded_at > original_timestamp surgically removes only the duplicate rows. Option A works but loses everything. C removes structural but not logical duplicates."},
{id:150,type:"mcq",topic:"Verification",difficulty:"hard",q:"Developer writes SELECT * FROM INFORMATION_SCHEMA.LOAD_HISTORY WHERE STATUS='LOADED'. Sees 7 rows, expected 9. Investigate?",opts:["A) Two tables loaded with STATUS='COMPLETED' — filtered out","B) Two files may have returned STATUS='SKIPPED' or 'LOAD_FAILED' — remove STATUS filter to see all 9","C) LOAD_HISTORY tracks 7 tables maximum","D) Other 2 tables in different schema not covered by LOAD_HISTORY"],ans:"B",exp:"STATUS has multiple values: LOADED, SKIPPED, LOAD_FAILED. Filtering WHERE STATUS='LOADED' misses the others. Remove the filter to see all 9 operations, then investigate why 2 didn't return LOADED."},
{id:151,type:"mcq",topic:"Data Loading",difficulty:"hard",q:"RAW_REVIEWS loads ~99,224 rows but RAW_ORDERS has ~99,441. Why fewer reviews?",opts:["A) NULL review_id rows filtered by ON_ERROR='SKIP_FILE'","B) Not all orders receive a review — customers can opt out or ignore the request","C) COPY INTO for reviews used ON_ERROR='SKIP_FILE' and some rows skipped","D) Reviews for cancelled orders excluded from dataset"],ans:"B",exp:"~217 fewer reviews represents orders with no submitted review. Olist sends review requests after delivery, but response is optional. ~99.8% review rate is actually very high. Not a data quality issue."},
{id:152,type:"mcq",topic:"COPY INTO",difficulty:"hard",q:"Minimum information to uniquely identify a specific COPY INTO load event in LOAD_HISTORY?",opts:["A) TABLE_NAME alone","B) SCHEMA_NAME + TABLE_NAME + LAST_LOAD_TIME together","C) FILE_NAME alone","D) STATUS alone"],ans:"B",exp:"TABLE_NAME alone is ambiguous (table loaded multiple times). FILE_NAME alone is ambiguous across tables. SCHEMA_NAME + TABLE_NAME + LAST_LOAD_TIME uniquely identifies a specific load event."},
{id:153,type:"mcq",topic:"Data Loading",difficulty:"hard",q:"Phase 01 shows 'delivered' = ~97% of orders. What does this confirm about the dataset?",opts:["A) Dataset was pre-filtered to only include delivered orders","B) Real production data with typical e-commerce delivery rates — not pre-filtered","C) Other 3% are test orders to filter in RAW","D) High delivery rate means COPY INTO worked correctly"],ans:"B",exp:"~97% delivered is consistent with a healthy e-commerce operation. Real production data includes all states. The 3% non-delivered includes cancelled, processing, shipped, etc. Validates that the full unfiltered dataset loaded correctly."},
{id:154,type:"mcq",topic:"COPY INTO",difficulty:"hard",q:"ERROR_ON_COLUMN_COUNT_MISMATCH=FALSE is in the file format. Can you also add it directly in the COPY INTO statement?",opts:["A) No — this option can only be in a named file format","B) Yes — FILE_FORMAT=(FORMAT_NAME='OLIST_CSV_FORMAT', ERROR_ON_COLUMN_COUNT_MISMATCH=FALSE) overrides the format setting for that statement only","C) Yes — but requires ACCOUNTADMIN","D) No — COPY INTO options and file format options can't be mixed"],ans:"B",exp:"FILE_FORMAT options in COPY INTO can override named format settings for a specific statement. ShopFlow sets it in both the format (for default) and the COPY INTO statement (for explicit clarity and redundancy)."},
{id:155,type:"mcq",topic:"Verification",difficulty:"hard",q:"INFORMATION_SCHEMA.TABLES shows RAW_GEOLOCATION.row_count = 998,000 but expected 1,000,163. Two most likely explanations?",opts:["A) COPY INTO has 1M row limit OR SKIP_FILE triggered","B) INFORMATION_SCHEMA row_count is approximate OR some rows failed to parse","C) Stage file truncated OR warehouse ran out of memory","D) Filter in COPY INTO excluded rows OR duplicates auto-removed"],ans:"B",exp:"Two legitimate explanations: (1) INFORMATION_SCHEMA.row_count is approximate — run SELECT COUNT(*) for exact confirmation. (2) Some rows may have had parsing errors and were skipped. Check LOAD_HISTORY.error_count."},
{id:156,type:"mcq",topic:"Data Loading",difficulty:"hard",q:"Why does Phase 01 suspend warehouse explicitly even though AUTO_SUSPEND=60?",opts:["A) AUTO_SUSPEND only works during business hours","B) Explicit suspend stops billing immediately — AUTO_SUSPEND still runs 60 more seconds. On a limited trial budget, every 60 seconds costs credits","C) AUTO_SUSPEND disabled when COPY INTO is running","D) Explicit suspend required before closing a Snowflake Notebook"],ans:"B",exp:"AUTO_SUSPEND=60 means up to 60 more seconds of idle billing. Explicit suspend fires immediately — zero wait. At X-Small (1 credit/hour), 60 seconds = ~0.017 credits. Good habit and demonstrates credit-conscious engineering."},
{id:157,type:"mcq",topic:"COPY INTO",difficulty:"hard",q:"Is COPY INTO RAW_ORDERS FROM @OLIST_STAGE (no filename) valid?",opts:["A) Yes — loads all 9 files into RAW_ORDERS","B) No-filename version loads ALL files in stage into RAW_ORDERS — most will mix product/review/payment data into orders table","C) Yes — Snowflake auto-routes each file to the correct table","D) No — COPY INTO always requires a specific filename"],ans:"B",exp:"COPY INTO RAW_ORDERS FROM @OLIST_STAGE (no filename) loads ALL stage files into RAW_ORDERS. All columns are VARCHAR so rows technically load — but products data, reviews data, etc. all end up in RAW_ORDERS. Always specify the exact filename."},
{id:158,type:"mcq",topic:"Data Loading",difficulty:"hard",q:"Phase 01 loads in order: orders, items, customers, sellers, products, payments, reviews, geolocation, translation. Does load order matter?",opts:["A) Yes — foreign key constraints enforce referential integrity at load time","B) No — Snowflake foreign keys are informational (NOVALIDATE/RELY) — load order doesn't matter for COPY INTO","C) Yes — later tables reference earlier ones via triggers","D) Yes — larger tables must load before smaller ones for memory efficiency"],ans:"B",exp:"Snowflake FK constraints are NOVALIDATE by default — informational hints for the optimizer, not enforced at write time. COPY INTO won't fail due to referential integrity. Load order in Phase 01 is for human readability only."},
{id:159,type:"mcq",topic:"Verification",difficulty:"hard",q:"RAW_SELLERS has 3,095 rows and RAW_ORDER_ITEMS references 3,095 unique seller_ids. Does equal count confirm data integrity?",opts:["A) No — coincidence in counts doesn't confirm matching IDs — need LEFT JOIN to check for orphans","B) Yes — matching counts prove all seller references are valid","C) No — RAW_SELLERS should have more rows than unique sellers in ORDER_ITEMS","D) Yes — count difference would be flagged by ERROR_ON_COLUMN_COUNT_MISMATCH"],ans:"A",exp:"Equal counts is coincidence — doesn't prove IDs match. A seller in ORDER_ITEMS might not exist in SELLERS, and a SELLERS seller might have no order items. Only a LEFT JOIN can verify: SELECT COUNT(*) FROM RAW_ORDER_ITEMS i LEFT JOIN RAW_SELLERS s ON i.seller_id=s.seller_id WHERE s.seller_id IS NULL."},
{id:160,type:"mcq",topic:"COPY INTO",difficulty:"hard",q:"Which COPY INTO result indicates complete success with no issues?",opts:["A) status=LOADED, rows_parsed=99441, rows_loaded=99441, error_count=0","B) status=SKIPPED, rows_parsed=99441, rows_loaded=0, error_count=0","C) status=LOADED, rows_parsed=99441, rows_loaded=99200, error_count=241","D) status=LOADED, rows_parsed=99441, rows_loaded=99441, error_count=241"],ans:"A",exp:"A is perfect: all rows parsed, all rows loaded, zero errors. B is idempotency skip (not fresh load). C loaded most rows but skipped 241 bad ones (CONTINUE mode). D is contradictory. A is the only unambiguous complete success."},
{id:161,type:"multi",topic:"COPY INTO",difficulty:"easy",q:"Which COPY INTO options are used in ShopFlow Phase 01? (Select ALL)",opts:["A) FORMAT_NAME = 'OLIST_CSV_FORMAT'","B) ERROR_ON_COLUMN_COUNT_MISMATCH = FALSE","C) ON_ERROR = 'SKIP_FILE'","D) PURGE = FALSE","E) FORCE = TRUE"],ans:["A","B","C","D"],exp:"A, B, C, D are used in every ShopFlow COPY INTO. E (FORCE=TRUE) is NOT used — idempotency protection is the default. FORCE=TRUE only for deliberate reloads after truncating."},
{id:162,type:"multi",topic:"Data Loading",difficulty:"easy",q:"Which are correct about the 9 Olist CSV files? (Select ALL)",opts:["A) RAW_GEOLOCATION is the largest with ~1,000,163 rows","B) RAW_CATEGORY_TRANSLATION is the smallest with ~71 rows","C) RAW_ORDERS and RAW_CUSTOMERS have the same row count (~99,441)","D) RAW_SELLERS is larger than RAW_PAYMENTS","E) Total rows across all 9 tables is approximately 1.6 million"],ans:["A","B","C","E"],exp:"A: ~1M rows (largest). B: ~71 rows (smallest). C: Both ~99,441. E: ~1.6M total. D is false: RAW_SELLERS has ~3,095; RAW_PAYMENTS has ~103,886 — PAYMENTS is much larger."},
{id:163,type:"multi",topic:"COPY INTO",difficulty:"easy",q:"What does a COPY INTO result row show after a successful load? (Select ALL)",opts:["A) file — which file was processed","B) status — LOADED, SKIPPED, or LOAD_FAILED","C) rows_parsed — total rows read from the file","D) rows_loaded — rows successfully inserted","E) warehouse_credits_used — compute cost of the load"],ans:["A","B","C","D"],exp:"A, B, C, D are standard COPY INTO result columns. E does not exist — credit usage is tracked in QUERY_HISTORY not in COPY INTO results."},
{id:164,type:"multi",topic:"Verification",difficulty:"easy",q:"Which Phase 01 verification steps are explicitly performed? (Select ALL)",opts:["A) Verify file count in stage with LIST @OLIST_STAGE","B) Verify row counts with INFORMATION_SCHEMA.TABLES","C) Verify load history with INFORMATION_SCHEMA.LOAD_HISTORY","D) Run 5 data quality spot checks against RAW tables","E) Run SELECT COUNT(*) on every table for exact row counts"],ans:["A","B","C","D"],exp:"A: LIST before loading. B: INFORMATION_SCHEMA.TABLES row counts. C: LOAD_HISTORY confirms what ran. D: 5 quality checks. E is not done — approximate counts from INFORMATION_SCHEMA are sufficient."},
{id:165,type:"multi",topic:"Data Loading",difficulty:"easy",q:"Correct order for Phase 01 steps? (Select ALL in order)",opts:["A) Upload CSV files to @OLIST_STAGE via Snowsight UI","B) Run LIST @OLIST_STAGE to confirm all 9 files present","C) Run COPY INTO for each of the 9 RAW tables","D) Verify row counts and run data quality checks","E) Delete staged files with REMOVE after verification"],ans:["A","B","C","D"],exp:"A→B→C→D is the Phase 01 sequence. E is not done — PURGE=FALSE keeps files in the stage. Deliberate file removal would require explicit REMOVE command."},
{id:166,type:"multi",topic:"COPY INTO",difficulty:"medium",q:"Which ON_ERROR options are available in Snowflake COPY INTO? (Select ALL)",opts:["A) ABORT_STATEMENT — stop on first error (default)","B) CONTINUE — skip bad rows, load good rows","C) SKIP_FILE — skip entire file if any error","D) SKIP_FILE_n — skip file only if error count exceeds n","E) RETRY — automatically retry file 3 times before skipping"],ans:["A","B","C","D"],exp:"A, B, C, D are all valid. E (RETRY) does not exist in Snowflake COPY INTO. The four valid options cover from most strict (ABORT) to most lenient (CONTINUE)."},
{id:167,type:"multi",topic:"Data Loading",difficulty:"medium",q:"Which columns in RAW tables are NOT from the source CSV files? (Select ALL)",opts:["A) _loaded_at — DEFAULT CURRENT_TIMESTAMP() applied at load time","B) order_id — from the CSV","C) _source_file — must be set manually in COPY INTO or stays NULL","D) _row_number — sequential counter","E) customer_unique_id — from the CSV"],ans:["A","C"],exp:"A: _loaded_at uses DEFAULT CURRENT_TIMESTAMP() — auto-populated. C: _source_file has no DEFAULT — must be set explicitly. All other columns (order_id, customer_unique_id, etc.) come directly from the CSV."},
{id:168,type:"multi",topic:"Verification",difficulty:"medium",q:"Which correctly describe INFORMATION_SCHEMA.LOAD_HISTORY? (Select ALL)",opts:["A) Shows one row per file per COPY INTO execution","B) Real-time — results appear immediately after COPY INTO","C) Retains history for 14 days","D) Covers all tables in the current database","E) Also available as SNOWFLAKE.ACCOUNT_USAGE.COPY_HISTORY for longer retention"],ans:["A","B","C","D","E"],exp:"All five correct: A (per file), B (real-time), C (14 days), D (current database scope), E (COPY_HISTORY is longer-retention equivalent). Knowing both views is tested on SnowPro Core."},
{id:169,type:"multi",topic:"COPY INTO",difficulty:"medium",q:"Which about COPY INTO idempotency are correct? (Select ALL)",opts:["A) Snowflake tracks files by metadata: filename + size + last-modified timestamp","B) Running COPY INTO twice on same file returns SKIPPED on second run","C) Re-uploading same CSV resets idempotency — new timestamp = new file identity","D) FORCE=TRUE bypasses idempotency and may create duplicate rows","E) Idempotency is per table — same file can load into two different tables independently"],ans:["A","B","C","D","E"],exp:"ALL five correct: A (tracking mechanism), B (SKIPPED result), C (new timestamp = new identity), D (FORCE bypasses — creates dupes), E (per-table tracking). Complete picture of COPY INTO idempotency."},
{id:170,type:"multi",topic:"Data Loading",difficulty:"medium",q:"Which correctly describe customer_id vs customer_unique_id in Olist? (Select ALL)",opts:["A) customer_id is generated fresh for every order — 5 orders = 5 different customer_ids","B) customer_unique_id is the true unique person identifier","C) COUNT(DISTINCT customer_id) gives order count, not unique people","D) COUNT(DISTINCT customer_unique_id) gives true unique customer count","E) RAW_CUSTOMERS has 99,441 rows because each row represents one unique person"],ans:["A","B","C","D"],exp:"A, B, C, D all correct. E is false: 99,441 rows = one row per ORDER (not per unique person). The number of unique people (customer_unique_id) is smaller — many placed multiple orders."},
{id:171,type:"multi",topic:"COPY INTO",difficulty:"medium",q:"What does LIST @OLIST_STAGE show for each file? (Select ALL)",opts:["A) File name","B) File size in bytes","C) Last modified timestamp","D) MD5 checksum","E) Number of rows inside the file"],ans:["A","B","C","D"],exp:"A, B, C, D are all LIST output columns. E (row count) is NOT shown — the stage only knows about files as binary objects. Row count is only known after COPY INTO runs."},
{id:172,type:"multi",topic:"Data Loading",difficulty:"medium",q:"Phase 01 Check 3 shows: 1-star=11%, 2-star=3%, 3-star=8%, 4-star=19%, 5-star=57%. Which are correct? (Select ALL)",opts:["A) Right-skewed toward positive reviews — typical for e-commerce","B) All 5 score values present — data loaded completely","C) 3% for 2-star is suspiciously low — likely loading error","D) STAGED will cast review_score to INTEGER for correct analysis","E) review_score in RAW is stored as VARCHAR '1' to '5'"],ans:["A","B","D","E"],exp:"A: Right-skewed is typical. B: All 5 values = complete load. D: Phase 02 casts to INTEGER. E: All RAW columns are VARCHAR. C is false: 2% for 2-star is real — customers skip from 1-star to 3+."},
{id:173,type:"multi",topic:"Verification",difficulty:"medium",q:"Which data quality checks should run after loading all 9 RAW tables? (Select ALL)",opts:["A) Count rows per table and compare to expected","B) Check order_id is never NULL in RAW_ORDERS","C) Verify review_score values are between 1 and 5","D) Check payment_value can be cast to FLOAT","E) Verify foreign key references — every order item has a matching order"],ans:["A","B","C","D","E"],exp:"All five are valid: A (row count validation), B (PK integrity), C (domain validation), D (type validation preview), E (referential integrity). All five together = comprehensive confidence before building STAGED."},
{id:174,type:"multi",topic:"COPY INTO",difficulty:"medium",q:"Team decides not to use named file format — all options inline in each COPY INTO. Downsides? (Select ALL)",opts:["A) 9 COPY INTO statements each with repeated FORMAT options — any change requires updating all 9","B) No central audit — cannot DESCRIBE FILE FORMAT to see current settings","C) Inline format options are slower than named formats","D) A typo in one COPY INTO creates inconsistent loading vs other tables","E) Inline format options not supported for internal stages"],ans:["A","B","D"],exp:"A: Duplication = maintenance burden. B: Named formats can be DESCRIBED — inline leaves no audit trail. D: A typo creates inconsistent behaviour. C is false: performance identical. E is false: inline options fully supported."},
{id:175,type:"multi",topic:"Data Loading",difficulty:"medium",q:"Why does RAW_GEOLOCATION require special handling in Phase 02? (Select ALL)",opts:["A) ~1M rows — largest table — requires QUALIFY for deduplication","B) Many zip codes have multiple entries with slightly different lat/lng","C) Without deduplication, joining customers to geolocation causes row fan-out","D) RAW_GEOLOCATION has NULL zip codes that must be filtered","E) ROW_NUMBER() + QUALIFY keeps one row per zip prefix"],ans:["A","B","C","E"],exp:"A: Largest table, ~1M rows. B: Duplicate zips with different coordinates — known Olist characteristic. C: Fan-out is the analytics consequence of undeduped geolocation joins. E: QUALIFY ROW_NUMBER() OVER (PARTITION BY zip) = 1 is the dedup pattern."},
{id:176,type:"multi",topic:"COPY INTO",difficulty:"hard",q:"Which are true about how Snowflake determines a file was already loaded? (Select ALL)",opts:["A) Checks filename, file size, and last-modified timestamp together","B) Renaming the file before re-uploading creates a new file identity","C) Re-uploading same content with new timestamp is treated as a new file","D) Only file content hash (MD5) used for idempotency — filename doesn't matter","E) Truncating the target table resets idempotency — Snowflake reloads the file"],ans:["A","B","C"],exp:"A: All three metadata fields form the identity. B: New name = new identity. C: New timestamp = new identity. D is false: Snowflake uses filename+size+last-modified, not MD5. E is false: TRUNCATE does NOT reset load metadata — FORCE=TRUE is still needed."},
{id:177,type:"multi",topic:"Verification",difficulty:"hard",q:"Debugging LOAD_FAILED on RAW_PRODUCTS. Which LOAD_HISTORY columns are most useful? (Select ALL)",opts:["A) first_error — exact error message","B) first_error_line — line number in CSV where first error occurred","C) first_error_column_name — which column caused the error","D) error_count — total number of error rows","E) warehouse_name — to check if wrong warehouse used"],ans:["A","B","C","D"],exp:"A: Error message tells what went wrong. B: Line number pinpoints bad row in CSV. C: Column name tells which field has bad value. D: Error count shows if isolated or widespread. E is not a LOAD_HISTORY column — warehouse info is in QUERY_HISTORY."},
{id:178,type:"multi",topic:"Data Loading",difficulty:"hard",q:"Which Olist dataset characteristics affect COPY INTO configuration? (Select ALL)",opts:["A) Portuguese characters — requires ENCODING=UTF8","B) Fields containing commas in values — requires FIELD_OPTIONALLY_ENCLOSED_BY='\"'","C) RAW tables have 2 extra audit columns — requires ERROR_ON_COLUMN_COUNT_MISMATCH=FALSE","D) Some date fields contain 'N/A' — handled by VARCHAR columns","E) Geolocation file has ~1M rows — requires larger warehouse for COPY INTO"],ans:["A","B","C","D"],exp:"A: UTF-8 for Portuguese. B: Quoted commas. C: 10-column tables for 8-column CSVs. D: 'N/A' dates store as-is in VARCHAR (NULL_IF converts them to NULL). E is false: COPY INTO for 1M rows on X-Small is fine — no warehouse resize needed for loading."},
{id:179,type:"multi",topic:"COPY INTO",difficulty:"hard",q:"Risks of using TRUNCATE TABLE before every COPY INTO in a daily pipeline? (Select ALL)",opts:["A) Historical data lost — only most recent file's data survives","B) Time Travel history reset — can't query yesterday's state after truncating","C) TRUNCATE faster than DELETE for full table clears","D) If COPY INTO fails after TRUNCATE, table is empty until manual intervention","E) TRUNCATE resets COPY INTO idempotency tracking — FORCE=TRUE is needed"],ans:["A","B","D"],exp:"A: Truncate removes history. B: TRUNCATE generates new table version, resetting Time Travel. D: The window between TRUNCATE and successful COPY INTO is a data outage risk. C is true (TRUNCATE IS faster) but not a risk. E is false: TRUNCATE does NOT reset idempotency."},
{id:180,type:"multi",topic:"Data Loading",difficulty:"hard",q:"Which correctly describe boleto payments in Phase 01 Check 2? (Select ALL)",opts:["A) Boleto is a Brazilian bank payment slip — unique to Brazil","B) Can be paid at any bank, lottery house, or ATM in Brazil","C) Boleto commonly has payment_installments > 1","D) Appears as payment_type='boleto' in RAW_PAYMENTS alongside credit_card and voucher","E) Boleto rows use a different schema than credit_card rows"],ans:["A","B","D"],exp:"A: Uniquely Brazilian. B: Physical payment at retail locations. D: payment_type column has multiple values. C is false: boleto typically has payment_installments=1 — single lump-sum payment. E is false: all payment types share the same schema."},
{id:181,type:"multi",topic:"Verification",difficulty:"hard",q:"Multi-step verification process after Phase 01 covering all bases? (Select ALL)",opts:["A) LIST @OLIST_STAGE — confirm all 9 files uploaded","B) INFORMATION_SCHEMA.LOAD_HISTORY — confirm LOADED status for all 9, zero errors","C) INFORMATION_SCHEMA.TABLES row_count — compare to expected values","D) Sample rows from each RAW table to spot-check values look reasonable","E) Referential integrity checks — join ORDER_ITEMS to ORDERS, CUSTOMERS, PRODUCTS"],ans:["A","B","C","D","E"],exp:"All five together form complete verification: A (files present), B (loads succeeded), C (row counts match), D (data sanity), E (cross-table references valid). Any one step alone is insufficient."},
{id:182,type:"multi",topic:"COPY INTO",difficulty:"hard",q:"All valid ways to specify the source in COPY INTO for internal stages? (Select ALL)",opts:["A) FROM @OLIST_STAGE/olist_orders_dataset.csv — specific file","B) FROM @OLIST_STAGE — all files in stage","C) FROM @OLIST_STAGE/olist_% — files matching a pattern","D) FROM @SHOPFLOW_DB.SHOPFLOW_RAW.OLIST_STAGE/file.csv — fully qualified","E) FROM 'olist_orders_dataset.csv' — filename only (stage inferred from session)"],ans:["A","B","C","D"],exp:"A: Specific file. B: All files. C: Pattern match using % wildcard. D: Fully qualified path. E is false: @ prefix is always required — you cannot reference a stage file by filename alone."},
{id:183,type:"multi",topic:"Data Loading",difficulty:"hard",q:"Which about the Phase 01 warehouse suspend at end are correct? (Select ALL)",opts:["A) Explicit suspend stops billing immediately — no waiting for AUTO_SUSPEND countdown","B) Suspending doesn't affect data stored in RAW tables","C) If there's an open transaction, ALTER WAREHOUSE SUSPEND waits for it to complete","D) Suspended state persists after closing browser — doesn't auto-resume without a query","E) SHOW WAREHOUSES confirms STATE='SUSPENDED' after the suspend command"],ans:["A","B","D","E"],exp:"A: Immediate billing stop. B: Compute and storage independent. D: Suspended state persists. E: SHOW WAREHOUSES confirms state. C is false: ALTER WAREHOUSE SUSPEND is immediate — may abort running transactions."},
{id:184,type:"multi",topic:"Verification",difficulty:"hard",q:"Which NULL check results in RAW_ORDERS indicate a genuine data quality problem (not expected NULLs)? (Select ALL)",opts:["A) null_order_id > 0 — rows with no order identifier","B) null_customer_id > 0 — orders with no customer reference","C) null_delivery_date > 0 — orders not yet delivered","D) null_purchase_ts > 0 — orders with no purchase timestamp","E) null_status > 0 — orders with no status"],ans:["A","B","D","E"],exp:"A: order_id NULL = orphan row, can never join. B: customer_id NULL = order with no customer. D: purchase_ts NULL = no creation time. E: status NULL = unknown state. All unexpected. C is expected: undelivered orders legitimately have NULL delivery dates."},
{id:185,type:"multi",topic:"COPY INTO",difficulty:"hard",q:"Which COPY INTO result columns help diagnose a LOAD_FAILED status? (Select ALL)",opts:["A) status — LOAD_FAILED confirms something went wrong","B) first_error — exact error message","C) first_error_line — line number in the CSV","D) rows_loaded — how many rows loaded before failure","E) file_size — size of the file that failed"],ans:["A","B","C","D"],exp:"A: Status identifies problem. B: Error message diagnoses cause. C: Line number pinpoints bad data. D: rows_loaded=0 confirms no data written. E is not a COPY INTO result column — file size is in LIST output."},
{id:186,type:"multi",topic:"Data Loading",difficulty:"hard",q:"Valid interpretations of payment_installments in RAW_PAYMENTS? (Select ALL)",opts:["A) installments=1 means full amount paid in one payment","B) installments=12 means customer split into 12 monthly payments","C) Boleto payments commonly have installments > 1","D) SUM(payment_value) across all rows for one order gives total order value","E) Phase 02 casts payment_installments from VARCHAR to INTEGER"],ans:["A","B","D","E"],exp:"A: 1 = single payment. B: 12 = 12 monthly credit card instalments (common in Brazil). D: Multiple payment rows require SUM for total. E: Phase 02 casts to INTEGER. C is false: boleto is almost always installments=1 — credit cards use instalments."},
{id:187,type:"multi",topic:"COPY INTO",difficulty:"hard",q:"Which correctly describe ERROR_ON_COLUMN_COUNT_MISMATCH=FALSE in ShopFlow? (Select ALL)",opts:["A) Required because RAW tables have 10 columns but CSV files have 8","B) The 2 extra columns (_loaded_at, _source_file) are handled by DEFAULT values","C) Without this setting, COPY INTO fails with 'Number of columns in file does not match table'","D) This setting is in both the named file format AND in each COPY INTO statement","E) FALSE means column values are matched positionally, not by name"],ans:["A","B","C","E"],exp:"A: The column count mismatch (8 vs 10) is the problem. B: _loaded_at uses DEFAULT, _source_file stays NULL. C: The exact error without this setting. E: Positional matching. D is partially true — it's in the format AND repeated in COPY INTO statements in ShopFlow for clarity."},
{id:188,type:"multi",topic:"Verification",difficulty:"hard",q:"Which are true about the five data quality checks in Phase 01? (Select ALL)",opts:["A) All run against RAW tables — before any STAGED transformation","B) Check 1 uses window functions to calculate order status percentages","C) Check 4 reveals ~17k NULL delivery dates — expected for undelivered orders","D) Check 5 joins RAW_PRODUCTS to RAW_CATEGORY_TRANSLATION using LEFT JOIN","E) All 5 checks should return zero rows to confirm data loaded correctly"],ans:["A","B","C","D"],exp:"A: All checks use RAW tables. B: SUM(COUNT(*)) OVER() window function for percentages. C: ~17k NULL delivery dates expected. D: LEFT JOIN on translation table. E is false: checks return data distributions, not zero rows — zero rows would only be expected for a 'find errors' check."},
{id:189,type:"multi",topic:"Data Loading",difficulty:"hard",q:"Complete process for getting Olist CSV data into Snowflake RAW tables? (Select ALL)",opts:["A) Download 9 CSV files from Kaggle to local laptop","B) Upload all 9 CSV files to @OLIST_STAGE via Snowsight UI","C) Run COPY INTO for each of the 9 RAW tables from the stage","D) Use Snowflake Notebooks to download files directly from Kaggle API","E) Verify row counts match expected values"],ans:["A","B","C","E"],exp:"A→B→C is the loading sequence. E: Verification against known row counts confirms correctness. D is false: Snowflake Notebooks cannot access external internet — Kaggle download must happen on local machine."},
{id:190,type:"multi",topic:"COPY INTO",difficulty:"hard",q:"COPY INTO uses FILE_FORMAT=(FORMAT_NAME='OLIST_CSV_FORMAT', ERROR_ON_COLUMN_COUNT_MISMATCH=FALSE). Which are true? (Select ALL)",opts:["A) FORMAT_NAME references the named format for all other settings (SKIP_HEADER, NULL_IF, ENCODING)","B) ERROR_ON_COLUMN_COUNT_MISMATCH=FALSE overrides the named format setting for this statement","C) The inline override applies only to this COPY INTO — other statements using the named format are unaffected","D) Specifying ERROR_ON_COLUMN_COUNT_MISMATCH=FALSE here is redundant if it's already in OLIST_CSV_FORMAT","E) Inline format options cannot be combined with FORMAT_NAME in the same FILE_FORMAT clause"],ans:["A","B","C","D"],exp:"A: Named format provides all base settings. B: Inline overrides for this statement. C: Statement-level only, not permanent. D: Redundant but explicit — ShopFlow includes for readability. E is false: combining FORMAT_NAME with inline overrides is fully supported."},
{id:191,type:"multi",topic:"Verification",difficulty:"hard",q:"INFORMATION_SCHEMA vs ACCOUNT_USAGE for Phase 01 verification — which are correct? (Select ALL)",opts:["A) INFORMATION_SCHEMA.LOAD_HISTORY — use immediately after loading for real-time confirmation","B) ACCOUNT_USAGE.COPY_HISTORY — use if you need to investigate a load from 3 weeks ago","C) INFORMATION_SCHEMA is per-database; ACCOUNT_USAGE covers the entire account","D) Both views have identical latency and retention","E) INFORMATION_SCHEMA.TABLES.row_count is more accurate than SELECT COUNT(*)"],ans:["A","B","C"],exp:"A: Real-time verification post-load. B: 365-day retention for historical investigation. C: Scope difference fundamental. D is false: INFORMATION_SCHEMA real-time/14-day; ACCOUNT_USAGE 45-min/365-day — very different. E is false: INFORMATION_SCHEMA row_count is APPROXIMATE; COUNT(*) gives exact."},
{id:192,type:"multi",topic:"Data Loading",difficulty:"hard",q:"Correct expectations for RAW table data after Phase 01? (Select ALL)",opts:["A) All numeric columns like price stored as VARCHAR strings","B) All timestamp columns like order_purchase_timestamp stored as VARCHAR strings","C) _loaded_at is the only non-VARCHAR column in every RAW table (TIMESTAMP_NTZ)","D) NULL values came from NULL_IF and EMPTY_FIELD_AS_NULL settings","E) Data is immediately ready for business analytics"],ans:["A","B","C","D"],exp:"A: Numbers as VARCHAR ('99.90' not 99.90). B: Timestamps as VARCHAR strings. C: _loaded_at is the only TIMESTAMP_NTZ column. D: NULL_IF converts 'N/A', empty strings to SQL NULL. E is false: RAW requires Phase 02 (casting, deduplication, NULL handling) before analytics."},
{id:193,type:"multi",topic:"COPY INTO",difficulty:"hard",q:"Why does ShopFlow Phase 01 set PURGE=FALSE? (Select ALL)",opts:["A) Staged files preserved for potential reload if a STAGED transformation bug found later","B) PURGE=FALSE allows same file to be loaded again with FORCE=TRUE if needed","C) Files can be re-examined with LIST @OLIST_STAGE for audit","D) Snowflake charges extra for purged files","E) PURGE=TRUE would also delete files from original Kaggle download"],ans:["A","B","C"],exp:"A: Preserve for future reloads. B: FORCE=TRUE can re-use the staged file. C: LIST still shows files for audit. D is false: purged files free stage storage. E is false: purge only affects the Snowflake internal stage."},
{id:194,type:"multi",topic:"Verification",difficulty:"hard",q:"Which Phase 01 quality checks require joining two RAW tables? (Select ALL)",opts:["A) Check 5 (top product categories) — joins RAW_PRODUCTS to RAW_CATEGORY_TRANSLATION","B) Referential integrity check — joins RAW_ORDER_ITEMS to RAW_ORDERS","C) Check 1 (order status distribution) — only uses RAW_ORDERS","D) Check 3 (review score distribution) — only uses RAW_REVIEWS","E) Payment analysis per order — joins RAW_PAYMENTS to RAW_ORDERS"],ans:["A","B"],exp:"A: Check 5 joins PRODUCTS to CATEGORY_TRANSLATION. B: Referential integrity joins ORDER_ITEMS to ORDERS. C: Status distribution needs only RAW_ORDERS. D: Score distribution needs only RAW_REVIEWS. E would need a join but it's not one of the 5 explicit Phase 01 checks."},
{id:195,type:"multi",topic:"Data Loading",difficulty:"hard",q:"Correct about Snowsight UI file upload process? (Select ALL)",opts:["A) Navigate to: Data → Databases → SHOPFLOW_DB → SHOPFLOW_RAW → Stages → OLIST_STAGE","B) Click '+ Files' button to select and upload CSV files","C) Files stored as .csv — UI doesn't auto-compress","D) Upload button is labelled 'PUT' in Snowsight UI","E) Multiple files can be uploaded in a single UI upload session"],ans:["A","B","C","E"],exp:"A: The exact navigation path. B: '+ Files' is the upload button. C: No auto-compression via UI. E: Multiple files selectable. D is false: button is '+ Files' not 'PUT' — PUT is a SnowSQL command."},
{id:196,type:"multi",topic:"COPY INTO",difficulty:"hard",q:"Which COPY INTO behaviours differ from INSERT statements? (Select ALL)",opts:["A) Idempotency — same file won't load twice without FORCE=TRUE","B) Atomic loading — entire file or nothing with ABORT_STATEMENT","C) Metadata tracking — every load creates LOAD_HISTORY record","D) Column matching by name — COPY INTO matches CSV columns to table columns by name","E) Parallel loading — multiple micro-partitions written simultaneously"],ans:["A","B","C","E"],exp:"A: Idempotency. B: Atomicity with ABORT_STATEMENT. C: LOAD_HISTORY audit trail. E: Parallel micro-partition writing. D is false: COPY INTO with CSV uses positional matching, not name matching. This is why ERROR_ON_COLUMN_COUNT_MISMATCH matters."},
{id:197,type:"multi",topic:"Data Loading",difficulty:"hard",q:"Why does Phase 01 run data quality checks BEFORE building the STAGED layer? (Select ALL)",opts:["A) Understanding data informs STAGED design (e.g. review_score is 1-5 confirms INTEGER is right cast)","B) Discovering NULL patterns helps decide which NULLs to filter vs keep in STAGED","C) Quality checks confirm data loaded correctly before spending effort on transformations","D) Quality checks automatically generate STAGED transformation code","E) Finding unexpected values early prevents surprises in TRY_CAST results"],ans:["A","B","C","E"],exp:"A: Data exploration informs design. B: NULL patterns guide STAGED WHERE clauses. C: Verify before building. E: Surprises found in RAW checks handled explicitly in STAGED. D is false: quality checks are exploratory queries, not code generators."},
{id:198,type:"multi",topic:"Verification",difficulty:"hard",q:"Which correctly describe scope and limitations of Phase 01 verification? (Select ALL)",opts:["A) Row count checks confirm right number of rows but not that values are correct","B) STATUS='LOADED' confirms successful loading but not data quality","C) Sample SELECT queries reveal obvious issues but can't guarantee every row is correct","D) Referential integrity checks confirm relationships are intact","E) Full data validation of every row is automatically performed by COPY INTO"],ans:["A","B","C","D"],exp:"A: Count correct doesn't mean values correct. B: LOADED = rows written, not values validated. C: Sampling catches obvious issues. D: JOIN-based integrity checks. E is false: COPY INTO only validates parsing, not business rules."},
{id:199,type:"multi",topic:"COPY INTO",difficulty:"hard",q:"Why not use Snowpark Python INSERT row-by-row instead of COPY INTO? (Select ALL)",opts:["A) COPY INTO parallelises loading — row-by-row inserts are orders of magnitude slower for 1M rows","B) COPY INTO provides native idempotency — row-by-row requires custom deduplication logic","C) COPY INTO creates LOAD_HISTORY record automatically — inserts leave no equivalent audit trail","D) Row-by-row INSERT is not supported in Snowflake","E) COPY INTO handles file parsing (encoding, delimiters, NULLs) natively — Python would parse CSV manually"],ans:["A","B","C","E"],exp:"A: Parallel bulk loading vs. serial inserts. B: Built-in idempotency vs custom logic. C: LOAD_HISTORY is automatic. E: File format handling is built in. D is false: row-by-row INSERT IS supported — just very slow for bulk loading."},
{id:200,type:"multi",topic:"Data Loading",difficulty:"hard",q:"After Phase 01 completes, which describe the state of the ShopFlow project? (Select ALL)",opts:["A) All 9 RAW tables contain data from the Olist CSV files","B) All RAW columns are VARCHAR — no type casting has occurred yet","C) _loaded_at timestamps show when each table's COPY INTO ran","D) SHOPFLOW_STAGED and SHOPFLOW_ANALYTICS schemas exist but contain no tables yet","E) Data is immediately queryable by analysts for business questions"],ans:["A","B","C","D"],exp:"A: All 9 tables loaded. B: VARCHAR across the board — Phase 02 handles casting. C: _loaded_at records load timing. D: Schemas from Phase 00 exist, tables come in Phase 02/03. E is false: RAW requires Phase 02 transformation — dates are VARCHAR strings, numerics are strings, duplicates exist in geolocation."},
];
const QUIZ_POOL_P2=[
// ─── TRUE / FALSE (IDs 201–225) ───────────────────────────────────────────
{id:201,type:'tf',topic:'TRY_CAST',difficulty:'easy',q:"TRY_CAST(col AS FLOAT) returns NULL when the value cannot be converted, while CAST(col AS FLOAT) throws an error.",ans:true,exp:"TRUE. This is the fundamental difference. TRY_CAST is the safe version — bad values become NULL, the query continues. CAST fails the entire query on the first unconvertible value. In a RAW→STAGED pipeline you always use TRY_CAST because you cannot guarantee every value in a VARCHAR column is clean."},
{id:202,type:'tf',topic:'TRY_TO_TIMESTAMP',difficulty:'easy',q:"TRY_TO_TIMESTAMP('2018-01-08 21:28:27') in Snowflake returns a TIMESTAMP_NTZ value by default.",ans:true,exp:"TRUE. TRY_TO_TIMESTAMP without a specified type defaults to TIMESTAMP_NTZ — the session's default timestamp type. In ShopFlow the STAGED tables are built using TRY_TO_TIMESTAMP for all five date columns in STG_ORDERS, producing TIMESTAMP_NTZ values."},
{id:203,type:'tf',topic:'CTAS',difficulty:'easy',q:"CREATE OR REPLACE TABLE ... AS SELECT (CTAS) infers column names and data types entirely from the SELECT statement.",ans:true,exp:"TRUE. In CTAS there is no explicit column definition — Snowflake derives names from aliases and types from the expression results. This is why TRY_CAST(price AS FLOAT) AS price creates a FLOAT column named 'price', not VARCHAR."},
{id:204,type:'tf',topic:'QUALIFY',difficulty:'easy',q:"QUALIFY is standard ANSI SQL syntax supported across all major databases.",ans:false,exp:"FALSE. QUALIFY is Snowflake-specific syntax for filtering on window function results without a CTE or subquery. The equivalent in standard SQL requires wrapping in a subquery or using a CTE with a WHERE clause. This is tested on the SnowPro Core exam as a Snowflake-specific feature."},
{id:205,type:'tf',topic:'NULL Handling',difficulty:'easy',q:"In ShopFlow STG_GEOLOCATION, QUALIFY ROW_NUMBER() OVER (PARTITION BY zip ORDER BY _loaded_at DESC) = 1 keeps the MOST recently loaded row per zip code.",ans:true,exp:"TRUE. ORDER BY _loaded_at DESC ranks the newest row first. QUALIFY = 1 keeps only rank 1 — the most recent. This deduplication strategy is intentional: if the same zip appears multiple times, the newest coordinate is assumed to be most accurate."},
{id:206,type:'tf',topic:'TIMESTAMP_NTZ',difficulty:'easy',q:"TIMESTAMP_LTZ automatically converts stored timestamps to the current session's local timezone when retrieved.",ans:true,exp:"TRUE. LTZ = Local Time Zone. Snowflake stores the value in UTC and converts to the session timezone on retrieval. TIMESTAMP_NTZ (No Time Zone) stores exactly what you give it with no conversion — which is why it is preferred for DWH tables where consistent UTC storage is the standard."},
{id:207,type:'tf',topic:'COALESCE',difficulty:'easy',q:"COALESCE(NULL, NULL, 'default') returns 'default'.",ans:true,exp:"TRUE. COALESCE returns the first non-NULL value in the list. If all values are NULL, COALESCE returns NULL. In STG_PRODUCTS, COALESCE(t.product_category_name_english, 'uncategorised') ensures every product has a category label — no NULLs flow into the analytics layer."},
{id:208,type:'tf',topic:'LEFT JOIN',difficulty:'easy',q:"In STG_PRODUCTS, changing LEFT JOIN to INNER JOIN on the translation table would still produce the same row count as RAW_PRODUCTS.",ans:false,exp:"FALSE. INNER JOIN only keeps rows that match on both sides. Products whose Portuguese category name has no entry in RAW_CATEGORY_TRANSLATION would be silently dropped. LEFT JOIN keeps ALL products — unmatched rows get NULL for the English name (then COALESCE substitutes 'uncategorised'). Never silently drop rows in a transformation."},
{id:209,type:'tf',topic:'DATEDIFF',difficulty:'easy',q:"DATEDIFF('day', estimated_delivery_ts, delivered_ts) returns a positive number when delivery was LATE.",ans:true,exp:"TRUE. DATEDIFF(unit, start, end) = end - start. If estimated was Jan 10 and actual delivery was Jan 15 — DATEDIFF = 5 (positive = late). If delivered Jan 8 — DATEDIFF = -2 (negative = early). NULL when delivered_ts is NULL (order not yet delivered)."},
{id:210,type:'tf',topic:'CTAS',difficulty:'medium',q:"CREATE OR REPLACE TABLE on an existing STAGED table with loaded data safely rebuilds it from scratch without data loss — the data is preserved.",ans:false,exp:"FALSE. CREATE OR REPLACE drops and recreates the table — all existing data is deleted. This is safe during initial builds when you are creating STAGED from RAW. But once you are in production and STAGED contains data not in RAW (e.g. from transformations), CREATE OR REPLACE without rebuilding from source means data loss. ShopFlow uses it safely because STAGED is always rebuilt fully from RAW."},
{id:211,type:'tf',topic:'ROW_NUMBER',difficulty:'medium',q:"ROW_NUMBER() guarantees exactly one row gets rank 1 per partition even when two rows are identical.",ans:true,exp:"TRUE. Unlike RANK() or DENSE_RANK(), ROW_NUMBER() never produces ties — every row in a partition gets a unique sequential number. With PARTITION BY zip ORDER BY _loaded_at DESC, even if two rows have the same timestamp, one will get rank 1 arbitrarily. This guarantees exactly one row per zip in STG_GEOLOCATION."},
