{id:408,type:'tf',topic:'RBAC',difficulty:'medium',q:"GRANT ROLE SHOPFLOW_SELLER TO USER PLATYPUS07 means PLATYPUS07 can USE ROLE SHOPFLOW_SELLER in their sessions.",ans:true,exp:"TRUE. GRANT ROLE to USER is how roles are assigned to individuals. PLATYPUS07 can then USE ROLE SHOPFLOW_SELLER to operate with seller-level permissions. A user can have multiple roles granted — they switch between them in different sessions."},
{id:409,type:'tf',topic:'Row Access',difficulty:'medium',q:"Row access policies are enforced server-side — a user cannot bypass them by using SnowSQL, Python connector, or any other client.",ans:true,exp:"TRUE. Row access policies are enforced at the Snowflake engine level, not the client. No matter what client, connector, or query tool — the policy runs. This is a key security guarantee: there is no 'back door' through alternative access methods."},
{id:410,type:'tf',topic:'Result Cache',difficulty:'hard',q:"Three Snowflake cache types exist: result cache (24h, cloud services layer), metadata cache (DDL queries, instant), and warehouse local disk cache (hot data in SSD).",ans:true,exp:"TRUE. The three caches: (1) Result cache: 24h TTL, cloud services layer, exact query + unchanged data, zero credits. (2) Metadata cache: system metadata like SHOW commands, row counts — no warehouse needed. (3) Local disk cache: warm data cached in warehouse SSD between queries in the same session — warehouse must stay running."},
{id:411,type:'tf',topic:'Masking',difficulty:'hard',q:"A masking policy can use CURRENT_ROLE() to check the calling role, but it cannot query a mapping table to determine masking rules dynamically.",ans:false,exp:"FALSE. Masking policy functions CAN query a mapping table. Example: a policy that looks up allowed_roles from a ROLE_PERMISSIONS table. This enables dynamic, data-driven masking rules rather than hardcoded CASE statements. More flexible but the mapping table query adds slight overhead."},
{id:412,type:'tf',topic:'RBAC',difficulty:'hard',q:"WITH GRANT OPTION in a GRANT statement allows the recipient role to grant that privilege to other roles.",ans:true,exp:"TRUE. GRANT SELECT ON TABLE fact_orders TO ROLE shopflow_analyst WITH GRANT OPTION. Now shopflow_analyst can itself grant SELECT on FACT_ORDERS to other roles. Without WITH GRANT OPTION, the recipient can use the privilege but cannot share it further. Use sparingly — it propagates privilege chains."},

// ─── MCQ (IDs 413–430) ────────────────────────────────────────────────────
{id:413,type:'mcq',topic:'RBAC',difficulty:'easy',q:"ShopFlow Phase 04 creates three custom roles: SHOPFLOW_ENGINEER, SHOPFLOW_ANALYST, SHOPFLOW_SELLER. Which has the broadest access?",opts:["A) SHOPFLOW_SELLER — sellers need full data access","B) SHOPFLOW_ANALYST — analysts query all tables","C) SHOPFLOW_ENGINEER — builds the pipeline, needs read/write across all layers","D) All three have identical access"],ans:'C',exp:"SHOPFLOW_ENGINEER needs: CREATE TABLE, INSERT, SELECT across all three schemas (RAW, STAGED, ANALYTICS). SHOPFLOW_ANALYST needs: SELECT on ANALYTICS only. SHOPFLOW_SELLER needs: SELECT on ANALYTICS with row access policy filtering to their seller_id. Engineer > Analyst > Seller in terms of access breadth."},
{id:414,type:'mcq',topic:'Result Cache',difficulty:'easy',q:"You run GMV-by-month query: 3.2s, 1.1 credits. You run it again immediately. What happens?",opts:["A) Same result: 3.2s, 1.1 credits — cache not applicable to GROUP BY queries","B) Instant: 0.0s, 0.0 credits — result cache returns cached result, no warehouse needed","C) Faster: 0.5s, 0.1 credits — warehouse local cache speeds it up","D) Error: result cache requires Enterprise edition"],ans:'B',exp:"Result cache: same query + same data + within 24h = instant return from cloud services layer. ZERO warehouse credits — warehouse doesn't even activate. This is the most dramatic caching demonstration — from 1.1 credits to 0. Available in all Snowflake editions."},
{id:415,type:'mcq',topic:'Masking',difficulty:'easy',q:"A dynamic masking policy replaces customer_email with '***@***.com' for SHOPFLOW_ANALYST. The analyst runs SELECT email FROM STG_CUSTOMERS. What do they see?",opts:["A) NULL — masked columns return NULL","B) The real email address — analysts have SELECT privilege","C) '***@***.com' for every row — the mask is applied to all rows","D) An error — masking prevents SELECT on the column"],ans:'C',exp:"Dynamic masking applies to the column output. Every row returns '***@***.com' (or whatever the mask expression produces). The analyst CAN run SELECT — they just see masked values. The physical data is real; the mask applies at retrieval. No errors, no NULLs (unless the mask expression returns NULL)."},
{id:416,type:'mcq',topic:'Row Access',difficulty:'easy',q:"SHOPFLOW_SELLER role queries FACT_ORDERS which has a row access policy filtering WHERE seller_id = current_seller_id(). A seller with seller_id = 'abc123' sees how many rows?",opts:["A) All 112,650 rows — row access is advisory only","B) Only rows where seller_id = 'abc123' — policy enforced at engine level","C) 0 rows — sellers cannot query FACT_ORDERS","D) A random sample of rows for privacy"],ans:'B',exp:"Row access policies are enforced server-side. The policy function maps the session to allowed seller_ids. 'abc123' only sees their own rows. The WHERE clause in the policy is applied before any results leave the engine — the seller never sees other sellers' data."},
{id:417,type:'mcq',topic:'RBAC',difficulty:'easy',q:"REVOKE SELECT ON TABLE FACT_ORDERS FROM ROLE SHOPFLOW_ANALYST. What happens to an analyst currently running a query on FACT_ORDERS?",opts:["A) Their running query is immediately terminated","B) Their running query completes; subsequent queries fail with insufficient privileges","C) The REVOKE fails because a query is in progress","D) Their session is terminated"],ans:'B',exp:"REVOKE takes effect for new queries. In-flight queries (already started) complete against the data they've already accessed. After REVOKE commits, any new SELECT on FACT_ORDERS by SHOPFLOW_ANALYST returns 'insufficient privileges'. Snowflake does not terminate running queries on privilege changes."},
{id:418,type:'mcq',topic:'Result Cache',difficulty:'medium',q:"Result cache is invalidated by which of the following?",opts:["A) Suspending and resuming the warehouse","B) An INSERT into the underlying table","C) A different user running the same query","D) Changing the session timezone"],ans:'B',exp:"Result cache invalidation triggers: (1) underlying table data changes (DML — INSERT, UPDATE, DELETE, MERGE, COPY INTO). (2) 24-hour TTL expires. (3) Query text changes. Warehouse suspend/resume (A) has no effect on result cache — it lives in cloud services, not the warehouse. Different user (C) can still hit the cache. Session settings (D) that don't affect the query don't invalidate it."},
{id:419,type:'mcq',topic:'Masking',difficulty:'medium',q:"A masking policy on STG_CUSTOMERS.customer_email is created and attached. SHOPFLOW_ENGINEER (who created the policy) queries the column. What do they see?",opts:["A) Masked value — the policy applies to all roles equally","B) Real value — the policy CASE statement grants SHOPFLOW_ENGINEER unmasked access","C) NULL — policy creator gets NULL by convention","D) An error — policy creator cannot query their own masked column"],ans:'B',exp:"The policy defines its own logic: CASE WHEN CURRENT_ROLE() IN ('SHOPFLOW_ENGINEER') THEN email ELSE '***@***.com' END. Engineer sees real email, others see masked. The policy creator has no automatic bypass — the bypass is explicitly in the CASE statement. If you forget to include the engineer role in the CASE, they'd see the masked value too."},
{id:420,type:'mcq',topic:'Row Access',difficulty:'medium',q:"Row access policy vs column masking policy — what is the fundamental difference?",opts:["A) Row access filters WHICH rows are returned; column masking controls WHAT VALUE is shown for a column","B) Row access is faster; column masking is more secure","C) Row access requires Enterprise edition; masking is available on all editions","D) Row access applies to SELECT only; masking applies to all DML"],ans:'A',exp:"Key distinction: Row access = 'can you see this row at all?' (returns or hides entire rows). Column masking = 'what value do you see for this column?' (all rows returned, but column value may be replaced). Both can be used together: seller sees only their own rows AND sees masked customer emails."},
{id:421,type:'mcq',topic:'RBAC',difficulty:'medium',q:"SHOPFLOW_ANALYST role needs SELECT on all current AND future tables in SHOPFLOW_ANALYTICS. Most efficient GRANT?",opts:["A) GRANT SELECT ON TABLE t1, t2, t3, t4, t5 TO ROLE SHOPFLOW_ANALYST","B) GRANT SELECT ON ALL TABLES IN SCHEMA SHOPFLOW_ANALYTICS TO ROLE SHOPFLOW_ANALYST","C) GRANT SELECT ON FUTURE TABLES IN SCHEMA SHOPFLOW_ANALYTICS TO ROLE SHOPFLOW_ANALYST","D) Both B and C together: B for existing tables, C for future tables"],ans:'D',exp:"B grants SELECT on all currently existing tables. C grants SELECT on tables created AFTER the grant. You need BOTH: B covers existing FACT_ORDERS, DIM_* tables; C ensures when Phase 05 adds new tables, the analyst role automatically gets access. Neither alone covers both scenarios."},
{id:422,type:'mcq',topic:'Result Cache',difficulty:'medium',q:"SHOPFLOW_ANALYST runs a query: 4.1 seconds. Five minutes later, an ENGINEER runs INSERT INTO FACT_ORDERS. Then ANALYST runs the same query. What happens?",opts:["A) Instant result from cache — INSERT doesn't invalidate result cache","B) Full re-execution: ~4.1 seconds — INSERT invalidated the result cache for FACT_ORDERS","C) Faster but not instant — partial cache hit","D) Error — cache invalidated queries must be re-prepared"],ans:'B',exp:"Any DML on FACT_ORDERS (INSERT, UPDATE, DELETE, MERGE, COPY INTO) invalidates the result cache for queries that read FACT_ORDERS. The next query re-executes from scratch — full 4.1 seconds again. No partial cache hits — it's all or nothing."},
{id:423,type:'mcq',topic:'Masking',difficulty:'hard',q:"A masking policy is created by SYSADMIN and attached to STG_CUSTOMERS.customer_email. SHOPFLOW_ENGINEER uses USE ROLE SHOPFLOW_ENGINEER. What privilege does SHOPFLOW_ENGINEER need to query the unmasked value?",opts:["A) OWNERSHIP on the masking policy","B) The SHOPFLOW_ENGINEER role must be listed in the policy's CASE expression — no separate privilege","C) APPLY MASKING POLICY privilege","D) ACCOUNTADMIN role"],ans:'B',exp:"Masking policies are role-based — the CASE statement defines which roles see real vs masked values. If CASE WHEN CURRENT_ROLE() = 'SHOPFLOW_ENGINEER' THEN real_value is in the policy, that role sees real data. No extra privilege needed — it's the policy logic itself that controls access. APPLY MASKING POLICY is needed to attach/detach policies, not to see unmasked values."},
{id:424,type:'mcq',topic:'RBAC',difficulty:'hard',q:"PLATYPUS07 has roles: PUBLIC, SHOPFLOW_ENGINEER, SHOPFLOW_ANALYST. They run USE ROLE SHOPFLOW_ANALYST. Can they access SHOPFLOW_RAW tables?",opts:["A) Yes — they have SHOPFLOW_ENGINEER role which has RAW access","B) No — active role is SHOPFLOW_ANALYST which only has ANALYTICS SELECT; RAW access requires switching to SHOPFLOW_ENGINEER","C) Yes — PUBLIC role gives access to all schemas","D) Yes — all their granted roles are active simultaneously"],ans:'B',exp:"Snowflake sessions use ONE active role at a time (unless using SECONDARY ROLES). USE ROLE SHOPFLOW_ANALYST = only SHOPFLOW_ANALYST privileges apply. SHOPFLOW_ENGINEER privileges are not active. To access RAW, they must USE ROLE SHOPFLOW_ENGINEER. This is role isolation in action."},
{id:425,type:'mcq',topic:'Row Access',difficulty:'hard',q:"A row access policy function returns FALSE for all rows for SHOPFLOW_ANALYST querying FACT_ORDERS. What does the analyst see?",opts:["A) An error: 'row access policy denied'","B) 0 rows — the query succeeds but returns an empty result set","C) All rows — FALSE means the policy is off","D) NULL for every column value"],ans:'B',exp:"Row access policy returning FALSE = row is filtered out. If the policy returns FALSE for ALL rows, the query returns an empty result (0 rows). No error — the query 'succeeds' syntactically; it just has no matching rows. The analyst might think the table is empty — no indication a policy is filtering."},
{id:426,type:'mcq',topic:'Result Cache',difficulty:'hard',q:"Three analysts run the exact same GMV query within 1 hour. Analyst 1 runs first (3s, 1.1 credits). What do Analysts 2 and 3 experience?",opts:["A) Each pays 1.1 credits — result cache is per-user","B) Analyst 2 gets cached result (0 credits), Analyst 3 gets cached result (0 credits) — result cache is shared across all users","C) Analyst 2 gets cached, Analyst 3 re-executes — cache has 1 hit limit","D) All three pay 1.1 credits — GROUP BY queries bypass result cache"],ans:'B',exp:"Result cache is account-wide, not per-user. Once any user runs a query that populates the cache, ALL users who run the same query (same text, same data, within 24h) get the cached result. Zero credits for both Analysts 2 and 3. This is a powerful cost optimization for shared dashboards."},
{id:427,type:'mcq',topic:'Masking',difficulty:'easy',q:"Which Snowflake command attaches a masking policy to a column?",opts:["A) CREATE MASKING POLICY ... ON TABLE ... COLUMN ...","B) ALTER TABLE STG_CUSTOMERS MODIFY COLUMN customer_email SET MASKING POLICY email_mask","C) GRANT MASKING POLICY email_mask ON customer_email TO ROLE SHOPFLOW_ANALYST","D) APPLY MASKING POLICY email_mask TO STG_CUSTOMERS.customer_email"],ans:'B',exp:"ALTER TABLE ... MODIFY COLUMN ... SET MASKING POLICY is the correct syntax to attach an existing masking policy to a column. The policy must be created first (CREATE MASKING POLICY), then attached with ALTER TABLE. You can also unset with UNSET MASKING POLICY."},
{id:428,type:'mcq',topic:'RBAC',difficulty:'medium',q:"In ShopFlow, SHOPFLOW_SELLER role should only see their own rows in FACT_ORDERS. The seller's identity is stored in: SELLER_USERS table (seller_id, username). What object implements this securely?",opts:["A) A view with WHERE seller_id = CURRENT_USER()","B) A row access policy that queries SELLER_USERS to get the allowed seller_id for CURRENT_USER()","C) A masking policy that hides other sellers' data","D) A separate copy of FACT_ORDERS per seller"],ans:'B',exp:"Row access policy is the correct security primitive. The policy function: CASE WHEN EXISTS (SELECT 1 FROM SELLER_USERS WHERE username = CURRENT_USER() AND seller_id = fact_orders.seller_id) THEN TRUE ELSE FALSE END. Secure, centralized, enforced at engine level. Views (A) can be bypassed if user has table-level SELECT. Masking (C) hides values but not rows."},
{id:429,type:'mcq',topic:'Row Access',difficulty:'medium',q:"A row access policy is set on FACT_ORDERS. SHOPFLOW_ENGINEER drops the policy (DROP ROW ACCESS POLICY). What happens to FACT_ORDERS?",opts:["A) Error — cannot drop a policy that is attached to a table","B) Policy is dropped and automatically detached — FACT_ORDERS now returns all rows to all roles","C) Policy is detached first, then dropped — two-step process required","D) FACT_ORDERS is also dropped — policies and tables are linked"],ans:'A',exp:"You cannot DROP a row access policy while it is attached to a table — Snowflake returns an error. Correct sequence: (1) ALTER TABLE FACT_ORDERS DROP ROW ACCESS POLICY policy_name — detach. (2) DROP ROW ACCESS POLICY policy_name — drop. This prevents accidental policy removal from active tables."},
{id:430,type:'mcq',topic:'Result Cache',difficulty:'easy',q:"Which session command disables result cache to prove a query re-executes fully?",opts:["A) SET USE_CACHED_RESULT = FALSE","B) ALTER SESSION SET USE_CACHED_RESULT = FALSE","C) SET RESULT_CACHE = DISABLED","D) ALTER WAREHOUSE SHOPFLOW_WH SET USE_CACHE = OFF"],ans:'B',exp:"ALTER SESSION SET USE_CACHED_RESULT = FALSE disables result cache for the current session. Useful for benchmarking — proves a query runs from scratch, not cache. This is the SnowPro-approved way to demonstrate result cache: run query, note time/credits, run again (cache hit), set USE_CACHED_RESULT=FALSE, run again (fresh execution)."},

// ─── MULTI-SELECT (IDs 431–450) ───────────────────────────────────────────
{id:431,type:'multi',topic:'RBAC',difficulty:'easy',q:"ShopFlow Phase 04 creates three custom roles. Which privilege sets are correct? (Select ALL)",opts:["A) SHOPFLOW_ENGINEER: CREATE TABLE, INSERT, SELECT on all three schemas","B) SHOPFLOW_ANALYST: SELECT on SHOPFLOW_ANALYTICS only","C) SHOPFLOW_SELLER: SELECT on SHOPFLOW_ANALYTICS with row access policy enforcing seller_id filtering","D) SHOPFLOW_ANALYST: TRUNCATE on SHOPFLOW_STAGED for data cleanup","E) SHOPFLOW_SELLER: INSERT on SHOPFLOW_RAW for loading new order data"],ans:['A','B','C'],exp:"A: Engineers build the pipeline — full access to all layers. B: Analysts query the star schema only — read-only ANALYTICS. C: Sellers see ANALYTICS but only their own rows via row access policy. D and E are wrong — analysts don't truncate, sellers don't insert into RAW."},
{id:432,type:'multi',topic:'Result Cache',difficulty:'easy',q:"Which correctly describe Snowflake result cache behaviour? (Select ALL)",opts:["A) Same query text + same data + within 24h = instant result, zero credits","B) Result cache is stored in the cloud services layer, not the warehouse","C) Different users can share the same cached result for the same query","D) Result cache is invalidated when the underlying table data changes","E) Warehouse must be running for result cache to work"],ans:['A','B','C','D'],exp:"A: 24h TTL, zero credits. B: Cloud services layer caches — not warehouse. C: Account-wide cache, shared. D: Any DML invalidates. E is FALSE — result cache lives in cloud services, warehouse does NOT need to be running. This is a key fact: zero compute for cached results."},
{id:433,type:'multi',topic:'Masking',difficulty:'easy',q:"Which are true about dynamic data masking in Snowflake? (Select ALL)",opts:["A) Masking policy evaluates CURRENT_ROLE() at query time to decide what to show","B) Physical data in the table is unchanged — masking only affects query output","C) A column can have at most one masking policy attached at a time","D) Masking policy must be created in the same schema as the table it protects","E) Masking is enforced for all access methods including Python connector, SnowSQL, and Snowsight"],ans:['A','B','C','E'],exp:"A: Role-based evaluation at query time. B: Physical data untouched. C: One policy per column. E: Server-side enforcement — all clients. D is FALSE — masking policies can be in any schema and attached to columns in a different schema using fully qualified names."},
{id:434,type:'multi',topic:'Row Access',difficulty:'easy',q:"True statements about row access policies? (Select ALL)",opts:["A) Row access policy filters rows BEFORE they leave the Snowflake engine","B) A user cannot see filtered rows even with SnowSQL or direct API access","C) Row access policies can be applied to tables and views","D) Row access policy logic can reference CURRENT_USER() and CURRENT_ROLE()","E) Row access policies replace the need for separate per-seller tables"],ans:['A','B','C','D','E'],exp:"ALL are true. A: Engine-level filtering. B: No bypass regardless of access method. C: Both tables and views. D: Session context functions work in policy logic. E: Instead of FACT_ORDERS_SELLER_ABC, FACT_ORDERS_SELLER_XYZ, one table with row access policy achieves the same security."},
{id:435,type:'multi',topic:'RBAC',difficulty:'medium',q:"Snowflake's 5 built-in system roles and their primary purposes? (Select ALL that are CORRECTLY described)",opts:["A) ACCOUNTADMIN — full account control, owns billing and governance","B) SYSADMIN — creates and manages warehouses, databases, schemas, tables","C) SECURITYADMIN — creates users, roles, and manages grants","D) USERADMIN — creates users and roles only (subset of SECURITYADMIN)","E) PUBLIC — default role for every user, minimal privileges"],ans:['A','B','C','D','E'],exp:"ALL are correctly described. The hierarchy: ACCOUNTADMIN > SYSADMIN + SECURITYADMIN > USERADMIN > PUBLIC. Higher roles inherit lower role privileges. Best practice: use SYSADMIN for object creation, SECURITYADMIN for RBAC management, never use ACCOUNTADMIN for daily work."},
{id:436,type:'multi',topic:'Masking',difficulty:'medium',q:"A masking policy for customer_email should show full email to SHOPFLOW_ENGINEER, first 3 chars to SHOPFLOW_ANALYST, and NULL to SHOPFLOW_SELLER. Which CASE expression is correct? (Select ALL)",opts:["A) CASE WHEN CURRENT_ROLE() = 'SHOPFLOW_ENGINEER' THEN val WHEN CURRENT_ROLE() = 'SHOPFLOW_ANALYST' THEN LEFT(val,3)||'***' ELSE NULL END","B) CASE WHEN CURRENT_ROLE() IN ('SHOPFLOW_ENGINEER') THEN val WHEN CURRENT_ROLE() IN ('SHOPFLOW_ANALYST') THEN REGEXP_REPLACE(val, '(?<=.{3}).*@', '***@') ELSE NULL END","C) IF(CURRENT_ROLE() = 'SHOPFLOW_ENGINEER', val, NULL)","D) The data type of the masking policy return must match the column data type (VARCHAR for email)","E) The policy function takes 'val' as input — the original column value"],ans:['A','B','D','E'],exp:"A: Correct CASE expression with three tiers. B: Same logic with different masking pattern. D: Return type must match — policy on a VARCHAR column must return VARCHAR. E: The policy function signature: (val VARCHAR) RETURNS VARCHAR. C is wrong — IF only handles two cases; can't serve three tiers of access."},
{id:437,type:'multi',topic:'Row Access',difficulty:'medium',q:"Row access policy for SHOPFLOW_SELLER — which design patterns are valid? (Select ALL)",opts:["A) Policy queries a SELLER_USERS mapping table: WHERE username = CURRENT_USER() to get seller_id","B) Policy uses CURRENT_ROLE(): IF CURRENT_ROLE() = 'SHOPFLOW_SELLER' THEN check seller_id ELSE TRUE (all rows)","C) Policy hardcodes seller_id per user in the CASE expression — no mapping table","D) Policy returns TRUE for SHOPFLOW_ENGINEER (sees all rows) and filters for SHOPFLOW_SELLER","E) Multiple sellers can be given SHOPFLOW_SELLER role and each sees only their own rows"],ans:['A','B','C','D','E'],exp:"ALL are valid patterns. A: Dynamic mapping table (most flexible). B: Role-based branching — engineers see all, sellers see filtered. C: Hardcoded (works but not maintainable for many sellers). D: Role hierarchy in policy logic. E: Row access is per-user based on mapping — multiple sellers can share the role safely."},
{id:438,type:'multi',topic:'RBAC',difficulty:'medium',q:"GRANT SELECT ON FUTURE TABLES IN SCHEMA SHOPFLOW_ANALYTICS TO ROLE SHOPFLOW_ANALYST. What does this cover? (Select ALL)",opts:["A) Tables created AFTER this GRANT statement","B) Existing tables in SHOPFLOW_ANALYTICS — they are also covered","C) Tables in SHOPFLOW_ANALYTICS created in the current session only","D) DIM_DATE if created after this GRANT","E) New STAGED tables (SHOPFLOW_STAGED) are NOT covered — schema-specific grant"],ans:['A','D','E'],exp:"A: FUTURE TABLES = tables created after the grant. D: DIM_DATE created after the grant is covered. E: Grant is schema-specific — SHOPFLOW_ANALYTICS only; SHOPFLOW_STAGED tables are not covered. B is WRONG — FUTURE only covers new tables; existing tables need a separate GRANT ALL TABLES grant."},
{id:439,type:'multi',topic:'Result Cache',difficulty:'medium',q:"To demonstrate result cache in ShopFlow Phase 04, which steps are taken? (Select ALL)",opts:["A) Run the GMV query — note execution time and credits (first run, cache miss)","B) Run the same query again immediately — should return instantly, 0 credits (cache hit)","C) ALTER SESSION SET USE_CACHED_RESULT = FALSE, then run again — proves it re-executes","D) Suspend the warehouse between step 1 and 2 — result cache still works (cloud services layer)","E) Run a different query to clear the cache before step 2"],ans:['A','B','C','D'],exp:"A: First run populates the cache. B: Cache hit — instant, 0 credits. C: Disabling cache proves the baseline cost. D: Warehouse suspension doesn't affect result cache — it lives in cloud services. E is wrong — running a different query doesn't clear this query's cache. The demonstration sequence: run, hit cache, disable cache, run again."},
{id:440,type:'multi',topic:'Masking',difficulty:'hard',q:"What are limitations of dynamic data masking in Snowflake? (Select ALL)",opts:["A) Masking cannot prevent a privileged user from exporting unmasked data if they have OWNERSHIP on the table","B) A masking policy function cannot have subqueries or JOINs","C) Masking policies apply to column-level access but cannot prevent row-level filtering","D) Users with APPLY MASKING POLICY privilege can detach policies — potential security gap","E) Masking the same value consistently (e.g. same email always becomes same hash) requires SHA2 or similar — non-trivial implementation"],ans:['A','D','E'],exp:"A: OWNERSHIP privilege bypasses some security controls — governance gap. D: Anyone with APPLY MASKING POLICY can detach policies. E: Consistent masking (same email → same hash) enables linking but requires SHA2/hash in the policy expression. B is FALSE — policies CAN contain subqueries (used for mapping tables). C is false — masking affects column values; row access policies handle row filtering."},
{id:441,type:'multi',topic:'Row Access',difficulty:'hard',q:"True statements about row access policy vs view-based row security? (Select ALL)",opts:["A) Row access policy: single table, policy engine filters; View: SELECT * FROM table WHERE seller_id = CURRENT_USER()","B) Row access policies are transparent — users query the table directly, not a view","C) Views can be bypassed if users have direct table SELECT; row access policies cannot","D) Both approaches prevent Snowflake administrators from seeing filtered rows","E) Row access policy shows empty result for filtered rows; view shows the same"],ans:['A','B','C','E'],exp:"A: Correct description of each approach. B: Policies are transparent — no view layer needed. C: Critical security difference — views are bypassable, policies are not. E: Both return empty results for filtered data. D is FALSE — Snowflake administrators (ACCOUNTADMIN) have overriding access and can bypass policies by certain mechanisms."},
{id:442,type:'multi',topic:'RBAC',difficulty:'hard',q:"SHOPFLOW_ANALYST runs a query. Snowflake checks multiple privilege layers. Which must ALL be satisfied for the query to succeed? (Select ALL)",opts:["A) SHOPFLOW_ANALYST has USAGE on SHOPFLOW_WH","B) SHOPFLOW_ANALYST has USAGE on SHOPFLOW_DB","C) SHOPFLOW_ANALYST has USAGE on SHOPFLOW_ANALYTICS schema","D) SHOPFLOW_ANALYST has SELECT on the queried tables in SHOPFLOW_ANALYTICS","E) SHOPFLOW_ANALYST has OPERATE on SHOPFLOW_WH (to start it)"],ans:['A','B','C','D'],exp:"ALL of A, B, C, D are required. USAGE on warehouse (to compute), USAGE on database and schema (to navigate the namespace), SELECT on table (to read data). Missing any one = error. E is wrong — OPERATE is needed to manually suspend/resume; AUTO_RESUME handles startup automatically with just USAGE."},
{id:443,type:'multi',topic:'Masking',difficulty:'easy',q:"Which correctly describe the CREATE MASKING POLICY statement? (Select ALL)",opts:["A) Specifies the input data type (e.g. VARCHAR for email)","B) Specifies the return data type (must match the column data type)","C) Contains the CASE expression determining what value to return per role","D) Can be created in any schema and attached to columns in other schemas","E) Once created, it is automatically applied to all VARCHAR columns"],ans:['A','B','C','D'],exp:"A: Input type = column data type. B: Return type must also match. C: CASE expression is the policy logic. D: Cross-schema attachment with fully qualified name. E is FALSE — policies must be explicitly attached to specific columns with ALTER TABLE."},
{id:444,type:'multi',topic:'Row Access',difficulty:'medium',q:"SHOPFLOW_SELLER (seller X) queries FACT_ORDERS. The row access policy is: CASE WHEN CURRENT_ROLE() = 'SHOPFLOW_ENGINEER' THEN TRUE WHEN CURRENT_ROLE() = 'SHOPFLOW_SELLER' THEN (seller_id = get_seller_for_user(CURRENT_USER())) ELSE FALSE END. What do different roles see? (Select ALL)",opts:["A) SHOPFLOW_ENGINEER: all rows","B) SHOPFLOW_SELLER: only rows where seller_id matches their user's seller","C) SHOPFLOW_ANALYST: 0 rows — ELSE FALSE catches them","D) PUBLIC role: 0 rows","E) ACCOUNTADMIN: all rows — ACCOUNTADMIN bypasses all policies"],ans:['A','B','C','D'],exp:"A: ELSE IF ENGINEER THEN TRUE = all rows. B: Seller gets their rows via mapping function. C: ANALYST is not ENGINEER or SELLER → ELSE FALSE → 0 rows. D: PUBLIC → ELSE FALSE → 0 rows. E is FALSE in this context — ACCOUNTADMIN is still subject to row access policies unless using specific override mechanisms. Policies are enforced for ALL roles including ACCOUNTADMIN."},
{id:445,type:'multi',topic:'RBAC',difficulty:'hard',q:"Which Snowflake RBAC behaviours match AWS IAM concepts? (Select ALL)",opts:["A) Snowflake role → AWS IAM role","B) Snowflake privilege → AWS IAM permission/policy statement","C) GRANT ROLE TO USER → Attach IAM role to IAM user","D) Snowflake SECURITYADMIN → AWS IAM administrator","E) WITH GRANT OPTION → AWS IAM PassRole permission"],ans:['A','B','C','D','E'],exp:"ALL are valid conceptual mappings. A: Roles in both systems are collections of permissions. B: Privileges map to IAM policy statements (Allow s3:GetObject). C: Role assignment is equivalent. D: Both manage the IAM/RBAC layer. E: WITH GRANT OPTION (pass on privileges) ≈ iam:PassRole (pass a role to a service). These mappings help AWS practitioners understand Snowflake RBAC faster."},
{id:446,type:'multi',topic:'Result Cache',difficulty:'hard',q:"Scenario: BI dashboard runs 50 queries every 5 minutes. Data is loaded nightly. Which result cache optimizations apply? (Select ALL)",opts:["A) After the first run at 6am, all 50 queries are cached — subsequent runs until 6am the next day return from cache at 0 cost","B) The nightly COPY INTO at 2am invalidates all caches — first dashboard run after load re-executes all 50 queries","C) If two dashboard users run the same query within 24h, only the first pays credits — second is free","D) Warehouse can be suspended during dashboard refresh (after first run) — cache serves all subsequent requests","E) Adding a meaningless comment (/* refresh */) to the query breaks cache — different query text"],ans:['A','B','C','D','E'],exp:"ALL are true and important. A: 24h cache serves the full day. B: Nightly load invalidates — first morning run is expensive. C: Shared cache across users. D: Warehouse not needed for cache hits — significant cost savings. E: Any change in query text = cache miss — even adding a comment. Consistent query text is important for cache efficiency."},
{id:447,type:'multi',topic:'Masking',difficulty:'hard',q:"You want to apply masking to customer_email on STG_CUSTOMERS AND the equivalent column in DIM_CUSTOMERS. What is required? (Select ALL)",opts:["A) The same masking policy can be attached to both columns if they have the same data type","B) You must create two separate masking policies — one per table","C) ALTER TABLE STG_CUSTOMERS MODIFY COLUMN customer_email SET MASKING POLICY email_mask","D) ALTER TABLE DIM_CUSTOMERS MODIFY COLUMN customer_email SET MASKING POLICY email_mask (second separate statement)","E) One masking policy can be reused across multiple tables and schemas"],ans:['A','C','D','E'],exp:"A and E: One policy, multiple attachments — reusability is a key benefit. C and D: Two separate ALTER TABLE statements to attach to each column. B is FALSE — you do NOT need two separate policies; the same policy applies to both. This is the efficiency benefit of policies as named objects."},
{id:448,type:'multi',topic:'Row Access',difficulty:'hard',q:"A row access policy is defined but the mapping table (SELLER_USERS) is empty. SHOPFLOW_SELLER queries FACT_ORDERS. What happens? (Select ALL)",opts:["A) Policy function finds no matching seller_id for the user — returns FALSE for all rows","B) FACT_ORDERS returns 0 rows to SHOPFLOW_SELLER","C) Policy function returns NULL — Snowflake treats NULL as FALSE in row access context","D) SHOPFLOW_SELLER gets an error: 'mapping table is empty'","E) This is a security gap that should be tested as part of policy validation"],ans:['A','B','C','E'],exp:"A: No match → function returns FALSE (or NULL, treated as FALSE). B: 0 rows returned — empty result. C: NULL in row access = access denied = FALSE. E: Testing edge cases (empty mapping, new user with no mapping) is essential policy validation. D is wrong — no error is raised; empty result is returned silently."},
{id:449,type:'multi',topic:'RBAC',difficulty:'medium',q:"True statements about Snowflake object ownership and privileges? (Select ALL)",opts:["A) The role that creates an object automatically owns it","B) The owner role can grant access to others without ACCOUNTADMIN involvement","C) OWNERSHIP can be transferred using GRANT OWNERSHIP ON TABLE ... TO ROLE ...","D) If the owner role is dropped, the owned objects are automatically dropped","E) OWNERSHIP grants the ability to ALTER, DROP, and manage grants for the object"],ans:['A','B','C','E'],exp:"A: Creator = owner. B: Owner can grant without ACCOUNTADMIN. C: GRANT OWNERSHIP transfers ownership. E: Ownership = full control (ALTER, DROP, GRANT privileges to others). D is FALSE — if a role is dropped, its owned objects are NOT automatically dropped; ownership must be transferred first."},
{id:450,type:'multi',topic:'Result Cache',difficulty:'medium',q:"Phase 04 demonstrates three cache types. Match each cache to its description. Which are CORRECTLY described? (Select ALL)",opts:["A) Result cache: zero credits, instant, cloud services layer, 24h TTL, query text + data must match","B) Metadata cache: serves SHOW commands and system queries, no warehouse needed","C) Warehouse local disk cache: warm data in SSD on warehouse nodes, survives warehouse suspension","D) All three caches are visible in QUERY_HISTORY as cache_hit = TRUE","E) Result cache is the most impactful for reducing costs on repeated analytical queries"],ans:['A','B','E'],exp:"A: Complete and correct result cache description. B: Metadata cache serves DDL/metadata queries. E: Result cache eliminates all compute for repeated queries — biggest cost impact. C is FALSE — warehouse local cache is LOST when warehouse suspends (it's in-memory/SSD on the cluster, which is deallocated). D is FALSE — only result cache shows explicitly as 'result cache hit'; the others aren't labelled the same way in query history."},
];
const QUIZ_POOL_P5=[
{id:501,type:'tf',topic:'Streams',difficulty:'easy',q:"A Snowflake stream captures INSERT, UPDATE, and DELETE changes that occur AFTER the stream is created.",ans:true,exp:"TRUE. A standard stream tracks all DML from the moment of creation. Changes that occurred before stream creation are not visible. METADATA$ACTION='INSERT'/'DELETE', and updates appear as two rows (DELETE old + INSERT new) with METADATA$ISUPDATE=TRUE."},
{id:502,type:'tf',topic:'Streams',difficulty:'easy',q:"A plain SELECT on a stream advances the offset and consumes the rows.",ans:false,exp:"FALSE. SELECT is read-only — it does NOT advance the stream offset. Only committed DML statements (INSERT...SELECT, MERGE, CTAS) that use the stream as a source consume rows and advance the offset. You can SELECT a stream repeatedly without consuming it."},
{id:503,type:'tf',topic:'Tasks',difficulty:'easy',q:"A suspended Snowflake task consumes zero credits while waiting to run.",ans:true,exp:"TRUE. Suspended tasks are completely idle. Credits are charged only when a task actively executes SQL. This makes SUSPEND/RESUME the correct pattern for temporarily pausing a pipeline without ongoing cost."},
{id:504,type:'tf',topic:'Tasks',difficulty:'easy',q:"SYSTEM$STREAM_HAS_DATA can be used in a task's WHEN clause to skip the run when the stream is empty.",ans:true,exp:"TRUE. CREATE TASK ... WHEN SYSTEM$STREAM_HAS_DATA('stream_name') ... — if FALSE, task is SKIPPED with no compute. Key cost pattern: schedule frequently for low latency, only pay when data exists."},
{id:505,type:'tf',topic:'Sharing',difficulty:'easy',q:"Snowflake secure data sharing physically copies the provider's data to the consumer's account.",ans:false,exp:"FALSE. Zero-copy sharing — consumers query the provider's live data through metadata pointers. No data is exported, transferred, or duplicated. The provider retains full ownership. Consumer always sees current data."},
{id:506,type:'tf',topic:'Streams',difficulty:'easy',q:"An append-only stream only tracks INSERT operations — it ignores UPDATE and DELETE.",ans:true,exp:"TRUE. Append-only streams are optimised for insert-only tables. They skip UPDATE/DELETE tracking overhead, making them faster and cheaper. FACT_ORDERS only receives INSERTs — append-only is the correct choice."},
{id:507,type:'tf',topic:'Sharing',difficulty:'easy',q:"A reader account is created and paid for by the data provider, for consumers without a Snowflake account.",ans:true,exp:"TRUE. Reader accounts allow non-Snowflake organisations to access shared data. The provider creates and manages the account, and pays for the consumer's query compute. The consumer gets read-only access."},
{id:508,type:'tf',topic:'Tasks',difficulty:'medium',q:"A task with WAREHOUSE=SHOPFLOW_WH will fail if the warehouse is suspended when the task fires.",ans:false,exp:"FALSE. AUTO_RESUME=TRUE (set on SHOPFLOW_WH) automatically starts the warehouse when any query — including a task — needs compute. The task resumes the warehouse, runs, and the warehouse auto-suspends after AUTO_SUSPEND seconds."},
{id:509,type:'tf',topic:'Streams',difficulty:'medium',q:"A stream on FACT_ORDERS becomes stale if its offset falls outside the table's DATA_RETENTION_TIME_IN_DAYS window.",ans:true,exp:"TRUE. Streams use Time Travel to track historical changes. If the offset is older than the retention period, that data moves to Fail-safe (inaccessible). With ShopFlow's 1-day retention, a stream not consumed for 25+ hours risks going stale."},
{id:510,type:'tf',topic:'Tasks',difficulty:'medium',q:"When any task in a DAG fails, Snowflake suspends the root task — halting the entire pipeline.",ans:true,exp:"TRUE. Task failure suspends the ROOT task of the DAG. Recovery requires: fix the root cause, then ALTER TASK root_task RESUME. This prevents cascading failures where downstream tasks process incomplete data."},
{id:511,type:'tf',topic:'Sharing',difficulty:'medium',q:"Data consumers can use Time Travel to query historical versions of tables in a share.",ans:false,exp:"FALSE. Time Travel on shared tables is only available to the data provider. Consumers query only the current state. The provider controls retention and can query history; consumers cannot."},
{id:512,type:'tf',topic:'Streams',difficulty:'hard',q:"A MERGE that reads from a stream and then rolls back does NOT advance the stream offset.",ans:true,exp:"TRUE. Stream consumption is fully transactional — all-or-nothing. A rolled-back transaction does not advance the offset. The rows remain for the next attempt. This guarantees exactly-once processing: if your task fails and rolls back, the next run re-processes the same data."},
{id:513,type:'tf',topic:'Tasks',difficulty:'hard',q:"In a task DAG, a child task can be resumed independently to restart processing from the middle of the DAG after a failure.",ans:false,exp:"FALSE. Task failure suspends the ROOT task. You cannot resume from the middle of a DAG. Recovery always requires ALTER TASK root_task RESUME, which restarts the full DAG from the beginning on the next scheduled interval."},
{id:514,type:'mcq',topic:'Streams',difficulty:'easy',q:"What does METADATA$ACTION contain for the row representing new values after an UPDATE?",opts:["A) 'UPDATE'","B) 'MODIFY'","C) 'INSERT'","D) 'UPSERT'"],ans:'C',exp:"UPDATE = two stream rows: DELETE (old values, METADATA$ACTION='DELETE') + INSERT (new values, METADATA$ACTION='INSERT'). Both rows have METADATA$ISUPDATE=TRUE. There is no 'UPDATE' or 'MODIFY' action value."},
{id:515,type:'mcq',topic:'Tasks',difficulty:'easy',q:"Which CRON expression runs a task at 2 AM UTC every day?",opts:["A) 'USING CRON 0 2 * * * UTC'","B) 'USING CRON 2 0 * * * UTC'","C) 'USING CRON */2 * * * * UTC'","D) 'USING CRON 0 0 2 * * UTC'"],ans:'A',exp:"CRON format: minute hour day-of-month month day-of-week timezone. '0 2 * * * UTC' = minute 0 of hour 2 = 2:00 AM UTC. B = 00:02. C = every 2 minutes. D = day 2 of month at midnight."},
{id:516,type:'mcq',topic:'Sharing',difficulty:'easy',q:"Which command grants a consumer account access to a share?",opts:["A) GRANT SHARE shopflow_share TO ACCOUNT consumer_id","B) SHARE TO ACCOUNT consumer_id FROM shopflow_share","C) CREATE SHARE FOR ACCOUNT consumer_id","D) ADD CONSUMER consumer_id TO SHARE shopflow_share"],ans:'A',exp:"GRANT SHARE share_name TO ACCOUNT locator is the final step of sharing. The consumer then runs CREATE DATABASE FROM SHARE to mount shared objects in their account."},
{id:517,type:'mcq',topic:'Tasks',difficulty:'easy',q:"Which view shows the execution history of a Snowflake task including errors and credits?",opts:["A) INFORMATION_SCHEMA.TASK_RUNS","B) SNOWFLAKE.ACCOUNT_USAGE.TASK_HISTORY","C) SHOW TASK HISTORY","D) DESCRIBE TASK my_task"],ans:'B',exp:"SNOWFLAKE.ACCOUNT_USAGE.TASK_HISTORY records every run: start/end time, state (succeeded/failed/skipped), error messages, credits used. INFORMATION_SCHEMA.TASK_HISTORY is the shorter-retention version. SHOW/DESCRIBE show task definition, not run history."},
{id:518,type:'mcq',topic:'Streams',difficulty:'easy',q:"Which stream type should be used on FACT_ORDERS given it only receives INSERTs?",opts:["A) Standard stream","B) Append-only stream","C) Insert-only stream","D) External stream"],ans:'B',exp:"Append-only streams are optimised for insert-only tables — they skip UPDATE/DELETE tracking overhead. FACT_ORDERS is a fact table that only grows via inserts. Standard stream is overkill. 'Insert-only' and 'external' are not valid Snowflake stream types."},
{id:519,type:'mcq',topic:'Sharing',difficulty:'medium',q:"Why use a SECURE VIEW in a share rather than sharing the base table directly?",opts:["A) Secure views query faster for consumers","B) To control column access and apply row-level filters without exposing the underlying table","C) Secure views are required — base tables cannot be shared","D) Secure views reduce provider storage costs"],ans:'B',exp:"Secure views let providers define exactly what consumers see: select only approved columns, add WHERE filters for row-level security, hide business logic. The view definition is hidden from consumers. Base tables CAN be shared directly, but secure views offer finer control."},
{id:520,type:'mcq',topic:'Tasks',difficulty:'medium',q:"A DAG: root → validate → transform → summarise. Transform fails. What is the recovery sequence?",opts:["A) ALTER TASK transform RESUME to restart from the failure point","B) Fix the issue then ALTER TASK root RESUME to restart the full DAG","C) ALTER TASK summarise SKIP to continue from summarise","D) The DAG auto-retries transform 3 times then continues"],ans:'B',exp:"Task failure suspends the ROOT task. Recovery: fix root cause, then ALTER TASK root RESUME. The DAG restarts from the root on next scheduled run. You cannot resume from mid-DAG or skip failed tasks. No automatic retry by default."},
{id:521,type:'mcq',topic:'Streams',difficulty:'medium',q:"FACT_ORDERS has DATA_RETENTION_TIME_IN_DAYS=1. The stream was last consumed 23 hours ago. What is its state?",opts:["A) Stale — approaching the retention limit","B) Healthy — 23 hours is within the 1-day retention window","C) Pending — requires manual refresh before 24-hour mark","D) Suspended — task hasn't run yet"],ans:'B',exp:"23 hours < 24-hour retention = stream is healthy. The stream's offset is 23 hours ago; Time Travel can still access that data. At 25+ hours it would become stale. Illustrates why nightly tasks with 1-day retention have very little buffer for missed runs."},
{id:522,type:'mcq',topic:'Sharing',difficulty:'medium',q:"Standard Snowflake data sharing works between accounts in which configuration?",opts:["A) Same Snowflake account — different users","B) Any two accounts in the same organisation","C) Same cloud provider AND same region","D) Any two Snowflake accounts worldwide"],ans:'C',exp:"Standard sharing requires same cloud provider (both AWS, or both Azure, or both GCP) AND same region (e.g. both us-east-1). For cross-region or cross-cloud, use database replication to create a copy in the target region, then share from there."},
{id:523,type:'mcq',topic:'Tasks',difficulty:'medium',q:"What distinguishes a root task from a child task in a DAG?",opts:["A) Root tasks can modify data; child tasks are read-only","B) Root tasks have a SCHEDULE; child tasks use AFTER parent_task","C) Root tasks use serverless; child tasks use named warehouses","D) Root tasks run in SHOPFLOW_ANALYTICS; child tasks in SHOPFLOW_STAGED"],ans:'B',exp:"Root task: has SCHEDULE (cron or minute interval), drives the whole DAG. Child tasks: defined with AFTER parent_task — no independent schedule. A task cannot have both SCHEDULE and AFTER."},
{id:524,type:'mcq',topic:'Streams',difficulty:'hard',q:"You query a stream with SELECT * five times. Then a task runs MERGE from the same stream. How many rows does the MERGE see?",opts:["A) 0 — SELECT consumed the rows across 5 queries","B) All rows — SELECT never advances the offset","C) Rows added after the 5th SELECT only","D) Rows divided equally across the 6 reads"],ans:'B',exp:"SELECT NEVER consumes stream rows. The stream offset remains unchanged regardless of how many SELECT queries run. The MERGE sees ALL unconsumed rows accumulated since the stream was last consumed by a committed DML transaction."},
{id:525,type:'mcq',topic:'Sharing',difficulty:'hard',q:"A consumer runs CREATE DATABASE shared_db FROM SHARE provider.shopflow_share. What can they do?",opts:["A) INSERT INTO shared_db.SHOPFLOW_ANALYTICS.FACT_ORDERS","B) SELECT * FROM shared_db.SHOPFLOW_ANALYTICS.FACT_ORDERS","C) CLONE TABLE shared_db.SHOPFLOW_ANALYTICS.FACT_ORDERS","D) CREATE STREAM ON shared_db.SHOPFLOW_ANALYTICS.FACT_ORDERS"],ans:'B',exp:"Consumers can only query (SELECT) shared objects. Cannot: INSERT/UPDATE/DELETE (read-only), CLONE shared objects, or CREATE STREAMS on shared tables. Time Travel is also unavailable to consumers."},
{id:526,type:'mcq',topic:'Tasks',difficulty:'hard',q:"A task with SCHEDULE='1 MINUTE' and WHEN SYSTEM$STREAM_HAS_DATA has no data for 6 hours. Billing impact?",opts:["A) Warehouse wakes 360 times — full billing for 360 activations","B) Task is SKIPPED — warehouse does NOT resume — near-zero cost","C) Task fires every minute but runs in under 1 second — 360 × 60-second minimum billing","D) Snowflake auto-suspends the task after 30 minutes of no data"],ans:'B',exp:"WHEN clause returning FALSE = task SKIPPED = no warehouse activation = near-zero cost. This is the key design pattern: schedule at 1-minute intervals for low latency, but only pay when data exists. No auto-suspension — task remains scheduled but skips."},
{id:527,type:'mcq',topic:'Sharing',difficulty:'hard',q:"A provider wants to share data with a company using a different cloud provider. Correct approach?",opts:["A) Standard CREATE SHARE works across all clouds","B) Replicate the database to a secondary account in the target cloud/region, then share from there","C) Export to S3 and share the bucket credentials","D) Use COPY INTO a file in the consumer's external stage"],ans:'B',exp:"Standard sharing is same cloud+region only. For cross-cloud/region: replicate the database using DATABASE REPLICATION to a secondary account in the target environment, then CREATE SHARE from that secondary account. Or use Snowflake Data Exchange."},
{id:528,type:'mcq',topic:'Streams',difficulty:'hard',q:"CREATE OR REPLACE TABLE FACT_ORDERS AS SELECT ... is run to rebuild the fact table. What happens to existing streams on FACT_ORDERS?",opts:["A) Streams continue tracking the new table transparently","B) Streams become stale or broken — CREATE OR REPLACE drops the original table","C) Streams automatically point to the new table after 5 minutes","D) Streams are paused and must be manually resumed"],ans:'B',exp:"CREATE OR REPLACE drops the original table and creates a new one. Streams referencing the original table lose their source and become stale/broken. You must DROP and recreate the stream on the new table. This is a key reason to use TRUNCATE + INSERT instead of CREATE OR REPLACE when streams exist."},
{id:529,type:'mcq',topic:'Tasks',difficulty:'medium',q:"Serverless tasks vs warehouse tasks — which is better for a 5-second nightly aggregation job?",opts:["A) Warehouse task — always cheaper","B) Serverless task — avoids 60-second minimum billing for a short job","C) They cost exactly the same for any workload","D) Warehouse task if the warehouse is already running; serverless otherwise"],ans:'D',exp:"If the warehouse is already active (e.g. other work is running), warehouse tasks add near-zero incremental cost. If the warehouse would need to wake up for 5 seconds, you pay 60-second minimum — serverless is cheaper. D captures the nuance. B is close but D is more complete."},
{id:530,type:'mcq',topic:'Tasks',difficulty:'easy',q:"What is the minimum task scheduling interval in Snowflake?",opts:["A) 30 seconds","B) 1 minute","C) 5 minutes","D) 1 hour"],ans:'B',exp:"Minimum task schedule is 1 minute (SCHEDULE='1 MINUTE'). For sub-minute processing, Snowpipe is the recommended approach for continuous ingestion. Tasks are designed for periodic batch-style execution."},
{id:531,type:'multi',topic:'Streams',difficulty:'easy',q:"Which metadata columns exist on a standard stream? (Select ALL)",opts:["A) METADATA$ACTION — 'INSERT' or 'DELETE'","B) METADATA$ISUPDATE — TRUE when row is part of an UPDATE","C) METADATA$ROW_ID — unique identifier for the source row","D) METADATA$TIMESTAMP — when the change was committed","E) METADATA$SOURCE_TABLE — name of the tracked table"],ans:['A','B','C'],exp:"Three metadata columns: METADATA$ACTION, METADATA$ISUPDATE, METADATA$ROW_ID. METADATA$TIMESTAMP does not exist — capture timing with CURRENT_TIMESTAMP() in your consuming query. METADATA$SOURCE_TABLE does not exist."},
{id:532,type:'multi',topic:'Tasks',difficulty:'easy',q:"Valid task scheduling methods in Snowflake? (Select ALL)",opts:["A) SCHEDULE = '5 MINUTE'","B) SCHEDULE = 'USING CRON 0 22 * * * UTC'","C) AFTER parent_task — runs after parent completes","D) SCHEDULE = 'DAILY AT 02:00'","E) SCHEDULE = '1 HOUR'"],ans:['A','B','C','E'],exp:"A: Interval in minutes — valid. B: CRON expression — valid. C: DAG dependency on parent — no SCHEDULE needed. E: '1 HOUR' shorthand — valid. D is INVALID — no 'DAILY AT HH:MM' syntax. Use CRON: USING CRON 0 2 * * * UTC."},
{id:533,type:'multi',topic:'Sharing',difficulty:'easy',q:"True statements about Snowflake data sharing? (Select ALL)",opts:["A) No data is physically copied to the consumer","B) Consumer queries always reflect the provider's latest data","C) Consumers can only read — no writes to shared data","D) Sharing works across any two Snowflake accounts worldwide","E) The provider retains full ownership and can revoke access at any time"],ans:['A','B','C','E'],exp:"A: Zero-copy. B: Live access. C: Read-only for consumers. E: Provider controls access. D is FALSE — standard sharing is same cloud + same region only."},
{id:534,type:'multi',topic:'Streams',difficulty:'easy',q:"Which DML operations consume a stream (advance its offset)? (Select ALL)",opts:["A) INSERT INTO target SELECT * FROM my_stream","B) SELECT * FROM my_stream","C) MERGE INTO target USING my_stream ON ...","D) CREATE TABLE new_table AS SELECT * FROM my_stream","E) DESCRIBE my_stream"],ans:['A','C','D'],exp:"Offset advances on committed DML that uses the stream as a source: INSERT...SELECT (A), MERGE (C), CTAS (D). SELECT (B) and DESCRIBE (E) are read-only and do NOT advance the offset."},
{id:535,type:'multi',topic:'Tasks',difficulty:'easy',q:"Required steps to create a working task that runs at 2 AM daily? (Select ALL)",opts:["A) CREATE TASK with SCHEDULE = 'USING CRON 0 2 * * * UTC'","B) Specify WAREHOUSE or use SERVERLESS compute","C) Write SQL in the task body","D) ALTER TASK my_task RESUME after creation","E) GRANT EXECUTE TASK to the role running it"],ans:['A','B','C','D','E'],exp:"All five are required: A: Schedule. B: Compute (warehouse or serverless). C: The SQL to execute. D: Tasks are created in SUSPENDED state — must RESUME to activate. E: The role executing the task needs EXECUTE TASK privilege."},
{id:536,type:'multi',topic:'Sharing',difficulty:'medium',q:"Steps required to share FACT_ORDERS with a consumer account? (Select ALL)",opts:["A) CREATE SHARE shopflow_share","B) GRANT USAGE ON DATABASE SHOPFLOW_DB TO SHARE shopflow_share","C) GRANT USAGE ON SCHEMA SHOPFLOW_ANALYTICS TO SHARE shopflow_share","D) GRANT SELECT ON TABLE FACT_ORDERS TO SHARE shopflow_share","E) GRANT SHARE shopflow_share TO ACCOUNT consumer_account_locator"],ans:['A','B','C','D','E'],exp:"ALL five steps are required in order. It's a layered permission model: create the share container, grant database access, grant schema access, grant table/view access, then assign to consumer. Missing any step prevents the consumer from accessing the data."},
{id:537,type:'multi',topic:'Streams',difficulty:'medium',q:"A single UPDATE to one row in FACT_ORDERS. What appears in the stream? (Select ALL true)",opts:["A) Two rows: one DELETE (old values), one INSERT (new values)","B) Both rows have METADATA$ISUPDATE = TRUE","C) Both rows have the same METADATA$ROW_ID linking them to the same source row","D) One row with METADATA$ACTION = 'UPDATE'","E) The DELETE row shows the old column values"],ans:['A','B','C','E'],exp:"UPDATE = 2 rows: DELETE + INSERT (A). Both have METADATA$ISUPDATE=TRUE (B). Same METADATA$ROW_ID links them (C). DELETE row shows old values (E). D is false — no 'UPDATE' action value exists."},
{id:538,type:'multi',topic:'Tasks',difficulty:'medium',q:"Correct statements about task DAGs? (Select ALL)",opts:["A) DAG must have exactly one root task with a SCHEDULE","B) Child tasks use AFTER parent_task — no SCHEDULE","C) A task can wait for multiple predecessors: AFTER task_a, task_b","D) Circular dependencies are allowed if in different schemas","E) Root suspension stops the entire DAG"],ans:['A','B','C','E'],exp:"A: One scheduled root. B: Children use AFTER. C: Fan-in via multiple AFTER predecessors. E: Root controls everything. D is FALSE — circular dependencies are never allowed. Snowflake validates and rejects them at creation time."},
{id:539,type:'multi',topic:'Sharing',difficulty:'medium',q:"Valid reasons to use SECURE VIEW in a share instead of the base table? (Select ALL)",opts:["A) Share only specific columns — hide sensitive ones like customer email","B) Apply row-level filters so sellers see only their own orders","C) Hide the view's SQL definition from consumers","D) Secure views run faster than tables for consumers","E) Share aggregated data without exposing individual row detail"],ans:['A','B','C','E'],exp:"A: Column restriction. B: Row-level security via WHERE CURRENT_USER(). C: Secure views hide definition — consumers can't reverse-engineer your business logic. E: Aggregate views for privacy. D is false — performance is the same."},
{id:540,type:'multi',topic:'Streams',difficulty:'medium',q:"ShopFlow Phase 5 design: stream on FACT_ORDERS feeding a nightly task. Which decisions matter? (Select ALL)",opts:["A) Use append-only stream — FACT_ORDERS only receives INSERTs","B) Set DATA_RETENTION_TIME_IN_DAYS > task interval to avoid stale stream","C) MERGE in task body handles retries safely (idempotent)","D) Stream must be in same schema as FACT_ORDERS","E) Use WHEN SYSTEM$STREAM_HAS_DATA to skip nights with no new orders"],ans:['A','B','C','E'],exp:"A: Append-only is correct. B: 1-day retention with nightly task — any missed run risks staleness. C: MERGE is idempotent — safe for retries. E: Skip cost for empty nights. D is false — stream and table can be in different schemas."},
{id:541,type:'multi',topic:'Sharing',difficulty:'medium',q:"Which objects can be added to a Snowflake share? (Select ALL)",opts:["A) Tables","B) Secure views","C) External tables","D) Stored procedures","E) Sequences"],ans:['A','B','C'],exp:"Shareable objects: tables, secure views, external tables, materialised views (Enterprise). Stored procedures and sequences cannot be shared. Secure views are the recommended approach for sharing curated data subsets with column/row-level control."},
{id:542,type:'multi',topic:'Tasks',difficulty:'medium',q:"Useful task monitoring approaches in Snowflake? (Select ALL)",opts:["A) SNOWFLAKE.ACCOUNT_USAGE.TASK_HISTORY — full history, errors, credits","B) INFORMATION_SCHEMA.TASK_HISTORY — lower latency, shorter retention","C) SHOW TASKS — task definitions and current state","D) DESCRIBE TASK my_task — schedule, predecessor, warehouse, last run","E) SELECT * FROM SYSTEM$TASK_DEPENDENTS('root') — DAG structure"],ans:['A','B','C','D'],exp:"A: 365-day audit trail. B: Database-level, near-real-time. C: All task states at a glance. D: Single-task details. E is not a valid Snowflake function — DAG structure is inspected via SHOW TASKS."},
{id:543,type:'multi',topic:'Streams',difficulty:'hard',q:"Which events cause a stream on FACT_ORDERS to become stale? (Select ALL)",opts:["A) Stream offset falls outside DATA_RETENTION_TIME_IN_DAYS","B) FACT_ORDERS is rebuilt with CREATE OR REPLACE TABLE","C) Stream is queried with SELECT multiple times without DML","D) DATA_RETENTION_TIME_IN_DAYS on FACT_ORDERS is changed to 0","E) Task consumes the stream every 12 hours consistently"],ans:['A','B','D'],exp:"A: Offset outside retention = historical data gone = stale. B: CREATE OR REPLACE drops the source table — stream loses reference. D: Retention 0 = no Time Travel = immediate staleness. C is safe — SELECT doesn't advance offset. E is healthy — regular consumption keeps offset current."},
{id:544,type:'multi',topic:'Tasks',difficulty:'hard',q:"Key design considerations for the ShopFlow nightly DAILY_SELLER_SUMMARY task? (Select ALL)",opts:["A) WHEN SYSTEM$STREAM_HAS_DATA to skip empty runs","B) Know that task failure suspends root — have RESUME procedure ready","C) TRUNCATE + INSERT pattern for clean nightly rebuild","D) Serverless compute avoids 60-second minimum billing for short jobs","E) Chain after a validation task in a DAG for data quality gate"],ans:['A','B','C','D','E'],exp:"ALL five are valid production principles: A: Skip cost on empty nights. B: Know failure/recovery model. C: Clean rebuild avoids cumulative errors. D: Serverless cost-efficient for short jobs. E: DAG for quality gates. This combination = reliable, cost-efficient pipeline."},
{id:545,type:'multi',topic:'Sharing',difficulty:'hard',q:"Limitations of Snowflake secure data sharing that a SnowPro candidate must know? (Select ALL)",opts:["A) Standard sharing is same-cloud, same-region only","B) Consumers cannot clone shared databases or tables","C) Consumers cannot create streams on shared tables","D) Consumers cannot use Time Travel on shared data","E) A provider can only share with one consumer account at a time"],ans:['A','B','C','D'],exp:"A: Same cloud+region constraint. B: No cloning. C: No streams on shared tables. D: No Time Travel for consumers. E is FALSE — a share can be granted to multiple consumer accounts simultaneously."},
{id:546,type:'multi',topic:'Streams',difficulty:'hard',q:"Which stream design decisions apply specifically to the ShopFlow FACT_ORDERS use case? (Select ALL)",opts:["A) Append-only stream is correct — FACT_ORDERS receives only INSERTs","B) 1-day retention with nightly task creates staleness risk if any run is missed","C) METADATA$ROW_ID is unnecessary — append-only streams don't track updates","D) Consuming in a MERGE handles task retries safely","E) Stream must be in SHOPFLOW_ANALYTICS schema"],ans:['A','B','C','D'],exp:"A: Append-only is correct. B: No buffer — missed run = potential staleness. C: ROW_ID tracks update history; irrelevant for insert-only. D: MERGE idempotency handles retries. E is false — stream schema is independent of source table schema."},
{id:547,type:'multi',topic:'Sharing',difficulty:'hard',q:"A provider grants their share to 5 consumer accounts then revokes one. Which are true? (Select ALL)",opts:["A) Revoke: REVOKE SHARE shopflow_share FROM ACCOUNT consumer_id","B) The other 4 consumers are unaffected","C) Revoked consumer loses access immediately on next query","D) Revoked consumer can still access data cached locally","E) Provider must recreate the share and re-grant to remaining 4 consumers"],ans:['A','B','C'],exp:"A: Correct REVOKE syntax. B: Per-account revocation — others unaffected. C: Zero-copy = no cache = access revoked immediately. D is false — there is no local cache. E is false — existing share is unchanged; only the one consumer is removed."},
{id:548,type:'multi',topic:'Tasks',difficulty:'hard',q:"Potential issues with a 1-minute interval task using SYSTEM$STREAM_HAS_DATA? (Select ALL)",opts:["A) Warehouse wakes every minute even when stream is empty","B) WHEN clause prevents warehouse wakeup — near-zero cost when empty","C) SKIPPED entries appear in TASK_HISTORY every minute — monitoring noise","D) Serverless compute eliminates the 60-second billing concern","E) 1-minute interval requires Enterprise edition"],ans:['B','C','D'],exp:"B: WHEN=FALSE means task SKIPPED and warehouse does NOT wake — near-zero cost. C: High-frequency SKIPPED entries create noisy logs — filter them in monitoring. D: Serverless avoids warehouse billing model. A is FALSE — WHEN clause prevents wakeup. E is false — 1-minute tasks are available on all editions."},
{id:549,type:'multi',topic:'Sharing',difficulty:'medium',q:"Steps a consumer must take after a provider grants them access to a share? (Select ALL)",opts:["A) CREATE DATABASE local_name FROM SHARE provider_locator.share_name","B) GRANT USAGE ON DATABASE local_name TO ROLE analyst_role","C) GRANT SELECT ON ALL TABLES IN DATABASE local_name TO ROLE analyst_role","D) COPY INTO local_table FROM shared_table to make a local copy","E) USE DATABASE local_name then query shared tables directly"],ans:['A','B','C','E'],exp:"A: Mount share as local database. B: Grant database usage to roles. C: Grant SELECT to roles. E: Then query directly. D is WRONG — never COPY data from a share. Zero-copy is the whole point. Copying wastes storage and defeats the purpose."},
{id:550,type:'multi',topic:'Tasks',difficulty:'hard',q:"Which statements about task WHEN clause and SYSTEM$STREAM_HAS_DATA are true? (Select ALL)",opts:["A) WHEN clause is evaluated before the warehouse is activated","B) If WHEN returns FALSE, the task logs as SKIPPED in TASK_HISTORY","C) SYSTEM$STREAM_HAS_DATA can reference streams in different schemas","D) WHEN clause can only be used with serverless tasks","E) A WHEN=FALSE skip counts toward the task's scheduled run — next run is at next interval"],ans:['A','B','C','E'],exp:"A: WHEN evaluation is cheap — happens before warehouse wakeup. B: SKIPPED state is logged. C: Can reference any accessible stream by full path. E: Skip = the schedule advances normally — next run at next interval. D is FALSE — WHEN clause works with both warehouse and serverless tasks."}
];
const QUIZ_POOL_P6=[
{id:601,type:"tf",topic:"Snowpark",difficulty:"easy",q:"Calling get_active_session() is the reliable way to get the Snowpark session in a Snowflake Notebook Python cell.",ans:true,exp:"TRUE. get_active_session() retrieves the running session injected by the Snowflake Notebook runtime. It works regardless of cell execution order. Always import and call it explicitly rather than relying on a bare session variable."},
{id:602,type:"tf",topic:"Visualisation",difficulty:"easy",q:"fig.show() renders Plotly charts correctly inside Snowflake Notebooks.",ans:false,exp:"FALSE. fig.show() requires nbformat which is not installed in Snowflake Notebooks. It throws ValueError: Mime type rendering requires nbformat>=4.2.0. Use st.plotly_chart(fig, use_container_width=True) instead — Streamlit is built in."},
{id:603,type:"tf",topic:"Snowpark",difficulty:"easy",q:"session.sql('SELECT ...') executes the query immediately and returns a Pandas DataFrame.",ans:false,exp:"FALSE. session.sql() returns a lazy Snowpark DataFrame — no execution happens yet. The query only runs when .to_pandas() (or .collect()) is called. This lazy evaluation is a core Snowpark design principle."},
{id:604,type:"tf",topic:"Notebooks",difficulty:"easy",q:"Snowflake Notebooks block all outbound HTTP connections, including urllib and requests.",ans:true,exp:"TRUE. Snowflake Notebook compute has no outbound internet access. urllib imports fine (it is stdlib) but urlopen() fails with a connection error. All external data must be loaded into Snowflake first via COPY INTO."},
{id:605,type:"tf",topic:"Visualisation",difficulty:"medium",q:"px.scatter(trendline='lowess') works in Snowflake Notebooks because statsmodels is pre-installed.",ans:false,exp:"FALSE. statsmodels is NOT pre-installed. trendline='lowess' throws ImportError. Use numpy.polyfit() for trendlines — numpy is pre-installed and needs no extra dependencies."},
{id:606,type:"tf",topic:"Notebooks",difficulty:"medium",q:"A USE DATABASE statement in a SQL cell changes the session context for subsequent Python cells that call session.sql().",ans:true,exp:"TRUE. All cells in a Snowflake Notebook share one session. Context set by USE DATABASE or USE SCHEMA in a SQL cell applies to all subsequent Python session.sql() calls."},
{id:607,type:"mcq",topic:"Snowpark",difficulty:"easy",q:"What is the correct import to get the Snowpark session in a Snowflake Notebook?",opts:["A) from snowflake.connector import connect","B) from snowflake.snowpark.context import get_active_session; session = get_active_session()","C) import snowflake; session = snowflake.session()","D) The session variable is always available — no import needed"],ans:"B",exp:"get_active_session() retrieves the already-running session. Options A and C try to create new connections (requiring credentials). Option D is unreliable — always import explicitly."},
{id:608,type:"mcq",topic:"Visualisation",difficulty:"easy",q:"Which function renders a Plotly figure inline in a Snowflake Notebook cell?",opts:["A) fig.show()","B) display(fig)","C) st.plotly_chart(fig, use_container_width=True)","D) fig.render()"],ans:"C",exp:"st.plotly_chart() is the correct Streamlit function for Plotly figures. fig.show() fails with nbformat error. display() is Jupyter-specific and not available. fig.render() does not exist."},
{id:609,type:"mcq",topic:"Notebooks",difficulty:"medium",q:"A Python cell calls urllib.request.urlopen('https://example.com'). What happens?",opts:["A) Works — Python stdlib has full network access","B) ImportError — urllib not available","C) ConnectionError at urlopen() — outbound internet is blocked","D) Works for HTTPS but not HTTP"],ans:"C",exp:"urllib is Python stdlib and imports fine. The network call fails because Snowflake Notebook compute has no outbound internet. The error occurs at urlopen(), not at import time."},
{id:610,type:"mcq",topic:"Snowpark",difficulty:"medium",q:"Best approach for a chart needing aggregated data from FACT_ORDERS?",opts:["A) Pull full table: session.sql('SELECT * FROM FACT_ORDERS').to_pandas() then aggregate in Pandas","B) Aggregate in SQL: session.sql('SELECT seller_id, SUM(price) FROM FACT_ORDERS GROUP BY 1').to_pandas()","C) session.table('FACT_ORDERS').to_pandas() then filter in Python","D) All three produce identical results"],ans:"B",exp:"Always aggregate in SQL before .to_pandas(). B pulls ~3k rows (one per seller). A and C pull ~112k raw rows each. Less data movement, faster charts, lower notebook memory usage."},
{id:611,type:"mcq",topic:"Visualisation",difficulty:"hard",q:"Which trendline approach works in Snowflake Notebooks without any extra package installation?",opts:["A) px.scatter(trendline='lowess') — needs statsmodels","B) px.scatter(trendline='ols') — needs statsmodels","C) numpy.polyfit() + np.poly1d() — polynomial fit","D) scipy.stats.linregress() — needs scipy"],ans:"C",exp:"numpy is pre-installed in Snowflake Notebooks. polyfit() fits a polynomial, poly1d() creates a callable function from the coefficients. statsmodels and scipy are not guaranteed to be available."},
{id:612,type:"mcq",topic:"Snowpark",difficulty:"easy",q:"session.sql() returns what type of object before .to_pandas() is called?",opts:["A) A Pandas DataFrame","B) A Python list of rows","C) A lazy Snowpark DataFrame","D) A SQL query string"],ans:"C",exp:"session.sql() returns a lazy Snowpark DataFrame. No data is fetched from Snowflake until .to_pandas() or .collect() is called. This lazy evaluation allows chaining transformations before execution."},
{id:613,type:"mcq",topic:"Notebooks",difficulty:"hard",q:"A Notebook has kernel='sql'. A cell has language='python' in its metadata. How is it executed?",opts:["A) Error — Python not allowed when kernel is sql","B) Cell executes as Python — cell-level language overrides notebook kernel","C) Executes as SQL, ignoring metadata","D) Executes as Python only if it is the first cell"],ans:"B",exp:"Snowflake Notebooks use per-cell language metadata independent of the notebook-level kernel. Setting language='python' makes the cell execute as Python even on an SQL-kernel notebook. This is how mixed SQL/Python notebooks work."},
{id:614,type:"multi",topic:"Notebooks",difficulty:"medium",q:"Which are true Snowflake Notebook limitations vs local Jupyter? (Select ALL)",opts:["A) No outbound internet — urllib, requests, Kaggle API all fail","B) statsmodels not installed — trendline='lowess' fails","C) fig.show() fails — nbformat not installed","D) pandas not available — must use Snowpark DataFrames only","E) All chart types blocked — only text output allowed"],ans:["A","B","C"],exp:"A: Outbound internet blocked. B: statsmodels not installed. C: nbformat not installed so fig.show() fails. D is false — pandas IS available. E is false — st.plotly_chart() renders full interactive charts."},
{id:615,type:"multi",topic:"Snowpark",difficulty:"easy",q:"Which correctly describe session.sql().to_pandas()? (Select ALL)",opts:["A) session.sql() is lazy — no SQL executes until to_pandas()","B) to_pandas() triggers SQL and transfers results to Python runtime","C) session.sql() requires explicit credentials each call","D) Aggregate in SQL before to_pandas() to minimise data transfer","E) to_pandas() fails if result has more than 10000 rows"],ans:["A","B","D"],exp:"A: Lazy evaluation. B: to_pandas() triggers execution and transfer. D: Best practice — push aggregation to SQL. C is false — session is already authenticated. E is false — no row limit, just a performance concern."},
{id:616,type:"tf",topic:"Snowpark",difficulty:"easy",q:"session.table('FACT_ORDERS') and session.sql('SELECT * FROM FACT_ORDERS') both return a lazy Snowpark DataFrame without executing any SQL.",ans:true,exp:"TRUE. Both return lazy DataFrames. The SQL only executes when you call .to_pandas(), .collect(), .show(), or another action. This lazy evaluation is fundamental to Snowpark's design."},
{id:617,type:"tf",topic:"Visualisation",difficulty:"easy",q:"Streamlit (st.) is available in Snowflake Notebooks without any pip install.",ans:true,exp:"TRUE. Streamlit is pre-installed in every Snowflake Notebook environment. You can use st.plotly_chart(), st.dataframe(), st.metric(), st.write() etc. directly with no installation."},
{id:618,type:"tf",topic:"Notebooks",difficulty:"easy",q:"You must restart the Snowflake Notebook kernel to switch between SQL and Python cells.",ans:false,exp:"FALSE. Snowflake Notebooks support per-cell language overrides. Each cell has a language selector (SQL or Python). You can switch freely between SQL and Python cells in the same notebook without restarting anything."},
{id:619,type:"tf",topic:"Snowpark",difficulty:"medium",q:"session.sql('SELECT ...').filter(col('price') > 100).to_pandas() is valid — you can chain Snowpark DataFrame methods after session.sql().",ans:true,exp:"TRUE. session.sql() returns a Snowpark DataFrame. You can chain any DataFrame method (.filter(), .select(), .groupBy(), etc.) before calling .to_pandas(). The entire chain is translated to SQL and executed in Snowflake."},
{id:620,type:"tf",topic:"Visualisation",difficulty:"medium",q:"st.dataframe(df) in a Snowflake Notebook renders an interactive scrollable table inline in the cell output.",ans:true,exp:"TRUE. st.dataframe() renders an interactive Streamlit table widget. It supports sorting by column click, resizing columns, and horizontal scrolling. Much better than the default Pandas repr output."},
{id:621,type:"tf",topic:"Snowpark",difficulty:"medium",q:"Calling .to_pandas() on a Snowpark DataFrame consumes warehouse credits.",ans:true,exp:"TRUE. .to_pandas() triggers SQL execution in Snowflake — the warehouse activates, runs the query, and sends results to the notebook. Any SQL execution costs warehouse credits. Minimise data pulled back with aggregations in SQL."},
{id:622,type:"tf",topic:"Notebooks",difficulty:"hard",q:"A Snowflake Notebook can read files from the Snowflake internal stage @OLIST_STAGE using Python.",ans:true,exp:"TRUE. You can read staged files in a Python cell using session.read.csv('@OLIST_STAGE/filename.csv') which returns a Snowpark DataFrame. This bypasses COPY INTO for quick exploration of staged data."},
{id:623,type:"tf",topic:"Visualisation",difficulty:"hard",q:"Plotly Express charts created in Snowflake Notebooks are fully interactive — users can zoom, pan, and hover for tooltips.",ans:true,exp:"TRUE. Plotly charts rendered via st.plotly_chart() retain full Plotly interactivity: zoom, pan, hover tooltips, legend toggles, download as PNG. This is one of the key advantages over static matplotlib charts."},
{id:624,type:"mcq",topic:"Snowpark",difficulty:"easy",q:"Which Snowpark method converts a SQL result to a Python list of Row objects (without pulling into Pandas)?",opts:["A) .to_pandas()","B) .collect()","C) .show()","D) .fetch()"],ans:"B",exp:".collect() returns a list of Row objects in Python memory — lighter than a Pandas DataFrame for small results or programmatic processing. .to_pandas() converts to a full Pandas DataFrame. .show() prints to console but doesn't return a value. .fetch() doesn't exist."},
{id:625,type:"mcq",topic:"Visualisation",difficulty:"easy",q:"You want to display a key metric (e.g. total GMV) prominently in a Notebook. Which Streamlit component fits best?",opts:["A) st.write(gmv)","B) st.metric(label='Total GMV', value=f'R${gmv:,.2f}')","C) st.text(gmv)","D) st.table(gmv)"],ans:"B",exp:"st.metric() displays a value with a label in a styled metric card — ideal for KPIs. It also supports a delta parameter to show change vs previous period. st.write() just prints. st.text() renders plain text. st.table() expects tabular data."},
{id:626,type:"mcq",topic:"Notebooks",difficulty:"easy",q:"How do you run a specific SQL statement from a Python cell without switching the cell language?",opts:["A) sql('SELECT ...')","B) session.sql('SELECT ...').collect()","C) execute_sql('SELECT ...')","D) %sql SELECT ..."],ans:"B",exp:"session.sql('SELECT ...').collect() runs SQL from within a Python cell using the Snowpark session. No magic commands or language switching needed. %sql magic is a Jupyter extension not available in Snowflake Notebooks."},
{id:627,type:"mcq",topic:"Snowpark",difficulty:"medium",q:"You want to pass a Python variable into a session.sql() query safely. Best approach?",opts:["A) session.sql(f'SELECT * FROM t WHERE id = {user_id}') — f-string","B) session.sql('SELECT * FROM t WHERE id = ?', params=[user_id]) — parameterized","C) session.sql('SELECT * FROM t WHERE id = :id').bindVariable('id', user_id)","D) Create a temp table with the value then join"],ans:"A",exp:"In Snowflake Notebooks session.sql() does not support parameterized queries with ? or :name syntax. The f-string approach (option A) is the standard pattern used in practice. For production pipelines, sanitize inputs carefully. Option D works but is overkill for simple filtering."},
{id:628,type:"mcq",topic:"Visualisation",difficulty:"medium",q:"You have a Pandas DataFrame df with columns MONTH and GMV_BRL. Which px call creates a bar chart with months on x-axis?",opts:["A) px.bar(df, x='month', y='GMV_BRL')","B) px.bar(df, x='MONTH', y='GMV_BRL')","C) px.bar(df, 'MONTH', 'GMV_BRL')","D) px.histogram(df, x='MONTH')"],ans:"B",exp:"Snowflake returns column names in UPPERCASE. When session.sql().to_pandas() creates the DataFrame, all column names are uppercase. Use 'MONTH' and 'GMV_BRL' (uppercase) to match. Option A with lowercase 'month' would throw a KeyError."},
{id:629,type:"mcq",topic:"Notebooks",difficulty:"hard",q:"A Python cell caches a DataFrame: df = session.sql(...).to_pandas(). The underlying Snowflake table is then updated. What happens when the cell runs again?",opts:["A) df automatically refreshes — Snowpark detects the table change","B) df still holds the old data — re-running the cell re-executes the SQL and gets fresh data","C) df raises a StaleDataException","D) The session automatically invalidates the cache"],ans:"B",exp:"Python variables hold their value in memory until reassigned. df doesn't auto-refresh. To get fresh data, re-run the cell — session.sql().to_pandas() executes the SQL again at that moment. There is no auto-refresh or change detection."},
{id:630,type:"mcq",topic:"Snowpark",difficulty:"hard",q:"session.sql('SELECT * FROM FACT_ORDERS').to_pandas() vs session.sql('SELECT seller_id, SUM(price) FROM FACT_ORDERS GROUP BY 1').to_pandas() — what is the key difference for a chart showing revenue by seller?",opts:["A) No difference — Pandas aggregates efficiently either way","B) First pulls ~112k rows to Python; second pulls ~3k rows — same chart, 37x less data transfer","C) First fails because SELECT * is not supported with to_pandas()","D) Second runs slower because GROUP BY is computed in Python not SQL"],ans:"B",exp:"Always aggregate in SQL. The first query transfers all 112k order rows to the notebook. The second aggregates in Snowflake and transfers only ~3k seller rows. Same chart, same result, but 37x less data movement, faster execution, lower memory usage in the notebook."}
